name: Release Recovery

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub draft Release tag to recover
        required: true
        type: string
      source_run_id:
        description: Failed CD run that built and verified the release artifact
        required: true
        type: string
      app_store_not_synced:
        description: I confirmed the failed CD never reached Halo App Store sync
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-recovery-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout exact release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: refs/tags/${{ inputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.18.0"

      - name: Verify exact failed state
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          APP_STORE_NOT_SYNCED: ${{ inputs.app_store_not_synced }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must be an exact semantic version tag."
            exit 1
          fi
          if [[ "$APP_STORE_NOT_SYNCED" != "true" ]]; then
            echo "Recovery is allowed only after explicitly confirming that Halo App Store sync never ran."
            exit 1
          fi
          if [[ ! "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "source_run_id must be numeric."
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "release_tag must resolve to an existing tag, not a branch."
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"
          if [[ "$(git rev-parse HEAD)" != "$tag_commit" ]]; then
            echo "Checked-out commit does not match the exact release tag."
            exit 1
          fi
          source_name="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .name)"
          source_event="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .event)"
          source_branch="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .head_branch)"
          source_sha="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .head_sha)"
          source_conclusion="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .conclusion)"
          source_attempt="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .run_attempt)"
          if [[ "$source_name" != "CD" || "$source_event" != "push" || "$source_branch" != "$RELEASE_TAG" || "$source_sha" != "$tag_commit" || "$source_conclusion" != "failure" ]]; then
            echo "Source run must be a failed CD push for the exact release tag commit."
            exit 1
          fi

          mapfile -t app_store_step_conclusions < <(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID/jobs?per_page=100" --paginate \
              --jq '.jobs[] | select(.name == "release") | .steps[] | select(.name == "Sync release to Halo App Store") | .conclusion'
          )
          if [[ ${#app_store_step_conclusions[@]} -ne 1 || "${app_store_step_conclusions[0]}" != "skipped" ]]; then
            echo "The source CD must prove that Halo App Store sync was skipped exactly once."
            exit 1
          fi

          mapfile -t release_ids < <(
            gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" --paginate \
              --jq '.[] | select(.tag_name == env.RELEASE_TAG) | .id'
          )
          if [[ ${#release_ids[@]} -ne 1 ]]; then
            echo "Expected exactly one GitHub Release for $RELEASE_TAG, found ${#release_ids[@]}."
            exit 1
          fi

          release_id="${release_ids[0]}"
          release_is_draft="$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" --jq .draft)"
          if [[ "$release_is_draft" != "true" ]]; then
            echo "Release $release_id is not a draft; recovery must stop."
            exit 1
          fi

          printf 'release_id=%s\n' "$release_id" >> "$GITHUB_OUTPUT"
          printf 'artifact_name=release-package-%s-%s\n' "$SOURCE_RUN_ID" "$source_attempt" >> "$GITHUB_OUTPUT"

      - name: Download and compare verified release artifact
        id: package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.state.outputs.release_id }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          ARTIFACT_NAME: ${{ steps.state.outputs.artifact_name }}
        run: |
          gh run download "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$ARTIFACT_NAME" --dir dist
          mapfile -t packages < <(find dist -maxdepth 1 -type f -name '*.zip' -print)
          if [[ ${#packages[@]} -ne 1 ]]; then
            echo "Expected exactly one ZIP in the verified artifact, found ${#packages[@]}."
            exit 1
          fi

          package_path="${packages[0]}"
          package_name="$(basename "$package_path")"
          node scripts/verify-release-package.mjs "$package_path"
          export PACKAGE_NAME="$package_name"
          mapfile -t asset_ids < <(
            gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
              --jq '.assets[] | select(.name == env.PACKAGE_NAME) | .id'
          )
          if [[ ${#asset_ids[@]} -ne 1 ]]; then
            echo "Draft Release must contain exactly one $package_name asset."
            exit 1
          fi

          release_asset_path="$RUNNER_TEMP/$package_name"
          gh api -H "Accept: application/octet-stream" \
            "repos/$GITHUB_REPOSITORY/releases/assets/${asset_ids[0]}" > "$release_asset_path"
          artifact_sha256="$(sha256sum "$package_path" | awk '{print $1}')"
          release_sha256="$(sha256sum "$release_asset_path" | awk '{print $1}')"
          if [[ "$artifact_sha256" != "$release_sha256" ]]; then
            echo "GitHub draft asset does not match the verified CD artifact."
            exit 1
          fi
          printf 'sha256=%s\n' "$artifact_sha256" >> "$GITHUB_OUTPUT"

      - name: Sync existing draft to Halo App Store
        id: app-store
        uses: halo-sigs/app-store-release-action@0b0b351312114a42a544471c1ee0b78d3f635e51 # v4
        with:
          github-token: ${{ github.token }}
          app-id: app-gqnoxtpt
          release-id: ${{ steps.state.outputs.release_id }}
          assets-dir: dist
          halo-pat: ${{ secrets.HALO_PAT }}

      - name: Explain App Store draft cleanup on failure
        if: failure() && steps.app-store.outcome == 'failure'
        shell: bash
        run: |
          echo "::error::Halo App Store recovery failed and may have left a draft. Inspect and clean that exact Halo draft before any further recovery attempt. Keep the GitHub draft unchanged."

      - name: Publish existing GitHub draft
        id: publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.state.outputs.release_id }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          max_attempts=5
          for attempt in $(seq 1 "$max_attempts"); do
            if gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F draft=false >/dev/null \
              && [[ "$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .draft)" == "false" ]] \
              && [[ "$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .tag_name)" == "$RELEASE_TAG" ]]; then
              echo "GitHub Release $RELEASE_TAG published on recovery attempt $attempt/$max_attempts."
              exit 0
            fi
            if [[ "$attempt" -lt "$max_attempts" ]]; then
              sleep $((attempt * 5))
            fi
          done
          exit 1

      - name: Explain publish recovery
        if: failure() && steps.app-store.outcome == 'success' && steps.publish.outcome == 'failure'
        shell: bash
        run: |
          echo "::error::Halo App Store sync succeeded, but GitHub is still a draft. Publish Release ID ${{ steps.state.outputs.release_id }} directly; do not rerun recovery."
