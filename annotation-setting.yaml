apiVersion: v1alpha1
kind: AnnotationSetting
metadata:
  name: theme-sky-blog-3-tag-setting
spec:
  targetRef:
    group: content.halo.run
    kind: Tag
  formSchema:
    - $formkit: iconify
      id: icon
      key: icon
      name: icon
      label: 标签图标 (SVG)
      format: svg
      value-only: true
      help: 选择一个图标用于随机标签小组件。
