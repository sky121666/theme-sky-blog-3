<!DOCTYPE html>
<th:block xmlns:th="https://www.thymeleaf.org"
          th:with="
            baseTitle=${title ?: '图库'},
            isAlbumsView=${param.view != null and !#lists.isEmpty(param.view) and param.view[0] == 'albums'},
            isGroupView=${param.group != null and !#lists.isEmpty(param.group)},
            activeGroup=${isGroupView ? param.group[0] : ''},
            photosViewValue=${isAlbumsView ? 'albums' : (isGroupView ? 'group' : 'library')},
            groupNameIndex=${groups != null ? groups.![metadata.name].indexOf(activeGroup) : -1},
            resolvedWindowTitle=${isAlbumsView ? '精选集' : (isGroupView ? (groupNameIndex >= 0 ? groups[groupNameIndex].spec.displayName : activeGroup) : baseTitle)},
            resolvedWindowSubtitle=${isAlbumsView ? ((groups != null ? #lists.size(groups) : 0) + ' 个相簿') : ((photos != null ? photos.total : 0) + ' 张照片')},
            resolvedDocumentTitle=${resolvedWindowTitle + ' - ' + site.title}">
  <html th:replace="~{modules/shell/layout :: html(
          title = ${resolvedDocumentTitle},
          description = '网站图库相册',
          ssrContent = ~{::ssrBlock},
          canonical = '/photos',
          image = ${site.logo},
          type = 'website',
          seoFallback = 'meta',
          pageMode = 'browser-list',
          pageApp = 'photos',
          windowVariant = 'photos',
          windowScene = 'none',
          windowTitle = ${resolvedWindowTitle},
          windowResizable = true,
          windowMaximizable = true,
          windowMetricsKey = 'photos'
        )}">
    <th:block th:fragment="ssrBlock">
    <div class="photos-shell"
         data-app-root="photos"
         x-data="photosExplorer"
         th:attr="data-photos-view=${photosViewValue}"
         th:attrappend=" data-photos-site-title=${site.title}, data-photos-chrome-title=${resolvedWindowTitle}, data-photos-chrome-subtitle=${resolvedWindowSubtitle}">
      <script type="application/json" data-app-props="photos" th:inline="javascript">{"version":1,"appId":"photos","data":{"view":[[${photosViewValue}]]}}</script>
      <!-- =============== 左侧边栏 =============== -->
      <aside class="photos-sidebar">
        <!-- 固定系统项 -->
        <nav class="photos-sidebar-section">
          <a class="photos-sidebar-item pjax-link"
             href="/photos"
             th:classappend="${!isAlbumsView and !isGroupView ? 'is-active' : ''}">
            <span class="photos-sidebar-icon icon-[lucide--images]" aria-hidden="true"></span>
            <span class="photos-sidebar-label">图库</span>
          </a>
          <a class="photos-sidebar-item pjax-link"
             href="/photos?view=albums"
             th:classappend="${isAlbumsView ? 'is-active' : ''}">
            <span class="photos-sidebar-icon icon-[lucide--folder]" aria-hidden="true"></span>
            <span class="photos-sidebar-label">精选集</span>
          </a>
        </nav>

        <!-- 相册分组 -->
        <div class="photos-sidebar-section" th:if="${not #lists.isEmpty(groups)}">
          <p class="photos-sidebar-section-title">相簿</p>
          <nav class="photos-sidebar-nav">
            <a class="photos-sidebar-item pjax-link"
               th:each="groupItem : ${groups}"
               th:with="
                 groupIcon=${#annotations.getOrDefault(groupItem, 'icon', '')},
                 groupLeadPhoto=${groupItem.photos != null and !#lists.isEmpty(groupItem.photos) ? groupItem.photos[0] : null},
                 groupCover=${groupLeadPhoto != null ? (!#strings.isEmpty(groupLeadPhoto.spec.cover) ? groupLeadPhoto.spec.cover : groupLeadPhoto.spec.url) : ''}
               "
               th:href="@{/photos(group=${groupItem.metadata.name})}"
               th:classappend="${activeGroup == groupItem.metadata.name ? 'is-active' : ''}">
             
             <!-- 优先使用用户配置的 SVG 图标 -->
             <span th:if="${!#strings.isEmpty(groupIcon)}" class="photos-sidebar-custom-icon" th:utext="${groupIcon}"></span>
             
             <!-- 否则使用默认图标 -->
             <span th:unless="${!#strings.isEmpty(groupIcon)}"
                   class="photos-sidebar-icon icon-[lucide--folder]"
                   aria-hidden="true"></span>
              <span class="photos-sidebar-label" th:text="${groupItem.spec.displayName}">相册</span>
              <span class="photos-sidebar-badge" th:text="${groupItem.status?.photoCount ?: ''}" th:if="${groupItem.status?.photoCount != null}"></span>
            </a>
          </nav>
        </div>
      </aside>

      <!-- =============== 主内容区 =============== -->
      <div class="photos-main">
        <!-- ── 视图A: 精选集 (Albums) ── -->
        <div class="photos-albums-view" th:if="${isAlbumsView}">
          <div th:if="${not #lists.isEmpty(groups)}">
            <div class="photos-albums-section">
              <!-- Section Header -->
              <div class="photos-albums-section-header">
                <h2 class="photos-albums-section-title">我的相簿</h2>
              </div>
              <div class="photos-album-grid"
                   :style="{ '--albums-col-count': effectiveColCountValue }">
                <a class="photos-album-card pjax-link"
                   th:each="groupItem : ${groups}"
                   th:with="
                     groupLeadPhoto=${groupItem.photos != null and !#lists.isEmpty(groupItem.photos) ? groupItem.photos[0] : null},
                     groupCoverPrimary=${groupLeadPhoto != null ? (!#strings.isEmpty(groupLeadPhoto.spec.cover) ? groupLeadPhoto.spec.cover : groupLeadPhoto.spec.url) : ''},
                     groupPhotoCount=${groupItem.status?.photoCount ?: 0}
                   "
                   th:href="@{/photos(group=${groupItem.metadata.name})}">
                  <div class="photos-album-cover-stack">
                    <div class="photos-album-cover photos-album-cover--front">
                      <img th:if="${!#strings.isEmpty(groupCoverPrimary)}"
                           class="photos-album-cover-image"
                           th:src="${groupCoverPrimary}"
                           th:alt="${groupItem.spec.displayName}"
                           loading="lazy"
                           decoding="async"
                           fetchpriority="low" />
                      <div th:unless="${!#strings.isEmpty(groupCoverPrimary)}" class="photos-album-cover-placeholder">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
                          <rect x="6" y="12" width="36" height="28" rx="4" stroke="currentColor" stroke-width="2" stroke-opacity="0.4"/>
                          <circle cx="18" cy="24" r="5" stroke="currentColor" stroke-width="2" stroke-opacity="0.4"/>
                          <path d="M6 36L16 27L21 32L27 26L42 36" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.4"/>
                        </svg>
                      </div>
                      <div class="photos-album-overlay" aria-hidden="true"></div>
                      <div class="photos-album-overlay-copy">
                        <span class="photos-album-overlay-title" th:text="${groupItem.spec.displayName}">相册名</span>
                        <span class="photos-album-overlay-count" th:text="${groupPhotoCount + ' 张'}">0 张</span>
                      </div>
                    </div>
                  </div>
                </a>
              </div>
            </div>
          </div>
          <div class="photos-empty" th:if="${#lists.isEmpty(groups)}">
            <svg viewBox="0 0 64 64" fill="none" width="48" height="48"><rect x="8" y="16" width="48" height="36" rx="6" stroke="currentColor" stroke-width="2" stroke-opacity="0.3"/><circle cx="24" cy="32" r="7" stroke="currentColor" stroke-width="2" stroke-opacity="0.3"/><path d="M8 48L22 36L29 42.5L38 34L56 48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-opacity="0.3"/></svg>
            <p>还没有相册，去后台创建吧</p>
          </div>
        </div>

        <!-- ── 视图B: 照片时间线 / 单相册 ── -->
        <div class="photos-grid-view" th:if="${!isAlbumsView}">
          <div class="photos-grid-scroll">
            <div class="photos-grid" :class="{ 'photos-grid--square': layoutMode === 'square', 'photos-grid--masonry': layoutMode === 'aspect' }" :style="{ '--col-count': effectiveColCountValue }">
              <div class="photo-card"
                   th:each="photo : ${photos.items}"
                   @click="openLightbox($event)"
                   th:attr="data-photo-url=${photo.spec.url},data-photo-desc=${photo.spec.description},data-photo-name=${photo.spec.displayName},data-photo-date=${#dates.format(photo.metadata.creationTimestamp, 'yyyy.MM.dd')}">
                <div class="photo-card-inner">
                  <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                       th:attr="data-src=${photo.spec.url}"
                       class="photo-card-img lazyload"
                       alt="" />
                  <!-- Hover info overlay -->
                  <div class="photo-card-overlay">
                    <span class="photo-card-overlay-text" th:text="${photo.spec.displayName}"></span>
                  </div>
                </div>
              </div>
            </div>

            <div class="photos-empty" th:if="${photos == null or #lists.isEmpty(photos.items)}">
              <svg viewBox="0 0 64 64" fill="none" width="48" height="48"><rect x="8" y="16" width="48" height="36" rx="6" stroke="currentColor" stroke-width="2" stroke-opacity="0.3"/><circle cx="24" cy="32" r="7" stroke="currentColor" stroke-width="2" stroke-opacity="0.3"/><path d="M8 48L22 36L29 42.5L38 34L56 48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-opacity="0.3"/></svg>
              <p>这里还没有照片</p>
            </div>

            <!-- 无限滚动:  sentinel -->
            <div class="photos-scroll-sentinel">
              <!-- 下一页链接，由 JS 读取并隐藏 -->
              <a id="next-page-url"
                 th:if="${photos != null and photos.hasNext()}"
                 th:href="@{${photos.nextUrl}}"
                 style="display:none;" aria-hidden="true"></a>
              <!-- Spinner -->
              <div id="photos-loading-spinner" class="photos-spinner hidden">
                <span class="icon-[lucide--loader-circle]" aria-hidden="true"></span>
              </div>
              <!-- End of content -->
              <div id="photos-no-more" class="photos-no-more hidden">— 已全部加载 —</div>
            </div>
          </div>
        </div>
      </div>

      <!-- =============== Lightbox =============== -->
      <template x-teleport="body">
        <div class="photos-lightbox"
             x-show="lightboxOpen"
             x-transition.opacity.duration.300ms
             @click="closeLightbox()"
             @keydown.escape.window="closeLightbox()"
             tabindex="0"
             style="display: none;">
          <div class="photos-lightbox-toolbar" @click.stop>
            <div class="photos-lightbox-meta">
              <span class="photos-lightbox-name" x-text="currentName" x-show="currentName"></span>
              <span class="photos-lightbox-date" x-text="currentDate"></span>
            </div>
            <button type="button" class="photos-lightbox-close" @click="closeLightbox()" aria-label="关闭">
              <span class="icon-[lucide--x]" aria-hidden="true"></span>
            </button>
          </div>
          <div class="photos-lightbox-view" @click.stop>
            <img :src="currentUrl" class="photos-lightbox-image" alt="大图" />
            <p class="photos-lightbox-desc" x-show="currentDesc" x-text="currentDesc"></p>
          </div>
        </div>
      </template>
    </div>
    </th:block>
  </html>
</th:block>
