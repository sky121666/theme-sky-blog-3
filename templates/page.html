<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = ${page.spec.title} + ' - ' + ${site.title},
        description = ${page.status.excerpt},
        ssrContent = ~{::ssrBlock}
      )}">
  <th:block th:fragment="ssrBlock">
    <div class="max-w-3xl mx-auto px-6 md:px-12 py-10 md:py-16">
      <div class="mb-14 text-center">
        <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-gray-900 mb-6" th:text="${page.spec.title}"></h1>
      </div>
      
      <!-- 官方 Typography 高阶文本直出 -->
      <article class="prose prose-lg md:prose-xl prose-slate max-w-none prose-img:rounded-2xl prose-img:shadow-lg prose-a:text-blue-600 hover:prose-a:text-blue-500"
               th:utext="${page.content.content}">
      </article>
      
      <!-- 评论区容器 -->
      <div class="mt-16 pt-8 border-t border-gray-100" th:if="${pluginFinder.available('PluginCommentWidget')}">
          <halo:comment
              group="content.halo.run"
              kind="SinglePage"
              th:attr="name=${page.metadata.name}"
              colorScheme="light"
          />
      </div>
    </div>
  </th:block>
</html>
