<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = ${page.spec.title} + ' - ' + ${site.title},
        description = ${page.status.excerpt},
        ssrContent = ~{::ssrBlock}
      )}">
  <th:block th:fragment="ssrBlock">
    <div class="post-reader-shell">
      <div class="post-reader-frame">
        <header class="post-header">
          <div class="post-kicker">Page</div>
          <h1 class="post-title" th:text="${page.spec.title}"></h1>
          <p class="post-summary" th:if="${!#strings.isEmpty(page.status.excerpt)}" th:text="${page.status.excerpt}"></p>
        </header>

        <article id="article-content" class="post-content" th:utext="${page.content.content}"></article>

        <section id="post-comments" class="post-comments" th:if="${pluginFinder.available('PluginCommentWidget')}">
          <h2 class="post-comments-title">评论</h2>
          <div class="post-comments-shell">
            <halo:comment
                group="content.halo.run"
                kind="SinglePage"
                th:attr="name=${page.metadata.name}"
                colorScheme="light"
            />
          </div>
        </section>
      </div>
    </div>
  </th:block>
</html>
