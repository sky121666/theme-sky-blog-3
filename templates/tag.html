<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = ${tag.spec.displayName + ' - ' + site.title},
        description = ${tag.spec.displayName + ' 标签下的 ' + posts.total + ' 篇文章'},
        ssrContent = ~{::ssrBlock},
        canonical = ${tag.status.permalink},
        image = ${!#strings.isEmpty(tag.spec.cover) ? tag.spec.cover : site.logo},
        type = 'website',
        seoFallback = 'meta',
        pageMode = 'browser-list',
        pageApp = 'explorer'
      )}">
  <th:block th:fragment="ssrBlock">
    <div class="tag-shell">
      <div class="tag-workspace"
           th:if="${posts != null and !#lists.isEmpty(posts.items)}"
           x-data="tagPostsExplorer">
        <aside class="tag-folder-pane">
          <header class="tag-folder-header">
            <span class="tag-folder-kicker">标签文件夹</span>
            <a class="tag-folder-back pjax-link" href="/tags">返回全部标签</a>
          </header>

          <div class="tag-folder-card is-active">
            <div class="tag-folder-icon-wrap">
              <svg class="tags-folder-icon tags-folder-icon--detail" viewBox="0 0 20 16" fill="none" aria-hidden="true">
                <path d="M1.5 4.25C1.5 3.00736 2.50736 2 3.75 2H7.375C7.94958 2 8.50106 2.22076 8.91529 2.61612L10.0897 3.75H16.25C17.4926 3.75 18.5 4.75736 18.5 6V11.75C18.5 12.9926 17.4926 14 16.25 14H3.75C2.50736 14 1.5 12.9926 1.5 11.75V4.25Z" fill="currentColor"/>
              </svg>
            </div>
            <div class="tag-folder-copy">
              <h1 class="tag-folder-title" th:text="${tag.spec.displayName}">标签</h1>
              <p class="tag-folder-meta" th:text="${posts.total} + ' 篇文章'">0 篇文章</p>
            </div>
          </div>

          <dl class="tag-folder-meta-list">
            <div>
              <dt>别名</dt>
              <dd th:text="${tag.spec.slug}">slug</dd>
            </div>
            <div>
              <dt>文章数量</dt>
              <dd th:text="${posts.total} + ' 篇'">0 篇</dd>
            </div>
            <div>
              <dt>颜色</dt>
              <dd class="tags-preview-color">
                <span class="tags-color-chip" th:style="'background:' + (${#strings.isEmpty(tag.spec.color)} ? '#94a3b8' : tag.spec.color)"></span>
                <span th:text="${#strings.isEmpty(tag.spec.color) ? '未设置' : tag.spec.color}">#94a3b8</span>
              </dd>
            </div>
          </dl>
        </aside>

        <section class="tag-posts-pane">
          <header class="tags-pane-header">
            <span class="tags-pane-title">文章</span>
            <span class="tags-pane-path" th:text="${tag.spec.displayName}">标签</span>
          </header>

          <div class="tag-posts-scroll">
            <a class="tag-post-row pjax-link"
               data-pjax-app="reader"
               th:each="post : ${posts.items}"
               th:href="${post.status.permalink}"
               data-tag-post-option
               th:attr="data-post-key=${post.metadata.name},data-post-title=${post.spec.title}"
               @mouseenter="selectPost($el.dataset.postKey, $el.dataset.postTitle)"
               @focus="selectPost($el.dataset.postKey, $el.dataset.postTitle)"
               @click="selectPost($el.dataset.postKey, $el.dataset.postTitle)"
               :class="{ 'is-active': activePostKey === $el.dataset.postKey }">
              <div class="tag-post-row-main">
                <svg class="tag-post-file-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 1.75H9.25L12.5 5V12.5C12.5 13.3284 11.8284 14 11 14H4C3.17157 14 2.5 13.3284 2.5 12.5V3.25C2.5 2.42157 3.17157 1.75 4 1.75Z" stroke="currentColor" stroke-width="1.1"/>
                  <path d="M9 1.75V5.25H12.5" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
                </svg>
                <span class="tag-post-row-title" th:text="${post.spec.title}">文章标题</span>
              </div>
              <span class="tag-post-row-meta">
                <time th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.03.26</time>
                <span th:text="${post.stats.comment} + ' 评论'">0 评论</span>
              </span>
            </a>
          </div>

          <nav class="tag-pagination" th:if="${posts.hasPrevious() or posts.hasNext()}">
            <a class="tag-page-btn pjax-link"
               th:if="${posts.hasPrevious()}"
               th:href="@{${posts.prevUrl}}">
              上一页
            </a>
            <span class="tag-page-btn is-disabled" th:unless="${posts.hasPrevious()}">上一页</span>

            <span class="tag-page-indicator" th:text="${posts.page} + ' / ' + ${posts.totalPages}">1 / 1</span>

            <a class="tag-page-btn pjax-link"
               th:if="${posts.hasNext()}"
               th:href="@{${posts.nextUrl}}">
              下一页
            </a>
            <span class="tag-page-btn is-disabled" th:unless="${posts.hasNext()}">下一页</span>
          </nav>
        </section>

        <aside class="tag-preview-pane">
          <header class="tags-pane-header">
            <span class="tags-pane-title">预览</span>
            <span class="tags-pane-path" x-text="activePostTitle || '未选择文章'"></span>
          </header>

          <div class="tag-preview-scroll">
            <th:block th:each="post : ${posts.items}">
              <article class="tag-preview-panel"
                       data-tag-post-panel
                       th:attr="data-post-key=${post.metadata.name}"
                       x-show="activePostKey === $el.dataset.postKey"
                       x-cloak>
                <header class="tag-preview-header">
                  <div class="tag-preview-icon">
                    <svg class="tag-post-file-icon tag-post-file-icon--preview" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                      <path d="M4 1.75H9.25L12.5 5V12.5C12.5 13.3284 11.8284 14 11 14H4C3.17157 14 2.5 13.3284 2.5 12.5V3.25C2.5 2.42157 3.17157 1.75 4 1.75Z" stroke="currentColor" stroke-width="1.1"/>
                      <path d="M9 1.75V5.25H12.5" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
                    </svg>
                  </div>
                  <div class="tag-preview-heading">
                    <h2 class="tag-preview-title" th:text="${post.spec.title}">文章标题</h2>
                    <p class="tag-preview-path" th:text="${tag.spec.displayName} + ' / ' + ${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">标签 / 时间</p>
                  </div>
                </header>

                <dl class="tag-preview-meta">
                  <div>
                    <dt>发布日期</dt>
                    <dd th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.03.26</dd>
                  </div>
                  <div>
                    <dt>评论</dt>
                    <dd th:text="${post.stats.comment} + ' 条'">0 条</dd>
                  </div>
                  <div>
                    <dt>作者</dt>
                    <dd th:text="${post.owner != null ? post.owner.displayName : site.title}">作者</dd>
                  </div>
                </dl>

                <p class="tag-preview-excerpt"
                   th:if="${!#strings.isEmpty(post.status.excerpt)}"
                   th:text="${post.status.excerpt}">
                  摘要
                </p>

                <a class="tag-preview-action pjax-link" data-pjax-app="reader" th:href="${post.status.permalink}">打开文章</a>
              </article>
            </th:block>

            <section class="tag-preview-empty" x-show="!activePostKey" x-cloak>
              <p>选择一篇文章后，在这里查看摘要与元信息。</p>
            </section>
          </div>
        </aside>
      </div>

      <div class="tag-empty" th:if="${posts == null or #lists.isEmpty(posts.items)}">
        <div class="tag-folder-card is-active">
          <div class="tag-folder-icon-wrap">
            <svg class="tags-folder-icon tags-folder-icon--detail" viewBox="0 0 20 16" fill="none" aria-hidden="true">
              <path d="M1.5 4.25C1.5 3.00736 2.50736 2 3.75 2H7.375C7.94958 2 8.50106 2.22076 8.91529 2.61612L10.0897 3.75H16.25C17.4926 3.75 18.5 4.75736 18.5 6V11.75C18.5 12.9926 17.4926 14 16.25 14H3.75C2.50736 14 1.5 12.9926 1.5 11.75V4.25Z" fill="currentColor"/>
            </svg>
          </div>
          <div class="tag-folder-copy">
            <h1 class="tag-folder-title" th:text="${tag.spec.displayName}">标签</h1>
            <p class="tag-folder-meta">当前标签下没有文章</p>
          </div>
        </div>
      </div>
    </div>
  </th:block>
</html>
