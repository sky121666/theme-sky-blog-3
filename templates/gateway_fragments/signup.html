<!-- ========================================== -->
<!--    Gateway Fragments - Signup             -->
<!--    注册表单片段                            -->
<!-- ========================================== -->

<form th:fragment="form" class="auth-form-stack" name="signup-form" id="signup-form" th:action="@{/signup}"
    th:object="${form}" method="post">
    <div class="auth-view-header">
        <h2 class="auth-view-title">创建账户</h2>
        <p class="auth-view-subtitle">填写以下信息完成注册</p>
    </div>

    <!-- 错误提示 -->
    <div class="auth-alert auth-alert-error" role="alert" th:if="${error == 'invalid-email-code'}">
        <svg class="auth-alert-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span>邮箱验证码无效或已过期</span>
    </div>
    <div class="auth-alert auth-alert-error" role="alert" th:if="${error == 'rate-limit-exceeded'}">
        <svg class="auth-alert-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span>请求过于频繁，请稍后再试</span>
    </div>
    <div class="auth-alert auth-alert-error" role="alert" th:if="${error == 'duplicate-username'}">
        <svg class="auth-alert-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span>该用户名已被使用</span>
    </div>
    <div class="auth-alert auth-alert-error" role="alert" th:if="${error == 'restricted-username'}">
        <svg class="auth-alert-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span>该用户名不可用</span>
    </div>

    <!-- 用户名 + 显示名称 -->
    <div class="auth-field-row">
        <div class="auth-field">
            <label for="username">用户名</label>
            <div class="auth-input-wrap">
                <span class="auth-input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21a8 8 0 0 0-16 0"></path>
                        <circle cx="12" cy="8" r="4"></circle>
                    </svg>
                </span>
                <input type="text" id="username" name="username" placeholder="用户名" autocomplete="username"
                    spellcheck="false" autocorrect="off" autocapitalize="off" autofocus required minlength="4"
                    maxlength="63" th:field="*{username}" class="auth-input auth-input-with-icon" />
            </div>
            <p class="auth-field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        </div>

        <div class="auth-field">
            <label for="displayName">显示名称</label>
            <div class="auth-input-wrap">
                <span class="auth-input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 13c-3.314 0-6 2.239-6 5h12c0-2.761-2.686-5-6-5Z"></path>
                        <circle cx="12" cy="7.5" r="3.5"></circle>
                    </svg>
                </span>
                <input type="text" id="displayName" name="displayName" placeholder="显示名称" autocomplete="name"
                    spellcheck="false" autocorrect="off" autocapitalize="off" required th:field="*{displayName}"
                    class="auth-input auth-input-with-icon" />
            </div>
            <p class="auth-field-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></p>
        </div>
    </div>

    <!-- 邮箱 + 验证码 -->
    <div class="auth-field">
        <label for="email">邮箱地址</label>
        <div class="auth-input-wrap">
            <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="5" width="18" height="14" rx="3"></rect>
                    <path d="m5 8 7 5 7-5"></path>
                </svg>
            </span>
            <input type="email" id="email" name="email" placeholder="邮箱地址" autocomplete="email"
                spellcheck="false" autocorrect="off" autocapitalize="off" required th:field="*{email}"
                class="auth-input auth-input-with-icon" />
        </div>
        <p class="auth-field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
    </div>

    <div class="auth-field" th:if="${globalInfo.mustVerifyEmailOnRegistration}">
        <label for="emailCode">验证码</label>
        <div class="auth-input-group auth-input-group-code">
            <div class="auth-input-wrap">
                <span class="auth-input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3 4.5 7v5c0 4.2 2.75 8.1 7.5 9 4.75-.9 7.5-4.8 7.5-9V7L12 3Z"></path>
                        <path d="m9.5 12 1.75 1.75L14.75 10"></path>
                    </svg>
                </span>
                <input type="text" inputmode="numeric" pattern="\d*" id="emailCode" name="emailCode" placeholder="6 位验证码"
                    required class="auth-input auth-input-with-icon" />
            </div>
            <button id="emailCodeSendButton" type="button" class="auth-btn auth-btn-secondary auth-code-send-btn">
                发送
            </button>
        </div>
        <p class="auth-field-error" th:if="${#fields.hasErrors('emailCode')}" th:errors="*{emailCode}"></p>
    </div>

    <!-- 密码 -->
    <div class="auth-field">
        <label for="password">密码</label>
        <div class="auth-password-wrap auth-input-wrap">
            <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="11" width="16" height="9" rx="2"></rect>
                    <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                </svg>
            </span>
            <input id="password" name="password" type="password" placeholder="设置密码" autocomplete="new-password" required
                minlength="5" maxlength="257" class="auth-input auth-input-with-icon" />
            <button type="button" class="auth-toggle-password" tabindex="-1">
                <svg class="auth-icon-eye-show" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c5.392 0 9.878 3.88 10.819 9c-.94 5.12-5.427 9-10.819 9c-5.392 0-9.878-3.88-10.818-9C2.122 6.88 6.608 3 12 3Zm0 16a9.005 9.005 0 0 0 8.778-7a9.005 9.005 0 0 0-17.555 0A9.005 9.005 0 0 0 12 19Zm0-2.5a4.5 4.5 0 1 1 0-9a4.5 4.5 0 0 1 0 9Zm0-2a2.5 2.5 0 1 0 0-5a2.5 2.5 0 0 0 0 5Z"></path></svg>
                <svg class="auth-icon-eye-hide" style="display:none" viewBox="0 0 24 24" fill="currentColor"><path d="M17.883 19.297A10.949 10.949 0 0 1 12 21c-5.392 0-9.878-3.88-10.818-9A10.982 10.982 0 0 1 4.52 5.935L1.394 2.808l1.414-1.414l19.799 19.798l-1.414 1.415l-3.31-3.31ZM5.936 7.35A8.965 8.965 0 0 0 3.223 12a9.005 9.005 0 0 0 13.201 5.838l-2.028-2.028A4.5 4.5 0 0 1 8.19 9.604L5.936 7.35Zm6.978 6.978l-3.242-3.241a2.5 2.5 0 0 0 3.241 3.241Zm7.893 2.265l-1.431-1.431A8.935 8.935 0 0 0 20.778 12A9.005 9.005 0 0 0 9.552 5.338L7.974 3.76C9.221 3.27 10.58 3 12 3c5.392 0 9.878 3.88 10.819 9a10.947 10.947 0 0 1-2.012 4.593Zm-9.084-9.084a4.5 4.5 0 0 1 4.769 4.769l-4.77-4.77Z"></path></svg>
            </button>
        </div>
        <p class="auth-field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
    </div>

    <!-- 确认密码 -->
    <div class="auth-field">
        <label for="confirmPassword">确认密码</label>
        <div class="auth-password-wrap auth-input-wrap">
            <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="11" width="16" height="9" rx="2"></rect>
                    <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                </svg>
            </span>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="再次输入密码" autocomplete="new-password"
                required minlength="5" maxlength="257" class="auth-input auth-input-with-icon" />
            <button type="button" class="auth-toggle-password" tabindex="-1">
                <svg class="auth-icon-eye-show" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c5.392 0 9.878 3.88 10.819 9c-.94 5.12-5.427 9-10.819 9c-5.392 0-9.878-3.88-10.818-9C2.122 6.88 6.608 3 12 3Zm0 16a9.005 9.005 0 0 0 8.778-7a9.005 9.005 0 0 0-17.555 0A9.005 9.005 0 0 0 12 19Zm0-2.5a4.5 4.5 0 1 1 0-9a4.5 4.5 0 0 1 0 9Zm0-2a2.5 2.5 0 1 0 0-5a2.5 2.5 0 0 0 0 5Z"></path></svg>
                <svg class="auth-icon-eye-hide" style="display:none" viewBox="0 0 24 24" fill="currentColor"><path d="M17.883 19.297A10.949 10.949 0 0 1 12 21c-5.392 0-9.878-3.88-10.818-9A10.982 10.982 0 0 1 4.52 5.935L1.394 2.808l1.414-1.414l19.799 19.798l-1.414 1.415l-3.31-3.31ZM5.936 7.35A8.965 8.965 0 0 0 3.223 12a9.005 9.005 0 0 0 13.201 5.838l-2.028-2.028A4.5 4.5 0 0 1 8.19 9.604L5.936 7.35Zm6.978 6.978l-3.242-3.241a2.5 2.5 0 0 0 3.241 3.241Zm7.893 2.265l-1.431-1.431A8.935 8.935 0 0 0 20.778 12A9.005 9.005 0 0 0 9.552 5.338L7.974 3.76C9.221 3.27 10.58 3 12 3c5.392 0 9.878 3.88 10.819 9a10.947 10.947 0 0 1-2.012 4.593Zm-9.084-9.084a4.5 4.5 0 0 1 4.769 4.769l-4.77-4.77Z"></path></svg>
            </button>
        </div>
        <p class="auth-field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
    </div>

    <!-- 验证码 -->
    <div halo:captcha class="auth-captcha-wrap"></div>

    <!-- 提交按钮 -->
    <button type="submit" class="auth-btn auth-btn-primary">
        创建账户
    </button>

    <!-- 密码确认脚本 -->
    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            setupPasswordConfirmation("password", "confirmPassword");
        });
    </script>

    <!-- 邮箱验证码发送脚本 -->
    <script th:if="${globalInfo.mustVerifyEmailOnRegistration}" th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const headerName = /*[[${_csrf.headerName}]]*/ "";
            const token = /*[[${_csrf.token}]]*/ "";

            async function sendRequest() {
                const email = document.getElementById("email").value;
                if (!email) {
                    throw new Error("请先输入邮箱地址");
                }

                const altchaPayload = typeof requestAltchaChallengeResult === 'function'
                    ? await requestAltchaChallengeResult()
                    : '';

                const response = await fetch("/signup/send-email-code", {
                    method: "POST",
                    body: JSON.stringify({ email: email }),
                    headers: {
                        "Content-Type": "application/json",
                        [headerName]: token,
                        'X-Altcha-Payload': altchaPayload,
                    },
                });

                if (!response.ok) {
                    const json = await response.json();
                    if (json.errors && json.errors.length) {
                        throw new Error(json.errors[0]);
                    }
                }
                return response;
            }

            const emailCodeSendButton = document.getElementById("emailCodeSendButton");
            sendVerificationCode(emailCodeSendButton, sendRequest);
        });
    </script>
</form>
