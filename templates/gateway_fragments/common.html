<!-- 基础静态资源（必须引入） -->
<th:block th:fragment="basicStaticResources">
    <th:block th:replace="~{gateway_fragments/common::basicScriptResources}"></th:block>
</th:block>

<!-- 基础脚本资源 -->
<th:block th:fragment="basicScriptResources">
    <!-- RSA 密码加密 (Halo 2.23+) -->
    <th:block th:if="${not #strings.isEmpty(publicKey)} and ${fragmentTemplateName} == 'login_local'">
        <!-- 注意：不加 defer，保证 JSEncrypt 类在 submit 时已可用 -->
        <script src="/webjars/jsencrypt/bin/jsencrypt.min.js"></script>
        <script th:inline="javascript" type="text/javascript">
            const publicKey = /*[[${publicKey}]]*/ "";

            document.addEventListener("DOMContentLoaded", function () {
                const loginForm = document.getElementById("login-form");
                const visiblePasswordInput = document.getElementById("password");
                const supportsFormDataEvent = typeof FormDataEvent !== "undefined";

                if (!loginForm || !visiblePasswordInput) return;

                const resolveEncryptedPassword = function () {
                    if (!visiblePasswordInput.value) return "";
                    try {
                        const encrypt = new JSEncrypt();
                        encrypt.setPublicKey(publicKey);
                        const encrypted = encrypt.encrypt(visiblePasswordInput.value);
                        return encrypted || visiblePasswordInput.value;
                    } catch (e) {
                        console.error('[Auth] RSA encrypt error:', e);
                        return visiblePasswordInput.value;
                    }
                };

                loginForm.addEventListener("formdata", function (event) {
                    const encrypted = resolveEncryptedPassword();
                    if (!encrypted) return;
                    event.formData.set("password", encrypted);
                });

                if (!supportsFormDataEvent) {
                    loginForm.addEventListener("submit", function () {
                        const encrypted = resolveEncryptedPassword();
                        if (!encrypted) return;
                        // Fallback for old browsers: submit hidden encrypted value instead of mutating
                        // the visible field name during the normal login flow.
                        const encryptedPasswordInput = document.createElement("input");
                        encryptedPasswordInput.type = "hidden";
                        encryptedPasswordInput.name = "password";
                        encryptedPasswordInput.value = encrypted;
                        encryptedPasswordInput.setAttribute("aria-hidden", "true");
                        encryptedPasswordInput.setAttribute("data-lpignore", "true");
                        encryptedPasswordInput.setAttribute("data-1p-ignore", "true");
                        encryptedPasswordInput.setAttribute("data-bwignore", "true");
                        loginForm.appendChild(encryptedPasswordInput);
                        visiblePasswordInput.disabled = true;
                    });
                }
            });
        </script>
    </th:block>

    <script th:inline="javascript">
        const i18nResources = {
            sendVerificationCodeSuccess: '发送成功',
            sendVerificationCodeFailed: '发送失败',
            sendVerificationCodeSending: '发送中...',
            passwordConfirmationFailed: '两次密码输入不一致',
        };

        // 密码确认验证
        window.setupPasswordConfirmation = function (passwordId, confirmPasswordId) {
            const password = document.getElementById(passwordId);
            const confirmPassword = document.getElementById(confirmPasswordId);
            if (!password || !confirmPassword) return;

            function validate() {
                const msg = password.value !== confirmPassword.value
                    ? (window.i18nResources?.passwordConfirmationFailed || "密码不一致")
                    : '';
                confirmPassword.setCustomValidity(msg);
            }
            password.addEventListener('input', validate);
            confirmPassword.addEventListener('input', validate);
        };

        // 发送验证码
        window.sendVerificationCode = function (button, sendRequest) {
            let countdown = 60;
            const originalText = button.textContent;

            button.addEventListener('click', async function () {
                if (button.disabled) return;
                button.disabled = true;
                button.textContent = '发送中...';

                try {
                    await sendRequest();
                    const timer = setInterval(function () {
                        countdown--;
                        button.textContent = countdown + 's';
                        if (countdown <= 0) {
                            clearInterval(timer);
                            button.textContent = originalText;
                            button.disabled = false;
                            countdown = 60;
                        }
                    }, 1000);
                } catch (error) {
                    button.textContent = originalText;
                    button.disabled = false;
                    alert(error.message || '发送失败');
                }
            });
        };

        // 密码显示/隐藏切换
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.auth-toggle-password').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var wrap = btn.closest('.auth-password-wrap');
                    if (!wrap) return;
                    var input = wrap.querySelector('input');
                    if (!input) return;
                    var isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    var showIcon = wrap.querySelector('.auth-icon-eye-show');
                    var hideIcon = wrap.querySelector('.auth-icon-eye-hide');
                    if (showIcon) showIcon.style.display = isPassword ? 'none' : 'block';
                    if (hideIcon) hideIcon.style.display = isPassword ? 'block' : 'none';
                });
            });
        });
    </script>
    <!-- Altcha Captcha Scripts (Halo Pro only, guarded for open-source compatibility) -->
    <th:block th:if="${globalInfo != null and #strings.contains(globalInfo.toString(), 'captchaProvider')}">
    <th:block th:if="${#strings.equalsIgnoreCase(globalInfo.captchaProvider, 'ALTCHA')}">
        <script async defer src="/webjars/altcha/dist/altcha.i18n.js" type="module"></script>
        <script src="/js/altcha-lib.iife.js"></script>
        <script src="/js/altcha-utils.js"></script>
    </th:block>
    </th:block>
</th:block>

<!-- ========================================== -->
<!--    社交账号登录                            -->
<!-- ========================================== -->
<div th:remove="tag" th:fragment="socialAuthProviders">
    <th:block th:unless="${#lists.isEmpty(socialAuthProviders)}">
        <div class="auth-divider">
            <hr /><span>其他登录方式</span><hr />
        </div>

        <div class="auth-provider-grid auth-provider-grid-icons">
            <th:block th:each="provider : ${socialAuthProviders}">
                <form class="social-auth-provider-form auth-provider-icon-form"
                    th:action="|/login/social/${provider.metadata.name}?remember-me=false|" method="post">
                    <button type="submit" class="auth-provider-btn auth-provider-icon-btn"
                        th:title="${provider.spec.displayName}">
                        <span class="auth-provider-icon-shell">
                            <img th:src="${provider.spec.logo}" th:alt="|${provider.spec.displayName}'s icon|" />
                        </span>
                    </button>
                </form>
            </th:block>
        </div>
    </th:block>

    <!-- Remember Me 联动脚本 -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var rememberMeCheckbox = document.getElementById("remember-me");
            var socialAuthProviders = document.querySelectorAll(".social-auth-provider-form");

            if (rememberMeCheckbox) {
                rememberMeCheckbox.addEventListener("change", function (e) {
                    var rememberMe = e.target.checked;
                    socialAuthProviders.forEach(function (form) {
                        var url = new URL(form.action, window.location.origin);
                        url.searchParams.set("remember-me", rememberMe ? "true" : "false");
                        form.action = url.pathname + url.search;
                    });
                });
            }
        });
    </script>
</div>

<!-- ========================================== -->
<!--    表单登录方式切换                         -->
<!-- ========================================== -->
<div th:remove="tag" th:fragment="formAuthProviders">
    <th:block th:unless="${#lists.isEmpty(formAuthProviders)}">
        <div class="auth-divider">
            <hr /><span>其他方式</span><hr />
        </div>

        <div class="auth-provider-grid auth-provider-grid-icons auth-provider-grid-compact">
            <th:block th:each="provider : ${formAuthProviders}">
                <a th:href="'/login?method=' + ${provider.metadata.name}"
                   class="auth-provider-btn auth-provider-icon-btn auth-provider-icon-btn-compact"
                   th:title="${provider.spec.displayName}">
                    <span class="auth-provider-icon-shell auth-provider-icon-shell-sm">
                        <img th:src="${provider.spec.logo}" th:alt="|${provider.spec.displayName}'s icon|" />
                    </span>
                </a>
            </th:block>
        </div>
    </th:block>
</div>

<!-- ========================================== -->
<!--    登录页统一方式入口                       -->
<!-- ========================================== -->
<div th:remove="tag" th:fragment="loginProviderSection">
    <th:block th:with="
        hasSocial = ${socialAuthProviders != null and !#lists.isEmpty(socialAuthProviders)},
        hasForm = ${formAuthProviders != null and !#lists.isEmpty(formAuthProviders)}">
        <th:block th:if="${hasSocial or hasForm}">
            <div class="auth-provider-section">
                <div class="auth-divider">
                    <hr /><span>其他方式登录</span><hr />
                </div>

                <div class="auth-provider-grid auth-provider-grid-icons">
                    <th:block th:if="${hasSocial}" th:each="provider : ${socialAuthProviders}">
                        <form class="social-auth-provider-form auth-provider-icon-form"
                            th:action="|/login/social/${provider.metadata.name}?remember-me=false|" method="post">
                            <button type="submit" class="auth-provider-btn auth-provider-icon-btn"
                                th:title="${provider.spec.displayName}">
                                <span class="auth-provider-icon-shell">
                                    <img th:src="${provider.spec.logo}" th:alt="|${provider.spec.displayName}'s icon|" />
                                </span>
                            </button>
                        </form>
                    </th:block>

                    <th:block th:if="${hasForm}" th:each="provider : ${formAuthProviders}">
                        <a th:href="'/login?method=' + ${provider.metadata.name}"
                           class="auth-provider-btn auth-provider-icon-btn"
                           th:title="${provider.spec.displayName}">
                            <span class="auth-provider-icon-shell">
                                <img th:src="${provider.spec.logo}" th:alt="|${provider.spec.displayName}'s icon|" />
                            </span>
                        </a>
                    </th:block>
                </div>
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", function () {
                    var rememberMeCheckbox = document.getElementById("remember-me");
                    var socialAuthProviders = document.querySelectorAll(".social-auth-provider-form");

                    if (rememberMeCheckbox) {
                        rememberMeCheckbox.addEventListener("change", function (e) {
                            var rememberMe = e.target.checked;
                            socialAuthProviders.forEach(function (form) {
                                var url = new URL(form.action, window.location.origin);
                                url.searchParams.set("remember-me", rememberMe ? "true" : "false");
                                form.action = url.pathname + url.search;
                            });
                        });
                    }
                });
            </script>
        </th:block>
    </th:block>
</div>
