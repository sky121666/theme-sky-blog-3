<!-- ========================================== -->
<!--    Gateway Fragments - Password Reset     -->
<!--    发送重置邮件表单                         -->
<!-- ========================================== -->

<th:block th:fragment="form">
    <!-- 已发送状态 -->
    <form th:if="${sent}" method="get" action="/login" class="auth-form-stack">
        <div class="auth-status-orb auth-status-orb-success">
            <svg class="auth-status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>

        <div class="auth-view-header auth-view-header-centered">
            <h2 class="auth-view-title">邮件已发送</h2>
            <p class="auth-view-subtitle">一封包含重置说明的邮件已发送至你的邮箱。请检查你的收件箱及垃圾邮件文件夹。</p>
        </div>

        <button type="submit" class="auth-btn auth-btn-secondary">
            返回登录
        </button>
    </form>

    <!-- 发送表单 -->
    <form th:unless="${sent}" class="auth-form-stack" th:action="@{/password-reset/email}" method="post" th:object="${form}">
        <div class="auth-view-header">
            <h2 class="auth-view-title">找回密码</h2>
            <p class="auth-view-subtitle">输入你注册时使用的邮箱地址，我们将向你发送一封包含重置链接的邮件。</p>
        </div>

        <!-- 错误提示 -->
        <div class="auth-alert auth-alert-error" role="alert" th:if="${param.error.size() > 0}">
            <svg class="auth-alert-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            <span th:if="${param.error[0] == 'invalid_reset_token'}">重置链接无效或已过期，请重新发送</span>
        </div>
        <div class="auth-alert auth-alert-error" role="alert" th:if="${error}">
            <svg class="auth-alert-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            <span th:if="${error == 'rate_limit_exceeded'}">请求过于频繁，请稍后再试</span>
        </div>

        <!-- 邮箱输入 -->
        <div class="auth-field">
            <label for="email">邮箱地址</label>
            <div class="auth-input-wrap">
                <span class="auth-input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="5" width="18" height="14" rx="3"></rect>
                        <path d="m5 8 7 5 7-5"></path>
                    </svg>
                </span>
                <input type="email" id="email" name="email" placeholder="name@example.com" autocomplete="email" autofocus required th:field="*{email}"
                    class="auth-input auth-input-with-icon" />
            </div>
            <p class="auth-field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>

        <!-- 验证码 -->
        <div halo:captcha class="auth-captcha-wrap"></div>

        <!-- 提交按钮 -->
        <button type="submit" class="auth-btn auth-btn-primary">
            发送重置链接
        </button>

        <div class="auth-footer-link auth-footer-link-return">
            <a th:href="@{/login}" class="auth-return-link">
                <svg class="auth-return-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>返回登录</span>
            </a>
        </div>
    </form>
</th:block>
