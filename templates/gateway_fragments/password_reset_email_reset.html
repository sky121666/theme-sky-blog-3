<!-- ========================================== -->
<!--    Gateway Fragments - Password Reset     -->
<!--    重置密码表单                            -->
<!-- ========================================== -->

<form th:fragment="form" class="auth-form-stack" th:action="@{/password-reset/email/{resetToken}(resetToken=${resetToken})}"
    method="post" th:object="${form}">
    <div class="auth-view-header">
        <h2 class="auth-view-title">重置密码</h2>
        <p class="auth-view-subtitle">请为你的账户设置一个新的密码。</p>
    </div>

    <!-- 错误提示 -->
    <div class="auth-alert auth-alert-error" role="alert" th:if="${error}">
        <svg class="auth-alert-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span th:if="${error == 'rate_limit_exceeded'}">请求过于频繁，请稍后再试</span>
    </div>

    <!-- 新密码 -->
    <div class="auth-field">
        <label for="password">新密码</label>
        <div class="auth-password-wrap auth-input-wrap">
            <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="11" width="16" height="9" rx="2"></rect>
                    <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                </svg>
            </span>
            <input id="password" name="password" type="password" placeholder="新密码" autocomplete="new-password" required
                minlength="5" maxlength="257" class="auth-input auth-input-with-icon" />
            <button type="button" class="auth-toggle-password" tabindex="-1">
                <svg class="auth-icon-eye-show" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c5.392 0 9.878 3.88 10.819 9c-.94 5.12-5.427 9-10.819 9c-5.392 0-9.878-3.88-10.818-9C2.122 6.88 6.608 3 12 3Zm0 16a9.005 9.005 0 0 0 8.778-7a9.005 9.005 0 0 0-17.555 0A9.005 9.005 0 0 0 12 19Zm0-2.5a4.5 4.5 0 1 1 0-9a4.5 4.5 0 0 1 0 9Zm0-2a2.5 2.5 0 1 0 0-5a2.5 2.5 0 0 0 0 5Z"></path></svg>
                <svg class="auth-icon-eye-hide" style="display:none" viewBox="0 0 24 24" fill="currentColor"><path d="M17.883 19.297A10.949 10.949 0 0 1 12 21c-5.392 0-9.878-3.88-10.818-9A10.982 10.982 0 0 1 4.52 5.935L1.394 2.808l1.414-1.414l19.799 19.798l-1.414 1.415l-3.31-3.31ZM5.936 7.35A8.965 8.965 0 0 0 3.223 12a9.005 9.005 0 0 0 13.201 5.838l-2.028-2.028A4.5 4.5 0 0 1 8.19 9.604L5.936 7.35Zm6.978 6.978l-3.242-3.241a2.5 2.5 0 0 0 3.241 3.241Zm7.893 2.265l-1.431-1.431A8.935 8.935 0 0 0 20.778 12A9.005 9.005 0 0 0 9.552 5.338L7.974 3.76C9.221 3.27 10.58 3 12 3c5.392 0 9.878 3.88 10.819 9a10.947 10.947 0 0 1-2.012 4.593Zm-9.084-9.084a4.5 4.5 0 0 1 4.769 4.769l-4.77-4.77Z"></path></svg>
            </button>
        </div>
        <p class="auth-field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
    </div>

    <!-- 确认密码 -->
    <div class="auth-field">
        <label for="confirmPassword">确认密码</label>
        <div class="auth-password-wrap auth-input-wrap">
            <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="11" width="16" height="9" rx="2"></rect>
                    <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                </svg>
            </span>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="再次输入密码" autocomplete="new-password"
                required minlength="5" maxlength="257" class="auth-input auth-input-with-icon" />
            <button type="button" class="auth-toggle-password" tabindex="-1">
                <svg class="auth-icon-eye-show" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c5.392 0 9.878 3.88 10.819 9c-.94 5.12-5.427 9-10.819 9c-5.392 0-9.878-3.88-10.818-9C2.122 6.88 6.608 3 12 3Zm0 16a9.005 9.005 0 0 0 8.778-7a9.005 9.005 0 0 0-17.555 0A9.005 9.005 0 0 0 12 19Zm0-2.5a4.5 4.5 0 1 1 0-9a4.5 4.5 0 0 1 0 9Zm0-2a2.5 2.5 0 1 0 0-5a2.5 2.5 0 0 0 0 5Z"></path></svg>
                <svg class="auth-icon-eye-hide" style="display:none" viewBox="0 0 24 24" fill="currentColor"><path d="M17.883 19.297A10.949 10.949 0 0 1 12 21c-5.392 0-9.878-3.88-10.818-9A10.982 10.982 0 0 1 4.52 5.935L1.394 2.808l1.414-1.414l19.799 19.798l-1.414 1.415l-3.31-3.31ZM5.936 7.35A8.965 8.965 0 0 0 3.223 12a9.005 9.005 0 0 0 13.201 5.838l-2.028-2.028A4.5 4.5 0 0 1 8.19 9.604L5.936 7.35Zm6.978 6.978l-3.242-3.241a2.5 2.5 0 0 0 3.241 3.241Zm7.893 2.265l-1.431-1.431A8.935 8.935 0 0 0 20.778 12A9.005 9.005 0 0 0 9.552 5.338L7.974 3.76C9.221 3.27 10.58 3 12 3c5.392 0 9.878 3.88 10.819 9a10.947 10.947 0 0 1-2.012 4.593Zm-9.084-9.084a4.5 4.5 0 0 1 4.769 4.769l-4.77-4.77Z"></path></svg>
            </button>
        </div>
        <p class="auth-field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
    </div>

    <!-- 提示信息 -->
    <p class="auth-helper-text">密码长度至少 5 个字符，建议使用字母、数字和符号的组合。</p>

    <!-- 验证码 -->
    <div halo:captcha class="auth-captcha-wrap"></div>

    <!-- 提交按钮 -->
    <button type="submit" class="auth-btn auth-btn-primary">
        重置密码
    </button>

    <!-- 密码确认脚本 -->
    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            setupPasswordConfirmation("password", "confirmPassword");
        });
    </script>
</form>
