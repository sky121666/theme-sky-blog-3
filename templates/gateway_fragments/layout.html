<!doctype html>
<html
  class="auth-gateway-html"
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  th:fragment="layout (title, head, body)"
  th:data-default-theme="${theme.config.header?.theme?.default_mode ?: 'system'}"
  th:with="
    bgConf = ${theme.config.desktop?.background},
    bgMode = ${bgConf?.mode ?: 'preset'},
    bgPreset = ${bgConf?.preset ?: 'tahoe-dawn'},
    desktopAppearance = ${theme.config.desktop?.appearance},
    legacyCustomScheme = ${(desktopAppearance?.mode == null) and (desktopAppearance?.accent_color != null or desktopAppearance?.selection_color != null or desktopAppearance?.folder_color1 != null or desktopAppearance?.folder_color2 != null or desktopAppearance?.folder_color3 != null or desktopAppearance?.glass_light_color != null or desktopAppearance?.glass_dark_color != null)},
    schemeMode = ${desktopAppearance?.mode ?: (legacyCustomScheme ? 'custom' : 'preset')},
    schemePreset = ${desktopAppearance?.preset ?: 'blue'},
    macAccent = ${desktopAppearance?.accent_color ?: '#2E5FBD'},
    macSelection = ${desktopAppearance?.selection_color ?: '#244D9B'},
    macFolder1 = ${desktopAppearance?.folder_color1 ?: '#4A90E2'},
    macFolder2 = ${desktopAppearance?.folder_color2 ?: '#64B5F6'},
    macFolder3 = ${desktopAppearance?.folder_color3 ?: '#90CAF9'},
    macShellLight = ${desktopAppearance?.glass_light_color ?: '#FFFFFF'},
    macShellDark = ${desktopAppearance?.glass_dark_color ?: '#141414'},
    bgImageUrl = ${bgConf?.image_url ?: bgConf?.image},
    wallpaperClass = ${bgMode == 'preset' ? 'wallpaper-' + bgPreset : ''},
    schemeClass = ${schemeMode == 'preset' ? 'scheme-' + schemePreset : 'scheme-custom'},
    headerLogoIcon = ${theme.config.header?.logo?.icon?.value ?: ''},
    headerAppName = ${!#strings.isEmpty(theme.config.header?.logo?.title) ? theme.config.header?.logo?.title : (site.title ?: '')},
    authBrandImage = ${site.logo != null ? site.logo.toString() : ''},
    themeFallbackIcon = ${#theme.assets('/favicon.svg')}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title ?: site.title}">登录</title>

    <script>
      (function() {
        var root = document.documentElement;
        var defaultTheme = root.getAttribute('data-default-theme') || 'system';
        var savedTheme = localStorage.getItem('theme');
        var theme = savedTheme || defaultTheme;
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

        root.classList.remove('dark', 'light', 'system', 'color-scheme-auto', 'color-scheme-dark', 'color-scheme-light');
        root.classList.add(theme === 'system' ? 'color-scheme-auto' : 'color-scheme-' + theme);
        root.classList.add(theme);
        root.setAttribute('data-color-scheme', theme);
        root.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>

    <th:block th:replace="~{gateway_fragments/common::basicScriptResources}" />
    <link rel="stylesheet" th:href="@{/assets/css/shell-core/index.css(t=${#dates.createNow().getTime()})}" />
    <link rel="stylesheet" th:href="@{/assets/css/apps/auth/index.css(t=${#dates.createNow().getTime()})}" />
    <script type="module" th:src="@{/assets/js/apps/auth/index.js(t=${#dates.createNow().getTime()})}"></script>
    <!-- auth gateway 暂不接自定义 head fragment，避免在 Halo gateway 场景下触发 fragment 解析失败 -->
  </head>
  <body
    class="auth-gateway-page"
    data-app-id="auth"
    data-page-app="auth"
    data-page-mode="auth"
    data-window-variant="none"
    th:classappend="${#strings.isEmpty(wallpaperClass) ? schemeClass : wallpaperClass + ' ' + schemeClass}"
    th:style="${(schemeMode == 'custom' ? '--mac-accent:' + macAccent + ';--mac-selection:' + macSelection + ';--mac-folder1:' + macFolder1 + ';--mac-folder2:' + macFolder2 + ';--mac-folder3:' + macFolder3 + ';--mac-shell-light:' + macShellLight + ';--mac-shell-dark:' + macShellDark + ';' : '')}"
    th:styleappend="${bgMode == 'image' and bgImageUrl != null ? 'background:url(' + bgImageUrl + ') center/cover no-repeat; background-color:#0f172a;' : (bgMode == 'solid' ? 'background-image:none; background-color:' + (bgConf?.solid_color ?: '#0f172a') + ';' : '')}">
    <main class="auth-gateway-shell" data-app-root="auth">
      <script type="application/json" data-app-props="auth">{"version":1,"appId":"auth","data":{"scene":"gateway"}}</script>

      <section class="auth-gateway-card mac-window">
        <header class="mac-titlebar">
          <div class="auth-titlebar-leading">
            <div class="mac-traffic-lights">
              <a th:href="@{/}"
                 class="mac-traffic-light close auth-traffic-link"
                 aria-label="返回首页"
                 title="返回首页">
                <span class="icon-[lucide--x]" aria-hidden="true"></span>
              </a>
              <span class="mac-traffic-light min" aria-hidden="true">
                <span class="icon-[lucide--minus]" aria-hidden="true"></span>
              </span>
              <span class="mac-traffic-light max" aria-hidden="true">
                <span class="icon-[lucide--maximize-2]" aria-hidden="true"></span>
              </span>
            </div>

            <button type="button" class="auth-titlebar-back" data-auth-go-back aria-label="返回上一页" title="返回上一页">
              <span class="auth-back-link-icon icon-[lucide--chevron-left]" aria-hidden="true"></span>
            </button>
          </div>
          <div class="auth-titlebar-actions">
            <button type="button"
                    class="auth-theme-toggle"
                    data-auth-theme-toggle
                    aria-label="切换主题"
                    title="切换主题">
              <span class="auth-theme-toggle-icon auth-theme-toggle-icon-moon icon-[lucide--moon]" aria-hidden="true"></span>
              <span class="auth-theme-toggle-icon auth-theme-toggle-icon-sun icon-[lucide--sun]" aria-hidden="true" hidden></span>
            </button>
          </div>
          <span class="auth-gateway-title auth-visually-hidden"
                th:text="|${title ?: '登录'} - ${headerAppName}|">登录 - 站点</span>
        </header>

        <div class="auth-stage">
          <div class="auth-toast-stack" data-auth-toast-host>
            <th:block th:replace="~{gateway_fragments/login::toast}"></th:block>
          </div>
          <div th:insert="${body}"></div>
        </div>
      </section>
    </main>

  </body>
</html>
