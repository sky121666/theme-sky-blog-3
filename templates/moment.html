<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:halo="https://halo.run/schema/thymeleaf"
      th:replace="~{modules/layout :: html(
        title = ${((moment.spec.content != null and !#strings.isEmpty(((!#strings.isEmpty(moment.spec.content.raw) ? moment.spec.content.raw : moment.spec.content.html).replaceAll('&lt;[^&gt;]+&gt;', ' ').replaceAll('&amp;nbsp;', ' ').replaceAll('\\s+', ' ').trim()))) ? #strings.abbreviate(((!#strings.isEmpty(moment.spec.content.raw) ? moment.spec.content.raw : moment.spec.content.html).replaceAll('&lt;[^&gt;]+&gt;', ' ').replaceAll('&amp;nbsp;', ' ').replaceAll('\\s+', ' ').trim()), 42) : ((moment.spec.content != null and moment.spec.content.medium != null and !#lists.isEmpty(moment.spec.content.medium)) ? '图片瞬间' : '瞬间记录')) + ' - ' + site.title},
        description = ${((moment.spec.content != null and !#strings.isEmpty(((!#strings.isEmpty(moment.spec.content.raw) ? moment.spec.content.raw : moment.spec.content.html).replaceAll('&lt;[^&gt;]+&gt;', ' ').replaceAll('&amp;nbsp;', ' ').replaceAll('\\s+', ' ').trim()))) ? #strings.abbreviate(((!#strings.isEmpty(moment.spec.content.raw) ? moment.spec.content.raw : moment.spec.content.html).replaceAll('&lt;[^&gt;]+&gt;', ' ').replaceAll('&amp;nbsp;', ' ').replaceAll('\\s+', ' ').trim()), 140) : '') ?: (site.seo?.description ?: site.subtitle)},
        ssrContent = ~{::ssrBlock},
        canonical = ${'/moments/' + moment.metadata.name},
        image = ${(moment.spec.content != null and moment.spec.content.medium != null and !#lists.isEmpty(moment.spec.content.medium) and moment.spec.content.medium[0].type.name() == 'PHOTO') ? moment.spec.content.medium[0].url : site.logo},
        type = 'article',
        seoFallback = 'full',
        pageMode = 'browser-moments',
        pageApp = 'moments-app'
      )}">
  <th:block th:fragment="ssrBlock"
            th:with="momentText=${(moment.spec.content != null and (!#strings.isEmpty(moment.spec.content.raw) or !#strings.isEmpty(moment.spec.content.html))) ? ((!#strings.isEmpty(moment.spec.content.raw) ? moment.spec.content.raw : moment.spec.content.html).replaceAll('&lt;[^&gt;]+&gt;', ' ').replaceAll('&amp;nbsp;', ' ').replaceAll('\\s+', ' ').trim()) : ''},
                     momentLabel=${!#strings.isEmpty(momentText) ? #strings.abbreviate(momentText, 42) : ((moment.spec.content != null and moment.spec.content.medium != null and !#lists.isEmpty(moment.spec.content.medium)) ? '图片瞬间' : '瞬间记录')},
                     momentSummary=${!#strings.isEmpty(momentText) ? #strings.abbreviate(momentText, 140) : ''}">
    <div class="moments-app moments-app--detail">
      <div class="moment-reader-shell">
        <div class="moment-reader-frame">
          <header class="moment-header">
            <div class="moment-kicker">Moment</div>
            <h1 class="moment-title" th:text="${momentLabel}">瞬间</h1>

            <div class="moment-meta">
              <div class="moment-meta-item">
                <span th:text="${moment.owner != null ? moment.owner.displayName : site.title}">作者</span>
              </div>
              <div class="moment-meta-item">
                <time th:text="${moment.spec.releaseTime != null ? #dates.format(moment.spec.releaseTime, 'yyyy年MM月dd日 HH:mm') : '未知时间'}"></time>
              </div>
            </div>

            <p class="moment-summary"
               th:if="${!#strings.isEmpty(momentSummary)}"
               th:text="${momentSummary}"></p>
          </header>

          <section class="moment-media-grid"
                   th:if="${moment.spec.content != null and !#lists.isEmpty(moment.spec.content.medium)}">
            <th:block th:each="medium : ${moment.spec.content.medium}">
              <figure class="moment-media-card" th:if="${medium.type.name() == 'PHOTO'}">
                <img th:src="${medium.url}" alt="" />
              </figure>
              <figure class="moment-media-card moment-media-card--video" th:if="${medium.type.name() == 'VIDEO'}">
                <video th:src="${medium.url}" controls="controls"></video>
              </figure>
              <figure class="moment-media-card moment-media-card--audio" th:if="${medium.type.name() == 'AUDIO'}">
                <audio th:src="${medium.url}" controls="controls"></audio>
              </figure>
              <figure class="moment-media-card moment-media-card--post" th:if="${medium.type.name() == 'POST'}">
                <div class="moment-media-placeholder">关联文章</div>
              </figure>
            </th:block>
          </section>

          <article id="moment-content"
                   class="moment-content"
                   th:if="${moment.spec.content != null and !#strings.isEmpty(moment.spec.content.html)}"
                   th:utext="${moment.spec.content.html}"></article>

          <section id="moment-comments"
                   class="moment-comments mac-comment-section"
                   th:if="${pluginFinder.available('PluginCommentWidget')}">
            <h2 class="moment-comments-title mac-comment-title">评论</h2>
            <div class="moment-comments-shell mac-comment-shell">
              <halo:comment group="moment.halo.run" kind="Moment" th:attr="name=${moment.metadata.name}"/>
            </div>
          </section>
        </div>
      </div>
    </div>
  </th:block>
</html>
