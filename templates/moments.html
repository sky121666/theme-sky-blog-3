<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = ${'瞬间 - ' + site.title},
        description = ${site.seo?.description ?: site.subtitle},
        ssrContent = ~{modules/page/moments/list :: content},
        canonical = '/moments',
        image = ${site.logo},
        type = 'website',
        seoFallback = 'full',
        pageMode = 'browser-moments',
        pageApp = 'moments-app',
        windowVariant = 'moments',
        windowTitle = ${title ?: '瞬间'},
        windowScene = 'feed',
        windowResizable = 'y',
        windowMaximizable = false,
        windowMetricsKey = 'moments'
      )}">
</html>
