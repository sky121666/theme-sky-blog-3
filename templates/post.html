<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = ${post.spec.title + ' - ' + site.title},
        description = ${!#strings.isEmpty(post.status.excerpt) ? post.status.excerpt : (site.seo?.description ?: site.subtitle)},
        ssrContent = ~{::ssrBlock},
        canonical = ${post.status.permalink},
        image = ${!#strings.isEmpty(post.spec.cover) ? post.spec.cover : site.logo},
        type = 'article',
        seoFallback = 'none'
      )}">
  <th:block th:fragment="ssrBlock">
    <div class="post-reader-shell">
      <div class="post-reader-frame" th:attr="data-post-name=${post.metadata.name}">
        <header class="post-header">
          <div class="post-kicker">Reader</div>
          <h1 class="post-title" th:text="${post.spec.title}"></h1>

          <div class="post-meta">
            <div class="post-meta-item">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              <span th:text="${post.owner.displayName}">Author</span>
            </div>
            <div class="post-meta-item">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
              <time th:text="${#dates.format(post.spec.publishTime, 'yyyy年MM月dd日')}"></time>
            </div>
          </div>

          <p class="post-summary" th:if="${!#strings.isEmpty(post.status.excerpt)}" th:text="${post.status.excerpt}"></p>
        </header>

        <article id="article-content" class="post-content" th:utext="${post.content.content}"></article>

        <section id="post-comments" class="post-comments mac-comment-section" th:if="${pluginFinder.available('PluginCommentWidget')}">
          <h2 class="post-comments-title mac-comment-title">评论</h2>
          <div class="post-comments-shell mac-comment-shell">
            <halo:comment group="content.halo.run" kind="Post" th:attr="name=${post.metadata.name}"/>
          </div>
        </section>
      </div>
    </div>
  </th:block>
</html>
