<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = '所有分类 - ' + ${site.title},
        description = '',
        ssrContent = ~{::ssrBlock}
      )}">
  <th:block th:fragment="ssrBlock">
    <div class="max-w-4xl mx-auto px-4 md:px-8 py-10 md:py-16">
      
      <div class="mb-14 text-center flex flex-col items-center justify-center">
        <div class="flex items-center justify-center gap-2 mb-3">
          <span class="text-4xl text-purple-500 font-bold opacity-80">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
          </span>
          <h1 class="text-4xl font-bold tracking-tight text-gray-800">所有分类</h1>
        </div>
        <p class="text-gray-500 text-lg" th:text="'共计 ' + ${categories.size()} + ' 个宇宙维面'"></p>
      </div>
      
      <!-- 分类卡片阵列 -->
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <a th:each="category : ${categories}" 
           th:href="${category.status.permalink}"
           class="group pjax-link flex flex-col items-center justify-center p-8 bg-white/60 backdrop-blur-sm rounded-2xl border border-black/5 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
           <span class="text-2xl font-bold text-gray-900 group-hover:text-purple-600 transition-colors mb-2" th:text="${category.spec.displayName}"></span>
           <span class="text-sm text-gray-400 font-medium bg-gray-100/80 px-3 py-1 rounded-full group-hover:bg-purple-50 group-hover:text-purple-500 transition-colors" th:text="${category.status.postCount} + ' 篇文章'"></span>
        </a>
      </div>
      
    </div>
  </th:block>
</html>
