<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = ${(error != null and error.status != null ? error.status : 404) + ' - ' + site.title},
        description = ${'当前索引里没有这条路径'},
        ssrContent = ~{::ssrBlock},
        canonical = '',
        image = ${site.logo},
        type = 'website',
        seoFallback = 'meta',
        pageMode = 'browser-error',
        pageApp = '',
        windowVariant = 'none',
        windowScene = 'none',
        windowTitle = '',
        windowResizable = false,
        windowMaximizable = false,
        windowMetricsKey = 'none'
      )}">
  <th:block th:fragment="ssrBlock">
    <div th:replace="~{error/modules/dialog :: panel(
      variant='missing',
      titleText='找不到这个页面。',
      bodyText='这个位置当前没有可显示的内容。',
      statusCode=${error != null and error.status != null ? error.status : 404},
      hintText='资源未找到'
    )}"></div>
  </th:block>
</html>
