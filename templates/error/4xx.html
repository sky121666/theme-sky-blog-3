<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = ${(error != null and error.status != null ? error.status : 400) + ' - ' + site.title},
        description = ${'这个请求没有通过'},
        ssrContent = ~{::ssrBlock}
      )}">
  <th:block th:fragment="ssrBlock">
    <div th:replace="~{error/modules/dialog :: panel(
      variant='client',
      titleText='这个请求暂时无法完成。',
      bodyText='权限、状态或请求参数没有通过检查。',
      statusCode=${error != null and error.status != null ? error.status : 400},
      hintText='请求受限'
    )}"></div>
  </th:block>
</html>
