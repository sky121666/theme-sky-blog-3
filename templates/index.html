<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = ${site.title},
        description = ${site.subtitle},
        ssrContent = ~{::ssrBlock}
      )}">
  <th:block th:fragment="ssrBlock">
    <!-- macOS 美学卡片流列表 -->
    <div class="max-w-4xl mx-auto px-4 md:px-8 py-10 md:py-16">
      
      <!-- 博客头部 -->
      <div class="mb-14 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-gray-800 dark:text-gray-100 mb-3" th:text="${site.title}">Blog</h1>
        <p class="text-gray-500 dark:text-gray-400 text-lg" th:text="${site.subtitle}"></p>
      </div>
      
      <!-- 文章网格 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
        <div th:each="post : ${posts.items}" 
             class="group bg-white/60 dark:bg-black/30 backdrop-blur-md border border-black/5 dark:border-white/10 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden flex flex-col rounded-2xl">
          
          <!-- 可以配置占位图，如果极简则省略 -->
          <a class="flex-1 p-6 md:p-8 flex flex-col pjax-link" th:href="${post.status.permalink}">
            <!-- 分类或标签 Tag 区域预留 -->
            <h2 class="text-xl md:text-2xl font-semibold text-gray-900 dark:text-gray-100 mb-3 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors line-clamp-2 leading-snug" 
                th:text="${post.spec.title}"></h2>
            
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-6 line-clamp-3 leading-relaxed" 
               th:text="${post.status.excerpt}"></p>
               
            <div class="mt-auto flex items-center justify-between text-xs text-gray-400 dark:text-gray-500 font-medium">
               <span th:text="${#dates.format(post.spec.publishTime, 'yyyy年MM月dd日')}"></span>
               <!-- 箭头小交互 -->
               <svg class="w-4 h-4 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
               </svg>
            </div>
          </a>
        </div>
      </div>
      
      <!-- 分页组件预留区 (暂时隐藏或简单编写) -->
      <div class="mt-16 flex justify-center gap-4" th:if="${posts.hasPrevious() or posts.hasNext()}">
        <a th:if="${posts.hasPrevious()}" th:href="@{${posts.prevUrl}}" class="pjax-link px-6 py-2 rounded-full bg-white/60 dark:bg-black/40 backdrop-blur-sm border border-black/5 dark:border-white/5 hover:bg-white/80 dark:hover:bg-black/60 text-gray-600 dark:text-gray-300 transition-colors font-medium text-sm">上一页</a>
        <a th:if="${posts.hasNext()}" th:href="@{${posts.nextUrl}}" class="pjax-link px-6 py-2 rounded-full bg-white/60 dark:bg-black/40 backdrop-blur-sm border border-black/5 dark:border-white/5 hover:bg-white/80 dark:hover:bg-black/60 text-gray-600 dark:text-gray-300 transition-colors font-medium text-sm">下一页</a>
      </div>
      
    </div>
  </th:block>
</html>
