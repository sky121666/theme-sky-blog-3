<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/shell/layout :: html(
        title = ${site.title},
        description = ${site.seo?.description ?: site.subtitle},
        ssrContent = ~{::ssrBlock},
        canonical = ${site.url},
        image = ${site.logo},
        type = 'website',
        seoFallback = 'none',
        pageMode = 'browser-home',
        pageApp = '',
        windowVariant = 'none',
        windowScene = 'none',
        windowTitle = '',
        windowResizable = false,
        windowMaximizable = false,
        windowMetricsKey = 'none'
      )}">
  <th:block th:fragment="ssrBlock">
    <!-- 首页只保留桌面壳层，不向主窗口注入内容。 -->
  </th:block>
</html>
