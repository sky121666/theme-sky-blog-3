<!DOCTYPE html>
<th:block xmlns:th="https://www.thymeleaf.org"
          xmlns:halo="https://halo.run/schema/thymeleaf"
          th:with="
            photoTitle=${photo != null and photo.spec != null and !#strings.isEmpty(photo.spec.displayName) ? photo.spec.displayName : title},
            photoDescription=${photo != null and photo.spec != null and !#strings.isEmpty(photo.spec.description) ? photo.spec.description : ''},
            photoImage=${photo != null and photo.spec != null and !#strings.isEmpty(photo.spec.url) ? photo.spec.url : site.logo},
            photoCanonical=${photo != null and !#strings.isEmpty(photo.permalink) ? photo.permalink : ('/photos/' + photo.metadata.name)},
            photoSubtitle=${position != null and total != null ? (position + ' / ' + total) : '图片详情'},
            photoTakenAt=${photo != null and photo.exif != null and photo.exif.dateTimeOriginal != null ? photo.exif.dateTimeOriginal : ''},
            photoResolution=${photo != null and photo.exif != null and photo.exif.imageWidth != null and photo.exif.imageHeight != null ? (photo.exif.imageWidth + ' × ' + photo.exif.imageHeight) : ''},
            detailGroups=${photoFinder.groupBy()},
            requestedDetailGroup=${!#strings.isEmpty(group) ? group : ''},
            detailGroupNameIndex=${detailGroups != null ? detailGroups.![metadata.name].indexOf(requestedDetailGroup) : -1},
            detailActiveGroup=${detailGroupNameIndex >= 0 ? requestedDetailGroup : ''},
            detailSidebarView=${!#strings.isEmpty(detailActiveGroup) ? 'group' : 'library'},
            detailPage=${page != null and page > 0 ? page : 1},
            detailSize=${size != null and size > 0 ? size : 20},
            detailFilmstripResult=${photoFinder.list(detailPage, detailSize, detailActiveGroup)},
            detailFilmstripItems=${detailFilmstripResult != null ? detailFilmstripResult.items : null},
            detailFilmstripCurrentIndex=${detailFilmstripItems != null ? detailFilmstripItems.![metadata.name].indexOf(photo.metadata.name) : -1},
            detailFilmstripPhotos=${detailFilmstripCurrentIndex >= 0 ? detailFilmstripItems : neighbors}">
  <html th:replace="~{modules/shell/layout :: html(
          title = ${photoTitle + ' - ' + site.title},
          description = ${!#strings.isEmpty(photoDescription) ? photoDescription : '图库照片'},
          ssrContent = ~{::ssrBlock},
          canonical = ${photoCanonical},
          image = ${photoImage},
          type = 'article',
          seoFallback = 'full',
          pageMode = 'browser-list',
          pageApp = 'photos',
          windowVariant = 'photos',
          windowScene = 'detail',
          windowTitle = ${photoTitle},
          windowResizable = true,
          windowMaximizable = true,
          windowMetricsKey = 'photos'
        )}">
    <th:block th:fragment="ssrBlock">
      <!-- plugin-contract: PluginPhotos; surface: detail; contract-version: 2.1.1; tested-version: 2.1.2; status: compatible-tested; source: docs/插件适配契约.md -->
      <article class="photos-shell photos-detail-shell"
               data-app-root="photos"
               data-photos-view="detail"
               x-data="photosExplorer"
               :class="{ 'is-comments-open': commentsOpen }"
               th:attrappend=" data-photos-site-title=${site.title}, data-photos-chrome-title=${photoTitle}, data-photos-chrome-subtitle=${photoSubtitle}, data-photos-list-url=${!#strings.isEmpty(backUrl) ? backUrl : '/photos'}"
               th:style="|--photos-detail-hero: url('${photoImage}');|">
        <h1 class="sr-only" th:text="${photoTitle}">图片详情</h1>
        <script type="application/json" data-app-props="photos">{"version":1,"appId":"photos","data":{"view":"detail","scene":"detail"}}</script>

        <th:block th:replace="~{modules/photos-app/sidebar :: sidebar(
            groups=${detailGroups},
            activeGroup=${detailActiveGroup},
            view=${detailSidebarView},
            photoUrl=${photoUrl}
          )}"></th:block>

        <main class="photos-main photos-detail-main">
          <section class="photos-detail-stage"
                   :class="{ 'is-pannable': photoCanPan, 'is-panning': photoPanning }">
            <figure class="photos-detail-figure"
                    th:attr="data-photo-name=${photo.metadata.name}">
              <img class="photos-detail-image"
                   th:src="${photo.spec.url}"
                   th:alt="${photoTitle}"
                   loading="eager"
                   decoding="async"
                   draggable="false"
                   :style="'transform: translate(calc(-50% + ' + panX + 'px), calc(-50% + ' + panY + 'px)) scale(' + zoomLevel + ')'" />
              <figcaption th:if="${!#strings.isEmpty(photoDescription)}" th:text="${photoDescription}">图片描述</figcaption>
            </figure>

            <div class="photos-detail-adjacent" th:if="${prev != null or next != null}">
              <a class="photos-detail-adjacent-btn pjax-link"
                 data-pjax-app="photos"
                 th:classappend="${prev == null ? 'is-disabled' : ''}"
                 th:href="${prev != null ? photoUrl.detail(prev) : '#'}"
                 th:attr="aria-disabled=${prev == null ? 'true' : null}, tabindex=${prev == null ? '-1' : null}"
                 rel="prev"
                 aria-label="上一张">
                <span class="icon-[lucide--chevron-left]" aria-hidden="true"></span>
              </a>
              <a class="photos-detail-adjacent-btn pjax-link"
                 data-pjax-app="photos"
                 th:classappend="${next == null ? 'is-disabled' : ''}"
                 th:href="${next != null ? photoUrl.detail(next) : '#'}"
                 th:attr="aria-disabled=${next == null ? 'true' : null}, tabindex=${next == null ? '-1' : null}"
                 rel="next"
                 aria-label="下一张">
                <span class="icon-[lucide--chevron-right]" aria-hidden="true"></span>
              </a>
            </div>
          </section>

          <nav class="photos-detail-filmstrip"
               th:if="${detailFilmstripPhotos != null and !#lists.isEmpty(detailFilmstripPhotos)}"
               th:attr="aria-label=${position != null and total != null ? ('照片切换列表，当前 ' + position + ' / ' + total) : '照片切换列表'}">
            <div class="photos-detail-neighbor-list">
              <a class="photos-detail-neighbor pjax-link"
                 data-pjax-app="photos"
                 th:each="neighbor : ${detailFilmstripPhotos}"
                 th:classappend="${neighbor.metadata.name == photo.metadata.name ? ' is-current' : ''}"
                 th:href="${photoUrl.detail(neighbor)}"
                 th:title="${neighbor.spec.displayName}"
                 th:attr="data-photo-name=${neighbor.metadata.name}, aria-current=${neighbor.metadata.name == photo.metadata.name ? 'true' : null}">
                <img th:src="${thumbnail.gen(!#strings.isEmpty(neighbor.spec.cover) ? neighbor.spec.cover : neighbor.spec.url, 's')}"
                     th:alt="${neighbor.spec.displayName}"
                     loading="eager"
                     decoding="async" />
              </a>
            </div>
          </nav>

          <section class="photos-detail-popover"
                   x-show="infoOpen"
                   x-transition:enter="photos-popover-enter"
                   x-transition:enter-start="photos-popover-enter-start"
                   x-transition:enter-end="photos-popover-enter-end"
                   x-transition:leave="photos-popover-leave"
                   x-transition:leave-start="photos-popover-leave-start"
                   x-transition:leave-end="photos-popover-leave-end"
                   @click.outside="infoOpen = false"
                   aria-label="图片详情">
            <div class="photos-detail-popover-head">
              <span>信息</span>
              <strong th:text="${photoTitle}">图片标题</strong>
              <p th:if="${!#strings.isEmpty(photoTakenAt)}" th:text="${photoTakenAt}">拍摄时间</p>
            </div>
            <dl class="photos-detail-meta">
              <div><dt>名称</dt><dd th:text="${photo.metadata.name}">photo-name</dd></div>
              <div th:if="${position != null and total != null}">
                <dt>序号</dt>
                <dd><span th:text="${position}">1</span><span> / </span><span th:text="${total}">1</span></dd>
              </div>
              <div th:if="${!#strings.isEmpty(photoResolution)}"><dt>尺寸</dt><dd th:text="${photoResolution}">-</dd></div>
              <div th:if="${photo.exif != null and !#strings.isEmpty(photo.exif.make)}"><dt>厂商</dt><dd th:text="${photo.exif.make}">-</dd></div>
              <div th:if="${photo.exif != null and !#strings.isEmpty(photo.exif.model)}"><dt>相机</dt><dd th:text="${photo.exif.model}">-</dd></div>
              <div th:if="${photo.exif != null and !#strings.isEmpty(photo.exif.lensModel)}"><dt>镜头</dt><dd th:text="${photo.exif.lensModel}">-</dd></div>
              <div th:if="${photo.exif != null and photo.exif.fNumber != null}"><dt>光圈</dt><dd th:text="${'f/' + photo.exif.fNumber}">-</dd></div>
              <div th:if="${photo.exif != null and photo.exif.exposureTime != null}"><dt>快门</dt><dd th:text="${photo.exif.exposureTime}">-</dd></div>
              <div th:if="${photo.exif != null and photo.exif.iso != null}"><dt>ISO</dt><dd th:text="${photo.exif.iso}">-</dd></div>
              <div th:if="${photo.exif != null and photo.exif.focalLength != null}"><dt>焦距</dt><dd th:text="${photo.exif.focalLength}">-</dd></div>
            </dl>
            <div class="photos-detail-popover-desc" th:if="${!#strings.isEmpty(photoDescription)}">
              <span>描述</span>
              <p th:text="${photoDescription}">图片描述</p>
            </div>
            <div class="photos-detail-tags" th:if="${photo.spec.tags != null and !#lists.isEmpty(photo.spec.tags)}">
              <span class="photos-detail-tag" th:each="tag : ${photo.spec.tags}" th:text="${tag}">Tag</span>
            </div>
          </section>
        </main>

        <aside class="photos-detail-comment-drawer"
               x-show="commentsOpen"
               x-transition:enter="photos-drawer-enter"
               x-transition:enter-start="photos-drawer-enter-start"
               x-transition:enter-end="photos-drawer-enter-end"
               x-transition:leave="photos-drawer-leave"
               x-transition:leave-start="photos-drawer-leave-start"
               x-transition:leave-end="photos-drawer-leave-end">
          <div class="photos-detail-comment-head">
            <strong>评论</strong>
            <button type="button" class="photos-detail-icon-btn" @click="commentsOpen = false; syncDetailChromeControls()" aria-label="关闭评论">
              <span class="icon-[lucide--x]" aria-hidden="true"></span>
            </button>
          </div>
          <!-- plugin-contract: PluginCommentWidget; contract-version: 3.1.1; tested-version: 3.1.1; status: confirmed; source: docs/插件适配契约.md -->
          <section th:if="${pluginFinder.available('PluginCommentWidget')}">
            <halo:comment group="core.halo.run" kind="Photo" th:attr="name=${photo.metadata.name}" />
          </section>
          <p class="photos-detail-comment-empty" th:unless="${pluginFinder.available('PluginCommentWidget')}">评论插件未启用。</p>
        </aside>
      </article>
    </th:block>
  </html>
</th:block>
