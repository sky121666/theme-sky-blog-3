<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:fragment="page"
      th:replace="~{modules/shell/layout :: html(
        title = ${post.spec.title + ' - ' + site.title},
        description = ${!#strings.isEmpty(post.status.excerpt) ? post.status.excerpt : (site.seo?.description ?: site.subtitle)},
        ssrContent = ~{modules/browser-reader/post :: content},
        canonical = ${post.status.permalink},
        image = ${!#strings.isEmpty(post.spec.cover) ? post.spec.cover : site.logo},
        type = 'article',
        seoFallback = 'none',
        pageMode = 'browser-reader',
        pageApp = 'reader',
        windowVariant = 'browser',
        windowScene = 'none',
        windowTitle = ${post.spec.title},
        windowResizable = true,
        windowMaximizable = true,
        windowMetricsKey = 'browser'
      )}">
  <th:block th:fragment="content">
    <div class="post-reader-shell" data-app-root="reader">
      <script type="application/json" data-app-props="reader">{"version":1,"appId":"reader","data":{"contentType":"post"}}</script>
      <div class="post-reader-frame" th:attr="data-post-name=${post.metadata.name}">
        <header class="post-header">
          <h1 class="post-title" th:text="${post.spec.title}"></h1>

          <div class="post-meta">
            <div class="post-meta-item post-meta-item--taxonomy"
                 th:if="${post.categories != null and !#lists.isEmpty(post.categories)}">
              <span class="post-meta-label">分类</span>
              <span class="post-meta-taxonomy-list">
                <th:block th:each="category, categoryStat : ${post.categories}">
                  <a class="post-meta-link pjax-link"
                     th:href="${category.status.permalink}"
                     th:text="${category.spec.displayName}">分类</a>
                  <span class="post-meta-separator"
                        th:if="${!categoryStat.last}">/</span>
                </th:block>
              </span>
            </div>
            <div class="post-meta-item post-meta-item--flag" th:if="${post.spec.pinned}">
              <span>置顶</span>
            </div>
            <div class="post-meta-item">
              <a class="post-meta-link pjax-link"
                 th:if="${post.owner != null}"
                 th:href="${post.owner.permalink}"
                 th:text="${post.owner.displayName}">Author</a>
              <span th:unless="${post.owner != null}" th:text="${site.title}">Author</span>
            </div>
            <div class="post-meta-item">
              <time th:text="${#dates.format(post.spec.publishTime, 'yyyy年MM月dd日')}"></time>
            </div>
            <div class="post-meta-item" th:if="${post.status.lastModifyTime != null}">
              <span th:text="${'更新于 ' + #dates.format(post.status.lastModifyTime, 'yyyy年MM月dd日')}">更新于</span>
            </div>
          </div>

          <div class="post-actions-shell"
               x-data="postUpvote($el.dataset.postName, $el.dataset.initialUpvote)"
               th:attr="data-post-name=${post.metadata.name}, data-initial-upvote=${post.stats?.upvote ?: 0}">
            <div class="post-actions">
              <span class="post-action-chip">
                <span class="post-action-icon icon-[lucide--eye]" aria-hidden="true"></span>
                <span th:text="${post.stats?.visit ?: 0} + ' 浏览'">0 浏览</span>
              </span>

              <a class="post-action-chip"
                 th:if="${pluginFinder.available('PluginCommentWidget')}"
                 href="#post-comments">
                <span class="post-action-icon icon-[lucide--message-circle]" aria-hidden="true"></span>
                <span th:text="${post.stats?.comment ?: 0} + ' 评论'">0 评论</span>
              </a>

              <button type="button"
                      class="post-action-chip post-action-chip--like"
                      :class="{ 'is-liked': liked, 'is-pending': pending }"
                      :disabled="pending || liked"
                      :aria-pressed="liked.toString()"
                      @click="upvote()">
                <span class="post-action-icon post-action-icon--heart icon-[lucide--heart]" aria-hidden="true"></span>
                <span x-text="count + ' 点赞'">0 点赞</span>
              </button>
            </div>

            <p class="post-action-feedback"
               x-show="error"
               x-text="error"
               style="display: none;"></p>
          </div>

          <p class="post-summary" th:if="${!#strings.isEmpty(post.status.excerpt)}" th:text="${post.status.excerpt}"></p>

          <figure class="post-cover" th:if="${!#strings.isEmpty(post.spec.cover)}">
            <img th:src="${post.spec.cover}" loading="lazy" decoding="async" th:alt="${post.spec.title}">
          </figure>
        </header>

        <div class="post-body-layout">
          <div class="post-main-column">
            <article id="article-content" class="post-content" th:utext="${post.content.content}"></article>

            <section class="post-tail"
                     th:with="postCursor=${postFinder.cursor(post.metadata.name)}"
                     th:if="${(post.tags != null and !#lists.isEmpty(post.tags)) or (postCursor != null ? (postCursor.hasPrevious() or postCursor.hasNext()) : false)}">
              <div class="post-tail-block"
                   th:if="${post.tags != null and !#lists.isEmpty(post.tags)}">
                <h2 class="post-tail-heading">标签</h2>
                <div class="post-chip-list">
                  <a class="post-taxonomy-chip post-taxonomy-chip--tag pjax-link"
                     th:each="tag : ${post.tags}"
                     th:href="${tag.status.permalink}"
                     th:text="${tag.spec.displayName}">标签</a>
                </div>
              </div>

              <nav class="post-neighbors"
                   th:if="${postCursor != null ? (postCursor.hasPrevious() or postCursor.hasNext()) : false}">
                <a class="post-neighbor-card pjax-link is-prev"
                   data-pjax-app="reader"
                   th:if="${postCursor.hasPrevious()}"
                   th:href="${postCursor.previous.status.permalink}">
                  <span class="post-neighbor-label">上一篇</span>
                  <strong class="post-neighbor-title"
                          th:text="${postCursor.previous.spec.title}">上一篇标题</strong>
                </a>
                <a class="post-neighbor-card pjax-link is-next"
                   data-pjax-app="reader"
                   th:if="${postCursor.hasNext()}"
                   th:href="${postCursor.next.status.permalink}">
                  <span class="post-neighbor-label">下一篇</span>
                  <strong class="post-neighbor-title"
                          th:text="${postCursor.next.spec.title}">下一篇标题</strong>
                </a>
              </nav>
            </section>

            <!-- plugin-contract: PluginCommentWidget; contract-version: pending; status: unconfirmed; source: docs/插件适配契约.md -->
            <section id="post-comments" class="post-comments mac-comment-section" th:if="${pluginFinder.available('PluginCommentWidget')}" data-lazy-comment>
              <h2 class="post-comments-title mac-comment-title">评论</h2>
              <div class="post-comments-shell mac-comment-shell" data-comment-hidden style="display:none;">
                <halo:comment group="content.halo.run" kind="Post" th:attr="name=${post.metadata.name}"/>
              </div>
            </section>
          </div>

          <aside class="post-outline" data-post-outline hidden>
            <details class="post-outline-details" open>
              <summary class="post-outline-summary">目录</summary>
              <div class="post-outline-card">
                <div class="post-outline-heading">目录</div>
                <nav class="post-outline-list" data-post-outline-list></nav>
              </div>
            </details>
          </aside>
        </div>
      </div>
    </div>
  </th:block>
</html>
