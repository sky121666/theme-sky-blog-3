<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:fragment="page"
      th:replace="~{modules/shell/layout :: html(
        title = ${singlePage.spec.title + ' - ' + site.title},
        description = ${!#strings.isEmpty(singlePage.status.excerpt) ? singlePage.status.excerpt : (site.seo?.description ?: site.subtitle)},
        ssrContent = ~{modules/browser-reader/page :: content},
        canonical = ${singlePage.status.permalink},
        image = ${site.logo},
        type = 'article',
        seoFallback = 'none',
        pageMode = 'browser-reader',
        pageApp = 'reader',
        windowVariant = 'browser',
        windowScene = 'none',
        windowTitle = ${singlePage.spec.title},
        windowResizable = true,
        windowMaximizable = true,
        windowMetricsKey = 'browser'
      )}">
  <th:block th:fragment="content">
    <div class="post-reader-shell" data-app-root="reader">
      <script type="application/json" data-app-props="reader">{"version":1,"appId":"reader","data":{"contentType":"page"}}</script>
      <div class="post-reader-frame">
        <header class="post-header">
          <div class="post-kicker">Page</div>
          <h1 class="post-title" th:text="${singlePage.spec.title}"></h1>
          <p class="post-summary" th:if="${!#strings.isEmpty(singlePage.status.excerpt)}" th:text="${singlePage.status.excerpt}"></p>
        </header>

        <article id="article-content" class="post-content" th:utext="${singlePage.content.content}"></article>

        <!-- plugin-contract: PluginCommentWidget; contract-version: 3.1.1; tested-version: 3.1.1; status: confirmed; source: docs/插件适配契约.md -->
        <section id="post-comments" class="post-comments mac-comment-section" th:if="${pluginFinder.available('PluginCommentWidget')}" data-lazy-comment>
          <h2 class="post-comments-title mac-comment-title">评论</h2>
          <div class="post-comments-shell mac-comment-shell" data-comment-hidden style="display:none;">
            <halo:comment
                group="content.halo.run"
                kind="SinglePage"
                th:attr="name=${singlePage.metadata.name}"
            />
          </div>
        </section>
      </div>
    </div>
  </th:block>
</html>
