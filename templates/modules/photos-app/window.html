<th:block th:fragment="frame (titleText, contentFragment, resizable, maximizable, windowScene, metricsKey)">
  <th:block th:replace="~{modules/shell/window-frame :: shell(
      variant='photos',
      metricsKey=${metricsKey},
      resizable=${resizable},
      maximizable=${maximizable},
      widthAttr='',
      extraClasses='photos-window md:min-w-[700px] md:min-h-[450px]',
      inlineStyle='--photos-shadow: 0 0 0 0.5px rgba(255,255,255,0.12), 0 22px 70px rgba(0,0,0,0.46), 0 8px 20px rgba(0,0,0,0.20);',
      bodyFragment=~{::frameBody(titleText=${titleText}, contentFragment=${contentFragment}, resizable=${resizable}, maximizable=${maximizable}, windowScene=${windowScene})}
    )}"></th:block>
</th:block>

<th:block th:fragment="frameBody (titleText, contentFragment, resizable, maximizable, windowScene)">
      <th:block th:replace="~{modules/shell/window-frame :: resizeHandles(mode='full', enabled=${resizable == true or resizable == 'true'})}"></th:block>

      <th:block th:replace="~{modules/shell/window-titlebar :: shell(
          extraClasses='photos-titlebar',
          inlineStyle='',
          contentFragment=~{::titlebarContent(titleText=${titleText}, maximizable=${maximizable}, windowScene=${windowScene})}
        )}"></th:block>
          
     <div class="window-body flex-1 overflow-hidden relative select-text" data-window-scroll data-window-content-root>
         <div id="pjax-container" data-window-content-variant="photos" class="w-full h-full">
            <th:block th:replace="${contentFragment}" />
         </div>
     </div>
</th:block>

<th:block th:fragment="titlebarContent (titleText, maximizable, windowScene)">
              <div class="window-titlebar-leading photos-titlebar-leading flex items-center gap-3 md:gap-4 w-[120px] md:w-[180px]"
                   th:classappend="${windowScene == 'detail' ? ' photos-titlebar-leading--detail' : ''}">
                <th:block th:replace="~{modules/shell/window-titlebar-leading :: trafficLightsOnly(maximizable=${maximizable})}"></th:block>
                <a th:if="${windowScene == 'detail'}"
                        href="/photos"
                        class="photos-titlebar-btn photos-detail-titlebar-back pjax-link"
                        data-pjax-app="photos"
                        title="返回图库">
                  <span class="icon-[lucide--chevron-left] w-[16px] h-[16px]" aria-hidden="true"></span>
                </a>
              </div>
              <div class="window-titlebar-center photos-titlebar-center flex-1 flex justify-center items-center overflow-hidden px-2">
                <th:block th:replace="~{::titlebarCenter(titleText=${titleText})}"></th:block>
              </div>
              <div class="window-titlebar-trailing photos-titlebar-trailing flex items-center justify-end gap-2 w-[120px] md:w-[180px] pr-0"
                   th:classappend="${windowScene == 'detail' ? ' photos-titlebar-trailing--detail' : ''}">
                <th:block th:replace="~{::titlebarTrailing(windowScene=${windowScene})}"></th:block>
              </div>
</th:block>

<th:block th:fragment="titlebarCenter (titleText)">
              <div class="photos-titlebar-meta flex items-center gap-3">
                  <th:block th:replace="~{modules/shell/window-titlebar :: titleStack(
                    titleText=${titleText},
                    subtitleText='图库',
                    stackClasses='photos-titlebar-copy',
                    titleClasses='photos-title-text truncate font-medium text-[14px] md:text-[13px] tracking-wide',
                    subtitleClasses='photos-title-subtitle'
                  )}"></th:block>
              </div>
</th:block>

<th:block th:fragment="titlebarTrailing (windowScene)">
              <div class="photos-titlebar-toolbar" data-photos-toolbar th:if="${windowScene != 'detail'}">
                  <div class="photos-titlebar-group photos-titlebar-group--mode" data-photos-layout-group>
                      <button type="button"
                              class="photos-titlebar-btn photos-titlebar-segment"
                              data-photos-mode-btn="square"
                              title="方格"
                              onclick="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:set-mode', { detail: { mode: 'square' }, bubbles: true }))">
                          <span class="icon-[lucide--grid-2x2] w-[15px] h-[15px]" aria-hidden="true"></span>
                      </button>
                      <button type="button"
                              class="photos-titlebar-btn photos-titlebar-segment"
                              data-photos-mode-btn="aspect"
                              title="瀑布流"
                              onclick="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:set-mode', { detail: { mode: 'aspect' }, bubbles: true }))">
                          <span class="icon-[lucide--columns-2] w-[15px] h-[15px]" aria-hidden="true"></span>
                      </button>
                  </div>
                  <div class="photos-titlebar-group photos-titlebar-group--density" data-photos-density-group>
                      <button type="button"
                              class="photos-titlebar-btn photos-titlebar-action"
                              data-photos-cols="decrease"
                              title="减少数量"
                              onclick="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:cols-decrease', { bubbles: true }))">
                          <span class="icon-[lucide--minus] w-[15px] h-[15px]" aria-hidden="true"></span>
                      </button>
                      <button type="button"
                              class="photos-titlebar-btn photos-titlebar-action"
                              data-photos-cols="increase"
                              title="增加数量"
                              onclick="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:cols-increase', { bubbles: true }))">
                          <span class="icon-[lucide--plus] w-[15px] h-[15px]" aria-hidden="true"></span>
                      </button>
                  </div>
              </div>
              <div class="photos-titlebar-detail-toolbar" data-photos-detail-toolbar th:if="${windowScene == 'detail'}">
                <div class="photos-titlebar-group photos-titlebar-zoom photos-titlebar-group--detail-zoom"
                     title="缩放"
                     onmousedown="event.stopPropagation()"
                     onpointerdown="event.stopPropagation()"
                     onclick="event.stopPropagation()">
                  <button type="button"
                          class="photos-titlebar-zoom-btn"
                          aria-label="缩小"
                          onclick="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:zoom-out', { bubbles: true }))">
                    <span class="icon-[lucide--minus] w-[13px] h-[13px]" aria-hidden="true"></span>
                  </button>
                  <input type="range"
                         min="0.5"
                         max="2.2"
                         step="0.05"
                         value="1"
                         data-photos-detail-zoom
                         aria-label="缩放图片"
                         onmousedown="event.stopPropagation()"
                         onpointerdown="event.stopPropagation()"
                         oninput="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:zoom-set', { detail: { value: this.value }, bubbles: true }))" />
                  <button type="button"
                          class="photos-titlebar-zoom-btn"
                          aria-label="放大"
                          onclick="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:zoom-in', { bubbles: true }))">
                    <span class="icon-[lucide--plus] w-[13px] h-[13px]" aria-hidden="true"></span>
                  </button>
                </div>
                <div class="photos-titlebar-group photos-titlebar-group--detail-actions">
                  <button type="button"
                          class="photos-titlebar-btn"
                          data-photos-detail-info-btn
                          title="详情"
                          onclick="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:info-toggle', { bubbles: true }))">
                    <span class="icon-[lucide--info] w-[16px] h-[16px]" aria-hidden="true"></span>
                  </button>
                  <button type="button"
                          class="photos-titlebar-btn photos-titlebar-comment-btn"
                          data-photos-detail-comments-btn
                          title="评论"
                          onclick="this.closest('[data-window-surface]')?.dispatchEvent(new CustomEvent('photos:comments-toggle', { bubbles: true }))">
                    <span class="icon-[lucide--message-circle] w-[16px] h-[16px]" aria-hidden="true"></span>
                  </button>
                </div>
              </div>
              <th:block th:if="${windowScene != 'detail'}">
                <th:block th:replace="~{modules/shell/window-titlebar-actions :: themeToggle(
                  wrapperClasses='',
                  buttonClasses='photos-titlebar-btn hidden md:inline-flex',
                  iconClasses='',
                  titleText='切换明暗'
                )}"></th:block>
                <th:block th:replace="~{modules/shell/window-titlebar-actions :: refreshButton(
                  buttonClasses='photos-titlebar-btn',
                  iconClasses='w-4 h-4',
                  titleText='刷新'
                )}"></th:block>
              </th:block>
</th:block>
</th:block>
