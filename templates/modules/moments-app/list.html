<th:block th:fragment="content">
  <!-- plugin-contract: PluginMoments; contract-version: 1.16.0; tested-version: 1.16.0; status: confirmed; source: docs/插件适配契约.md -->
  <div class="moments-app moments-app--feed" data-app-root="moments">
    <h1 class="sr-only">瞬间</h1>
    <script type="application/json" data-app-props="moments">{"version":1,"appId":"moments","data":{"scene":"feed"}}</script>
    <div class="moments-feed-shell">

      <!-- 封面区 -->
      <div class="moments-cover-wrapper"
           th:with="coverImage=${theme.config.moments?.cover?.image_url}"
           th:classappend="${coverImage == null or #strings.isEmpty(coverImage)} ? 'moments-cover-wrapper--empty'">
        <div class="moments-cover">
          <img class="moments-cover-img"
               th:if="${coverImage != null and !#strings.isEmpty(coverImage)}"
               th:src="${coverImage}"
               loading="lazy"
               decoding="async"
               alt="" />
        </div>
        <div class="moments-cover-user">
          <div class="moments-cover-identity">
            <span class="moments-cover-name"
                  th:text="${!#strings.isEmpty(theme.config.moments?.profile?.display_name) ? theme.config.moments.profile.display_name : site.title}"></span>
            <span class="moments-cover-subtitle"
                  th:if="${!#strings.isEmpty(theme.config.moments?.profile?.subtitle) or !#strings.isEmpty(site.subtitle)}"
                  th:text="${!#strings.isEmpty(theme.config.moments?.profile?.subtitle) ? theme.config.moments.profile.subtitle : site.subtitle}"></span>
          </div>
          <img class="moments-cover-avatar"
               th:if="${site.logo != null and !#strings.isEmpty(site.logo)}"
               th:src="${site.logo}"
               loading="lazy"
               decoding="async"
               alt="" />
          <div class="moments-cover-avatar moments-cover-avatar--placeholder"
               th:if="${site.logo == null or #strings.isEmpty(site.logo)}"
               th:with="initial=${!#strings.isEmpty(theme.config.moments?.profile?.display_name) ? #strings.substring(theme.config.moments.profile.display_name, 0, 1) : (!#strings.isEmpty(site.title) ? #strings.substring(site.title, 0, 1) : 'M')}"
               th:text="${initial}"></div>
        </div>
      </div>

      <!-- 标签区 -->
      <div class="moments-tags" th:if="${tags != null and !#lists.isEmpty(tags)}">
        <a class="moments-tag pjax-link"
           th:classappend="${(param.tag == null or #lists.isEmpty(param.tag)) ? 'is-active' : ''}"
           th:href="@{/moments}">全部</a>
        <th:block th:each="tag : ${tags}">
          <a class="moments-tag pjax-link"
             th:classappend="${param.tag != null and !#lists.isEmpty(param.tag) and param.tag[0] == tag.name ? 'is-active' : ''}"
             th:href="@{/moments(tag=${tag.name})}"
             th:text="${tag.name}"></a>
        </th:block>
      </div>

      <!-- 动态列表 -->
      <div class="moments-feed-list" th:if="${moments != null and moments.items != null}">
        <article th:each="moment : ${moments.items}"
                 class="moment-feed-card"
                 th:with="upvoteCount=${moment.stats != null and moment.stats.upvote != null ? moment.stats.upvote : 0},
                          commentCount=${moment.stats != null ? (moment.stats.approvedComment != null ? moment.stats.approvedComment : (moment.stats.totalComment != null ? moment.stats.totalComment : 0)) : 0},
                          momentName=${moment.metadata != null ? moment.metadata.name : ''},
                          momentDetailUrl=${!#strings.isEmpty(momentName) ? '/moments/' + momentName : '/moments'},
                          ownerName=${moment.owner != null and moment.owner.name != null ? moment.owner.name : ''},
                          ownerUrl=${!#strings.isEmpty(ownerName) ? '/authors/' + ownerName : ''}"
                 th:attr="data-moment-card=${momentName},
                          data-moment-name=${momentName},
                          data-upvote-count=${upvoteCount},
                          data-comment-count=${commentCount},
                          data-detail-url=${momentDetailUrl}">

          <!-- 头像列 -->
          <div class="moment-feed-avatar-col">
            <a class="moment-feed-avatar-link pjax-link"
               data-pjax-app="explorer-author"
               th:if="${!#strings.isEmpty(ownerUrl) and moment.owner != null and moment.owner.avatar != null}"
               th:href="${ownerUrl}"
               th:title="${moment.owner.displayName != null ? moment.owner.displayName : ownerName}">
              <img class="moment-feed-avatar"
                   th:src="${moment.owner.avatar}"
                   loading="lazy"
                   decoding="async"
                   alt="" />
            </a>
            <img class="moment-feed-avatar"
                 th:if="${#strings.isEmpty(ownerUrl) and moment.owner != null and moment.owner.avatar != null}"
                 th:src="${moment.owner.avatar}"
                 loading="lazy"
                 decoding="async"
                 alt="" />
          </div>

          <!-- 内容列 -->
          <div class="moment-feed-content-col">
            <a class="moment-feed-nickname pjax-link"
               data-pjax-app="explorer-author"
               th:if="${!#strings.isEmpty(ownerUrl)}"
               th:href="${ownerUrl}"
               th:text="${moment.owner != null and moment.owner.displayName != null ? moment.owner.displayName : ownerName}"></a>
            <span class="moment-feed-nickname"
                  th:if="${#strings.isEmpty(ownerUrl)}"
                  th:text="${moment.owner != null and moment.owner.displayName != null ? moment.owner.displayName : '匿名'}"></span>

            <div class="moment-feed-body"
                 th:if="${moment.spec != null and moment.spec.content != null and moment.spec.content.html != null and !#strings.isEmpty(moment.spec.content.html)}"
                 th:utext="${moment.spec.content.html}"></div>

            <th:block th:if="${moment.spec != null and moment.spec.content != null and moment.spec.content.medium != null}">
              <div class="moment-feed-gallery"
                   th:if="${!#lists.isEmpty(moment.spec.content.medium)}"
                   th:data-count="${#lists.size(moment.spec.content.medium)}">
                <th:block th:each="media : ${moment.spec.content.medium}">
                  <div class="moment-feed-gallery-item-wrapper"
                       th:if="${media.type != null and media.type.name() == 'PHOTO'}"
                       data-moment-photo
                       role="button"
                       tabindex="0"
                       aria-label="预览图片"
                       th:attr="data-moment-photo-url=${media.url},
                                data-moment-photo-type=${media.originType}">
                    <img class="moment-feed-gallery-item"
                         th:attr="data-src=${media.url}"
                         loading="lazy"
                         decoding="async"
                         alt="" />
                  </div>
                  <!-- 视频占位卡 -->
                  <a th:if="${media.type != null and media.type.name() == 'VIDEO'}"
                     th:href="${momentDetailUrl}"
                     data-pjax-app="moments"
                     class="moment-feed-video-placeholder moment-feed-media-placeholder pjax-link"
                     title="点击查看视频">
                    <span class="icon-[lucide--play]" aria-hidden="true"></span>
                    <span class="moment-feed-video-label">视频</span>
                  </a>
                  <a th:if="${media.type != null and media.type.name() == 'AUDIO'}"
                     th:href="${momentDetailUrl}"
                     data-pjax-app="moments"
                     class="moment-feed-media-placeholder pjax-link"
                     title="点击收听音频">
                    <span class="icon-[lucide--music]" aria-hidden="true"></span>
                    <span class="moment-feed-video-label">音频</span>
                  </a>
                  <a th:if="${media.type != null and media.type.name() == 'POST'}"
                     th:href="${momentDetailUrl}"
                     data-pjax-app="moments"
                     class="moment-feed-media-placeholder pjax-link"
                     title="查看关联文章">
                    <span class="icon-[lucide--file-text]" aria-hidden="true"></span>
                    <span class="moment-feed-video-label">关联文章</span>
                  </a>
                </th:block>
              </div>
            </th:block>

            <div class="moment-feed-footer">
              <div class="moment-feed-meta">
                <a class="moment-feed-time-link pjax-link"
                   data-pjax-app="moments"
                   th:if="${moment.spec != null and moment.spec.releaseTime != null and !#strings.isEmpty(momentName)}"
                   th:href="${momentDetailUrl}">
                  <time th:text="${#dates.format(moment.spec.releaseTime, 'yyyy年MM月dd日 HH:mm')}"></time>
                </a>
                <time th:if="${moment.spec != null and moment.spec.releaseTime != null and #strings.isEmpty(momentName)}"
                      th:text="${#dates.format(moment.spec.releaseTime, 'yyyy年MM月dd日 HH:mm')}"></time>
              </div>
              <div class="moment-feed-actions">
                <button class="moment-feed-action-btn"
                        type="button"
                        data-moment-action-toggle
                        th:if="${!#strings.isEmpty(momentName)}"
                        title="更多操作"
                        aria-label="更多操作"
                        aria-expanded="false">··</button>
                <div class="moment-feed-action-popover" data-moment-action-popover hidden>
                  <button type="button" class="moment-feed-popover-btn" data-moment-upvote>
                    <span class="icon-[lucide--heart]" aria-hidden="true"></span>
                    <span data-moment-upvote-label>赞</span>
                  </button>
                  <button type="button" class="moment-feed-popover-btn" data-moment-comments-toggle>
                    <span class="icon-[lucide--message-circle]" aria-hidden="true"></span>
                    <span>评论</span>
                  </button>
                </div>
              </div>
            </div>
            <section class="moment-feed-comments-panel"
                     data-moment-comments-panel
                     th:hidden="${upvoteCount <= 0 and commentCount <= 0}"
                     th:attr="aria-label=${'评论 ' + momentName}">
              <div class="moment-detail-social moment-feed-social" data-moment-stats th:hidden="${upvoteCount <= 0}">
                <span class="moment-detail-social-item" data-moment-upvote-stat th:hidden="${upvoteCount <= 0}" th:title="${upvoteCount + ' 个点赞'}">
                  <span class="icon-[lucide--heart]" aria-hidden="true"></span>
                  <span data-moment-upvote-count th:text="${upvoteCount}"></span>
                </span>
              </div>
              <div class="moment-feed-comments-status" data-moment-comments-status hidden></div>
              <div class="moment-feed-comments-list" data-moment-comments-list></div>
              <button type="button" class="moment-feed-comments-load-more" data-moment-comments-more hidden>查看更多评论</button>
              <a class="moment-feed-comments-more pjax-link"
                 data-pjax-app="moments"
                 hidden
                 th:href="${momentDetailUrl + '#moment-comments'}">打开详情页评论</a>
              <div class="moment-feed-reply-bar" data-moment-reply-bar hidden>
                <span data-moment-reply-label></span>
                <button type="button" data-moment-reply-cancel>取消</button>
              </div>
              <form class="moment-feed-comment-form"
                    data-moment-comment-form
                    hidden>
                <div class="moment-feed-comment-editor" data-moment-comment-editor>
                  <textarea class="moment-feed-comment-input"
                            data-moment-comment-input
                            rows="1"
                            maxlength="500"
                            placeholder="评论..."></textarea>
                  <div class="moment-feed-comment-tools">
                    <button type="button"
                            class="moment-feed-comment-tool"
                            data-moment-emoji-toggle
                            aria-label="选择表情"
                            aria-expanded="false">
                      <span class="icon-[lucide--smile]" aria-hidden="true"></span>
                    </button>
                  </div>
                  <div class="moment-feed-emoji-panel" data-moment-emoji-panel hidden></div>
                </div>
                <button type="submit" class="moment-feed-comment-submit" data-moment-comment-submit disabled>发送</button>
              </form>
            </section>
          </div>
        </article>
      </div>
      
      <!-- 翻页组件（瀑布流加载） -->
      <div class="moments-feed-pagination" 
           th:if="${moments != null and moments.hasNext()}"
           x-data="{
               nextUrl: $el.dataset.nextUrl,
               loading: false,
               hasMore: true,
               cacheKey: 'moments_waterfall_cache',
               debugLog(msg, data = null) {
                   if (document.body.dataset.debug !== 'true') return;
                   if (data) {
                       console.debug(`[waterfall] ${msg}`, data);
                   } else {
                       console.debug(`[waterfall] ${msg}`);
                   }
               },
               init() {
                   // 1. 尝试从单次返回缓存中恢复
                   const rawCache = sessionStorage.getItem(this.cacheKey);
                   if (rawCache) {
                       try {
                           const cache = JSON.parse(rawCache);
                           // 校验是否针对当前路由
                           if (cache.path === location.pathname + location.search) {
                               if (cache.extraHtml) {
                                   const targetList = document.querySelector('.moments-feed-list');
                                   if (targetList) {
                                       targetList.insertAdjacentHTML('beforeend', cache.extraHtml);
                                       this.debugLog(`restored extra html from cache, bytes: ${cache.extraHtml.length}`);
                                       
                                   if (typeof window.__initLazyImages === 'function') {
                                           window.__initLazyImages(targetList);
                                       }
                                       window.dispatchEvent(new CustomEvent('moments:feed-updated', { detail: { source: 'cache' } }));
                                       const pjaxLinks = Array.from(targetList.querySelectorAll('.waterfall-injected a.pjax-link'));
                                       if (window.pjax && typeof window.pjax.attachLinks === 'function' && pjaxLinks.length > 0) {
                                           window.pjax.attachLinks(pjaxLinks);
                                       }
                                   }
                               }
                               this.nextUrl = cache.nextUrl;
                               this.hasMore = cache.hasMore;
                               
                               if (cache.scrollY) {
                                   setTimeout(() => {
                                       const scroller = this.$el.closest('.moments-body') || document.querySelector('.moments-body');
                                       if (!scroller) return;
                                       let attempts = 0;
                                       const tryRestore = () => {
                                           scroller.scrollTop = cache.scrollY;
                                           attempts++;
                                           if (Math.abs(scroller.scrollTop - cache.scrollY) > 5 && attempts < 15) {
                                               setTimeout(tryRestore, 50);
                                           } else {
                                               this.debugLog(`final scrollY to ${scroller.scrollTop} / expected ${cache.scrollY}`);
                                           }
                                       };
                                       tryRestore();
                                   }, 10);
                               }
                           }
                       } catch(e) {}
                       // 用完即焚，保证刷新等其他动作时获取最新
                       sessionStorage.removeItem(this.cacheKey);
                   }
                   
                   // 2. 监听下一次离开（仅在 PJAX 跳转时保存状态）
                   this._onPjaxSend = () => {
                       const scroller = this.$el.closest('.moments-body') || document.querySelector('.moments-body');
                       const injected = document.querySelectorAll('.moments-feed-list > article.waterfall-injected');
                       const currentScroll = scroller ? scroller.scrollTop : 0;
                       
                       // 只有产生了下滚或有追加内容才值得缓存
                       if (injected.length > 0 || currentScroll > 50) {
                           sessionStorage.setItem(this.cacheKey, JSON.stringify({
                               path: location.pathname + location.search,
                               extraHtml: Array.from(injected).map(el => el.outerHTML).join(''),
                               nextUrl: this.nextUrl,
                               hasMore: this.hasMore,
                               scrollY: currentScroll
                           }));
                           this.debugLog('saved state before leaving', { scrollY: currentScroll, extraCards: injected.length });
                       }
                   };
                   document.addEventListener('pjax:send', this._onPjaxSend);
                   document.addEventListener('pjax:same-variant-send', this._onPjaxSend);
               },
               destroy() {
                   document.removeEventListener('pjax:send', this._onPjaxSend);
                   document.removeEventListener('pjax:same-variant-send', this._onPjaxSend);
               },
               async loadNext() {
                   if (!this.hasMore || this.loading || !this.nextUrl) return;
                   this.loading = true;
                   this.debugLog('loading next page', { url: this.nextUrl });
                   try {
                       const res = await fetch(this.nextUrl);
                       const html = await res.text();
                       const doc = new DOMParser().parseFromString(html, 'text/html');
                       
                       const newCards = doc.querySelectorAll('.moments-feed-list > article');
                       const targetList = document.querySelector('.moments-feed-list');
                       
                       if (newCards.length > 0 && targetList) {
                           newCards.forEach(card => {
                               card.classList.add('waterfall-injected');
                               targetList.appendChild(card);
                           });
                           this.debugLog(`appended ${newCards.length} cards`);
                           
                           // 重新唤醒图片懒加载（关键修复）
                           if (typeof window.__initLazyImages === 'function') {
                               window.__initLazyImages(targetList);
                               this.debugLog('re-initialized lazy images observer');
                           }
                           
                           // 重新挂载 PJAX 事件
                           const pjaxLinks = Array.from(newCards).flatMap(card => Array.from(card.querySelectorAll('a.pjax-link')));
                           if (window.pjax && typeof window.pjax.attachLinks === 'function' && pjaxLinks.length > 0) {
                               window.pjax.attachLinks(pjaxLinks);
                               this.debugLog(`attached pjax to ${pjaxLinks.length} new links`);
                           }
                           window.dispatchEvent(new CustomEvent('moments:feed-updated', { detail: { source: 'waterfall' } }));
                       }
                       
                       // 解析下一页游标
                       const nextTrigger = doc.querySelector('.moments-feed-pagination');
                       if (nextTrigger && nextTrigger.dataset.nextUrl) {
                           this.nextUrl = nextTrigger.dataset.nextUrl;
                           this.debugLog('has next page', { url: this.nextUrl });
                       } else {
                           this.hasMore = false;
                           this.debugLog('reached end of list');
                       }
                   } catch(e) {
                       if (document.body.dataset.debug === 'true') {
                           console.error('[waterfall] load error:', e);
                       }
                   } finally {
                       this.loading = false;
                   }
               }
           }"
           th:data-next-url="${moments.nextUrl}">
           
        <!-- 探针区域 -->
        <div x-intersect.full.margin.200px="loadNext()" class="w-full py-8 flex items-center justify-center text-[13px] text-white/50 tracking-widest">
            <template x-if="hasMore && loading">
                <span class="flex items-center gap-2">
                    <span class="icon-[lucide--loader-circle] animate-spin h-4 w-4" aria-hidden="true"></span>
                    加载中...
                </span>
            </template>
            <template x-if="!hasMore">
                <span class="opacity-80">已经到底啦</span>
            </template>
        </div>
      </div>

      <div th:if="${moments == null or moments.items == null or #lists.isEmpty(moments.items)}" class="moment-feed-empty">
        暂无动态
      </div>
    </div>
  </div>
</th:block>
