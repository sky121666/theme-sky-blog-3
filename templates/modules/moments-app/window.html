<th:block th:fragment="frame (titleText, contentFragment, windowResizable, windowScene, metricsKey)">
  <th:block th:replace="~{modules/shell/window-frame :: shell(
      variant='moments',
      metricsKey=${metricsKey},
      resizable=${windowResizable != null ? windowResizable : 'y'},
      maximizable='false',
      widthAttr='560',
      extraClasses=${'moments-window md:min-w-[560px] md:min-h-[400px] moments-color-' + ((theme.config.moments?.style?.color_mode == 'theme') ? 'theme' : 'wechat')},
      inlineStyle='',
      bodyFragment=~{::frameBody(titleText=${titleText}, contentFragment=${contentFragment}, windowScene=${windowScene}, windowResizable=${windowResizable})}
    )}"></th:block>
</th:block>

<th:block th:fragment="frameBody (titleText, contentFragment, windowScene, windowResizable)">
    <th:block th:replace="~{modules/shell/window-frame :: resizeHandles(mode='vertical', enabled=${windowResizable == null or windowResizable != 'false'})}"></th:block>

    <!-- 微信风格标题栏 -->
    <th:block th:replace="~{modules/shell/window-titlebar :: shell(
        extraClasses='',
        inlineStyle='',
        contentFragment=~{::titlebarContent(titleText=${titleText}, windowScene=${windowScene})}
      )}"></th:block>
        
    <div class="window-body moments-body w-full flex-1 overflow-y-auto relative select-text" data-window-scroll data-window-content-root>
        <th:block th:replace="~{modules/shell/window-frame :: loadingOverlay(contentFragment=~{::loadingSkeleton(windowScene=${windowScene})})}"></th:block>
        <div data-window-content-variant="moments">
          <th:block th:replace="${contentFragment}" />
        </div>
    </div>
</th:block>

<th:block th:fragment="titlebarContent (titleText, windowScene)">
            <div class="window-titlebar-leading moments-titlebar-leading flex items-center gap-2">
              <th:block th:replace="~{modules/shell/window-titlebar-leading :: momentsBack(windowScene=${windowScene})}"></th:block>
            </div>
            <div class="window-titlebar-center flex-1 flex justify-center items-center overflow-hidden px-2">
              <th:block th:replace="~{::titlebarCenter(titleText=${titleText})}"></th:block>
            </div>
            <div class="window-titlebar-trailing moments-titlebar-trailing moments-titlebar-icons justify-end">
              <th:block th:replace="~{::titlebarTrailing}"></th:block>
            </div>
</th:block>

<th:block th:fragment="titlebarCenter (titleText)">
            <th:block th:replace="~{modules/shell/window-titlebar :: titleStack(
              titleText=${titleText} ?: '瞬间',
              subtitleText=${null},
              stackClasses='',
              titleClasses='truncate font-medium text-[14px] md:text-[13px] tracking-wide',
              subtitleClasses=''
            )}"></th:block>
</th:block>

<th:block th:fragment="titlebarTrailing">
            <div class="moments-notification"
                 data-moments-notification
                 data-user-endpoint="/apis/api.console.halo.run/v1alpha1/users/-"
                 data-endpoint="/apis/api.console.halo.run/v1alpha1/users/-"
                 data-notifications-endpoint="/apis/api.notification.halo.run/v1alpha1/userspaces/{username}/notifications"
                 data-console-url="/console/notifications"
                 data-reason-type="new-comment-on-moment">
              <button type="button"
                      class="moments-titlebar-icon-btn moments-notification-btn"
                      data-moments-notification-toggle
                      title="消息"
                      aria-label="消息"
                      aria-haspopup="dialog"
                      aria-expanded="false">
                <span class="icon-[lucide--bell]" aria-hidden="true"></span>
                <i class="moments-notification-dot" data-moments-notification-dot hidden></i>
              </button>
              <div class="moments-notification-popover"
                   data-moments-notification-panel
                   role="dialog"
                   aria-label="消息"
                   hidden>
                <header class="moments-notification-head">
                  <strong>消息</strong>
                </header>
                <div class="moments-notification-status" data-moments-notification-status>打开后加载消息</div>
                <div class="moments-notification-list" data-moments-notification-list></div>
              </div>
            </div>
            <th:block th:replace="~{modules/shell/window-titlebar-actions :: themeToggle(
              wrapperClasses='',
              buttonClasses='moments-titlebar-icon-btn',
              iconClasses='w-4 h-4',
              titleText='切换外观'
            )}"></th:block>
            <button type="button"
                    class="moments-titlebar-icon-btn moments-publish-trigger"
                    data-moments-publish-open
                    hidden
                    th:if="${theme.config.moments?.publish == null or theme.config.moments.publish.enabled == null or theme.config.moments.publish.enabled}"
                    title="发布瞬间"
                    aria-label="发布瞬间">
              <span class="icon-[lucide--camera]" aria-hidden="true"></span>
            </button>
            <dialog class="moments-publish-dialog"
                    data-moments-publish-dialog
                    th:if="${theme.config.moments?.publish == null or theme.config.moments.publish.enabled == null or theme.config.moments.publish.enabled}"
                    th:data-image-enabled="${theme.config.moments?.publish == null or theme.config.moments.publish.image_upload == null or theme.config.moments.publish.image_upload}"
                    th:data-video-enabled="${theme.config.moments?.publish != null and theme.config.moments.publish.video_upload != null ? theme.config.moments.publish.video_upload : true}"
                    th:data-audio-enabled="${theme.config.moments?.publish != null and theme.config.moments.publish.audio_upload != null ? theme.config.moments.publish.audio_upload : true}"
                    data-user-endpoint="/apis/api.console.halo.run/v1alpha1/users/-"
                    data-upload-endpoint="/apis/uc.api.storage.halo.run/v1alpha1/attachments/-/upload"
                    data-moment-endpoint="/apis/moment.halo.run/v1alpha1/moments">
              <form class="moments-publish-form" data-moments-publish-form method="dialog">
                <div class="moments-publish-body">
                  <textarea class="moments-publish-textarea"
                            data-moments-publish-content
                            maxlength="1000"
                            rows="6"
                            placeholder="这一刻的想法..."></textarea>
                  <div class="moments-publish-inline-tools">
                    <div class="moments-publish-compose-tools">
                      <button type="button" class="moments-publish-tool" data-moments-publish-emoji-toggle title="表情" aria-label="插入表情">
                        <span class="icon-[lucide--smile]" aria-hidden="true"></span>
                      </button>
                      <button type="button" class="moments-publish-tool" data-moments-publish-tag-toggle title="标签" aria-label="添加标签">
                        <span class="icon-[lucide--hash]" aria-hidden="true"></span>
                      </button>
                    </div>
                    <div class="moments-publish-media-tools">
                      <button type="button" class="moments-publish-tool" data-moments-publish-media="image" th:if="${theme.config.moments?.publish == null or theme.config.moments.publish.image_upload == null or theme.config.moments.publish.image_upload}" title="图片 / GIF" aria-label="上传图片或 GIF 表情">
                        <span class="icon-[lucide--image]" aria-hidden="true"></span>
                      </button>
                      <button type="button" class="moments-publish-tool" data-moments-publish-media="video" th:if="${theme.config.moments?.publish != null and theme.config.moments.publish.video_upload != null ? theme.config.moments.publish.video_upload : true}" title="视频" aria-label="上传视频">
                        <span class="icon-[lucide--video]" aria-hidden="true"></span>
                      </button>
                      <button type="button" class="moments-publish-tool" data-moments-publish-media="audio" th:if="${theme.config.moments?.publish != null and theme.config.moments.publish.audio_upload != null ? theme.config.moments.publish.audio_upload : true}" title="音频" aria-label="上传音频">
                        <span class="icon-[lucide--music]" aria-hidden="true"></span>
                      </button>
                    </div>
                  </div>
                  <div class="moments-publish-emoji-panel" data-moments-publish-emoji-panel hidden></div>
                  <div class="moments-publish-meta">
                    <span data-moments-publish-count>0/1000</span>
                    <span data-moments-publish-status></span>
                  </div>
                  <div class="moments-publish-preview" data-moments-publish-preview hidden></div>
                  <div class="moments-publish-tags" data-moments-publish-tags hidden></div>
                  <div class="moments-publish-tag-row" data-moments-publish-tag-row hidden>
                    <input type="text" class="moments-publish-tag-input" data-moments-publish-tag-input maxlength="50" placeholder="添加标签" />
                    <button type="button" class="moments-publish-plain-btn" data-moments-publish-tag-add>添加</button>
                  </div>
                  <input type="file" data-moments-publish-file hidden multiple />
                </div>
                <footer class="moments-publish-actions">
                  <button type="button" class="moments-publish-cancel" data-moments-publish-close>取消</button>
                  <button type="submit" class="moments-publish-submit" data-moments-publish-submit disabled>发表</button>
                </footer>
              </form>
            </dialog>
</th:block>
</th:block>

<th:block th:fragment="loadingSkeleton (windowScene)">
  <th:block th:if="${windowScene == null or windowScene == 'feed'}">
    <div class="skeleton-moments moments-app">
      <div class="skeleton-cover skeleton-moments-cover">
        <div class="skeleton-moments-cover-user">
          <div class="skeleton-bar skeleton-moments-cover-name"></div>
          <div class="skeleton-block skeleton-moments-cover-avatar"></div>
        </div>
      </div>
      <div class="skeleton-moments-list skeleton-feed">
        <div class="skeleton-moments-card">
          <div class="skeleton-block skeleton-moments-avatar"></div>
          <div class="skeleton-moments-content">
            <div class="skeleton-bar skeleton-moments-name"></div>
            <div class="skeleton-bar skeleton-moments-line"></div>
            <div class="skeleton-bar skeleton-moments-line short"></div>
            <div class="skeleton-moments-media">
              <div class="skeleton-block skeleton-moments-media-block"></div>
              <div class="skeleton-block skeleton-moments-media-block"></div>
              <div class="skeleton-block skeleton-moments-media-block"></div>
            </div>
            <div class="skeleton-bar skeleton-moments-footer"></div>
          </div>
        </div>
        <div class="skeleton-moments-card">
          <div class="skeleton-block skeleton-moments-avatar"></div>
          <div class="skeleton-moments-content">
            <div class="skeleton-bar skeleton-moments-name"></div>
            <div class="skeleton-bar skeleton-moments-line"></div>
            <div class="skeleton-bar skeleton-moments-line"></div>
            <div class="skeleton-bar skeleton-moments-line short"></div>
            <div class="skeleton-bar skeleton-moments-footer"></div>
          </div>
        </div>
        <div class="skeleton-moments-card">
          <div class="skeleton-block skeleton-moments-avatar"></div>
          <div class="skeleton-moments-content">
            <div class="skeleton-bar skeleton-moments-name"></div>
            <div class="skeleton-bar skeleton-moments-line"></div>
            <div class="skeleton-bar skeleton-moments-line short"></div>
            <div class="skeleton-moments-media">
              <div class="skeleton-block skeleton-moments-media-block"></div>
              <div class="skeleton-block skeleton-moments-media-block"></div>
              <div class="skeleton-block skeleton-moments-media-block"></div>
            </div>
            <div class="skeleton-bar skeleton-moments-footer"></div>
          </div>
        </div>
      </div>
    </div>
  </th:block>

  <th:block th:if="${windowScene == 'detail'}">
    <div class="skeleton-moments-detail moments-app">
      <div class="skeleton-moments-detail-head">
        <div class="skeleton-block skeleton-moments-avatar"></div>
        <div class="skeleton-moments-content"><div class="skeleton-bar skeleton-moments-name"></div></div>
      </div>
      <div class="skeleton-moments-detail-body">
        <div class="skeleton-bar skeleton-moments-line"></div>
        <div class="skeleton-bar skeleton-moments-line"></div>
        <div class="skeleton-bar skeleton-moments-line short"></div>
      </div>
      <div class="skeleton-moments-detail-media">
        <div class="skeleton-moments-media">
          <div class="skeleton-block skeleton-moments-media-block"></div>
          <div class="skeleton-block skeleton-moments-media-block"></div>
          <div class="skeleton-block skeleton-moments-media-block"></div>
        </div>
      </div>
      <div class="skeleton-moments-detail-comments">
        <div class="skeleton-block skeleton-moments-comment-block"></div>
        <div class="skeleton-block skeleton-moments-comment-block"></div>
      </div>
    </div>
  </th:block>
</th:block>
