<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:fragment="page"
      th:replace="~{modules/shell/layout :: html(
        title = ${'文章归档 - ' + site.title},
        description = ${site.seo?.description ?: site.subtitle},
        ssrContent = ~{modules/browser-explorer/archives :: content},
        canonical = ${!#strings.isEmpty(site.routes?.archivesUri) ? site.routes.archivesUri : '/archives'},
        image = ${site.logo},
        type = 'website',
        seoFallback = 'full',
        pageMode = 'browser-list',
        pageApp = 'explorer-archives',
        windowVariant = 'browser',
        windowScene = 'none',
        windowTitle = '文章归档',
        windowResizable = true,
        windowMaximizable = true,
        windowMetricsKey = 'browser'
      )}">
  <th:block th:fragment="content">
    <div class="archive-shell" data-app-root="explorer-archives">
      <h1 class="sr-only">文章归档</h1>
      <script type="application/json" data-app-props="explorer-archives">{"version":1,"appId":"explorer-archives","data":{"view":"archives"}}</script>
      <div class="archive-workspace"
           th:if="${archives != null and !#lists.isEmpty(archives.items)}"
           x-data="archiveExplorer">
        <aside class="archive-sidebar">
          <p class="archive-sidebar-title">年份</p>
          <nav class="archive-sidebar-nav">
            <button type="button"
                    class="archive-sidebar-item"
                    th:each="archive : ${archives.items}"
                    data-archive-year-option
                    th:attr="data-year=${archive.year},data-year-label=${archive.year} + ' 年'"
                    @click="selectYear($el.dataset.year, $el.dataset.yearLabel)"
                    :class="{ 'is-active': activeYear === $el.dataset.year }">
              <span class="archive-folder-icon archive-folder-icon--sidebar icon-[lucide--folder]" aria-hidden="true"></span>
              <span class="archive-sidebar-label" th:text="${archive.year} + ' 年'">2026 年</span>
            </button>
          </nav>
        </aside>

        <section class="archive-columns">
          <section class="archive-column archive-column--months">
            <header class="archive-pane-header">
              <span class="archive-pane-title">月份</span>
              <span class="archive-pane-path" x-text="activeYearLabel"></span>
            </header>

            <div class="archive-pane-scroll">
              <th:block th:each="archive : ${archives.items}">
                <div data-archive-year-panel
                     th:attr="data-year=${archive.year}"
                     x-show="activeYear === $el.dataset.year"
                     x-cloak>
                  <button type="button"
                          class="archive-entry archive-entry--folder"
                          th:each="month : ${archive.months}"
                          data-archive-month-option
                          th:attr="data-parent-year=${archive.year},data-month-key=${archive.year + '-' + month.month},data-month-label=${archive.year} + ' 年 ' + ${month.month} + ' 月'"
                          @click="selectMonth($el.dataset.monthKey, $el.dataset.monthLabel)"
                          :class="{ 'is-active': activeMonthKey === $el.dataset.monthKey }">
                    <div class="archive-entry-main">
                      <span class="archive-folder-icon archive-folder-icon--entry icon-[lucide--folder]" aria-hidden="true"></span>
                      <div class="archive-entry-copy">
                        <h2 class="archive-entry-title" th:text="${month.month} + ' 月'">03 月</h2>
                      </div>
                    </div>
                    <span class="archive-entry-trailing archive-entry-trailing--month" th:text="${#lists.size(month.posts)} + ' 篇'">0 篇</span>
                    <span class="archive-entry-chevron icon-[lucide--chevron-right]" aria-hidden="true"></span>
                  </button>
                </div>
              </th:block>
            </div>
          </section>

          <section class="archive-column archive-column--posts">
            <header class="archive-pane-header">
              <span class="archive-pane-title">文章</span>
              <span class="archive-pane-path" x-text="activeMonthLabel"></span>
            </header>

            <div class="archive-pane-scroll">
              <th:block th:each="archive : ${archives.items}">
                <th:block th:each="month : ${archive.months}">
                  <div data-archive-month-panel
                       th:attr="data-month-key=${archive.year + '-' + month.month}"
                       x-show="activeMonthKey === $el.dataset.monthKey"
                       x-cloak>
                    <a class="archive-entry archive-entry--file pjax-link"
                       data-pjax-app="reader"
                       th:each="post : ${month.posts}"
                       th:href="${post.status.permalink}"
                       data-archive-post-option
                       th:attr="data-parent-month-key=${archive.year + '-' + month.month},data-post-key=${post.metadata.name},data-post-title=${post.spec.title},data-post-date=${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')},data-post-comments=${post.stats.comment},data-post-excerpt=${post.status.excerpt},data-post-parent-name=${archive.year + ' 年 / ' + month.month + ' 月'},data-post-author=${post.owner != null ? post.owner.displayName : site.title}"
                       @mouseenter="selectPost($el)"
                      @focus="selectPost($el)"
                      @click="selectPost($el)"
                       :class="{ 'is-active': activePostKey === $el.dataset.postKey }">
                      <div class="archive-entry-main">
                        <span class="archive-file-icon icon-[lucide--file-text]" aria-hidden="true"></span>
                        <div class="archive-entry-copy">
                          <h3 class="archive-entry-title archive-entry-title--file" th:text="${post.spec.title}">文章标题</h3>
                        </div>
                      </div>
                      <span class="archive-entry-trailing archive-entry-trailing--file">
                        <time th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.03.26</time>
                        <span th:text="${post.stats.comment} + ' 评论'">0 评论</span>
                      </span>
                    </a>
                  </div>
                </th:block>
              </th:block>
            </div>
          </section>

          <aside class="archive-column archive-column--preview">
            <header class="archive-pane-header">
              <span class="archive-pane-title">预览</span>
              <span class="archive-pane-path" x-text="activePostTitle || '未选择文章'"></span>
            </header>

            <div class="archive-pane-scroll archive-pane-scroll--preview">
              <article class="archive-preview-panel" x-show="activePostKey" x-cloak>
                <header class="archive-preview-header">
                  <div class="archive-preview-icon">
                    <span class="archive-file-icon archive-file-icon--preview icon-[lucide--file-text]" aria-hidden="true"></span>
                  </div>
                  <div class="archive-preview-heading">
                    <h2 class="archive-preview-title" x-text="activePostTitle">文章标题</h2>
                    <p class="archive-preview-path" x-text="activePostParentName">2026 年 / 03 月</p>
                  </div>
                </header>

                <dl class="archive-preview-meta">
                  <div>
                    <dt>发布日期</dt>
                    <dd x-text="activePostDate">2026.03.26</dd>
                  </div>
                  <div>
                    <dt>评论</dt>
                    <dd x-text="activePostComments + ' 条'">0 条</dd>
                  </div>
                  <div>
                    <dt>作者</dt>
                    <dd x-text="activePostAuthor">作者</dd>
                  </div>
                </dl>

                <p class="archive-preview-excerpt" x-show="activePostExcerpt" x-text="activePostExcerpt"></p>

                <a class="archive-preview-action pjax-link" data-pjax-app="reader" :href="activePostHref">打开文章</a>
              </article>

              <section class="archive-preview-empty" x-show="!activePostKey" x-cloak>
                <p>选择一篇文章后，在这里查看摘要与元信息。</p>
              </section>
            </div>
          </aside>
        </section>

        <nav class="archive-pagination" th:if="${archives.hasPrevious() or archives.hasNext()}">
          <a class="archive-page-btn"
             th:if="${archives.hasPrevious()}"
             th:href="@{${archives.prevUrl}}">
            上一页
          </a>
          <span class="archive-page-btn is-disabled" th:unless="${archives.hasPrevious()}">上一页</span>

          <span class="archive-page-indicator" th:text="${archives.page} + ' / ' + ${archives.totalPages}">1 / 1</span>

          <a class="archive-page-btn"
             th:if="${archives.hasNext()}"
             th:href="@{${archives.nextUrl}}">
            下一页
          </a>
          <span class="archive-page-btn is-disabled" th:unless="${archives.hasNext()}">下一页</span>
        </nav>
      </div>

      <div class="archive-empty" th:if="${archives == null or #lists.isEmpty(archives.items)}">
        <h2 class="archive-empty-title">没有任何归档内容</h2>
        <p class="archive-empty-text">当前条件下没有任何文章被记录入档。稍后再来查看吧。</p>
      </div>
    </div>
  </th:block>
</html>
