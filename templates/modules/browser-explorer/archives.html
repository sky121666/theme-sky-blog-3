<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:fragment="page"
      th:replace="~{modules/shell/layout :: html(
        title = ${'文章归档 - ' + site.title},
        description = ${site.seo?.description ?: site.subtitle},
        ssrContent = ~{modules/browser-explorer/archives :: content},
        canonical = ${!#strings.isEmpty(site.routes?.archivesUri) ? site.routes.archivesUri : '/archives'},
        image = ${site.logo},
        type = 'website',
        seoFallback = 'full',
        pageMode = 'browser-list',
        pageApp = 'explorer-archives',
        windowVariant = 'browser',
        windowScene = 'none',
        windowTitle = '文章归档',
        windowResizable = true,
        windowMaximizable = true,
        windowMetricsKey = 'browser'
      )}">
  <th:block th:fragment="content"
            th:with="archiveBase=${!#strings.isEmpty(site.routes?.archivesUri) ? site.routes.archivesUri : '/archives'},
                     archiveStats=${siteStatsFinder.getStats()},
                     archiveIndexSize=${archiveStats != null and archiveStats.post > 0 ? archiveStats.post : 1},
                     archiveIndex=${postFinder.archives(1, archiveIndexSize)},
                     activeArchive=${archives != null and !#lists.isEmpty(archives.items) ? archives.items[0] : null},
                     activeMonth=${activeArchive != null and !#lists.isEmpty(activeArchive.months) ? activeArchive.months[0] : null},
                     archivePageSize=${site.post?.archivePageSize ?: 10}">
    <div class="archive-shell" data-app-root="explorer-archives">
      <h1 class="sr-only">文章归档</h1>
      <script type="application/json" data-app-props="explorer-archives">{"version":1,"appId":"explorer-archives","data":{"view":"archives"}}</script>

      <div class="archive-workspace"
           th:if="${archiveIndex != null and !#lists.isEmpty(archiveIndex.items) and activeArchive != null and activeMonth != null}"
           th:attr="data-archive-base-url=${archiveBase},
                    data-active-year=${activeArchive.year},
                    data-active-year-label=${activeArchive.year + ' 年'},
                    data-active-month-key=${activeArchive.year + '-' + activeMonth.month},
                    data-active-month-label=${activeArchive.year + ' 年 ' + activeMonth.month + ' 月'},
                    data-current-page=${archives.page},
                    data-page-size=${archivePageSize},
                    data-archive-index-complete=${!archiveIndex.hasNext()}"
           x-data="archiveExplorer">
        <aside class="archive-sidebar">
          <p class="archive-sidebar-title">年份</p>
          <nav class="archive-sidebar-nav" aria-label="归档年份">
            <a class="archive-sidebar-item pjax-link"
               th:each="archive : ${archiveIndex.items}"
               th:href="${archiveBase + '/' + archive.year}"
               data-pjax-app="explorer-archives"
               data-archive-year-option
               th:classappend="${archive.year == activeArchive.year} ? ' is-active'"
               th:attr="data-year=${archive.year},
                        data-year-label=${archive.year + ' 年'},
                        aria-current=${archive.year == activeArchive.year ? 'page' : null}">
              <span class="archive-folder-icon archive-folder-icon--sidebar icon-[lucide--folder]" aria-hidden="true"></span>
              <span class="archive-sidebar-label" th:text="${archive.year} + ' 年'">2026 年</span>
            </a>
          </nav>
        </aside>

        <section class="archive-columns">
          <section class="archive-column archive-column--months">
            <header class="archive-pane-header">
              <span class="archive-pane-title">月份</span>
              <span class="archive-pane-path" x-text="activeYearLabel"></span>
            </header>

            <div class="archive-pane-scroll" data-archive-month-list>
              <th:block th:each="archive : ${archiveIndex.items}">
                <nav th:if="${archive.year == activeArchive.year}"
                     data-archive-year-panel
                     th:attr="data-year=${archive.year}"
                     th:aria-label="${archive.year + ' 年归档月份'}">
                  <a class="archive-entry archive-entry--folder pjax-link"
                     th:each="month : ${archive.months}"
                     th:href="${archiveBase + '/' + archive.year + '/' + month.month}"
                     data-pjax-app="explorer-archives"
                     data-archive-month-option
                     th:classappend="${archive.year == activeArchive.year and month.month == activeMonth.month} ? ' is-active'"
                     th:attr="data-parent-year=${archive.year},
                              data-month-key=${archive.year + '-' + month.month},
                              data-month-label=${archive.year + ' 年 ' + month.month + ' 月'},
                              data-month-count=${#lists.size(month.posts)},
                              aria-current=${archive.year == activeArchive.year and month.month == activeMonth.month ? 'page' : null}">
                    <div class="archive-entry-main">
                      <span class="archive-folder-icon archive-folder-icon--entry icon-[lucide--folder]" aria-hidden="true"></span>
                      <div class="archive-entry-copy">
                        <h2 class="archive-entry-title" th:text="${month.month} + ' 月'">03 月</h2>
                      </div>
                    </div>
                    <span class="archive-entry-trailing archive-entry-trailing--month" th:text="${#lists.size(month.posts)} + ' 篇'">0 篇</span>
                    <span class="archive-entry-chevron icon-[lucide--chevron-right]" aria-hidden="true"></span>
                  </a>
                </nav>
              </th:block>
            </div>
          </section>

          <section class="archive-column archive-column--posts">
            <header class="archive-pane-header">
              <span class="archive-pane-title">文章</span>
              <span class="archive-pane-path" x-text="activeMonthLabel"></span>
            </header>

            <div class="archive-pane-scroll archive-pane-scroll--posts"
                 :aria-busy="loading ? 'true' : 'false'">
              <div id="archive-post-list" data-archive-post-list>
                <th:block th:each="catalogArchive : ${archiveIndex.items}">
                  <th:block th:each="catalogMonth : ${catalogArchive.months}"
                            th:if="${catalogArchive.year == activeArchive.year and catalogMonth.month == activeMonth.month}">
                    <a class="archive-entry archive-entry--file pjax-link"
                       data-pjax-app="reader"
                       th:each="post, postStat : ${catalogMonth.posts}"
                       th:if="${postStat.index < archives.page * archivePageSize}"
                       th:href="${post.status.permalink}"
                       data-archive-post-option
                       th:attr="data-parent-month-key=${catalogArchive.year + '-' + catalogMonth.month},
                                data-post-key=${post.metadata.name},
                                data-post-title=${post.spec.title},
                                data-post-date=${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')},
                                data-post-comments=${post.stats.comment},
                                data-post-excerpt=${post.status.excerpt},
                                data-post-parent-name=${catalogArchive.year + ' 年 / ' + catalogMonth.month + ' 月'},
                                data-post-author=${post.owner != null ? post.owner.displayName : site.title}"
                       @mouseenter="selectPost($el)"
                       @focus="selectPost($el)"
                       @click="selectPost($el)"
                       :class="{ 'is-active': activePostKey === $el.dataset.postKey }">
                      <div class="archive-entry-main">
                        <span class="archive-file-icon icon-[lucide--file-text]" aria-hidden="true"></span>
                        <div class="archive-entry-copy">
                          <h3 class="archive-entry-title archive-entry-title--file" th:text="${post.spec.title}">文章标题</h3>
                        </div>
                      </div>
                      <span class="archive-entry-trailing archive-entry-trailing--file">
                        <time th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.03.26</time>
                        <span th:text="${post.stats.comment} + ' 评论'">0 评论</span>
                      </span>
                    </a>
                  </th:block>
                </th:block>
              </div>

              <div class="archive-load-more-region"
                   data-archive-pagination
                   aria-live="polite"
                   aria-atomic="true">
                <th:block th:each="catalogArchive : ${archiveIndex.items}">
                  <th:block th:each="catalogMonth : ${catalogArchive.months}">
                    <a class="archive-load-more"
                       th:if="${catalogArchive.year == activeArchive.year
                                and catalogMonth.month == activeMonth.month
                                and #lists.size(catalogMonth.posts) > archives.page * archivePageSize}"
                       th:with="nextArchiveUrl=${archiveBase + '/' + activeArchive.year + '/' + activeMonth.month + '/page/' + (archives.page + 1)}"
                       th:href="${nextArchiveUrl}"
                       th:attr="data-next-url=${nextArchiveUrl}"
                       data-archive-loadmore
                       aria-controls="archive-post-list"
                       @click.prevent="loadNext()"
                       x-show="hasMore && !loading && !loadError">
                      继续加载
                    </a>
                  </th:block>
                </th:block>

                <span class="archive-load-state" x-show="loading" x-cloak>正在加载…</span>
                <button class="archive-load-more archive-load-more--retry"
                        type="button"
                        aria-controls="archive-post-list"
                        x-show="loadError && !loading"
                        x-cloak
                        @click="loadNext()">
                  加载失败，点击重试
                </button>
                <span class="archive-load-state"
                      x-show="!hasMore && !loading && !loadError"
                      x-cloak>
                  本月文章已全部加载（<span x-text="loadedCount"></span> 篇）
                </span>
              </div>
            </div>
          </section>

          <aside class="archive-column archive-column--preview">
            <header class="archive-pane-header">
              <span class="archive-pane-title">预览</span>
              <span class="archive-pane-path" x-text="activePostTitle || '未选择文章'"></span>
            </header>

            <div class="archive-pane-scroll archive-pane-scroll--preview">
              <article class="archive-preview-panel" x-show="activePostKey" x-cloak>
                <header class="archive-preview-header">
                  <div class="archive-preview-icon">
                    <span class="archive-file-icon archive-file-icon--preview icon-[lucide--file-text]" aria-hidden="true"></span>
                  </div>
                  <div class="archive-preview-heading">
                    <h2 class="archive-preview-title" x-text="activePostTitle">文章标题</h2>
                    <p class="archive-preview-path" x-text="activePostParentName">2026 年 / 03 月</p>
                  </div>
                </header>

                <dl class="archive-preview-meta">
                  <div>
                    <dt>发布日期</dt>
                    <dd x-text="activePostDate">2026.03.26</dd>
                  </div>
                  <div>
                    <dt>评论</dt>
                    <dd x-text="activePostComments + ' 条'">0 条</dd>
                  </div>
                  <div>
                    <dt>作者</dt>
                    <dd x-text="activePostAuthor">作者</dd>
                  </div>
                </dl>

                <p class="archive-preview-excerpt" x-show="activePostExcerpt" x-text="activePostExcerpt"></p>

                <a class="archive-preview-action pjax-link" data-pjax-app="reader" :href="activePostHref">打开文章</a>
              </article>

              <section class="archive-preview-empty" x-show="!activePostKey" x-cloak>
                <p>选择一篇文章后，在这里查看摘要与元信息。</p>
              </section>
            </div>
          </aside>
        </section>
      </div>

      <div class="archive-empty"
           th:if="${archiveIndex == null or #lists.isEmpty(archiveIndex.items) or activeArchive == null or activeMonth == null}">
        <h2 class="archive-empty-title">没有任何归档内容</h2>
        <p class="archive-empty-text">当前条件下没有任何文章被记录入档。稍后再来查看吧。</p>
      </div>
    </div>
  </th:block>
</html>
