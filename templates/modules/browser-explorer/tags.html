<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:fragment="page"
      th:replace="~{modules/shell/layout :: html(
        title = ${'所有标签 - ' + site.title},
        description = ${site.seo?.description ?: site.subtitle},
        ssrContent = ~{modules/browser-explorer/tags :: content},
        canonical = ${!#strings.isEmpty(site.routes?.tagsUri) ? site.routes.tagsUri : '/tags'},
        image = ${site.logo},
        type = 'website',
        seoFallback = 'meta',
        pageMode = 'browser-list',
        pageApp = 'explorer-tags',
        windowVariant = 'browser',
        windowScene = 'none',
        windowTitle = '所有标签',
        windowResizable = true,
        windowMaximizable = true,
        windowMetricsKey = 'browser'
      )}">
  <th:block th:fragment="content"
            th:with="tagsRootUri=${!#strings.isEmpty(site.routes?.tagsUri) ? site.routes.tagsUri : '/tags'},
                     tagList=${tags},
                     requestedPageText=${param.page != null and !#lists.isEmpty(param.page) ? param.page[0] : '1'},
                     requestedPage=${requestedPageText matches '^[1-9][0-9]{0,8}$' ? requestedPageText : 1},
                     tagPageSize=${site.post?.tagPageSize ?: 10},
                     allPosts=${postFinder.list({
                       page: requestedPage,
                       size: tagPageSize,
                       sort: {'spec.publishTime,desc'}
                     })}">
    <div class="tags-shell" data-app-root="explorer-tags">
      <h1 class="sr-only">所有标签与文章</h1>
      <script type="application/json" data-app-props="explorer-tags">{"version":1,"appId":"explorer-tags","data":{"view":"collection"}}</script>

      <div class="tag-workspace tag-workspace--all"
           x-data="tagsExplorer"
           data-tag-root
           data-tag-scope="all"
           th:attr="data-tag-current-page=${allPosts != null ? allPosts.page : 1},
                    data-tag-total-pages=${allPosts != null ? allPosts.totalPages : 0},
                    data-tag-total-posts=${allPosts != null ? allPosts.total : 0},
                    data-tag-page-size=${tagPageSize}">
        <aside class="tags-sidebar">
          <p class="tags-sidebar-title">标签</p>
          <nav class="tags-sidebar-nav" aria-label="标签导航">
            <a class="tags-sidebar-item tags-sidebar-item--all is-active pjax-link"
               data-pjax-app="explorer-tags"
               data-tag-all-link
               aria-current="page"
               th:href="${tagsRootUri}">
              <span class="tags-folder-icon tags-folder-icon--sidebar icon-[lucide--tags]" aria-hidden="true"></span>
              <span class="tags-sidebar-label">全部标签</span>
              <span class="tags-sidebar-count" th:text="${allPosts != null ? allPosts.total : 0}">0</span>
            </a>

            <th:block th:if="${tagList != null and !#lists.isEmpty(tagList)}"
                      th:replace="~{modules/browser-explorer/tag :: tagSidebar(tags=${tagList}, currentTagName=${''})}"></th:block>

            <p class="tags-sidebar-empty"
               th:if="${tagList == null or #lists.isEmpty(tagList)}">暂无标签</p>
          </nav>
        </aside>

        <section class="tag-posts-pane">
          <header class="tags-pane-header">
            <span class="tags-pane-title">文章</span>
            <span class="tags-pane-path"
                  th:text="${'全部文章 · ' + (allPosts != null ? allPosts.total : 0) + ' 篇'}">全部文章 · 0 篇</span>
          </header>

          <div class="tag-posts-scroll">
            <th:block th:replace="~{modules/browser-explorer/tag :: postRows(posts=${allPosts}, parentName=${'全部文章'})}"></th:block>

            <section class="tags-post-empty"
                     data-tag-empty
                     aria-live="polite"
                     th:if="${allPosts == null or #lists.isEmpty(allPosts.items)}">
              <div>
                <h2 class="tags-empty-title"
                    th:if="${allPosts != null and allPosts.page > 1}"
                    th:text="${'第 ' + allPosts.page + ' 页不存在'}">当前页不存在</h2>
                <h2 class="tags-empty-title"
                    th:if="${allPosts == null or allPosts.page <= 1}">当前没有可浏览的文章</h2>

                <p class="tags-empty-text"
                   th:if="${allPosts != null and allPosts.page > 1}"
                   th:text="${allPosts.totalPages > 0 ? '全部文章共 ' + allPosts.totalPages + ' 页，请返回有效页码。' : '当前没有可浏览的分页内容。'}">请返回有效页码。</p>
                <p class="tags-empty-text"
                   th:if="${allPosts == null or allPosts.page <= 1}">文章发布后会显示在这里。</p>

                <nav class="tags-post-overflow" aria-label="全部文章恢复导航">
                  <a class="tags-post-viewmore pjax-link"
                     data-pjax-app="explorer-tags"
                     data-tag-return-root
                     th:href="${tagsRootUri}">返回全部文章</a>
                  <a class="tags-post-viewmore pjax-link"
                     data-pjax-app="explorer-tags"
                     data-tag-return-last
                     th:if="${allPosts != null and allPosts.page > 1 and allPosts.totalPages > 1}"
                     th:href="${tagsRootUri + '?page=' + allPosts.totalPages}">返回最后一页</a>
                </nav>
              </div>
            </section>
          </div>

          <nav class="tag-pagination"
               data-tag-pagination
               data-tag-pagination-scope="all"
               th:if="${allPosts != null and !#lists.isEmpty(allPosts.items) and (allPosts.page > 1 or allPosts.hasNext())}"
               aria-label="全部文章分页">
            <a class="tag-page-btn pjax-link"
               data-pjax-app="explorer-tags"
               data-tag-all-prev
               rel="prev"
               th:if="${allPosts.page > 1}"
               th:href="${allPosts.page == 2 ? tagsRootUri : tagsRootUri + '?page=' + (allPosts.page - 1)}">上一页</a>
            <span class="tag-page-btn is-disabled" aria-disabled="true" th:unless="${allPosts.page > 1}">上一页</span>

            <span class="tag-page-indicator"
                  aria-current="page"
                  th:text="${allPosts.page + ' / ' + allPosts.totalPages}">1 / 1</span>

            <a class="tag-page-btn pjax-link"
               data-pjax-app="explorer-tags"
               data-tag-all-next
               rel="next"
               th:if="${allPosts.hasNext()}"
               th:href="${tagsRootUri + '?page=' + (allPosts.page + 1)}">下一页</a>
            <span class="tag-page-btn is-disabled" aria-disabled="true" th:unless="${allPosts.hasNext()}">下一页</span>
          </nav>
        </section>

        <th:block th:replace="~{modules/browser-explorer/tag :: previewPane}"></th:block>
      </div>
    </div>
  </th:block>
</html>
