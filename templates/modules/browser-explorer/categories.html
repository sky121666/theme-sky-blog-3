<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:fragment="page"
      th:replace="~{modules/shell/layout :: html(
        title = ${'所有分类 - ' + site.title},
        description = ${site.seo?.description ?: site.subtitle},
        ssrContent = ~{modules/browser-explorer/categories :: content},
        canonical = ${!#strings.isEmpty(site.routes?.categoriesUri) ? site.routes.categoriesUri : '/categories'},
        image = ${site.logo},
        type = 'website',
        seoFallback = 'meta',
        pageMode = 'browser-list',
        pageApp = 'explorer-categories',
        windowVariant = 'browser',
        windowScene = 'none',
        windowTitle = '所有分类',
        windowResizable = true,
        windowMaximizable = true,
        windowMetricsKey = 'browser'
      )}">
  <th:block th:fragment="categoryOverview(categories, depth)">
    <th:block th:with="currentDepth=${depth != null ? depth : 0}">
      <th:block th:each="item : ${categories}">
        <a class="categories-folder-card pjax-link"
           data-pjax-app="explorer-categories"
           data-category-overview-link
           th:href="${item.status.permalink}"
           th:attr="data-category-depth=${currentDepth},
                    aria-label=${item.spec.displayName + '，' + item.postCount + ' 篇文章'}">
          <span class="categories-folder-icon categories-folder-icon--card icon-[lucide--folder]" aria-hidden="true"></span>
          <span class="categories-folder-copy">
            <span class="categories-folder-title" th:text="${item.spec.displayName}">分类</span>
            <span class="categories-folder-meta" th:text="${item.postCount} + ' 篇文章'">0 篇文章</span>
          </span>
        </a>

        <th:block th:if="${not #lists.isEmpty(item.children)}"
                  th:replace="~{::categoryOverview(categories=${item.children}, depth=${currentDepth + 1})}"></th:block>
      </th:block>
    </th:block>
  </th:block>

  <th:block th:fragment="content">
    <div class="categories-shell" data-app-root="explorer-categories">
      <h1 class="sr-only">所有分类</h1>
      <script type="application/json" data-app-props="explorer-categories">{"version":1,"appId":"explorer-categories","data":{"view":"collection"}}</script>

      <div class="categories-workspace categories-workspace--overview"
           data-category-root
           th:if="${categories != null and !#lists.isEmpty(categories)}">
        <section class="categories-content categories-content--overview">
          <section class="categories-pane categories-pane--posts">
            <header class="categories-pane-header">
              <span class="categories-pane-title">全部分类</span>
              <span class="categories-pane-path" th:text="${#lists.size(categories)} + ' 个顶级分类'">0 个顶级分类</span>
            </header>

            <div class="category-posts-scroll">
              <nav class="categories-folder-grid" aria-label="全部分类">
                <th:block th:replace="~{::categoryOverview(categories=${categories}, depth=${0})}"></th:block>
              </nav>
            </div>
          </section>
        </section>
      </div>

      <div class="categories-empty" th:if="${categories == null or #lists.isEmpty(categories)}">
        <h2 class="categories-empty-title">当前没有任何分类</h2>
        <p class="categories-empty-text">内容还没有整理到分类文件夹中，稍后再来查看。</p>
      </div>
    </div>
  </th:block>
</html>
