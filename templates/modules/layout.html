<!doctype html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  th:fragment="html (title, description, ssrContent)"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title th:text="${title}"></title>
    <meta name="description" th:content="${description}" />

    <!-- 本地打包产物 (开发阶段加入时间戳废除缓存) -->
    <link rel="stylesheet" th:href="@{/assets/main.css(t=${#dates.createNow().getTime()})}" />
    <script defer th:src="@{/assets/main.js(t=${#dates.createNow().getTime()})}"></script>
  </head>

  <!-- 读取后台配置 -->
  <th:block th:with="
      bgConf = ${theme.config.desktop?.background},
      bgMode = ${bgConf?.mode ?: 'preset'},
      bgPreset = ${bgConf?.preset ?: 'tahoe-dawn'},
      rawMenuName = ${theme.config.dock?.settings?.menu_name ?: 'primary'},
      dockMenu = ${!#strings.isEmpty(rawMenuName) ? menuFinder.getByName(rawMenuName) : menuFinder.getByName('primary')},
      recentPosts = ${postFinder.list({page: 1, size: 20})}">

  <body
    class="overflow-hidden m-0 p-0 text-white w-screen h-screen relative"
    th:classappend="${bgMode == 'preset' ? 'wallpaper-' + bgPreset : ''}"
    th:styleappend="${bgMode == 'image' and bgConf?.image != null ? 'background:url(' + bgConf.image + ') center/cover no-repeat; background-color:#0f172a;' : (bgMode == 'solid' ? 'background-color:' + (bgConf?.solid_color ?: '#0f172a') + ';' : '')}"
  >

    <!-- ==================== MenuBar ==================== -->
    <div class="menubar" x-data="menuBar">
      <div class="flex items-center gap-1">
        <span class="menubar-item text-base">&#63743;</span>
        <span class="menubar-item font-bold" x-text="appName">Finder</span>
        <span class="menubar-item hidden sm:block">File</span>
        <span class="menubar-item hidden sm:block">Edit</span>
        <span class="menubar-item hidden sm:block">View</span>
        <span class="menubar-item hidden sm:block">Go</span>
        <span class="menubar-item hidden sm:block">Window</span>
        <span class="menubar-item hidden sm:block">Help</span>
      </div>
      <div class="flex items-center gap-1 font-medium text-xs">
        <div class="menubar-icon-btn">
          <!-- Wi-Fi -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9l2.83-2.83a15 15 0 0121.5 0L22.58 9M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
        </div>
        <div class="menubar-icon-btn">
          <!-- 电池 -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="16" height="10" rx="3" ry="3"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
        </div>
        <div class="menubar-icon-btn">
          <!-- 控制中心 -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </div>
        <div class="menubar-item" x-text="timeStr"></div>
      </div>
    </div>

    <!-- ==================== 桌面图标 ==================== -->
    <div class="desktop-grid" x-data="desktopIcons" @click.window="handleOutsideClick($event)">
      <th:block th:each="post : ${recentPosts?.items ?: {}}">
        <!-- 转为 PJAX 超链接 -->
        <a th:href="${post.status.permalink}" 
           class="desktop-icon pjax-link block"
           th:attr="data-id=${post.metadata.name}"
           :class="{ 'selected': selectedId === $el.dataset.id }"
           @click="select($el.dataset.id)">
          <div class="desktop-icon-graphic">
            <!-- 文件图标 SVG -->
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="rgba(255,255,255,0.15)"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="8" y1="13" x2="16" y2="13" stroke-opacity="0.6"/>
              <line x1="8" y1="17" x2="13" y2="17" stroke-opacity="0.6"/>
            </svg>
          </div>
          <div class="desktop-icon-label" th:text="${#strings.abbreviate(post.spec.title, 24)}">Post</div>
        </a>
      </th:block>
    </div>

    <!-- ==================== 极简单主窗 (PJAX 热重载) ==================== -->
    <!-- 赋予 Alpine 状态控制最小化，同时监听全局唤醒信号 -->
    <div class="window-layer fixed inset-0 z-10 pointer-events-none flex items-center justify-center md:pb-20"
         x-data="{ showMainWin: window.location.pathname !== '/' }" @open-window.window="showMainWin = true">
      
      <!-- Safari 极简静态拟真窗口壳 (移动端100%覆盖，桌面端85%漂浮) -->
      <div class="macos-window flex flex-col pointer-events-auto shadow-2xl relative w-full h-full md:w-[85%] md:h-[85%] max-w-[1200px] rounded-none md:rounded-xl overflow-hidden bg-white/95 backdrop-blur-3xl md:border border-black/10 origin-center"
           x-show="showMainWin" 
           x-transition:enter="transition ease-out duration-200" 
           x-transition:enter-start="opacity-0 md:scale-95" 
           x-transition:enter-end="opacity-100 md:scale-100" 
           x-transition:leave="transition ease-in duration-150" 
           x-transition:leave-start="opacity-100 md:scale-100" 
           x-transition:leave-end="opacity-0 md:scale-95">
        
        <!-- 标题栏 -->
        <div class="window-titlebar h-[50px] flex-shrink-0 flex items-center px-4 bg-gray-200/60 backdrop-blur-md justify-between border-b border-black/5">
            <!-- 交通灯 -->
            <div class="traffic-lights flex items-center gap-2 w-16">
                <!-- 红灯 (x) -> 隐藏窗口并返回首页 -->
                <button @click="showMainWin = false; window.preventAutoOpen = true; setTimeout(() => window.pjax.loadUrl('/'), 200)" class="traffic-btn close w-3 h-3 rounded-full bg-[#ff5f56] border border-[#e0443e] cursor-pointer" title="隐藏并返回大厅"></button>
                <!-- 黄灯 (-) -> 最小化/隐藏窗口 -->
                <button @click="showMainWin = false" class="traffic-btn minimize w-3 h-3 rounded-full bg-[#ffbd2e] border border-[#dea123] cursor-pointer" title="最小化"></button>
                <!-- 绿灯 (+) -> 暂无功能/留给未来最大化 -->
                <div class="traffic-btn maximize w-3 h-3 rounded-full bg-[#27c93f] border border-[#1aab29]"></div>
            </div>
            <!-- Title -->
            <div class="font-semibold text-xs text-gray-600 pointer-events-none" th:text="${title}">Browser</div>
            <div class="w-16"></div> <!-- 空白占位块以保证中间标题绝对居中 -->
        </div>

        <!-- 内部正文 (PJAX 容器) -->
        <div class="window-body flex-1 overflow-y-auto w-full relative bg-white select-text">
            <!-- Pjax 的局部无刷新刷新范围死死框定在这里，外壳永远静止 -->
            <div id="pjax-container" class="w-full min-h-full">
                <!-- SSR 渲染的正文注入 -->
                <th:block th:replace="${ssrContent}" />
            </div>
        </div>
      </div>
    </div>

    <!-- ==================== Dock ==================== -->
    <div class="dock-container" x-data="dock">
      <div class="dock-glass"></div>
      <div class="dock-bar relative z-10" x-ref="dockBar">
        <th:block th:if="${dockMenu != null}">
          <th:block th:each="menuItem : ${dockMenu.menuItems}">
            <th:block th:with="
                iconType = ${#annotations.getOrDefault(menuItem, 'icon_type', 'iconify')},
                iconSvg = ${#annotations.getOrDefault(menuItem, 'icon', '')},
                customSvg = ${#annotations.getOrDefault(menuItem, 'custom_svg', '')},
                imageUrl = ${#annotations.getOrDefault(menuItem, 'image_url', '')},
                bgColor = ${#annotations.getOrDefault(menuItem, 'bg_color', '')}">
              
              <!-- 改为 PJAX <a> 链接 -->
              <a class="dock-icon pjax-link group"
                 th:href="${menuItem.status.href}"
                 th:style="${iconType != 'image' and !#strings.isEmpty(bgColor)} ? 'background-color:' + ${bgColor} : (${#strings.isEmpty(bgColor) and iconType != 'image'} ? 'background: rgba(255,255,255,0.15)' : '')"
                 th:title="${menuItem.status.displayName}">

                <!-- Tooltip -->
                <div class="dock-tooltip" th:text="${menuItem.status.displayName}">Name</div>

                <!-- 图片类型 -->
                <th:block th:if="${iconType == 'image' and !#strings.isEmpty(imageUrl)}">
                  <img class="dock-icon-img" th:src="${imageUrl}" th:alt="${menuItem.status.displayName}" draggable="false" />
                </th:block>

                <!-- SVG 类型 -->
                <th:block th:if="${iconType != 'image'}">
                  <th:block th:with="svgContent = ${iconType == 'custom_svg' ? customSvg : iconSvg}">
                    <th:block th:if="${!#strings.isEmpty(svgContent)}">
                      <div class="dock-icon-svg" th:utext="${svgContent}"></div>
                    </th:block>
                  </th:block>
                </th:block>
              </a>
            </th:block>
          </th:block>
        </th:block>
      </div>
    </div>
    
    <halo:footer />
  </body>
  </th:block>
</html>
