<!doctype html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  th:fragment="html (title, description, ssrContent)"
  th:data-default-theme="${theme.config.desktop?.theme?.default_mode ?: 'system'}"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title th:text="${title}"></title>
    <meta name="description" th:content="${description}" />

    <!-- 阻止暗黑模式闪烁的内联脚本 -->
    <script>
      (function() {
        var defaultTheme = document.documentElement.getAttribute('data-default-theme') || 'system';
        var savedTheme = localStorage.getItem('theme');
        var theme = savedTheme || defaultTheme;
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <!-- 本地打包产物 (开发阶段加入时间戳废除缓存) -->
    <link rel="stylesheet" th:href="@{/assets/main.css(t=${#dates.createNow().getTime()})}" />
    <script defer th:src="@{/assets/main.js(t=${#dates.createNow().getTime()})}"></script>
  </head>

  <!-- 读取后台配置 -->
  <th:block th:with="
      bgConf = ${theme.config.desktop?.background},
      iconConf = ${theme.config.desktop?.icons},
      bgMode = ${bgConf?.mode ?: 'preset'},
      bgPreset = ${bgConf?.preset ?: 'tahoe-dawn'},
      enableThemeSetting = ${theme.config.desktop?.theme?.enable_frontend_setting != null ? theme.config.desktop?.theme?.enable_frontend_setting : true},
      desktopCustomIcons = ${theme.config.desktop?.icons?.custom_icons ?: {}},
      desktopCategories = ${theme.config.desktop?.icons?.categories ?: {}},
      desktopTags = ${theme.config.desktop?.icons?.tags ?: {}},
      desktopPosts = ${theme.config.desktop?.icons?.posts ?: {}},
      desktopSinglePages = ${theme.config.desktop?.icons?.single_pages ?: {}},
      dockMenu = ${!#strings.isEmpty(rawMenuName) ? menuFinder.getByName(rawMenuName) : menuFinder.getByName('primary')}">

  <body
    class="overflow-hidden m-0 p-0 text-white w-screen h-screen relative"
    th:classappend="${bgMode == 'preset' ? 'wallpaper-' + bgPreset : ''}"
    th:styleappend="${bgMode == 'image' and bgConf?.image != null ? 'background:url(' + bgConf.image + ') center/cover no-repeat; background-color:#0f172a;' : (bgMode == 'solid' ? 'background-color:' + (bgConf?.solid_color ?: '#0f172a') + ';' : '')}"
  >

    <!-- ==================== MenuBar ==================== -->
    <div class="menubar" x-data="menuBar">
      <div class="flex items-center gap-1">
        <span class="menubar-item text-base">&#63743;</span>
        <span class="menubar-item font-bold" x-text="appName">Finder</span>
        <span class="menubar-item hidden sm:block">File</span>
        <span class="menubar-item hidden sm:block">Edit</span>
        <span class="menubar-item hidden sm:block">View</span>
        <span class="menubar-item hidden sm:block">Go</span>
        <span class="menubar-item hidden sm:block">Window</span>
        <span class="menubar-item hidden sm:block">Help</span>
      </div>
      <div class="flex items-center gap-1 font-medium text-xs">
        <!-- 主题切换 (毛玻璃下拉框) -->
        <div class="menubar-icon-btn relative" x-data="{ open: false }" @click.away="open = false" th:if="${enableThemeSetting}">
          <div @click="open = !open" title="主题外观" class="w-full h-full flex items-center justify-center">
            <svg x-show="!$store.theme.isDark" style="display: none;" class="w-[15px] h-[15px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg x-show="$store.theme.isDark" style="display: none;" class="w-[15px] h-[15px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </div>
          <div x-show="open" 
               style="display: none;"
               x-transition.opacity.duration.200ms
               class="absolute top-full right-0 mt-2 p-1.5 rounded-xl bg-white/70 dark:bg-black/40 backdrop-blur-3xl border border-black/10 dark:border-white/10 shadow-lg flex flex-col gap-1 w-[110px] justify-start text-gray-800 dark:text-gray-200">
             <button class="p-1.5 pl-2.5 text-left rounded-md hover:bg-black/5 dark:hover:bg-white/10 text-xs font-medium transition-colors" :class="{ 'bg-black/5 dark:bg-white/15': $store.theme.mode === 'light' }" @click="$store.theme.setMode('light'); open = false">浅色</button>
             <button class="p-1.5 pl-2.5 text-left rounded-md hover:bg-black/5 dark:hover:bg-white/10 text-xs font-medium transition-colors" :class="{ 'bg-black/5 dark:bg-white/15': $store.theme.mode === 'dark' }" @click="$store.theme.setMode('dark'); open = false">深色</button>
             <button class="p-1.5 pl-2.5 text-left rounded-md hover:bg-black/5 dark:hover:bg-white/10 text-xs font-medium transition-colors" :class="{ 'bg-black/5 dark:bg-white/15': $store.theme.mode === 'system' }" @click="$store.theme.setMode('system'); open = false">跟随系统</button>
          </div>
        </div>
        <div class="menubar-icon-btn">
          <!-- Wi-Fi -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9l2.83-2.83a15 15 0 0121.5 0L22.58 9M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
        </div>
        <div class="menubar-icon-btn">
          <!-- 电池 -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="16" height="10" rx="3" ry="3"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
        </div>
        <div class="menubar-icon-btn">
          <!-- 控制中心 -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </div>
        <div class="menubar-item" x-text="timeStr"></div>
      </div>
    </div>

    <!-- ==================== 桌面图标 ==================== -->
    <div class="desktop-grid" x-data="desktopIcons" @click.window="handleOutsideClick($event)">
      
      <!-- 1. 自定义挂载图标 (接管最初的菜单源头) -->
      <th:block th:each="icon : ${desktopCustomIcons}">
        <a th:href="${icon.href}" class="desktop-icon block group" th:classappend="${!icon.external ? 'pjax-link' : ''}" th:attr="data-id=${icon.name}, target=${icon.external ? '_blank' : null}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
          <div class="desktop-icon-graphic">
            
            <!-- 1.1 文章或单页 (渲染为文稿) -->
            <th:block th:if="${icon.type == 'document'}">
              <svg viewBox="0 0 120 120" width="52" height="52" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <path fill="#ffffff" d="M25 15 L70 15 L95 40 L95 105 C95 110, 90 115, 85 115 L25 115 C20 115, 15 110, 15 105 L15 25 C15 20, 20 15, 25 15 Z" />
                <path fill="#e0e0e0" d="M70 15 L70 35 C70 38, 72 40, 75 40 L95 40 Z" />
                <rect fill="#cccccc" x="35" y="55" width="50" height="6" rx="3" />
                <rect fill="#cccccc" x="35" y="70" width="50" height="6" rx="3" />
                <rect fill="#cccccc" x="35" y="85" width="35" height="6" rx="3" />
              </svg>
            </th:block>

            <!-- 1.2 分类或标签 (渲染为文件夹) -->
            <th:block th:if="${icon.type == 'folder'}">
              <svg viewBox="0 0 120 120" width="56" height="56" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <path fill="#4A90E2" d="M10 35 C10 30, 14 26, 19 26 L45 26 C48 26, 51 28, 53 30 L63 42 L101 42 C106 42, 110 46, 110 51 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="#64B5F6" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="#90CAF9" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 V50 C110 45, 106 41, 101 41 L19 41 C14 41, 10 45, 10 50 Z" />
              </svg>
            </th:block>
            
            <!-- 1.3 第三方链接 (渲染为 Safari 地球) -->
            <th:block th:if="${icon.type == 'link'}">
              <svg viewBox="0 0 120 120" width="56" height="56" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <circle cx="60" cy="60" r="48" fill="#ffffff" />
                <circle cx="60" cy="60" r="44" fill="#0288D1" />
                <path fill="none" stroke="#81D4FA" stroke-width="4" d="M60 16 C 30 16, 30 104, 60 104 C 90 104, 90 16, 60 16 Z" />
                <path fill="none" stroke="#81D4FA" stroke-width="4" d="M18 60 L102 60 M27 35 L93 35 M27 85 L93 85 M60 16 V104" />
              </svg>
            </th:block>

          </div>
          <div class="desktop-icon-label" th:text="${icon.name}">Name</div>
        </a>
      </th:block>

      <!-- 2. 分类 (渲染为文件夹) -->
      <th:block th:each="catName : ${desktopCategories}">
        <th:block th:with="category=${categoryFinder.getByName(catName)}">
          <a th:if="${category != null}" th:href="${category.status.permalink}" class="desktop-icon pjax-link block group" th:attr="data-id=${catName}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
            <div class="desktop-icon-graphic">
              <svg viewBox="0 0 120 120" width="56" height="56" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <path fill="#4A90E2" d="M10 35 C10 30, 14 26, 19 26 L45 26 C48 26, 51 28, 53 30 L63 42 L101 42 C106 42, 110 46, 110 51 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="#64B5F6" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="#90CAF9" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 V50 C110 45, 106 41, 101 41 L19 41 C14 41, 10 45, 10 50 Z" />
              </svg>
            </div>
            <div class="desktop-icon-label" th:text="${category.spec.displayName}">Cat</div>
          </a>
        </th:block>
      </th:block>

      <!-- 3. 标签 (渲染为文件夹) -->
      <th:block th:each="tagName : ${desktopTags}">
        <th:block th:with="tag=${tagFinder.getByName(tagName)}">
          <a th:if="${tag != null}" th:href="${tag.status.permalink}" class="desktop-icon pjax-link block group" th:attr="data-id=${tagName}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
            <div class="desktop-icon-graphic">
              <svg viewBox="0 0 120 120" width="56" height="56" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <path fill="#4A90E2" d="M10 35 C10 30, 14 26, 19 26 L45 26 C48 26, 51 28, 53 30 L63 42 L101 42 C106 42, 110 46, 110 51 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="#64B5F6" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="#90CAF9" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 V50 C110 45, 106 41, 101 41 L19 41 C14 41, 10 45, 10 50 Z" />
              </svg>
            </div>
            <div class="desktop-icon-label" th:text="${tag.spec.displayName}">Tag</div>
          </a>
        </th:block>
      </th:block>

      <!-- 4. 指定文章 (渲染为文稿) -->
      <th:block th:each="postName : ${desktopPosts}">
        <th:block th:with="post=${postFinder.getByName(postName)}">
          <a th:if="${post != null}" th:href="${post.status.permalink}" class="desktop-icon pjax-link block group" th:attr="data-id=${postName}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
             <div class="desktop-icon-graphic">
               <svg viewBox="0 0 120 120" width="52" height="52" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                 <path fill="#ffffff" d="M25 15 L70 15 L95 40 L95 105 C95 110, 90 115, 85 115 L25 115 C20 115, 15 110, 15 105 L15 25 C15 20, 20 15, 25 15 Z" />
                 <path fill="#e0e0e0" d="M70 15 L70 35 C70 38, 72 40, 75 40 L95 40 Z" />
                 <rect fill="#cccccc" x="35" y="55" width="50" height="6" rx="3" />
                 <rect fill="#cccccc" x="35" y="70" width="50" height="6" rx="3" />
                 <rect fill="#cccccc" x="35" y="85" width="35" height="6" rx="3" />
               </svg>
             </div>
             <div class="desktop-icon-label" th:text="${post.spec.title}">Post</div>
          </a>
        </th:block>
      </th:block>

      <!-- 5. 指定单页 (渲染为文稿) -->
      <th:block th:each="pageName : ${desktopSinglePages}">
        <th:block th:with="singlePage=${singlePageFinder.getByName(pageName)}">
          <a th:if="${singlePage != null}" th:href="${singlePage.status.permalink}" class="desktop-icon pjax-link block group" th:attr="data-id=${pageName}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
             <div class="desktop-icon-graphic">
               <svg viewBox="0 0 120 120" width="52" height="52" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                 <path fill="#ffffff" d="M25 15 L70 15 L95 40 L95 105 C95 110, 90 115, 85 115 L25 115 C20 115, 15 110, 15 105 L15 25 C15 20, 20 15, 25 15 Z" />
                 <path fill="#e0e0e0" d="M70 15 L70 35 C70 38, 72 40, 75 40 L95 40 Z" />
                 <rect fill="#cccccc" x="35" y="55" width="50" height="6" rx="3" />
                 <rect fill="#cccccc" x="35" y="70" width="50" height="6" rx="3" />
                 <rect fill="#cccccc" x="35" y="85" width="35" height="6" rx="3" />
               </svg>
             </div>
             <div class="desktop-icon-label" th:text="${singlePage.spec.title}">Page</div>
          </a>
        </th:block>
      </th:block>



    </div>

    <!-- ==================== 极简单主窗 (PJAX 热重载) ==================== -->
    <!-- 赋予 Alpine 状态控制最小化，同时监听全局唤醒信号 -->
    <div class="window-layer fixed inset-0 z-10 pointer-events-none flex items-center justify-center md:pb-20"
         th:attr="data-home-behavior=${homeBehavior},data-close-action=${closeAction}"
         x-data="{ showMainWin: window.location.pathname !== '/', init() { if (this.$el.dataset.homeBehavior === 'window-first') this.showMainWin = true; } }" @open-window.window="showMainWin = true">
      
      <!-- Safari 极简静态拟真窗口壳 (移动端100%覆盖，桌面端85%漂浮) -->
      <div class="macos-window flex flex-col pointer-events-auto shadow-2xl relative w-full h-full md:w-[85%] md:h-[85%] max-w-[1200px] rounded-none md:rounded-xl overflow-hidden bg-white/80 dark:bg-[#1c1c1e]/60 backdrop-blur-3xl md:border border-black/10 dark:border-white/10 origin-center"
           x-show="showMainWin" 
           x-transition:enter="transition ease-out duration-200" 
           x-transition:enter-start="opacity-0 md:scale-95" 
           x-transition:enter-end="opacity-100 md:scale-100" 
           x-transition:leave="transition ease-in duration-150" 
           x-transition:leave-start="opacity-100 md:scale-100" 
           x-transition:leave-end="opacity-0 md:scale-95">
        
        <!-- 1:1 拟真 Safari 标题栏 -->
        <div class="window-titlebar h-[52px] flex-shrink-0 flex items-center px-3 md:px-4 bg-[#f4f5f5]/70 dark:bg-[#2c2c2e]/40 backdrop-blur-2xl justify-between border-b border-black/10 dark:border-white/5 relative text-gray-600 dark:text-gray-300"
             x-data="{ path: window.location.pathname, host: window.location.host, title: document.title }" 
             @pjax:complete.window="path = window.location.pathname; title = document.title; host = window.location.host">
            
            <!-- Left side: 交通灯 + 边栏开关 + 前进后退 -->
            <div class="flex items-center gap-3 md:gap-4 w-[120px] md:w-[240px]">
                <!-- 交通灯 -->
                <div class="traffic-lights flex items-center gap-2">
                    <button @click="if ($el.closest('.window-layer').dataset.closeAction === 'return-home') { showMainWin = false; window.preventAutoOpen = true; setTimeout(() => window.pjax.loadUrl('/'), 200); } else { showMainWin = false; }" class="traffic-btn close w-3 h-3 rounded-full bg-[#ff5f56] border border-[#e0443e] cursor-pointer" title="关闭"></button>
                    <button @click="showMainWin = false" class="traffic-btn minimize w-3 h-3 rounded-full bg-[#ffbd2e] border border-[#dea123] cursor-pointer" title="最小化"></button>
                    <div class="traffic-btn maximize w-3 h-3 rounded-full bg-[#27c93f] border border-[#1aab29]"></div>
                </div>

                <!-- Sidebar Toggle (Mobile hidden) -->
                <button class="hidden md:block hover:bg-gray-200/60 p-1.5 rounded-md transition-colors text-gray-500 hover:text-gray-800" title="隐藏边栏">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                    </svg>
                </button>

                <!-- Navigation < > (Mobile hidden) -->
                <div class="hidden md:flex items-center gap-0.5">
                    <button @click="window.history.back()" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-gray-200/60 transition-colors" title="返回上一页">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <button @click="window.history.forward()" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-gray-200/60 transition-colors" title="前往下一页">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- Center side: 拟真地址搜索栏 -->
            <div class="flex-1 flex justify-center items-center px-2 md:px-4 max-w-xl">
                <div class="w-full flex items-center justify-between bg-white/70 dark:bg-black/20 border border-black/5 dark:border-white/5 rounded-md px-3 py-1 shadow-sm hover:shadow transition hover:bg-white/90 dark:hover:bg-black/40 cursor-text group" title="显示详情">
                    <div class="flex items-center gap-2 overflow-hidden flex-1 justify-center relative">
                        <!-- 安全锁 Icon -->
                        <svg class="w-3 h-3 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        
                        <!-- Domain / Title 层叠组 -->
                        <div class="flex flex-col items-center truncate min-w-0" style="max-width: 85%;">
                            <span class="font-medium text-[13px] truncate text-gray-800 dark:text-gray-200" x-text="title" th:text="${title}"></span>
                            <span class="text-[10px] text-gray-400 dark:text-gray-500 font-medium truncate mt-0.5 tracking-tight group-hover:text-blue-500 transition-colors" x-text="host + path"></span>
                        </div>
                    </div>
                    
                    <!-- Pjax 专属页面热重载 -->
                    <button @click="window.pjax.reload()" class="ml-2 text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 flex-shrink-0 transition-colors" title="重新加载此页面">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                </div>
            </div>

            <!-- Right side: 分享 / 新标签 -->
            <div class="hidden md:flex items-center justify-end gap-2 w-[240px] pr-2">
                <!-- 主题切换 -->
                <div class="relative flex items-center" x-data="{ open: false }" @click.away="open = false" th:if="${enableThemeSetting}">
                  <button @click="open = !open" class="hover:bg-gray-200/60 dark:hover:bg-gray-700/60 p-1.5 rounded-md transition-colors text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200" title="主题外观">
                      <svg x-show="!$store.theme.isDark" style="display: none;" class="w-[17px] h-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                      <svg x-show="$store.theme.isDark" style="display: none;" class="w-[17px] h-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  </button>
                  <div x-show="open" 
                       style="display: none;"
                       x-transition.opacity.duration.200ms
                       class="absolute top-[120%] right-0 mt-2 p-1.5 rounded-xl bg-white/80 dark:bg-black/50 backdrop-blur-3xl border border-black/10 dark:border-white/10 shadow-lg flex flex-col gap-1 w-[110px] justify-start text-gray-800 dark:text-gray-200 z-50">
                     <button class="p-1.5 pl-2.5 text-left rounded-md hover:bg-black/5 dark:hover:bg-white/10 text-xs font-medium transition-colors" :class="{ 'bg-black/5 dark:bg-white/15': $store.theme.mode === 'light' }" @click="$store.theme.setMode('light'); open = false">浅色</button>
                     <button class="p-1.5 pl-2.5 text-left rounded-md hover:bg-black/5 dark:hover:bg-white/10 text-xs font-medium transition-colors" :class="{ 'bg-black/5 dark:bg-white/15': $store.theme.mode === 'dark' }" @click="$store.theme.setMode('dark'); open = false">深色</button>
                     <button class="p-1.5 pl-2.5 text-left rounded-md hover:bg-black/5 dark:hover:bg-white/10 text-xs font-medium transition-colors" :class="{ 'bg-black/5 dark:bg-white/15': $store.theme.mode === 'system' }" @click="$store.theme.setMode('system'); open = false">跟随系统</button>
                  </div>
                </div>

                <button class="hover:bg-gray-200/60 dark:hover:bg-gray-700/60 p-1.5 rounded-md transition-colors text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400" title="分享">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                </button>
                <button class="hover:bg-gray-200/60 dark:hover:bg-gray-700/60 p-1 rounded-md transition-colors text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200" title="新建标签页">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                </button>
            </div>
        </div>

        <!-- 内部正文 (PJAX 容器) -->
        <div class="window-body flex-1 overflow-y-auto w-full relative bg-white/90 dark:bg-black/40 select-text">
            <!-- Pjax 的局部无刷新刷新范围死死框定在这里，外壳永远静止 -->
            <div id="pjax-container" class="w-full min-h-full">
                <!-- SSR 渲染的正文注入 -->
                <th:block th:replace="${ssrContent}" />
            </div>
        </div>
      </div>
    </div>

    <!-- ==================== Dock ==================== -->
    <div class="dock-container" th:attr="data-show-labels=${dockShowLabels},data-magnification=${dockMagnification}" x-data="dock">
      <div class="dock-glass"></div>
      <div class="dock-bar relative z-10" x-ref="dockBar">
        <th:block th:if="${dockMenu != null}">
          <th:block th:each="menuItem : ${dockMenu.menuItems}">
            <th:block th:with="
                iconType = ${#annotations.getOrDefault(menuItem, 'icon_type', 'iconify')},
                iconSvg = ${#annotations.getOrDefault(menuItem, 'icon', '')},
                customSvg = ${#annotations.getOrDefault(menuItem, 'custom_svg', '')},
                imageUrl = ${#annotations.getOrDefault(menuItem, 'image_url', '')},
                bgColor = ${#annotations.getOrDefault(menuItem, 'bg_color', '')}">
              
              <!-- 改为 PJAX <a> 链接 -->
              <a class="dock-icon pjax-link group"
                 th:href="${menuItem.status.href}"
                 th:style="${iconType != 'image' and !#strings.isEmpty(bgColor)} ? 'background-color:' + ${bgColor} : (${#strings.isEmpty(bgColor) and iconType != 'image'} ? 'background: rgba(255,255,255,0.15)' : '')"
                 th:title="${menuItem.status.displayName}">

                <!-- Tooltip -->
                <div class="dock-tooltip" x-show="$el.closest('.dock-container').dataset.showLabels === 'true'" th:text="${menuItem.status.displayName}">Name</div>

                <!-- 图片类型 -->
                <th:block th:if="${iconType == 'image' and !#strings.isEmpty(imageUrl)}">
                  <img class="dock-icon-img" th:src="${imageUrl}" th:alt="${menuItem.status.displayName}" draggable="false" />
                </th:block>

                <!-- SVG 类型 -->
                <th:block th:if="${iconType != 'image'}">
                  <th:block th:with="svgContent = ${iconType == 'custom_svg' ? customSvg : iconSvg}">
                    <th:block th:if="${!#strings.isEmpty(svgContent)}">
                      <div class="dock-icon-svg" th:utext="${svgContent}"></div>
                    </th:block>
                  </th:block>
                </th:block>
              </a>
            </th:block>
          </th:block>
        </th:block>
      </div>
    </div>
    
    <halo:footer />
  </body>
  </th:block>
</html>
