<!doctype html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  th:fragment="html (title, description, ssrContent)"
  th:data-default-theme="${theme.config.header?.theme?.default_mode ?: 'system'}"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title th:text="${title}"></title>
    <meta name="description" th:content="${description}" />

    <!-- 阻止暗黑模式闪烁的内联脚本 -->
    <script>
      (function() {
        var root = document.documentElement;
        var defaultTheme = root.getAttribute('data-default-theme') || 'system';
        var savedTheme = localStorage.getItem('theme');
        var theme = savedTheme || defaultTheme;
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

        root.classList.remove('dark', 'light', 'color-scheme-auto', 'color-scheme-dark', 'color-scheme-light');
        root.classList.add(theme === 'system' ? 'color-scheme-auto' : 'color-scheme-' + theme);
        root.classList.add(theme);
        root.setAttribute('data-color-scheme', theme);

        if (isDark) {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
      })();
    </script>

    <!-- 本地打包产物 (开发阶段加入时间戳废除缓存) -->
    <link rel="stylesheet" th:href="@{/assets/main.css(t=${#dates.createNow().getTime()})}" />
    <script defer th:src="@{/assets/main.js(t=${#dates.createNow().getTime()})}"></script>
  </head>

  <!-- 读取后台配置 -->
  <th:block th:with="
      bgConf = ${theme.config.desktop?.background},
      iconConf = ${theme.config.desktop?.icons},
      bgMode = ${bgConf?.mode ?: 'preset'},
      bgPreset = ${bgConf?.preset ?: 'tahoe-dawn'},
      enableThemeSetting = ${theme.config.header?.theme?.enable_frontend_setting != null ? theme.config.header?.theme?.enable_frontend_setting : true},
      headerLogoIcon = ${theme.config.header?.logo?.icon?.value ?: ''},
      desktopCustomIcons = ${theme.config.desktop?.icons?.custom_icons ?: {}},
      desktopCategories = ${theme.config.desktop?.icons?.categories ?: {}},
      desktopTags = ${theme.config.desktop?.icons?.tags ?: {}},
      desktopPosts = ${theme.config.desktop?.icons?.posts ?: {}},
      desktopSinglePages = ${theme.config.desktop?.icons?.single_pages ?: {}},
      rawMenuName = ${theme.config.dock?.source?.menu_name ?: 'primary'},
      dockShowLabels = ${theme.config.dock?.appearance?.show_labels != null ? theme.config.dock?.appearance?.show_labels : true},
      dockMagnification = ${theme.config.dock?.appearance?.magnification != null ? theme.config.dock?.appearance?.magnification : true},
      headerMenuName = ${theme.config.header?.source?.menu_name ?: 'primary'},
      headerMenu = ${!#strings.isEmpty(headerMenuName) ? menuFinder.getByName(headerMenuName) : menuFinder.getByName('primary')},
      dockMenu = ${!#strings.isEmpty(rawMenuName) ? menuFinder.getByName(rawMenuName) : menuFinder.getByName('primary')},
      desktopAppearance = ${theme.config.desktop?.appearance},
      legacyCustomScheme = ${(desktopAppearance?.mode == null) and (desktopAppearance?.accent_color != null or desktopAppearance?.selection_color != null or desktopAppearance?.folder_color1 != null or desktopAppearance?.folder_color2 != null or desktopAppearance?.folder_color3 != null or desktopAppearance?.glass_light_color != null or desktopAppearance?.glass_dark_color != null)},
      schemeMode = ${desktopAppearance?.mode ?: (legacyCustomScheme ? 'custom' : 'preset')},
      schemePreset = ${desktopAppearance?.preset ?: 'blue'},
      macAccent = ${desktopAppearance?.accent_color ?: '#2E5FBD'},
      macSelection = ${desktopAppearance?.selection_color ?: '#244D9B'},
      macFolder1 = ${desktopAppearance?.folder_color1 ?: '#4A90E2'},
      macFolder2 = ${desktopAppearance?.folder_color2 ?: '#64B5F6'},
      macFolder3 = ${desktopAppearance?.folder_color3 ?: '#90CAF9'},
      macShellLight = ${desktopAppearance?.glass_light_color ?: '#FFFFFF'},
      macShellDark = ${desktopAppearance?.glass_dark_color ?: '#141414'},
      bgImageUrl = ${bgConf?.image_url ?: bgConf?.image},
      wallpaperClass = ${bgMode == 'preset' ? 'wallpaper-' + bgPreset : ''},
      schemeClass = ${schemeMode == 'preset' ? 'scheme-' + schemePreset : 'scheme-custom'}">

  <body
    class="overflow-hidden m-0 p-0 text-white w-screen h-screen relative"
    th:classappend="${#strings.isEmpty(wallpaperClass) ? schemeClass : wallpaperClass + ' ' + schemeClass}"
    th:style="${schemeMode == 'custom' ? '--mac-accent:' + macAccent + ';--mac-selection:' + macSelection + ';--mac-folder1:' + macFolder1 + ';--mac-folder2:' + macFolder2 + ';--mac-folder3:' + macFolder3 + ';--mac-shell-light:' + macShellLight + ';--mac-shell-dark:' + macShellDark + ';' : ''}"
    th:styleappend="${bgMode == 'image' and bgImageUrl != null ? 'background:url(' + bgImageUrl + ') center/cover no-repeat; background-color:#0f172a;' : (bgMode == 'solid' ? 'background-color:' + (bgConf?.solid_color ?: '#0f172a') + ';' : '')}"
  >

    <!-- ==================== MenuBar ==================== -->
    <div class="menubar relative z-50 flex items-center justify-between px-3 h-7 bg-white/10 dark:bg-[#1c1c1e]/30 backdrop-blur-3xl saturate-[1.8] border-b border-white/10 antialiased transition-colors" x-data="menuBar" th:data-site-title="${site.title ?: 'Finder'}">
      
      <!-- 左侧：系统菜单与主导航 -->
      <div class="flex items-center text-[13.5px] font-medium tracking-tight text-white drop-shadow-md">
        <!-- Apple Logo / 自定义 Logo -->
        <a href="javascript:void(0)" class="px-[10px] h-[22px] mx-0.5 rounded-[4px] hover:bg-white/20 transition-colors text-base flex items-center justify-center gap-1" title="System">
          <th:block th:if="${#strings.isEmpty(headerLogoIcon)}">
            &#63743;
          </th:block>
          <th:block th:unless="${#strings.isEmpty(headerLogoIcon)}">
            <span class="flex items-center justify-center w-[1.2em] h-[1.2em]" th:utext="${headerLogoIcon}"></span>
          </th:block>
        </a>
        
        <!-- 动态当前应用名 -->
        <span class="px-2 h-[22px] flex items-center font-bold cursor-default drop-shadow-md" x-text="appName">Finder</span>

        <!-- 动态渲染 Halo 后台菜单 (含二级下拉) -->
        <th:block th:if="${headerMenu != null}">
          <div th:each="menuItem : ${headerMenu.menuItems}" class="relative group" x-data="{ open: false }" @mouseenter="open = true" @mouseleave="open = false" @click.away="open = false">
            <a th:href="${#lists.isEmpty(menuItem.children) ? menuItem.status.href : 'javascript:void(0)'}" 
               th:target="${menuItem.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
               class="hidden sm:inline-flex items-center px-[10px] h-[22px] mx-0.5 rounded-[4px] hover:bg-white/20 transition-none"
               th:classappend="${#lists.isEmpty(menuItem.children) ? 'pjax-link' : ''}"
               th:text="${menuItem.status.displayName}">
            </a>
            
            <!-- macOS Panel 风格下拉菜单 -->
            <div th:if="${!#lists.isEmpty(menuItem.children)}"
                 x-show="open"
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 style="display: none;"
                 class="absolute top-[100%] left-0 mt-[1px] min-w-[240px] p-[6px] rounded-[10px] bg-black/20 dark:bg-[#1c1c1e]/60 backdrop-blur-3xl saturate-[1.8] border border-white/20 dark:border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.3)] dark:shadow-[0_20px_50px_rgba(0,0,0,0.5)] origin-top-left flex flex-col z-[100] drop-shadow-none">
                 
                 <a th:each="child : ${menuItem.children}"
                    th:href="${child.status.href}"
                    th:target="${child.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
                    class="mac-accent-panel-item px-3 py-[3px] text-[13.5px] tracking-tight font-medium text-white drop-shadow-sm transition-none flex items-center justify-between rounded-[5px] pjax-link">
                    <span th:text="${child.status.displayName}"></span>
                 </a>
            </div>
          </div>
        </th:block>
      </div>

      <!-- 右侧：控件与时间 -->
      <div class="flex items-center gap-[6px] font-medium text-[13px] text-white drop-shadow-md">
        <!-- Spotlight 全局搜索 (纯净原生极简图标) -->
        <button type="button" th:if="${pluginFinder.available('PluginSearchWidget')}" @click="openSearch()" class="relative px-1.5 h-[22px] flex items-center justify-center rounded-[4px] transition-colors hover:bg-[color-mix(in_srgb,var(--mac-shell-light)_16%,transparent)] dark:hover:bg-[color-mix(in_srgb,var(--mac-shell-light)_14%,transparent)] text-white" title="聚焦搜索 (Cmd+K)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>

        <!-- 主题切换 (极致原生精简缩放) -->
        <button @click="$store.theme.setMode($store.theme.isDark ? 'light' : 'dark')" class="relative px-1.5 h-[22px] flex items-center justify-center rounded-[4px] transition-colors hover:bg-[color-mix(in_srgb,var(--mac-shell-light)_16%,transparent)] dark:hover:bg-[color-mix(in_srgb,var(--mac-shell-light)_14%,transparent)] text-white" th:if="${enableThemeSetting}" title="切换外观">
            <svg x-show="!$store.theme.isDark" class="w-[14px] h-[14px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg x-show="$store.theme.isDark" style="display: none;" class="w-[14px] h-[14px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        
        <!-- 时钟 -->
        <div class="px-3 py-0.5 cursor-default truncate min-w-[120px] text-right" x-text="timeStr"></div>
      </div>
    </div>

    <!-- ==================== 桌面图标 ==================== -->
    <div class="desktop-grid" x-data="desktopIcons" @click.window="handleOutsideClick($event)">
      
      <!-- 1. 自定义挂载图标 (接管最初的菜单源头) -->
      <th:block th:each="icon : ${desktopCustomIcons}">
        <a th:href="${icon.href}" class="desktop-icon block group" th:classappend="${!icon.external ? 'pjax-link' : ''}" th:attr="data-id=${icon.name}, target=${icon.external ? '_blank' : null}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
          <div class="desktop-icon-graphic">
            
            <!-- 1.1 文章或单页 (渲染为文稿) -->
            <th:block th:if="${icon.type == 'document'}">
              <svg viewBox="0 0 120 120" width="52" height="52" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <path fill="#ffffff" d="M25 15 L70 15 L95 40 L95 105 C95 110, 90 115, 85 115 L25 115 C20 115, 15 110, 15 105 L15 25 C15 20, 20 15, 25 15 Z" />
                <path fill="#e0e0e0" d="M70 15 L70 35 C70 38, 72 40, 75 40 L95 40 Z" />
                <rect fill="#cccccc" x="35" y="55" width="50" height="6" rx="3" />
                <rect fill="#cccccc" x="35" y="70" width="50" height="6" rx="3" />
                <rect fill="#cccccc" x="35" y="85" width="35" height="6" rx="3" />
              </svg>
            </th:block>

            <!-- 1.2 分类或标签 (渲染为文件夹) -->
            <th:block th:if="${icon.type == 'folder'}">
              <svg viewBox="0 0 120 120" width="56" height="56" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <path fill="var(--mac-folder1)" d="M10 35 C10 30, 14 26, 19 26 L45 26 C48 26, 51 28, 53 30 L63 42 L101 42 C106 42, 110 46, 110 51 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="var(--mac-folder2)" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="var(--mac-folder3)" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 V50 C110 45, 106 41, 101 41 L19 41 C14 41, 10 45, 10 50 Z" />
              </svg>
            </th:block>
            
            <!-- 1.3 第三方链接 (渲染为 Safari 地球) -->
            <th:block th:if="${icon.type == 'link'}">
              <svg viewBox="0 0 120 120" width="56" height="56" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <circle cx="60" cy="60" r="48" fill="#ffffff" />
                <circle cx="60" cy="60" r="44" fill="var(--mac-link-primary)" />
                <path fill="none" stroke="var(--mac-link-secondary)" stroke-width="4" d="M60 16 C 30 16, 30 104, 60 104 C 90 104, 90 16, 60 16 Z" />
                <path fill="none" stroke="var(--mac-link-secondary)" stroke-width="4" d="M18 60 L102 60 M27 35 L93 35 M27 85 L93 85 M60 16 V104" />
              </svg>
            </th:block>

          </div>
          <div class="desktop-icon-label" th:text="${icon.name}">Name</div>
        </a>
      </th:block>

      <!-- 2. 分类 (渲染为文件夹) -->
      <th:block th:each="catName : ${desktopCategories}">
        <th:block th:with="category=${categoryFinder.getByName(catName)}">
          <a th:if="${category != null}" th:href="${category.status.permalink}" class="desktop-icon pjax-link block group" th:attr="data-id=${catName}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
            <div class="desktop-icon-graphic">
              <svg viewBox="0 0 120 120" width="56" height="56" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <path fill="var(--mac-folder1)" d="M10 35 C10 30, 14 26, 19 26 L45 26 C48 26, 51 28, 53 30 L63 42 L101 42 C106 42, 110 46, 110 51 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="var(--mac-folder2)" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="var(--mac-folder3)" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 V50 C110 45, 106 41, 101 41 L19 41 C14 41, 10 45, 10 50 Z" />
              </svg>
            </div>
            <div class="desktop-icon-label" th:text="${category.spec.displayName}">Cat</div>
          </a>
        </th:block>
      </th:block>

      <!-- 3. 标签 (渲染为文件夹) -->
      <th:block th:each="tagName : ${desktopTags}">
        <th:block th:with="tag=${tagFinder.getByName(tagName)}">
          <a th:if="${tag != null}" th:href="${tag.status.permalink}" class="desktop-icon pjax-link block group" th:attr="data-id=${tagName}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
            <div class="desktop-icon-graphic">
              <svg viewBox="0 0 120 120" width="56" height="56" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                <path fill="var(--mac-folder1)" d="M10 35 C10 30, 14 26, 19 26 L45 26 C48 26, 51 28, 53 30 L63 42 L101 42 C106 42, 110 46, 110 51 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="var(--mac-folder2)" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 L110 95 C110 100, 106 104, 101 104 L10 104 Z" />
                <path fill="var(--mac-folder3)" d="M10 48 C10 43, 14 39, 19 39 L101 39 C106 39, 110 43, 110 48 V50 C110 45, 106 41, 101 41 L19 41 C14 41, 10 45, 10 50 Z" />
              </svg>
            </div>
            <div class="desktop-icon-label" th:text="${tag.spec.displayName}">Tag</div>
          </a>
        </th:block>
      </th:block>

      <!-- 4. 指定文章 (渲染为文稿) -->
      <th:block th:each="postName : ${desktopPosts}">
        <th:block th:with="post=${postFinder.getByName(postName)}">
          <a th:if="${post != null}" th:href="${post.status.permalink}" class="desktop-icon pjax-link block group" th:attr="data-id=${postName}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
             <div class="desktop-icon-graphic">
               <svg viewBox="0 0 120 120" width="52" height="52" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                 <path fill="#ffffff" d="M25 15 L70 15 L95 40 L95 105 C95 110, 90 115, 85 115 L25 115 C20 115, 15 110, 15 105 L15 25 C15 20, 20 15, 25 15 Z" />
                 <path fill="#e0e0e0" d="M70 15 L70 35 C70 38, 72 40, 75 40 L95 40 Z" />
                 <rect fill="#cccccc" x="35" y="55" width="50" height="6" rx="3" />
                 <rect fill="#cccccc" x="35" y="70" width="50" height="6" rx="3" />
                 <rect fill="#cccccc" x="35" y="85" width="35" height="6" rx="3" />
               </svg>
             </div>
             <div class="desktop-icon-label" th:text="${post.spec.title}">Post</div>
          </a>
        </th:block>
      </th:block>

      <!-- 5. 指定单页 (渲染为文稿) -->
      <th:block th:each="pageName : ${desktopSinglePages}">
        <th:block th:with="singlePage=${singlePageFinder.getByName(pageName)}">
          <a th:if="${singlePage != null}" th:href="${singlePage.status.permalink}" class="desktop-icon pjax-link block group" th:attr="data-id=${pageName}" :class="{ 'selected': selectedId === $el.dataset.id }" @click="select($el.dataset.id)">
             <div class="desktop-icon-graphic">
               <svg viewBox="0 0 120 120" width="52" height="52" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-sm mx-auto">
                 <path fill="#ffffff" d="M25 15 L70 15 L95 40 L95 105 C95 110, 90 115, 85 115 L25 115 C20 115, 15 110, 15 105 L15 25 C15 20, 20 15, 25 15 Z" />
                 <path fill="#e0e0e0" d="M70 15 L70 35 C70 38, 72 40, 75 40 L95 40 Z" />
                 <rect fill="#cccccc" x="35" y="55" width="50" height="6" rx="3" />
                 <rect fill="#cccccc" x="35" y="70" width="50" height="6" rx="3" />
                 <rect fill="#cccccc" x="35" y="85" width="35" height="6" rx="3" />
               </svg>
             </div>
             <div class="desktop-icon-label" th:text="${singlePage.spec.title}">Page</div>
          </a>
        </th:block>
      </th:block>



    </div>

    <!-- ==================== 极简单主窗 (PJAX 热重载) ==================== -->
    <div class="window-layer fixed inset-x-0 bottom-0 top-[28px] md:top-0 z-10 pointer-events-none p-0 md:p-8 flex items-start md:items-center justify-center"
         x-data
         x-show="$store.windowManager.show"
         @open-window.window="$store.windowManager.open(document.title)"
         @close-window.window="$store.windowManager.hide()"
         style="display: none;">
      
      <!-- Safari 极简交互窗口 (支持桌面端拖拽与缩放) -->
      <div class="macos-window flex flex-col pointer-events-auto shadow-[0_20px_60px_rgba(0,0,0,0.3)] dark:shadow-[0_30px_80px_rgba(0,0,0,0.5)] relative md:absolute w-full h-full md:w-auto md:h-auto md:min-w-[400px] md:min-h-[400px] rounded-none md:rounded-[14px] overflow-hidden bg-white/80 dark:bg-[#1c1c1e]/60 backdrop-blur-3xl md:border border-black/10 dark:border-white/10 origin-center"
           x-data="draggableWindow"
           @mousemove.window="onDragMove"
           @mouseup.window="onDragEnd"
           x-transition:enter="transition ease-out duration-200" 
           x-transition:enter-start="opacity-0 md:scale-95" 
           x-transition:enter-end="opacity-100 md:scale-100" 
           x-transition:leave="transition ease-in duration-150" 
           x-transition:leave-start="opacity-100 md:scale-100" 
           x-transition:leave-end="opacity-0 md:scale-95">
         
        <!-- macOS 拟真统一窗口标题栏 (双端继承 macOS 美学) -->
        <div class="window-titlebar relative w-full z-50 h-[48px] md:h-[52px] shrink-0 flex items-center px-3 md:px-4 bg-[#f4f5f5]/80 dark:bg-[#2c2c2e]/70 backdrop-blur-3xl border-b border-black/10 dark:border-white/5 text-gray-800 dark:text-gray-200 transition-all font-sans" style="-webkit-backdrop-filter: blur(30px) saturate(150%); backdrop-filter: blur(30px) saturate(150%);"
             x-data="{ path: window.location.pathname, host: window.location.host, title: document.title }" 
             @pjax:complete.window="path = window.location.pathname; title = document.title; host = window.location.host"
             @mousedown="onDragStart">
            
            <!-- 统一左侧 (交通灯 + 返回导航) -->
            <div class="flex items-center gap-3 md:gap-4 w-[120px] md:w-[240px]">
                <!-- 交通灯 -->
                <div class="traffic-lights flex items-center gap-2">
                    <button @click="closeWindow()" class="traffic-btn close w-3 h-3 rounded-full bg-[#ED6A5E] border border-[#CE5347] cursor-pointer shadow-sm" title="关闭"></button>
                    <button @click="$store.windowManager.minimize()" class="traffic-btn minimize w-3 h-3 rounded-full bg-[#F4BF4F] border border-[#D6A243] cursor-pointer shadow-sm" title="最小化"></button>
                    <button @click="toggleMaximize()" class="traffic-btn maximize w-3 h-3 rounded-full bg-[#61C554] border border-[#58A942] cursor-pointer shadow-sm" title="最大化"></button>
                </div>

                <!-- Navigation 返回 (双端统一样式) -->
                <div class="flex items-center gap-1">
                    <button @click="window.history.back()" class="w-6 md:w-7 h-6 md:h-7 flex items-center justify-center rounded-md hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-gray-500 dark:text-gray-400" title="返回上一页">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <button @click="window.history.forward()" class="hidden md:flex w-7 h-7 items-center justify-center rounded-md hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-gray-500 dark:text-gray-400" title="前往下一页">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- 统一中心 (纯净标题) -->
            <div class="flex-1 flex justify-center items-center overflow-hidden px-2">
                <div class="truncate font-medium text-[14px] md:text-[13px] tracking-wide text-gray-800 dark:text-gray-200" x-text="title" th:text="${title}"></div>
            </div>

            <!-- 移动端专属右侧 (对称留白) -->
            <div class="flex md:hidden w-[120px]"></div>

            <!-- 桌面端专属右侧: 主题切换 / 分享 -->
            <div class="hidden md:flex items-center justify-end gap-2 w-[240px] pr-2">
                <!-- 主题切换 -->
                <div class="relative flex items-center" th:if="${enableThemeSetting}">
                  <button @click="$store.theme.setMode($store.theme.isDark ? 'light' : 'dark')" class="hover:bg-gray-200/60 dark:hover:bg-gray-700/60 p-1.5 rounded-md transition-colors text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200" title="切换深色/浅色">
                      <svg x-show="!$store.theme.isDark" style="display: none;" class="w-[17px] h-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                      <svg x-show="$store.theme.isDark" style="display: none;" class="w-[17px] h-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  </button>
                </div>

                <!-- 分享 (原生 macOS sheet API 调起) -->
                <button @click="if (navigator.share) { navigator.share({ title: document.title, url: window.location.href }) } else { navigator.clipboard.writeText(window.location.href); alert('链接已复制到剪贴板！') }" class="window-accent-action hover:bg-gray-200/60 dark:hover:bg-gray-700/60 p-1.5 rounded-md transition-colors text-gray-500 dark:text-gray-400" title="分享">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                </button>
            </div>
        </div>

        <!-- 内部正文 (PJAX 容器) -->
        <div class="window-body w-full flex-1 overflow-y-auto relative bg-white/90 dark:bg-black/40 select-text">
            <!-- Pjax 的局部无刷新刷新范围死死框定在这里，外壳永远静止 -->
            <div id="pjax-container" class="w-full min-h-full">
                <!-- SSR 渲染的正文注入 -->
                <th:block th:replace="${ssrContent}" />
            </div>
        </div>
      </div>
    </div>

    <!-- ==================== Dock ==================== -->
    <div class="dock-container" th:attr="data-show-labels=${dockShowLabels},data-magnification=${dockMagnification}" x-data="dock">
      <div class="dock-glass"></div>
      <div class="dock-bar relative z-10" x-ref="dockBar">
        <th:block th:if="${dockMenu != null}">
          <th:block th:each="menuItem : ${dockMenu.menuItems}">
            <th:block th:with="
                iconType = ${#annotations.getOrDefault(menuItem, 'icon_type', 'iconify')},
                iconSvg = ${#annotations.getOrDefault(menuItem, 'icon', '')},
                customSvg = ${#annotations.getOrDefault(menuItem, 'custom_svg', '')},
                imageUrl = ${#annotations.getOrDefault(menuItem, 'image_url', '')},
                bgColor = ${#annotations.getOrDefault(menuItem, 'bg_color', '')}">
              
              <!-- 改为 PJAX <a> 链接 -->
              <a class="dock-icon pjax-link group"
                 th:href="${menuItem.status.href}"
                 th:style="${iconType != 'image' and !#strings.isEmpty(bgColor) ? 'background-color:' + bgColor : ''}"
                 th:title="${menuItem.status.displayName}">

                <!-- Tooltip -->
                <div class="dock-tooltip" x-show="$el.closest('.dock-container').dataset.showLabels === 'true'" th:text="${menuItem.status.displayName}">Name</div>

                <!-- 图片类型 -->
                <th:block th:if="${iconType == 'image' and !#strings.isEmpty(imageUrl)}">
                  <img class="dock-icon-img" th:src="${imageUrl}" th:alt="${menuItem.status.displayName}" draggable="false" />
                </th:block>

                <!-- SVG 类型 -->
                <th:block th:if="${iconType != 'image'}">
                  <th:block th:with="svgContent = ${iconType == 'custom_svg' ? customSvg : iconSvg}">
                    <th:block th:if="${!#strings.isEmpty(svgContent)}">
                      <div class="dock-icon-svg" th:utext="${svgContent}"></div>
                    </th:block>
                  </th:block>
                </th:block>
              </a>
            </th:block>
          </th:block>
        </th:block>

        <!-- 动态缩小应用展示区 (macOS 分割线 + 极简文稿图标) -->
        <template x-if="$store.windowManager.minimized">
           <div style="display: contents;">
              <!-- macOS 竖向分隔线 -->
              <div class="w-[1px] h-[40px] bg-white/20 dark:bg-white/15 rounded-full mx-2 mb-[12px] shrink-0"></div>
              
              <!-- 最小化的应用图标 -->
              <a id="minimized-dock-icon" class="dock-icon group cursor-pointer relative shrink-0" 
                 @click="$store.windowManager.restore()">
               <!-- Hover Label -->
               <div class="dock-tooltip" x-show="$el.closest('.dock-container').dataset.showLabels === 'true'" x-text="$store.windowManager.title"></div>
               <!-- 缩略图图标 (macOS 真实窗口微缩) -->
               <div class="w-[80%] h-[80%] flex justify-center items-center drop-shadow-md">
                 <svg viewBox="0 0 52 40" fill="none" class="w-full h-full object-contain">
                    <!-- Window Shape -->
                    <rect width="52" height="40" rx="4" fill="white" stroke="#000000" stroke-opacity="0.1" stroke-width="0.5"/>
                    <!-- Titlebar Background -->
                    <path d="M0 4 C0 1.79 1.79 0 4 0 L48 0 C50.21 0 52 1.79 52 4 L52 10 L0 10 Z" fill="#eef0f2"/>
                    <rect x="0" y="10" width="52" height="0.5" fill="#000000" fill-opacity="0.1"/>
                    <!-- Traffic Lights -->
                    <circle cx="6" cy="5" r="1.5" fill="#ff5f56" stroke="#e0443e" stroke-width="0.3"/>
                    <circle cx="11" cy="5" r="1.5" fill="#ffbd2e" stroke="#dea123" stroke-width="0.3"/>
                    <circle cx="16" cy="5" r="1.5" fill="#27c93f" stroke="#1aab29" stroke-width="0.3"/>
                 </svg>
               </div>
               <!-- 指示点 -->
               <div class="dock-dot"></div>
             </a>
          </div>
        </template>
      </div>
    </div>
    
    <halo:footer />
  </body>
  </th:block>
</html>
