<!doctype html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  th:fragment="html (title, description, ssrContent, canonical, image, type, seoFallback)"
  th:data-default-theme="${theme.config.header?.theme?.default_mode ?: 'system'}"
>
  <head
    th:with="
      pageDescription = ${!#strings.isEmpty(description) ? description : (!#strings.isEmpty(site.seo?.description) ? site.seo.description : site.subtitle)},
      pageType = ${!#strings.isEmpty(type) ? type : 'website'},
      seoFallbackMode = ${seoFallback != null ? seoFallback.toString() : 'none'},
      shouldEmitMetaFallback = ${seoFallbackMode == 'meta' or seoFallbackMode == 'full'},
      shouldEmitSocialFallback = ${seoFallbackMode == 'full'},
      faviconHref = ${site.favicon != null ? site.favicon.toString() : ''},
      touchIconHref = ${site.logo != null ? site.logo.toString() : ''},
      rawCanonical = ${canonical != null ? canonical.toString() : ''},
      rawImage = ${image != null ? image.toString() : ''},
      siteBaseUrl = ${site.url != null ? site.url.toString() : ''},
      absoluteCanonical = ${!#strings.isEmpty(rawCanonical) ? ((rawCanonical.startsWith('http://') or rawCanonical.startsWith('https://')) ? rawCanonical : (!#strings.isEmpty(siteBaseUrl) ? ((siteBaseUrl.endsWith('/') and rawCanonical.startsWith('/')) ? siteBaseUrl + rawCanonical.substring(1) : ((!siteBaseUrl.endsWith('/')) and (!rawCanonical.startsWith('/')) ? siteBaseUrl + '/' + rawCanonical : siteBaseUrl + rawCanonical)) : rawCanonical)) : ''},
      absoluteImage = ${!#strings.isEmpty(rawImage) ? ((rawImage.startsWith('http://') or rawImage.startsWith('https://')) ? rawImage : (!#strings.isEmpty(siteBaseUrl) ? ((siteBaseUrl.endsWith('/') and rawImage.startsWith('/')) ? siteBaseUrl + rawImage.substring(1) : ((!siteBaseUrl.endsWith('/')) and (!rawImage.startsWith('/')) ? siteBaseUrl + '/' + rawImage : siteBaseUrl + rawImage)) : rawImage)) : ''},
      themeFallbackIcon = ${#theme.assets('/favicon.svg')}">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title th:text="${title}"></title>
    <meta name="description"
          th:if="${shouldEmitMetaFallback and !#strings.isEmpty(pageDescription)}"
          th:content="${pageDescription}" />
    <link rel="canonical"
          th:if="${!#strings.isEmpty(absoluteCanonical)}"
          th:href="${absoluteCanonical}" />
    <meta property="og:url"
          th:if="${!#strings.isEmpty(absoluteCanonical)}"
          th:content="${absoluteCanonical}" />
    <meta property="og:site_name"
          th:if="${!#strings.isEmpty(site.title)}"
          th:content="${site.title}" />

    <meta property="og:description"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(pageDescription)}"
          th:content="${pageDescription}" />
    <meta property="og:image"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(absoluteImage)}"
          th:content="${absoluteImage}" />

    <meta name="twitter:description"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(pageDescription)}"
          th:content="${pageDescription}" />
    <meta name="twitter:image"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(absoluteImage)}"
          th:content="${absoluteImage}" />

    <link rel="icon" type="image/svg+xml" th:if="${#strings.isEmpty(faviconHref)}" th:href="${themeFallbackIcon}" />
    <link rel="shortcut icon" th:if="${#strings.isEmpty(faviconHref)}" th:href="${themeFallbackIcon}" />
    <link rel="apple-touch-icon" th:if="${#strings.isEmpty(faviconHref) and !#strings.isEmpty(touchIconHref)}" th:href="${touchIconHref}" />
    <link rel="apple-touch-icon" th:if="${#strings.isEmpty(faviconHref) and #strings.isEmpty(touchIconHref)}" th:href="${themeFallbackIcon}" />

    <!-- 阻止暗黑模式闪烁的内联脚本 -->
    <script>
      (function() {
        var root = document.documentElement;
        var defaultTheme = root.getAttribute('data-default-theme') || 'system';
        var savedTheme = localStorage.getItem('theme');
        var theme = savedTheme || defaultTheme;
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

        root.classList.remove('dark', 'light', 'system', 'color-scheme-auto', 'color-scheme-dark', 'color-scheme-light');
        root.classList.add(theme === 'system' ? 'color-scheme-auto' : 'color-scheme-' + theme);
        root.classList.add(theme);
        root.setAttribute('data-color-scheme', theme);
        root.style.colorScheme = isDark ? 'dark' : 'light';

        if (isDark) {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
      })();
    </script>

    <!-- 本地打包产物 (开发阶段加入时间戳废除缓存) -->
    <link rel="stylesheet" th:href="@{/assets/main.css(t=${#dates.createNow().getTime()})}" />
    <script defer th:src="@{/assets/main.js(t=${#dates.createNow().getTime()})}"></script>
  </head>

  <!-- 读取后台配置 -->
  <th:block th:with="
      bgConf = ${theme.config.desktop?.background},
      iconConf = ${theme.config.desktop?.icons},
      bgMode = ${bgConf?.mode ?: 'preset'},
      bgPreset = ${bgConf?.preset ?: 'tahoe-dawn'},
      enableThemeSetting = ${theme.config.header?.theme?.enable_frontend_setting != null ? theme.config.header?.theme?.enable_frontend_setting : true},
      headerLogoIcon = ${theme.config.header?.logo?.icon?.value ?: ''},
      headerAppName = ${!#strings.isEmpty(theme.config.header?.logo?.title) ? theme.config.header?.logo?.title : (site.title ?: '')},
      desktopCustomIcons = ${theme.config.desktop?.icons?.custom_icons ?: {}},
      desktopCategories = ${theme.config.desktop?.icons?.categories ?: {}},
      desktopTags = ${theme.config.desktop?.icons?.tags ?: {}},
      desktopPosts = ${theme.config.desktop?.icons?.posts ?: {}},
      desktopSinglePages = ${theme.config.desktop?.icons?.single_pages ?: {}},
      rawMenuName = ${theme.config.dock?.source?.menu_name ?: 'primary'},
      dockShowLabels = ${theme.config.dock?.appearance?.show_labels != null ? theme.config.dock?.appearance?.show_labels : true},
      dockMagnification = ${theme.config.dock?.appearance?.magnification != null ? theme.config.dock?.appearance?.magnification : true},
      headerMenuName = ${theme.config.header?.source?.menu_name ?: 'primary'},
      headerMenu = ${!#strings.isEmpty(headerMenuName) ? menuFinder.getByName(headerMenuName) : menuFinder.getByName('primary')},
      dockMenu = ${!#strings.isEmpty(rawMenuName) ? menuFinder.getByName(rawMenuName) : menuFinder.getByName('primary')},
      desktopAppearance = ${theme.config.desktop?.appearance},
      legacyCustomScheme = ${(desktopAppearance?.mode == null) and (desktopAppearance?.accent_color != null or desktopAppearance?.selection_color != null or desktopAppearance?.folder_color1 != null or desktopAppearance?.folder_color2 != null or desktopAppearance?.folder_color3 != null or desktopAppearance?.glass_light_color != null or desktopAppearance?.glass_dark_color != null)},
      schemeMode = ${desktopAppearance?.mode ?: (legacyCustomScheme ? 'custom' : 'preset')},
      schemePreset = ${desktopAppearance?.preset ?: 'blue'},
      macAccent = ${desktopAppearance?.accent_color ?: '#2E5FBD'},
      macSelection = ${desktopAppearance?.selection_color ?: '#244D9B'},
      macFolder1 = ${desktopAppearance?.folder_color1 ?: '#4A90E2'},
      macFolder2 = ${desktopAppearance?.folder_color2 ?: '#64B5F6'},
      macFolder3 = ${desktopAppearance?.folder_color3 ?: '#90CAF9'},
      macShellLight = ${desktopAppearance?.glass_light_color ?: '#FFFFFF'},
      macShellDark = ${desktopAppearance?.glass_dark_color ?: '#141414'},
      headerDropdownLightBg = ${theme.config.header?.dropdown?.light_bg ?: 'rgba(53, 53, 56, 0.82)'},
      headerDropdownDarkBg = ${theme.config.header?.dropdown?.dark_bg ?: 'rgba(40, 40, 42, 0.9)'},
      bgImageUrl = ${bgConf?.image_url ?: bgConf?.image},
      wallpaperClass = ${bgMode == 'preset' ? 'wallpaper-' + bgPreset : ''},
      schemeClass = ${schemeMode == 'preset' ? 'scheme-' + schemePreset : 'scheme-custom'},
      isErrorPage = ${error != null},
      pageCanonical = ${canonical != null ? canonical.toString() : ''},
      widgetsConf = ${theme.config.widgets},
      desktopLayoutJson = ${theme.config.default_layout?.layout_json ?: ''},
      desktopThemeName = ${theme.metadata.name ?: 'theme-sky-blog-3'},
      widgetsBehavior = ${widgetsConf?.behavior},
      widgetsModules = ${widgetsConf?.modules},

      widgetsEnabled = ${widgetsBehavior?.enabled != null ? widgetsBehavior.enabled : true},
      widgetsEditEnabled = ${widgetsBehavior?.edit_enabled != null ? widgetsBehavior.edit_enabled : true},
      widgetsLayoutVersion = ${widgetsBehavior?.layout_version ?: 'v1'},
      widgetsColumns = ${widgetsBehavior?.grid_columns != null ? widgetsBehavior.grid_columns : 12},
      widgetsGap = ${widgetsBehavior?.gap != null ? widgetsBehavior.gap : 18},

      widgetsWeatherCityName = ${widgetsModules?.weather?.city_name ?: '北京'},
      widgetsWeatherRefreshMinutes = ${widgetsModules?.weather?.refresh_minutes != null ? widgetsModules.weather.refresh_minutes : 30},
      widgetsFallbackCover = ${widgetsBehavior?.fallback_cover ?: ''},
      widgetsLatestPosts = ${widgetsEnabled ? postFinder.list({
        page: 1,
        size: 8,
        sort: {'spec.publishTime,desc'}
      }) : null},
      widgetsPopularPosts = ${widgetsEnabled ? postFinder.list({
        page: 1,
        size: 8,
        sort: {'stats.visit,desc'}
      }) : null},
      widgetsCategoryTree = ${widgetsEnabled ? categoryFinder.listAsTree() : {}},
      widgetsSiteStats = ${widgetsEnabled ? siteStatsFinder.getStats() : null},
      widgetsAllTags = ${widgetsEnabled ? tagFinder.listAll() : {}},
      widgetsMomentsAvailable = ${widgetsEnabled and pluginFinder.available('PluginMoments')},
      widgetsRecentMoments = ${widgetsMomentsAvailable ? momentFinder.list({
        page: 1,
        size: 8,
        sort: {'spec.releaseTime,desc'}
      }) : null},
      widgetsSiteTitle = ${site.title ?: ''},
      widgetsSiteSubtitle = ${site.subtitle ?: ''},
      widgetsSiteLogo = ${site.logo},
      isDesktopHome = ${site.url != null and pageCanonical == site.url.toString()}">

  <body
    class="overflow-hidden m-0 p-0 text-white w-screen h-screen relative"
    th:classappend="${#strings.isEmpty(wallpaperClass) ? schemeClass : wallpaperClass + ' ' + schemeClass}"
    th:attr="data-error-page=${isErrorPage}"
    th:style="${(schemeMode == 'custom' ? '--mac-accent:' + macAccent + ';--mac-selection:' + macSelection + ';--mac-folder1:' + macFolder1 + ';--mac-folder2:' + macFolder2 + ';--mac-folder3:' + macFolder3 + ';--mac-shell-light:' + macShellLight + ';--mac-shell-dark:' + macShellDark + ';' : '') + '--mac-header-dropdown-light-bg:' + headerDropdownLightBg + ';--mac-header-dropdown-dark-bg:' + headerDropdownDarkBg + ';'}"
    th:styleappend="${bgMode == 'image' and bgImageUrl != null ? 'background:url(' + bgImageUrl + ') center/cover no-repeat; background-color:#0f172a;' : (bgMode == 'solid' ? 'background-color:' + (bgConf?.solid_color ?: '#0f172a') + ';' : '')}"
  >

    <!-- ==================== MenuBar ==================== -->
    <div class="menubar relative z-50 flex items-center justify-between px-3 h-7 antialiased transition-colors" x-data="menuBar" th:data-site-title="${headerAppName}">
      
      <!-- 左侧：系统菜单与主导航 -->
      <div class="flex items-center text-[13.5px] font-medium tracking-tight text-white drop-shadow-md">
        <!-- Apple Logo / 自定义 Logo -->
        <a href="javascript:void(0)" class="menubar-icon-btn mx-0.5 text-base justify-center gap-1" title="System">
          <th:block th:if="${#strings.isEmpty(headerLogoIcon)}">
            &#63743;
          </th:block>
          <th:block th:unless="${#strings.isEmpty(headerLogoIcon)}">
            <span class="flex items-center justify-center w-[1.2em] h-[1.2em]" th:utext="${headerLogoIcon}"></span>
          </th:block>
        </a>
        
        <!-- 动态当前应用名 -->
        <span th:if="${!#strings.isEmpty(headerAppName)}" class="menubar-app-name px-2 h-[22px] flex items-center cursor-default" x-text="appName" th:text="${headerAppName}"></span>

        <!-- 动态渲染 Halo 后台菜单 (含二级下拉) -->
        <th:block th:if="${headerMenu != null}">
          <div th:each="menuItem : ${headerMenu.menuItems}" class="relative group" x-data="{ open: false }" @mouseenter="open = true" @mouseleave="open = false" @click.away="open = false">
            <a th:href="${#lists.isEmpty(menuItem.children) ? menuItem.status.href : 'javascript:void(0)'}" 
               th:target="${menuItem.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
               class="menubar-item hidden sm:inline-flex items-center mx-0.5 transition-none"
               :class="{ 'is-open': open }"
               th:classappend="${#lists.isEmpty(menuItem.children) ? 'pjax-link' : ''}"
               th:text="${menuItem.status.displayName}">
            </a>
            
            <!-- macOS Panel 风格下拉菜单 -->
            <div th:if="${!#lists.isEmpty(menuItem.children)}"
                 x-show="open"
                 x-transition:enter="transition ease-out duration-75"
                 x-transition:enter-start="opacity-0 -translate-y-0.5"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-60"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 -translate-y-0.5"
                 style="display: none;"
                 class="menubar-dropdown absolute top-[100%] left-[-6px] mt-[3px] min-w-[220px] p-[5px] rounded-[11px] origin-top-left flex flex-col z-[100] drop-shadow-none">
                 
                 <th:block th:each="child : ${menuItem.children}"
                           th:with="
                             childIconType = ${#annotations.getOrDefault(child, 'icon_type', 'iconify')},
                             childIconSvg = ${#annotations.getOrDefault(child, 'icon', '')},
                             childCustomSvg = ${#annotations.getOrDefault(child, 'custom_svg', '')},
                             childImageUrl = ${#annotations.getOrDefault(child, 'image_url', '')},
                             childSeparatorBefore = ${#annotations.getOrDefault(child, 'header_separator_before', 'false')},
                             childSvgContent = ${childIconType == 'custom_svg' ? childCustomSvg : childIconSvg}">
                   <div th:if="${childSeparatorBefore == 'true' or childSeparatorBefore == true}" class="menubar-dropdown-separator"></div>
                   <a th:href="${child.status.href}"
                      th:target="${child.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
                      class="menubar-dropdown-item text-[13px] tracking-tight font-medium transition-none rounded-[6px]"
                      th:classappend="${child.spec.target?.name() == 'BLANK' ? '' : 'pjax-link'}">
                      <span class="menubar-dropdown-leading">
                        <img th:if="${childIconType == 'image' and !#strings.isEmpty(childImageUrl)}"
                             class="menubar-dropdown-icon-image"
                             th:src="${childImageUrl}"
                             th:alt="${child.status.displayName}"
                             draggable="false" />
                        <span th:if="${childIconType != 'image' and !#strings.isEmpty(childSvgContent)}"
                              class="menubar-dropdown-icon-svg"
                              th:utext="${childSvgContent}"></span>
                      </span>
                      <span class="menubar-dropdown-label" th:text="${child.status.displayName}"></span>
                      <span class="menubar-dropdown-trailing">
                        <svg th:if="${child.spec.target?.name() == 'BLANK'}" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                          <path d="M4 2.5H9.5V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                          <path d="M8.8 3.2 2.6 9.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                      </span>
                   </a>
                 </th:block>
            </div>
          </div>
        </th:block>
      </div>

      <!-- 右侧：控件与时间 -->
      <div class="flex items-center gap-[6px] font-medium text-[13px] text-white drop-shadow-md">
        <!-- Spotlight 全局搜索 (纯净原生极简图标) -->
        <button type="button" th:if="${pluginFinder.available('PluginSearchWidget')}" @click="openSearch()" class="menubar-icon-btn relative" title="聚焦搜索 (Cmd+K)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>

        <!-- 主题切换 (极致原生精简缩放) -->
        <button @click="$store.theme.setMode($store.theme.isDark ? 'light' : 'dark')" class="menubar-icon-btn relative" th:if="${enableThemeSetting}" title="切换外观">
            <svg x-show="!$store.theme.isDark" class="w-[14px] h-[14px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg x-show="$store.theme.isDark" style="display: none;" class="w-[14px] h-[14px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        
        <!-- 时钟 -->
        <div class="px-3 py-0.5 cursor-default truncate min-w-[120px] text-right" x-text="timeStr"></div>
      </div>
    </div>

    <script th:inline="javascript">
      (() => {
        const baseColumns = Math.max(Number([[${widgetsColumns}]]) || 12, 12);
        const rawIcons = [
          /*[# th:each="icon : ${desktopCustomIcons}"]*/
          {
            key: [[${'icon-custom-' + icon.name}]],
            title: [[${icon.name}]],
            href: [[${icon.href}]],
            pjax: [[${!icon.external}]],
            external: [[${icon.external}]],
            subtype: [[${icon.type}]],
            dataId: [[${icon.name}]]
          },
          /*[/]*/
          /*[# th:each="catName : ${desktopCategories}"]*/
          {
            key: [[${'icon-category-' + catName}]],
            title: [[${categoryFinder.getByName(catName) != null ? categoryFinder.getByName(catName).spec.displayName : catName}]],
            href: [[${categoryFinder.getByName(catName) != null ? categoryFinder.getByName(catName).status.permalink : '#'}]],
            pjax: true,
            external: false,
            subtype: 'folder',
            dataId: [[${catName}]]
          },
          /*[/]*/
          /*[# th:each="tagName : ${desktopTags}"]*/
          {
            key: [[${'icon-tag-' + tagName}]],
            title: [[${tagFinder.getByName(tagName) != null ? tagFinder.getByName(tagName).spec.displayName : tagName}]],
            href: [[${tagFinder.getByName(tagName) != null ? tagFinder.getByName(tagName).status.permalink : '#'}]],
            pjax: true,
            external: false,
            subtype: 'folder',
            dataId: [[${tagName}]]
          },
          /*[/]*/
          /*[# th:each="postName : ${desktopPosts}"]*/
          {
            key: [[${'icon-post-' + postName}]],
            title: [[${postFinder.getByName(postName) != null ? postFinder.getByName(postName).spec.title : postName}]],
            href: [[${postFinder.getByName(postName) != null ? postFinder.getByName(postName).status.permalink : '#'}]],
            pjax: true,
            external: false,
            subtype: 'document',
            dataId: [[${postName}]]
          },
          /*[/]*/
          /*[# th:each="pageName : ${desktopSinglePages}"]*/
          {
            key: [[${'icon-page-' + pageName}]],
            title: [[${singlePageFinder.getByName(pageName) != null ? singlePageFinder.getByName(pageName).spec.title : pageName}]],
            href: [[${singlePageFinder.getByName(pageName) != null ? singlePageFinder.getByName(pageName).status.permalink : '#'}]],
            pjax: true,
            external: false,
            subtype: 'document',
            dataId: [[${pageName}]]
          },
          /*[/]*/
        ];

        window.__THEME_DESKTOP_PROTOCOL__ = Object.assign(window.__THEME_DESKTOP_PROTOCOL__ || {}, {
          baseColumns,
          icons: rawIcons
        });
        window.__THEME_DESKTOP_ICONS__ = window.__THEME_DESKTOP_PROTOCOL__.icons;
      })();
    </script>

    <div class="desktop-surface"
         data-desktop-shell-version="20260328-2"
         x-data="desktopWidgets"
         x-ref="surface"
         @click.window="handleDesktopSurfaceOutsideClick($event)"
         @contextmenu.prevent="handleDesktopSurfaceContextMenu($event)"
         @keydown.window="handleDesktopKeydown($event)">

    <th:block th:replace="~{modules/desktop-widgets :: layer(
      enabled=${widgetsEnabled},
      isHome=${isDesktopHome},
      editEnabled=${widgetsEditEnabled},
      columns=${widgetsColumns},
      gap=${widgetsGap},
      layoutVersion=${widgetsLayoutVersion},
      serverLayoutJson=${desktopLayoutJson},
      themeName=${desktopThemeName},
      themeJsonConfigEndpoint=@{/apis/api.console.halo.run/v1alpha1/themes/{name}/json-config(name=${desktopThemeName})},

      weatherCityName=${widgetsWeatherCityName},
      weatherRefreshMinutes=${widgetsWeatherRefreshMinutes},
      latestPosts=${widgetsLatestPosts != null ? widgetsLatestPosts.items : {}},
      popularPosts=${widgetsPopularPosts != null ? widgetsPopularPosts.items : {}},
      categoryTree=${widgetsCategoryTree},
      siteStats=${widgetsSiteStats},
      randomTags=${widgetsAllTags},
      momentsAvailable=${widgetsMomentsAvailable},
      recentMoments=${widgetsRecentMoments != null ? widgetsRecentMoments.items : {}},
      siteUrl=${site.url != null ? site.url.toString() : ''},
      siteTitle=${widgetsSiteTitle},
      siteSubtitle=${widgetsSiteSubtitle},
      siteLogo=${widgetsSiteLogo},
      archivesUrl=${site.routes != null and site.routes.archivesUri != null ? site.routes.archivesUri : '/archives'},
      fallbackCover=${widgetsFallbackCover}
    )}"></th:block>
    </div>

    <!-- ==================== 极简单主窗 (PJAX 热重载) ==================== -->
    <div class="window-layer fixed inset-x-0 bottom-0 top-[28px] md:top-0 z-10 pointer-events-none p-0 md:p-8 flex items-start md:items-center justify-center"
         th:if="${!isErrorPage}"
         x-data
         x-show="$store.windowManager.show"
         @open-window.window="$store.windowManager.open(document.title)"
         @close-window.window="$store.windowManager.hide()"
         style="display: none;">
      
      <!-- Safari 极简交互窗口 (支持桌面端拖拽与缩放) -->
      <div class="macos-window flex flex-col pointer-events-auto relative md:absolute w-full h-full md:w-auto md:h-auto md:min-w-[400px] md:min-h-[400px] rounded-none md:rounded-[14px] overflow-hidden origin-center"
           x-data="draggableWindow"
           :class="{ 'window-resizable': isDesktop && !isMaximized }"
           @mousemove.window="onPointerMove"
           @mouseup.window="onPointerEnd"
           x-transition:enter="transition ease-out duration-200" 
           x-transition:enter-start="opacity-0 md:scale-95" 
           x-transition:enter-end="opacity-100 md:scale-100" 
           x-transition:leave="transition ease-in duration-150" 
           x-transition:leave-start="opacity-100 md:scale-100" 
           x-transition:leave-end="opacity-0 md:scale-95">
          <div class="window-resize-handle window-resize-handle--n" @mousedown.stop.prevent="startResize('n', $event)"></div>
          <div class="window-resize-handle window-resize-handle--s" @mousedown.stop.prevent="startResize('s', $event)"></div>
          <div class="window-resize-handle window-resize-handle--e" @mousedown.stop.prevent="startResize('e', $event)"></div>
          <div class="window-resize-handle window-resize-handle--w" @mousedown.stop.prevent="startResize('w', $event)"></div>
          <div class="window-resize-handle window-resize-handle--ne" @mousedown.stop.prevent="startResize('ne', $event)"></div>
          <div class="window-resize-handle window-resize-handle--nw" @mousedown.stop.prevent="startResize('nw', $event)"></div>
          <div class="window-resize-handle window-resize-handle--se" @mousedown.stop.prevent="startResize('se', $event)"></div>
          <div class="window-resize-handle window-resize-handle--sw" @mousedown.stop.prevent="startResize('sw', $event)"></div>
         
        <!-- macOS 拟真统一窗口标题栏 (双端继承 macOS 美学) -->
        <div class="window-titlebar relative w-full z-50 h-[48px] md:h-[52px] shrink-0 flex items-center px-3 md:px-4 border-b font-sans" style="-webkit-backdrop-filter: blur(30px) saturate(150%); backdrop-filter: blur(30px) saturate(150%);"
             x-data="windowTitlebar"
             @pjax:complete.window="closeSharePanel(); sync()"
             @mousedown="onDragStart">
            
            <!-- 统一左侧 (交通灯 + 返回导航) -->
            <div class="flex items-center gap-3 md:gap-4 w-[120px] md:w-[240px]">
                <!-- 交通灯 -->
                <div class="traffic-lights flex items-center gap-2">
                    <button @click="closeWindow()" class="traffic-btn close" title="关闭">
                        <svg viewBox="0 0 14 14" fill="none"><path d="M4 4l6 6m0-6l-6 6" stroke-width="1.6" stroke-linecap="round"/></svg>
                    </button>
                    <button @click="$store.windowManager.minimize()" class="traffic-btn minimize" title="最小化">
                        <svg viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                    <button @click="toggleMaximize()" class="traffic-btn maximize" title="最大化">
                        <svg viewBox="0 0 14 14" fill="none"><path d="M8.5 4h-3a1 1 0 00-1 1v3h1.5V5.5H8.5V4zM5.5 10h3a1 1 0 001-1V6H8v2.5H5.5V10z" fill="currentColor"/></svg>
                    </button>
                </div>

                <!-- Navigation 返回 (双端统一样式) -->
                <div class="flex items-center gap-1">
                    <button @click="window.history.back()" class="window-nav-btn w-6 md:w-7 h-6 md:h-7 flex items-center justify-center rounded-md" title="返回上一页">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <button @click="window.history.forward()" class="window-nav-btn hidden md:flex w-7 h-7 items-center justify-center rounded-md" title="前往下一页">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- 统一中心 (纯净标题) -->
            <div class="flex-1 flex justify-center items-center overflow-hidden px-2">
                <div class="window-title-text truncate font-medium text-[14px] md:text-[13px] tracking-wide" x-text="title" th:text="${title}"></div>
            </div>

            <div class="flex items-center justify-end gap-2 w-[120px] md:w-[240px] pr-0 md:pr-2">
                <span class="window-toolbar-feedback"
                      x-show="shareFeedback"
                      x-text="shareFeedback"
                      style="display: none;"></span>
                <!-- 主题切换 -->
                <div class="relative hidden md:flex items-center" th:if="${enableThemeSetting}">
                  <button @click="$store.theme.setMode($store.theme.isDark ? 'light' : 'dark')" class="window-toolbar-btn p-1.5 rounded-md" title="切换深色/浅色">
                      <svg x-show="!$store.theme.isDark" style="display: none;" class="w-[17px] h-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                      <svg x-show="$store.theme.isDark" style="display: none;" class="w-[17px] h-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  </button>
                </div>

                <div class="window-share relative flex items-center">
                  <button @click.stop="toggleSharePanel()" class="window-toolbar-btn window-accent-action p-1.5 rounded-md" title="分享">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                  </button>

                  <div class="share-panel"
                       x-show="shareOpen"
                       x-transition:enter="transition ease-out duration-180"
                       x-transition:enter-start="opacity-0 translate-y-1 scale-[0.98]"
                       x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                       x-transition:leave="transition ease-in duration-120"
                       x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                       x-transition:leave-end="opacity-0 translate-y-1 scale-[0.98]"
                       @click.outside="closeSharePanel()"
                       @keydown.escape.window="closeSharePanel()"
                       style="display: none;">
                    <div class="share-panel-preview">
                      <div class="share-panel-host" x-text="shareMeta.host || '分享链接'"></div>
                      <div class="share-panel-title" x-text="shareMeta.title || title"></div>
                      <div class="share-panel-description"
                           x-show="shareMeta.description"
                           x-text="shareMeta.description"
                           style="display: none;"></div>
                    </div>

                    <div class="share-panel-actions" x-show="shareView === 'actions'">
                      <button class="share-panel-action share-panel-action--primary" @click="copyLink()">
                        <span class="share-panel-action-label">复制链接</span>
                        <span class="share-panel-action-meta">发送正式地址</span>
                      </button>
                      <button class="share-panel-action" @click="openWeChatShare()">
                        <span class="share-panel-action-label">微信</span>
                        <span class="share-panel-action-meta">复制链接或扫码发送</span>
                      </button>
                      <button class="share-panel-action" @click="shareToQQ()">
                        <span class="share-panel-action-label">QQ</span>
                        <span class="share-panel-action-meta">复制链接后手动发送</span>
                      </button>
                      <button class="share-panel-action" @click="shareToTelegram()">
                        <span class="share-panel-action-label">Telegram</span>
                        <span class="share-panel-action-meta">发送链接预览</span>
                      </button>
                      <button class="share-panel-action" @click="shareToX()">
                        <span class="share-panel-action-label">X</span>
                        <span class="share-panel-action-meta">使用标题和链接</span>
                      </button>
                      <button class="share-panel-action" @click="shareToEmail()">
                        <span class="share-panel-action-label">邮件</span>
                        <span class="share-panel-action-meta">附带标题与摘要</span>
                      </button>
                      <button class="share-panel-action"
                              @click="shareCurrent()"
                              x-show="typeof navigator !== 'undefined' && !!navigator.share"
                              style="display: none;">
                        <span class="share-panel-action-label">更多方式</span>
                        <span class="share-panel-action-meta">调用系统分享</span>
                      </button>
                    </div>

                    <div class="share-panel-wechat" x-show="shareView === 'wechat'" style="display: none;">
                      <button class="share-panel-back" @click="backToShareActions()">返回分享列表</button>
                      <div class="share-panel-qr-shell">
                        <div class="share-panel-qr"
                             x-show="!wechatQrLoading && !wechatQrError && wechatQrDataUrl"
                             style="display: none;">
                          <img :src="wechatQrDataUrl" alt="微信分享二维码" class="share-panel-qr-image">
                        </div>
                        <div class="share-panel-qr-placeholder"
                             x-show="wechatQrLoading"
                             style="display: none;">正在生成二维码…</div>
                        <div class="share-panel-qr-placeholder"
                             x-show="wechatQrError"
                             x-text="wechatQrError"
                             style="display: none;"></div>
                        <div class="share-panel-qr-caption">微信里打开“扫一扫”，或直接复制链接发送。</div>
                      </div>
                      <button class="share-panel-action share-panel-action--primary share-panel-action--full" @click="copyLink('已复制链接，可发送到微信')">
                        <span class="share-panel-action-label">复制链接</span>
                        <span class="share-panel-action-meta">在微信里粘贴发送</span>
                      </button>
                      <button class="share-panel-action share-panel-action--full" @click="saveWeChatQr()">
                        <span class="share-panel-action-label">保存二维码</span>
                        <span class="share-panel-action-meta">保存到本地后再发送</span>
                      </button>
                    </div>
                  </div>
                </div>
            </div>
        </div>

        <!-- 内部正文 (PJAX 容器) -->
        <div class="window-body w-full flex-1 overflow-y-auto relative select-text">
            <!-- Pjax 的局部无刷新刷新范围死死框定在这里，外壳永远静止 -->
            <div id="pjax-container" class="w-full min-h-full">
                <!-- SSR 渲染的正文注入 -->
                <th:block th:replace="${ssrContent}" />
            </div>
        </div>
      </div>
    </div>

    <div class="error-desktop-layer" th:if="${isErrorPage}">
      <div class="error-desktop-container">
        <th:block th:replace="${ssrContent}" />
      </div>
    </div>

    <!-- ==================== Dock ==================== -->
    <div class="dock-container" th:attr="data-show-labels=${dockShowLabels},data-magnification=${dockMagnification}" x-data="dock">
      <div class="dock-glass"></div>
      <div class="dock-bar relative z-10" x-ref="dockBar">
        <th:block th:if="${dockMenu != null}">
          <th:block th:each="menuItem : ${dockMenu.menuItems}">
            <th:block th:with="
                iconType = ${#annotations.getOrDefault(menuItem, 'icon_type', 'iconify')},
                iconSvg = ${#annotations.getOrDefault(menuItem, 'icon', '')},
                customSvg = ${#annotations.getOrDefault(menuItem, 'custom_svg', '')},
                imageUrl = ${#annotations.getOrDefault(menuItem, 'image_url', '')},
                bgColor = ${#annotations.getOrDefault(menuItem, 'bg_color', '')}">
              
              <!-- 改为 PJAX <a> 链接 -->
              <a class="dock-icon pjax-link group"
                 th:href="${menuItem.status.href}"
                 th:style="${iconType != 'image' and !#strings.isEmpty(bgColor) ? 'background-color:' + bgColor : ''}"
                 th:title="${menuItem.status.displayName}">

                <!-- Tooltip -->
                <div class="dock-tooltip" x-show="$el.closest('.dock-container').dataset.showLabels === 'true'" th:text="${menuItem.status.displayName}">Name</div>

                <!-- 图片类型 -->
                <th:block th:if="${iconType == 'image' and !#strings.isEmpty(imageUrl)}">
                  <img class="dock-icon-img" th:src="${imageUrl}" th:alt="${menuItem.status.displayName}" draggable="false" />
                </th:block>

                <!-- SVG 类型 -->
                <th:block th:if="${iconType != 'image'}">
                  <th:block th:with="svgContent = ${iconType == 'custom_svg' ? customSvg : iconSvg}">
                    <th:block th:if="${!#strings.isEmpty(svgContent)}">
                      <div class="dock-icon-svg" th:utext="${svgContent}"></div>
                    </th:block>
                  </th:block>
                </th:block>
              </a>
            </th:block>
          </th:block>
        </th:block>

        <!-- 动态缩小应用展示区 (macOS 分割线 + 极简文稿图标) -->
        <template x-if="$store.windowManager.minimized">
           <div style="display: contents;">
              <!-- macOS 竖向分隔线 -->
              <div class="w-[1px] h-[40px] bg-white/20 dark:bg-white/15 rounded-full mx-2 mb-[12px] shrink-0"></div>
              
              <!-- 最小化的应用图标 -->
              <button id="minimized-dock-icon" type="button" class="dock-icon group cursor-pointer relative shrink-0" 
                 @click.stop="$store.windowManager.restore()">
               <!-- Hover Label -->
               <div class="dock-tooltip" x-show="$el.closest('.dock-container').dataset.showLabels === 'true'" x-text="$store.windowManager.title"></div>
               <!-- 缩略图图标 (macOS 真实窗口微缩) -->
               <div class="w-[80%] h-[80%] flex justify-center items-center drop-shadow-md">
                 <svg viewBox="0 0 52 40" fill="none" class="w-full h-full object-contain">
                    <!-- Window Shape -->
                    <rect width="52" height="40" rx="4" fill="white" stroke="#000000" stroke-opacity="0.1" stroke-width="0.5"/>
                    <!-- Titlebar Background -->
                    <path d="M0 4 C0 1.79 1.79 0 4 0 L48 0 C50.21 0 52 1.79 52 4 L52 10 L0 10 Z" fill="#eef0f2"/>
                    <rect x="0" y="10" width="52" height="0.5" fill="#000000" fill-opacity="0.1"/>
                    <!-- Traffic Lights -->
                    <circle cx="6" cy="5" r="1.5" fill="#ff5f56" stroke="#e0443e" stroke-width="0.3"/>
                    <circle cx="11" cy="5" r="1.5" fill="#ffbd2e" stroke="#dea123" stroke-width="0.3"/>
                    <circle cx="16" cy="5" r="1.5" fill="#27c93f" stroke="#1aab29" stroke-width="0.3"/>
                 </svg>
               </div>
               <!-- 指示点 -->
               <div class="dock-dot"></div>
             </button>
          </div>
        </template>
      </div>
    </div>
    
    <halo:footer />
  </body>
  </th:block>
</html>
