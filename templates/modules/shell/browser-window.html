<th:block th:fragment="frame (titleText, contentFragment, resizable, maximizable, metricsKey)">
  <th:block th:replace="~{modules/shell/window-frame :: shell(
      variant='browser',
      metricsKey=${metricsKey},
      resizable=${resizable},
      maximizable=${maximizable},
      widthAttr='',
      extraClasses='md:min-w-[400px] md:min-h-[400px]',
      inlineStyle='',
      bodyFragment=~{::frameBody(titleText=${titleText}, contentFragment=${contentFragment}, resizable=${resizable}, maximizable=${maximizable})}
    )}"></th:block>
</th:block>

<th:block th:fragment="frameBody (titleText, contentFragment, resizable, maximizable)">
        <th:block th:replace="~{modules/shell/window-frame :: resizeHandles(mode='full', enabled=${resizable == true or resizable == 'true'})}"></th:block>

        <!-- macOS 拟真统一窗口标题栏 (双端继承 macOS 美学) -->
        <th:block th:replace="~{modules/shell/window-titlebar :: shell(
            extraClasses='border-b',
            inlineStyle='-webkit-backdrop-filter: blur(30px) saturate(150%); backdrop-filter: blur(30px) saturate(150%);',
            contentFragment=~{::titlebarContent(titleText=${titleText}, maximizable=${maximizable})}
          )}"></th:block>
            
        <div class="post-outline-mobile-backdrop" data-post-outline-mobile-backdrop hidden></div>
        <div class="post-outline-mobile-sheet" data-post-outline-mobile-sheet hidden>
            <button type="button"
                    class="post-outline-mobile-sheet-handle"
                    data-post-outline-mobile-handle
                    aria-label="拖动关闭目录"></button>
            <div class="post-outline-mobile-header">
                <div class="post-outline-mobile-title">目录</div>
            </div>
            <nav class="post-outline-mobile-list" data-post-outline-mobile-list></nav>
        </div>

        <div class="window-body w-full flex-1 overflow-y-auto relative select-text" data-window-scroll data-window-content-root>
            <th:block th:replace="~{modules/shell/window-frame :: loadingOverlay(contentFragment=~{::loadingSkeleton})}"></th:block>
            <div id="pjax-container" data-window-content-variant="browser" class="w-full min-h-full">
                <th:block th:replace="${contentFragment}" />
            </div>
        </div>
</th:block>

<th:block th:fragment="titlebarContent (titleText, maximizable)">
            <div class="window-titlebar-leading flex items-center gap-3 md:gap-4 w-[120px] md:w-[240px]">
              <th:block th:replace="~{modules/shell/window-titlebar-leading :: browserHistory(maximizable=${maximizable})}"></th:block>
            </div>
            <div class="window-titlebar-center flex-1 flex justify-center items-center overflow-hidden px-2">
              <th:block th:replace="~{::titlebarCenter(titleText=${titleText})}"></th:block>
            </div>
            <div class="window-titlebar-trailing flex items-center justify-end gap-2 w-[120px] md:w-[240px] pr-0 md:pr-2">
              <th:block th:replace="~{::titlebarTrailing}"></th:block>
            </div>
</th:block>

<th:block th:fragment="titlebarCenter (titleText)">
            <th:block th:replace="~{modules/shell/window-titlebar :: titleStack(
              titleText=${titleText},
              subtitleText=${null},
              stackClasses='',
              titleClasses='truncate font-medium text-[14px] md:text-[13px] tracking-wide',
              subtitleClasses=''
            )}"></th:block>
</th:block>

<th:block th:fragment="titlebarTrailing">
            <th:block th:replace="~{modules/shell/window-titlebar-actions :: themeToggle(
              wrapperClasses='relative hidden md:flex items-center',
              buttonClasses='window-toolbar-btn p-1.5 rounded-md',
              iconClasses='w-[17px] h-[17px]',
              titleText='切换深色/浅色'
            )}"></th:block>
            <th:block th:replace="~{modules/shell/window-titlebar-actions :: outlineTrigger(
              buttonClasses='window-toolbar-btn post-outline-trigger',
              iconClasses='w-4 h-4',
              titleText='目录'
            )}"></th:block>
            <th:block th:replace="~{modules/shell/window-titlebar-actions :: shareMenu(
              feedbackClasses='window-toolbar-feedback',
              buttonClasses='window-toolbar-btn window-accent-action p-1.5 rounded-md',
              iconClasses='w-4 h-4'
            )}"></th:block>
</th:block>

<th:block th:fragment="loadingSkeleton">
  <div class="skeleton-finder">
    <div class="skeleton-sidebar"><div class="skeleton-bar"></div><div class="skeleton-bar short"></div><div class="skeleton-bar"></div><div class="skeleton-bar short"></div></div>
    <div class="skeleton-list"><div class="skeleton-bar"></div><div class="skeleton-bar"></div><div class="skeleton-bar short"></div><div class="skeleton-bar"></div><div class="skeleton-bar short"></div><div class="skeleton-bar"></div></div>
    <div class="skeleton-preview"><div class="skeleton-block"></div><div class="skeleton-bar"></div><div class="skeleton-bar short"></div></div>
  </div>
</th:block>
