<th:block xmlns:th="https://www.thymeleaf.org">
  <th:block th:fragment="trafficLightsOnly (maximizable)">
    <th:block th:replace="~{modules/shell/window-controls :: trafficLights(maximizable=${maximizable})}"></th:block>
  </th:block>

  <th:block th:fragment="browserHistory (maximizable)">
    <th:block th:replace="~{modules/shell/window-controls :: trafficLights(maximizable=${maximizable})}"></th:block>
    <div class="flex items-center gap-1">
      <button onclick="if(window.matchMedia&&window.matchMedia('(max-width: 768px)').matches&&window.__browserBackOrHome){window.__browserBackOrHome('/')}else{window.history.back()}"
              class="window-nav-btn w-6 md:w-7 h-6 md:h-7 flex items-center justify-center rounded-md"
              title="返回上一页">
        <span class="icon-[lucide--chevron-left] w-[15px] h-[15px]" aria-hidden="true"></span>
      </button>
      <button @click="window.history.forward()"
              class="window-nav-btn hidden md:flex w-7 h-7 items-center justify-center rounded-md"
              title="前往下一页">
        <span class="icon-[lucide--chevron-right] w-[15px] h-[15px]" aria-hidden="true"></span>
      </button>
    </div>
  </th:block>

  <th:block th:fragment="momentsBack (windowScene)">
    <th:block th:replace="~{modules/shell/window-controls :: trafficLights(maximizable=false)}"></th:block>
    <a th:href="${windowScene == 'detail' ? '/moments' : '/'}"
       class="moments-titlebar-back pjax-link"
       data-pjax-app="moments"
       title="返回"
       onclick="if(window.history.length > 1) { event.preventDefault(); history.back(); }">
      <span class="icon-[lucide--chevron-left]" aria-hidden="true"></span>
    </a>
  </th:block>

  <th:block th:fragment="friendsBack">
    <th:block th:replace="~{modules/shell/window-controls :: trafficLights(maximizable=false)}"></th:block>
    <a th:href="@{/}"
       class="moments-titlebar-back friends-titlebar-back pjax-link"
       data-pjax-app="friends"
       title="返回"
       onclick="if(window.history.length > 1) { event.preventDefault(); history.back(); }">
      <span class="icon-[lucide--chevron-left]" aria-hidden="true"></span>
    </a>
  </th:block>
</th:block>
