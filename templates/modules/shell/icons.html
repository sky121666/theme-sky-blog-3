<th:block xmlns:th="https://www.thymeleaf.org">
  <!-- ===== 手机端菜单 (lucide:menu) ===== -->
  <span th:fragment="header_mobile_menu"
        class="icon-[lucide--menu]"
        aria-hidden="true"></span>

  <!-- ===== 搜索 (lucide:search) ===== -->
  <span th:fragment="header_search"
        class="icon-[lucide--search]"
        aria-hidden="true"></span>

  <!-- ===== 登录 / 用户 (lucide:user-round) ===== -->
  <span th:fragment="header_auth"
        class="icon-[lucide--user-round]"
        aria-hidden="true"></span>

  <!-- ===== 浅色模式 (lucide:sun) ===== -->
  <span th:fragment="header_theme_light"
        class="icon-[lucide--sun]"
        aria-hidden="true"></span>

  <!-- ===== 深色模式 (lucide:moon) ===== -->
  <span th:fragment="header_theme_dark"
        class="icon-[lucide--moon]"
        aria-hidden="true"></span>
</th:block>
