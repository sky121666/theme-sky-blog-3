<th:block xmlns:th="https://www.thymeleaf.org">
  <div th:fragment="bar (siteTitle, logoIcon, headerMenu, enableThemeSetting, searchWidgetAvailable, searchEnabled, authEnabled, mobileMenuEnabled, loginLabel, timeEnabled, timeDesktopPreset, timeMobilePreset, timeHourCycle, notificationCenterTitle, notificationCenterGuestTitle, notificationCenterDefaultOpen, notificationCenterAuthenticated, iconMobileMenu, iconSearch, iconAuth, iconThemeLight, iconThemeDark)"
       class="menubar"
       x-data="menuBar"
       th:data-site-title="${siteTitle}"
       th:data-search-enabled="${searchEnabled}"
       th:data-mobile-menu-enabled="${mobileMenuEnabled}"
       th:data-time-enabled="${timeEnabled}"
       th:data-time-desktop-preset="${timeDesktopPreset}"
       th:data-time-mobile-preset="${timeMobilePreset}"
       th:data-time-hour-cycle="${timeHourCycle}"
       th:data-notification-center-title="${notificationCenterTitle}"
       th:data-notification-center-guest-title="${notificationCenterGuestTitle}"
       th:data-notification-center-default-open="${notificationCenterDefaultOpen}"
       th:data-notification-center-authenticated="${notificationCenterAuthenticated}">
    <div class="menubar-left">
      <a href="javascript:void(0)" class="menubar-icon-btn menubar-brand-icon" title="System">
        <th:block th:if="${#strings.isEmpty(logoIcon)}">
          &#63743;
        </th:block>
        <th:block th:unless="${#strings.isEmpty(logoIcon)}">
          <span class="menubar-brand-glyph" th:utext="${logoIcon}"></span>
        </th:block>
      </a>

      <span th:if="${!#strings.isEmpty(siteTitle)}"
            class="menubar-app-name"
            x-text="appName"
            th:text="${siteTitle}"></span>

      <nav class="menubar-nav" th:if="${headerMenu != null}">
        <div th:each="menuItem : ${headerMenu.menuItems}"
             th:with="
               menuItemHref = ${menuItem.status.href != null ? menuItem.status.href.toString() : ''}"
             class="menubar-menu-group"
             x-data="{ open: false }"
             @mouseenter="open = true"
             @mouseleave="open = false"
             @click.away="open = false"
             @theme-menubar-close.window="open = false">
          <a th:href="${#lists.isEmpty(menuItem.children) ? menuItem.status.href : 'javascript:void(0)'}"
             th:target="${menuItem.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
             class="menubar-item menubar-item--desktop"
             :class="{ 'is-open': open }"
             th:classappend="${#lists.isEmpty(menuItem.children) and menuItem.spec.target?.name() != 'BLANK' ? 'pjax-link' : ''}"
             th:text="${menuItem.status.displayName}"></a>

          <th:block th:replace="~{modules/shell/header :: submenu(menuItem=${menuItem})}"></th:block>
        </div>
      </nav>
    </div>

    <div class="menubar-right">
      <button type="button"
              class="menubar-icon-btn menubar-mobile-trigger"
              th:if="${mobileMenuEnabled and headerMenu != null and !#lists.isEmpty(headerMenu.menuItems)}"
              @click="toggleMobileMenu()"
              :aria-expanded="mobileMenuOpen.toString()"
              aria-label="打开菜单"
              title="菜单">
        <th:block th:if="${!#strings.isEmpty(iconMobileMenu)}" th:utext="${iconMobileMenu}" />
        <th:block th:unless="${!#strings.isEmpty(iconMobileMenu)}">
          <th:block th:replace="~{modules/shell/icons :: header_mobile_menu}" />
        </th:block>
      </button>

      <!-- plugin-contract: PluginSearchWidget; contract-version: 1.7.1; tested-version: 1.7.1; status: confirmed; source: docs/插件适配契约.md -->
      <button type="button"
              class="menubar-icon-btn menubar-search-btn"
              th:if="${searchWidgetAvailable and searchEnabled}"
              @click="openSearch()"
              title="聚焦搜索 (Cmd+K)">
        <th:block th:if="${!#strings.isEmpty(iconSearch)}" th:utext="${iconSearch}" />
        <th:block th:unless="${!#strings.isEmpty(iconSearch)}">
          <th:block th:replace="~{modules/shell/icons :: header_search}" />
        </th:block>
      </button>

      <a th:if="${authEnabled}"
         href="/login"
         class="menubar-auth-btn menubar-auth-btn--icon"
         @click="closeMobileMenu()"
         th:attr="title=${loginLabel},aria-label=${loginLabel}">
        <th:block th:if="${!#strings.isEmpty(iconAuth)}" th:utext="${iconAuth}" />
        <th:block th:unless="${!#strings.isEmpty(iconAuth)}">
          <th:block th:replace="~{modules/shell/icons :: header_auth}" />
        </th:block>
      </a>

      <button th:if="${enableThemeSetting}"
              @click="$store.theme.setMode($store.theme.isDark ? 'light' : 'dark')"
              class="menubar-icon-btn menubar-theme-btn"
              title="切换外观">
        <span class="menubar-theme-icon-slot" x-show="!$store.theme.isDark">
          <th:block th:if="${!#strings.isEmpty(iconThemeLight)}" th:utext="${iconThemeLight}" />
          <th:block th:unless="${!#strings.isEmpty(iconThemeLight)}">
            <th:block th:replace="~{modules/shell/icons :: header_theme_light}" />
          </th:block>
        </span>
        <span class="menubar-theme-icon-slot" x-show="$store.theme.isDark" style="display: none;">
          <th:block th:if="${!#strings.isEmpty(iconThemeDark)}" th:utext="${iconThemeDark}" />
          <th:block th:unless="${!#strings.isEmpty(iconThemeDark)}">
            <th:block th:replace="~{modules/shell/icons :: header_theme_dark}" />
          </th:block>
        </span>
      </button>

      <button th:if="${timeEnabled}"
              type="button"
              th:with="
             headerNow=${#dates.createNow()},
             isHeaderTime24Hour=${#strings.toString(timeHourCycle) == '24'},
             desktopTimePattern=${isHeaderTime24Hour ? 'HH:mm' : 'a h:mm'},
             desktopTimeSecondsPattern=${isHeaderTime24Hour ? 'HH:mm:ss' : 'a h:mm:ss'},
             desktopTimeText=${#dates.format(headerNow, desktopTimePattern)},
             desktopTimeSecondsText=${#dates.format(headerNow, desktopTimeSecondsPattern)},
             desktopDateText=${#dates.format(headerNow, 'M月d日')},
             desktopWeekdayText=${#dates.format(headerNow, 'E')},
             initialTimeText=${
               timeDesktopPreset == 'time-seconds' ? desktopTimeSecondsText :
               timeDesktopPreset == 'date-time' ? desktopDateText + ' ' + desktopTimeText :
               timeDesktopPreset == 'weekday-date-time' ? desktopWeekdayText + ' ' + desktopDateText + ' ' + desktopTimeText :
               timeDesktopPreset == 'month-day-weekday-time' ? desktopDateText + ' ' + desktopWeekdayText + ' ' + desktopTimeText :
               desktopTimeText
              }"
              class="menubar-time"
              x-ref="notificationCenterTrigger"
              @click.stop="toggleNotificationCenter()"
              :aria-expanded="notificationCenterOpen.toString()"
              aria-controls="notification-center-panel"
              :aria-label="`${notificationCenterOpen ? '关闭' : '打开'}${notificationCenterTitle}`"
              :title="notificationCenterTitle"
              x-text="timeStr"
              th:text="${initialTimeText}"></button>
    </div>

    <th:block th:replace="~{modules/shell/header :: mobile_dropdown(
      headerMenu=${headerMenu},
      searchWidgetAvailable=${searchWidgetAvailable},
      searchEnabled=${searchEnabled},
      authEnabled=${authEnabled},
      mobileMenuEnabled=${mobileMenuEnabled}
    )}"></th:block>

    <div class="notification-center-backdrop"
         aria-hidden="true"
         x-show="notificationCenterVisible"
         :class="{
           'is-animating': notificationCenterAnimating,
           'is-opening': notificationCenterMotionPhase === 'opening',
           'is-closing': notificationCenterMotionPhase === 'closing'
         }"
         style="display: none;"></div>

    <aside id="notification-center-panel"
           class="notification-center"
           data-notification-widget-drop-target
           x-ref="notificationCenterPanel"
           x-show="notificationCenterVisible"
           tabindex="-1"
           aria-modal="true"
           :class="{
             'is-animating': notificationCenterAnimating,
             'is-opening': notificationCenterMotionPhase === 'opening',
             'is-closing': notificationCenterMotionPhase === 'closing'
           }"
           @keydown.tab="handleNotificationFocusTrap($event)"
           @click.outside="!isNotificationWidgetEditingActive() && closeNotificationCenter()"
           style="display: none;"
           role="dialog"
           :aria-label="notificationCenterDisplayTitle()">
      <header class="notification-center-header">
        <div class="notification-center-title-stack">
          <h2 x-text="notificationCenterDisplayTitle()"
              th:text="${notificationCenterTitle}">通知中心</h2>
          <span x-show="notificationCenterAuthenticated && notificationSummaryText()"
                x-text="notificationSummaryText()"></span>
        </div>
        <div class="notification-center-actions">
          <div class="notification-center-segmented"
               x-show="notificationCenterAuthenticated"
               :class="{ 'is-all': notificationShowRead, 'is-unread': !notificationShowRead }"
               role="group"
               aria-label="通知筛选">
            <button type="button"
                    class="notification-center-segment"
                    :class="{ 'is-active': !notificationShowRead }"
                    :aria-pressed="(!notificationShowRead).toString()"
                    @click="setNotificationReadFilter(false)">
              <span>未读</span>
            </button>
            <button type="button"
                    class="notification-center-segment"
                    :class="{ 'is-active': notificationShowRead }"
                    :aria-pressed="notificationShowRead.toString()"
                    @click="setNotificationReadFilter(true)">
              <span>全部</span>
            </button>
          </div>
          <button type="button"
                  class="notification-center-close"
                  x-ref="notificationCenterClose"
                  @click="closeNotificationCenter()"
                  aria-label="关闭通知中心">
            <span class="icon-[lucide--x]" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <div class="notification-panel-scroll"
           x-ref="notificationCenterScroll"
           :class="{ 'is-hydrating': notificationOpenScrollPending }"
           @scroll.passive="handleNotificationScroll()">
        <section class="notification-center-section notification-center-feed"
                 x-show="notificationCenterAuthenticated"
                 :class="{
                   'is-filter-switching': notificationFilterSwitching,
                   'is-showing-all': notificationShowRead
                 }">
          <template x-if="notificationStatusText">
            <div class="notification-center-status" :data-state="notificationStatus">
              <span class="icon-[lucide--bell]" aria-hidden="true"></span>
              <span x-text="notificationStatusText"></span>
            </div>
          </template>

          <template x-if="notificationVisibleGroups().length > 0">
            <div class="notification-center-groups">
              <template x-for="group in notificationVisibleGroups()" :key="group.key">
                <section class="notification-center-group"
                         :data-notification-group-key="group.key"
                         :class="{ 'is-expanded': isNotificationGroupExpanded(group) }">
                  <div class="notification-center-group-header-wrapper"
                       x-show="isNotificationGroupExpanded(group)">
                    <button type="button"
                            class="notification-center-group-head"
                            @click="collapseNotificationGroup()"
                            aria-expanded="true">
                      <strong x-text="group.label"></strong>
                    </button>
                    <div class="notification-center-group-actions">
                      <button type="button"
                              class="notification-center-group-collapse"
                              @click.stop="collapseNotificationGroup()"
                              aria-label="折叠该类型通知"
                              title="折叠">
                        <span class="icon-[lucide--chevron-up]" aria-hidden="true"></span>
                      </button>
                      <div class="notification-center-group-menu-shell"
                           @click.outside="isNotificationGroupMenuOpen(group) && closeNotificationGroupMenu()">
                        <button type="button"
                                class="notification-center-group-more"
                                :aria-expanded="isNotificationGroupMenuOpen(group).toString()"
                                @click.stop="toggleNotificationGroupMenu(group)"
                                aria-label="更多通知操作"
                                title="更多">
                          <span class="icon-[lucide--ellipsis]" aria-hidden="true"></span>
                        </button>
                        <div class="notification-center-group-menu"
                             x-show="isNotificationGroupMenuOpen(group)"
                             x-transition.opacity.duration.120ms
                             style="display: none;"
                             role="menu">
                          <button type="button"
                                  class="notification-center-group-menu-item"
                                  x-show="notificationGroupUnreadCount(group) > 0"
                                  :disabled="notificationGroupActionBusyKey === group.key"
                                  @click.stop="markNotificationGroupAsRead(group, $event)"
                                  role="menuitem">
                            <span class="icon-[lucide--check-check]" aria-hidden="true"></span>
                            <span>本组标为已读</span>
                            <small x-text="notificationGroupUnreadCount(group)"></small>
                          </button>
                          <button type="button"
                                  class="notification-center-group-menu-item"
                                  x-show="notificationGroupReadCount(group) > 0 && notificationGroupConfirmKey !== group.key"
                                  :disabled="notificationGroupActionBusyKey === group.key"
                                  @click.stop="requestNotificationGroupClear(group)"
                                  role="menuitem">
                            <span class="icon-[lucide--trash-2]" aria-hidden="true"></span>
                            <span>清除已读通知</span>
                            <small x-text="notificationGroupReadCount(group)"></small>
                          </button>
                          <div class="notification-center-group-confirm"
                               x-show="notificationGroupConfirmKey === group.key">
                            <span x-text="`清除 ${notificationGroupReadCount(group)} 条已读通知？`"></span>
                            <div>
                              <button type="button"
                                      @click.stop="cancelNotificationGroupClear()">取消</button>
                              <button type="button"
                                      class="is-danger"
                                      :disabled="notificationGroupActionBusyKey === group.key"
                                      @click.stop="clearReadNotificationGroup(group, $event)">清除</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="notification-center-stack-preview"
                       x-show="!isNotificationGroupExpanded(group) && notificationGroupItems(group).length > 0"
                       @click="openNotificationGroup(group)"
                       @keydown.enter.prevent="openNotificationGroup(group)"
                       role="button"
                       tabindex="0"
                       :aria-label="`展开${group.label}通知`">
                    <template x-if="notificationGroupItems(group).length > 0">
                      <div class="notification-center-stack-card-wrapper">
                        <div class="notification-center-stack-layer notification-center-stack-layer--2"
                             x-show="notificationGroupItems(group).length > 2"
                             aria-hidden="true"></div>
                        <div class="notification-center-stack-layer notification-center-stack-layer--1"
                             x-show="notificationGroupItems(group).length > 1"
                             aria-hidden="true"></div>

                        <article class="notification-center-card"
                                 :class="{ 'is-unread': notificationGroupItems(group)[0].unread }"
                                 :data-notification-type="notificationGroupItems(group)[0].typeKey"
                                 :data-notification-item-key="notificationGroupItems(group)[0].key"
                                 role="presentation">
                          <div class="notification-center-card-main">
                            <div class="notification-center-card-header">
                              <div class="notification-center-card-header-left">
                                <span class="notification-center-card-icon-shell" aria-hidden="true">
                                  <span class="notification-center-card-icon-small" :class="notificationGroupItems(group)[0].icon"></span>
                                </span>
                                <span class="notification-center-card-app-name" x-text="notificationGroupItems(group)[0].typeLabel || group.label"></span>
                                <span class="notification-center-card-header-sep" aria-hidden="true">•</span>
                              </div>
                              <time class="notification-center-card-time"
                                    :datetime="notificationGroupItems(group)[0].createdAt"
                                    :title="notificationGroupItems(group)[0].timeTitle"
                                    x-text="notificationGroupItems(group)[0].time"></time>
                            </div>

                            <div class="notification-center-card-content">
                              <strong class="notification-center-card-title" x-text="notificationGroupItems(group)[0].title"></strong>
                              <div class="notification-center-card-body"
                                   x-show="notificationGroupItems(group)[0].body"
                                   x-text="notificationGroupItems(group)[0].body"></div>
                            </div>
                          </div>
                        </article>
                      </div>
                    </template>
                  </div>

                  <div class="notification-center-list"
                       x-show="isNotificationGroupExpanded(group)">
                    <template x-for="item in notificationExpandedItems(group)" :key="item.key">
                      <article class="notification-center-card"
                               :class="{
                                 'is-unread': item.unread,
                                 'is-actionable': !!item.href
                               }"
                               :data-notification-type="item.typeKey"
                               :data-notification-item-key="item.key">
                        <div class="notification-center-card-main"
                             :role="item.href ? 'link' : null"
                             :tabindex="item.href ? '0' : null"
                             @click="item.href && openNotificationItem(item, $event)"
                             @keydown.enter.prevent="item.href && openNotificationItem(item, $event)">
                          <!-- macOS 1:1 Top Row: Icon, App Name, Separator, and Time -->
                          <div class="notification-center-card-header">
                            <div class="notification-center-card-header-left">
                              <span class="notification-center-card-icon-shell" aria-hidden="true">
                                <span class="notification-center-card-icon-small" :class="item.icon"></span>
                              </span>
                              <span class="notification-center-card-app-name" x-text="item.typeLabel || group.label"></span>
                              <span class="notification-center-card-header-sep" aria-hidden="true">•</span>
                            </div>
                            <time class="notification-center-card-time"
                                  :datetime="item.createdAt"
                                  :title="item.timeTitle"
                                  x-text="item.time"></time>
                          </div>

                          <!-- macOS 1:1 Content Section: Title & Body stacked with 24px indent -->
                          <div class="notification-center-card-content">
                            <strong class="notification-center-card-title" x-text="item.title"></strong>
                            <div class="notification-center-card-body"
                                 x-show="item.body"
                                 x-text="item.body"></div>
                          </div>
                        </div>

                        <!-- Separate sibling control: avoids nested interactive semantics. -->
                        <button type="button"
                                class="notification-center-card-read"
                                @click.stop="dismissNotification(item, $event)"
                                :aria-label="notificationItemActionLabel(item)"
                                :title="notificationItemActionLabel(item)">
                          <span :class="item.unread ? 'icon-[lucide--check]' : 'icon-[lucide--trash-2]'"
                                aria-hidden="true"></span>
                        </button>
                      </article>
                    </template>
                    <button type="button"
                            class="notification-center-group-load-more"
                            x-show="notificationGroupRemainingCount(group) > 0"
                            @click="showMoreNotificationGroupItems(group)">
                      <span>继续显示</span>
                      <small x-text="`${notificationGroupRemainingCount(group)} 条`"></small>
                    </button>
                  </div>
                </section>
              </template>
            </div>
          </template>

          <div class="notification-center-pagination"
               x-show="notificationHasMore || notificationLoadMoreError">
            <button type="button"
                    :disabled="notificationLoadingMore"
                    @click="loadMoreNotifications()">
              <span x-text="notificationLoadingMore ? '正在加载…' : '继续加载通知'"></span>
              <small x-show="!notificationLoadingMore"
                     x-text="`${notificationLoadedCount} / ${notificationTotalCount}`"></small>
            </button>
            <span role="status"
                  x-show="notificationLoadMoreError"
                  x-text="notificationLoadMoreError"></span>
          </div>

          <template x-if="notificationEmptyText()">
            <div class="notification-center-empty">
              <span class="icon-[lucide--bell-off]" aria-hidden="true"></span>
              <strong x-text="notificationEmptyText()"></strong>
              <span x-show="!notificationShowRead && notificationTotalCount > 0">可以切换查看全部通知。</span>
            </div>
          </template>
        </section>

        <section class="notification-center-section notification-center-widgets"
                 aria-label="小组件"
                 x-effect="enhanceNotificationWidgets(notificationWidgetRenderTick)">
          <template x-if="notificationWidgets.length > 0">
            <div class="notification-center-widget-list">
              <div class="notification-widget-insert-preview"
                   x-show="notificationWidgetDropPreview.active"
                   :style="notificationWidgetDropPreviewStyle()"
                   style="display: none;"></div>
              <template x-for="widget in notificationWidgets" :key="widget.key">
                <article class="notification-widget-card desktop-widget-card"
                         data-notification-widget-card
                         :data-notification-widget-key="widget.key"
                         :data-notification-widget-type="widget.widget"
                         :data-widget-appearance="notificationWidgetAppearanceValue(widget)"
                         :class="notificationWidgetCardClass(widget)"
                         @pointerdown="beginNotificationWidgetDrag(widget, $event)"
                         @contextmenu.prevent="openNotificationWidgetContextMenu(widget, $event)">
                  <header class="desktop-widget-header">
                    <div>
                      <p class="desktop-widget-kicker" x-text="notificationWidgetKicker(widget)"></p>
                      <h2 class="desktop-widget-title" x-text="widget.title"></h2>
                    </div>
                  </header>
                  <div class="desktop-widget-body notification-widget-body"
                       x-html="renderNotificationWidget(widget, notificationWidgetRenderTick)"></div>
                </article>
              </template>
            </div>
          </template>
          <template x-if="notificationWidgets.length === 0">
            <div class="notification-center-widget-dropzone">
              <span class="icon-[lucide--panel-right]" aria-hidden="true"></span>
              <strong>通知栏小组件</strong>
              <span>编辑桌面时可把小组件拖到这里，或在组件中心添加。</span>
            </div>
          </template>
        </section>
      </div>

      <footer class="notification-center-widget-toolbar"
              x-show="notificationCenterAuthenticated"
              aria-label="小组件操作">
        <button type="button"
                class="notification-center-widget-edit"
                @click="openNotificationWidgetEditor()">
          <span>编辑小组件</span>
        </button>
        <button type="button"
                class="notification-center-widget-close"
                @click="closeNotificationCenter()"
                aria-label="关闭通知中心"
                title="关闭通知中心">
          <span class="icon-[lucide--x]" aria-hidden="true"></span>
        </button>
      </footer>
    </aside>
  </div>

  <div th:fragment="submenu (menuItem)"
       th:if="${!#lists.isEmpty(menuItem.children)}"
       x-show="open"
       x-transition.opacity.duration.75ms
       style="display: none;"
       class="menubar-dropdown">
    <th:block th:each="child, childStat : ${menuItem.children}"
              th:with="
                childIconType = ${#annotations.getOrDefault(child, 'icon_type', 'iconify')},
                childIconSvg = ${#annotations.getOrDefault(child, 'icon', '')},
                childCustomSvg = ${#annotations.getOrDefault(child, 'custom_svg', '')},
                childImageUrl = ${#annotations.getOrDefault(child, 'image_url', '')},
                childImageUrlNormalized = ${#strings.trim(childImageUrl)},
                childImageUrlLower = ${#strings.toLowerCase(childImageUrlNormalized)},
                childImageAllowed = ${!#strings.isEmpty(childImageUrlNormalized) and (#strings.startsWith(childImageUrlNormalized, '/') or #strings.startsWith(childImageUrlLower, 'https://') or #strings.startsWith(childImageUrlLower, 'http://'))},
                childSeparatorBefore = ${#annotations.getOrDefault(child, 'header_separator_before', 'false')},
                prevChildSeparatorBefore = ${childStat.index > 0 ? #annotations.getOrDefault(menuItem.children[childStat.index - 1], 'header_separator_before', 'false') : 'false'},
                childSvgContent = ${childIconType == 'custom_svg' ? childCustomSvg : childIconSvg}">
      <div th:if="${childStat.index > 0 and (childSeparatorBefore == 'true' or childSeparatorBefore == true) and !(prevChildSeparatorBefore == 'true' or prevChildSeparatorBefore == true)}"
           class="menubar-dropdown-separator"></div>

      <a th:href="${child.status.href}"
         th:target="${child.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
         class="menubar-dropdown-item"
         th:classappend="${child.spec.target?.name() == 'BLANK' ? '' : 'pjax-link'}"
         @click="open = false; $dispatch('theme-menubar-close')">
        <span class="menubar-dropdown-leading">
          <img th:if="${childIconType == 'image' and childImageAllowed}"
               class="menubar-dropdown-icon-image"
               th:src="${childImageUrlNormalized}"
               th:alt="${child.status.displayName}"
               loading="lazy"
               decoding="async"
               draggable="false" />
          <span th:if="${childIconType == 'image' and !childImageAllowed}"
                class="menubar-dropdown-icon-svg">
            <span class="icon-[lucide--image]" aria-hidden="true"></span>
          </span>
          <span th:if="${childIconType != 'image' and !#strings.isEmpty(childSvgContent)}"
                class="menubar-dropdown-icon-svg"
                th:utext="${childSvgContent}"></span>
        </span>
        <span class="menubar-dropdown-label" th:text="${child.status.displayName}"></span>
        <span class="menubar-dropdown-trailing">
          <span th:if="${child.spec.target?.name() == 'BLANK'}"
                class="icon-[lucide--external-link]"
                aria-hidden="true"></span>
        </span>
      </a>
    </th:block>
  </div>

  <div th:fragment="mobile_dropdown (headerMenu, searchWidgetAvailable, searchEnabled, authEnabled, mobileMenuEnabled)"
       th:if="${mobileMenuEnabled}"
       x-show="mobileMenuOpen"
       x-transition.opacity.duration.100ms
       @click.outside="closeMobileMenu()"
       style="display: none;"
       class="menubar-mobile-dropdown">
    <div class="menubar-mobile-dropdown-inner">
      <th:block th:if="${headerMenu != null}">
        <th:block th:each="menuItem : ${headerMenu.menuItems}"
                  th:with="
                    menuItemHref = ${menuItem.status.href != null ? menuItem.status.href.toString() : ''}">
          <a th:if="${#lists.isEmpty(menuItem.children)}"
             th:href="${menuItem.status.href}"
             th:target="${menuItem.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
             class="menubar-mobile-item"
             th:classappend="${menuItem.spec.target?.name() == 'BLANK' ? '' : 'pjax-link'}"
             @click="closeMobileMenu()"
             th:text="${menuItem.status.displayName}"></a>

          <section th:if="${!#lists.isEmpty(menuItem.children)}" class="menubar-mobile-section">
            <h3 class="menubar-mobile-section-label" th:text="${menuItem.status.displayName}"></h3>

            <th:block th:each="child, childStat : ${menuItem.children}"
                      th:with="
                        childIconType = ${#annotations.getOrDefault(child, 'icon_type', 'iconify')},
                        childIconSvg = ${#annotations.getOrDefault(child, 'icon', '')},
                        childCustomSvg = ${#annotations.getOrDefault(child, 'custom_svg', '')},
                        childImageUrl = ${#annotations.getOrDefault(child, 'image_url', '')},
                        childImageUrlNormalized = ${#strings.trim(childImageUrl)},
                        childImageUrlLower = ${#strings.toLowerCase(childImageUrlNormalized)},
                        childImageAllowed = ${!#strings.isEmpty(childImageUrlNormalized) and (#strings.startsWith(childImageUrlNormalized, '/') or #strings.startsWith(childImageUrlLower, 'https://') or #strings.startsWith(childImageUrlLower, 'http://'))},
                        childSeparatorBefore = ${#annotations.getOrDefault(child, 'header_separator_before', 'false')},
                        prevChildSeparatorBefore = ${childStat.index > 0 ? #annotations.getOrDefault(menuItem.children[childStat.index - 1], 'header_separator_before', 'false') : 'false'},
                        childSvgContent = ${childIconType == 'custom_svg' ? childCustomSvg : childIconSvg}">
              <div th:if="${childStat.index > 0 and (childSeparatorBefore == 'true' or childSeparatorBefore == true) and !(prevChildSeparatorBefore == 'true' or prevChildSeparatorBefore == true)}"
                   class="menubar-mobile-dropdown-separator"></div>

              <a th:href="${child.status.href}"
                 th:target="${child.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
                 class="menubar-mobile-item menubar-mobile-item--child"
                 th:classappend="${child.spec.target?.name() == 'BLANK' ? '' : 'pjax-link'}"
                 @click="closeMobileMenu()"
                 th:attr="aria-label=${child.status.displayName}">
                <span class="menubar-mobile-item-icon" th:if="${childIconType == 'image' and childImageAllowed}">
                  <img th:src="${childImageUrlNormalized}" th:alt="${child.status.displayName}" loading="lazy" decoding="async" draggable="false" />
                </span>
                <span class="menubar-mobile-item-icon" th:if="${childIconType == 'image' and !childImageAllowed}">
                  <span class="icon-[lucide--image]" aria-hidden="true"></span>
                </span>
                <span class="menubar-mobile-item-icon" th:if="${childIconType != 'image' and !#strings.isEmpty(childSvgContent)}" th:utext="${childSvgContent}"></span>
                <span class="menubar-mobile-item-label" th:text="${child.status.displayName}"></span>
              </a>
            </th:block>
          </section>
        </th:block>
      </th:block>

    </div>
  </div>
</th:block>
