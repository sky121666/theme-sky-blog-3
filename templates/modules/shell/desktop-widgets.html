<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
  <th:block th:fragment="layer(enabled, isHome, hideOnMobile, editEnabled, columns, gap, layoutVersion, serverLayoutJson, themeName, themeJsonConfigEndpoint, weatherCityName, weatherRefreshMinutes, latestPosts, popularPosts, categoryTree, siteStats, randomTags, momentsAvailable, recentMoments, bangumisAvailable, bangumisAnimeWish, bangumisAnimeWatching, bangumisAnimeDone, bangumisDramaWish, bangumisDramaWatching, bangumisDramaDone, bangumiAnimeWishCount, bangumiAnimeWatchingCount, bangumiAnimeDoneCount, bangumiDramaWishCount, bangumiDramaWatchingCount, bangumiDramaDoneCount, friendsAvailable, recentFriends, docsmeAvailable, docsmeProjects, photosAvailable, photos, photoGroups, doubanAvailable, steamAvailable, steamPlaying, steamStatusText, steamPersonaName, steamAvatarFull, steamProfileUrl, steamLevel, steamStatsTotalGames, steamStatsRecentPlaytimeFormatted, steamStatsRecentPlaytimeMinutes, steamRecentGames, steamOwnedGames, siteUrl, siteTitle, siteSubtitle, siteLogo, authenticated, currentUserName, currentUserDisplayName, currentUserAvatar, currentUserBio, archivesUrl, fallbackCover)">
    <!-- Inert, JSON-only response contract. Thymeleaf's JavaScript serializer
         escapes embedded strings before they enter this raw-text element. -->
    <script id="theme-desktop-widget-protocol"
            type="application/json"
            data-theme-desktop-widget-protocol
            th:inline="javascript">
      {
        "enabled": [[${enabled}]],
        "isHome": [[${isHome}]],
        "hideOnMobile": [[${hideOnMobile}]],
        "editEnabled": [[${editEnabled}]],
        "columns": [[${columns}]],
        "gap": [[${gap}]],
        "layoutVersion": [[${layoutVersion}]],
        "serverLayoutJson": [[${serverLayoutJson}]],
        "themeName": [[${themeName}]],
        "themeJsonConfigEndpoint": [[${themeJsonConfigEndpoint}]],
        "siteUrl": [[${siteUrl}]],
        "modules": {
          "weather": {
            "cityName": [[${weatherCityName}]],
            "refreshMinutes": [[${weatherRefreshMinutes}]]
          }
        },

        "sources": {
          "siteProfile": {
            "title": [[${siteTitle}]],
            "subtitle": [[${siteSubtitle}]],
            "logo": [[${siteLogo}]],
            "url": [[${siteUrl}]]
          },
          "currentUser": {
            "authenticated": [[${authenticated}]],
            "name": [[${currentUserName}]],
            "displayName": [[${currentUserDisplayName}]],
            "avatar": [[${currentUserAvatar}]],
            "bio": [[${currentUserBio}]],
            "permalink": "/uc"
          },
          "latestPosts": [[${latestPosts}]],
          "popularPosts": [[${popularPosts}]],
          "categories": [[${categoryTree}]],
          "siteStats": [[${siteStats}]],
          "randomTags": [[${randomTags}]],
          "momentsAvailable": [[${momentsAvailable}]],
          "recentMoments": [[${recentMoments}]],
          "bangumisAvailable": [[${bangumisAvailable}]],
          "bangumisUrl": "/bangumis",
          "bangumisByStatus": {
            "anime": {
              "wish": [[${bangumisAnimeWish}]],
              "watching": [[${bangumisAnimeWatching}]],
              "done": [[${bangumisAnimeDone}]]
            },
            "drama": {
              "wish": [[${bangumisDramaWish}]],
              "watching": [[${bangumisDramaWatching}]],
              "done": [[${bangumisDramaDone}]]
            }
          },
          "bangumiStatusCounts": {
            "anime": {
              "wish": [[${bangumiAnimeWishCount}]],
              "watching": [[${bangumiAnimeWatchingCount}]],
              "done": [[${bangumiAnimeDoneCount}]]
            },
            "drama": {
              "wish": [[${bangumiDramaWishCount}]],
              "watching": [[${bangumiDramaWatchingCount}]],
              "done": [[${bangumiDramaDoneCount}]]
            }
          },
          "friendsAvailable": [[${friendsAvailable}]],
          "recentFriends": [[${recentFriends}]],
          "friendsUrl": "/friends",
          "docsmeAvailable": [[${docsmeAvailable}]],
          "docsmeUrl": "/docs",
          "docsmeProjects": [[${docsmeProjects}]],
          "archivesUrl": [[${archivesUrl}]],
          "fallbackCover": [[${fallbackCover}]],
          "photosAvailable": [[${photosAvailable}]],
          "photos": [[${photos}]],
          "photoGroups": [[${photoGroups}]],
          "photosUrl": "/photos",
          "doubanAvailable": [[${doubanAvailable}]],
          "doubanUrl": "/douban",
          "doubanApiBase": "/apis/api.douban.moony.la/v1alpha1/doubanmovies",
          "steamAvailable": [[${steamAvailable}]],
          "steamUrl": "/steam",
          "steamProfile": {
            "playing": [[${steamPlaying}]],
            "statusText": [[${steamStatusText}]],
            "personaName": [[${steamPersonaName}]],
            "avatarFull": [[${steamAvatarFull}]],
            "profileUrl": [[${steamProfileUrl}]],
            "steamLevel": [[${steamLevel}]],
            "currentGameName": ""
          },
          "steamStats": {
            "totalGames": [[${steamStatsTotalGames}]],
            "recentPlaytimeFormatted": [[${steamStatsRecentPlaytimeFormatted}]],
            "recentPlaytimeMinutes": [[${steamStatsRecentPlaytimeMinutes}]]
          },
          "steamRecentGames": [[${steamRecentGames}]],
          "steamOwnedGames": [[${steamOwnedGames}]]
        }
      }
    </script>
    <script>
      (() => {
        const payloadNode = document.getElementById('theme-desktop-widget-protocol');
        if (!payloadNode) return;
        try {
          const widgetProtocol = JSON.parse(payloadNode.textContent || '{}');
          if (!widgetProtocol || typeof widgetProtocol !== 'object' || Array.isArray(widgetProtocol)) return;
          window.__THEME_DESKTOP_PROTOCOL__ = Object.assign(window.__THEME_DESKTOP_PROTOCOL__ || {}, {
            widgets: widgetProtocol
          });
          window.__THEME_WIDGETS__ = widgetProtocol;
        } catch (_error) {
          // Keep the shell usable when a malformed optional payload is served.
        }
      })();
    </script>

    <section class="desktop-widgets-layer"
             x-ref="layer"
             x-show="enabled"
             :class="{
               'is-editing': isEditing,
               'is-adding': isEditing && editStage === 'add',
               'is-decorating': isEditing && editStage === 'decorate'
             }"
             x-cloak
             style="display: none;">

      <div class="desktop-context-menu"
           x-show="showDesktopContextMenu"
           :style="desktopContextMenuPositionStyle"
           @click.outside="closeDesktopContextMenu()"
           x-transition:enter="transition ease-out duration-120"
           x-transition:enter-start="opacity-0 scale-95 translate-y-1"
           x-transition:enter-end="opacity-100 scale-100 translate-y-0"
           x-transition:leave="transition ease-in duration-90"
           x-transition:leave-start="opacity-100 scale-100 translate-y-0"
           x-transition:leave-end="opacity-0 scale-95 translate-y-1"
           style="display: none;">
        <template x-if="desktopContextMenu.targetKind === 'desktop' && canManageDefaultDesktopLayout">
          <div style="display: contents;">
            <div class="desktop-context-menu-group">
              <button type="button"
                      class="desktop-context-menu-item"
                      @click="openAddWidgetCenterFromContext()">
                <span class="icon-[lucide--plus]" aria-hidden="true"></span>
                <span>添加小组件</span>
              </button>
              <button type="button"
                      class="desktop-context-menu-item"
                      @click="openAddIconFromContext()">
                <span class="icon-[lucide--file-plus]" aria-hidden="true"></span>
                <span>添加图标</span>
              </button>
            </div>
            
            <div class="desktop-context-menu-group">
              <button type="button"
                      class="desktop-context-menu-item"
                      @click="reArrangeIcons(); closeDesktopContextMenu()">
                <span class="icon-[lucide--list-ordered]" aria-hidden="true"></span>
                <span>整理图标</span>
              </button>
            </div>

            <div class="desktop-context-menu-group" x-show="isEditing">
              <button type="button"
                      class="desktop-context-menu-item"
                      style="color: var(--theme-danger, #ef4444);"
                      @click="resetLayout(); closeDesktopContextMenu()">
                <span class="icon-[lucide--trash-2]" aria-hidden="true"></span>
                <span>清空组件</span>
              </button>
              <button type="button"
                      class="desktop-context-menu-item"
                      style="color: var(--theme-danger, #ef4444);"
                      @click="clearAllIcons(); closeDesktopContextMenu()">
                <span class="icon-[lucide--x]" aria-hidden="true"></span>
                <span>清空图标</span>
              </button>
            </div>

            <div class="desktop-context-menu-group" x-show="isEditing">
              <button type="button"
                      class="desktop-context-menu-item desktop-context-menu-item--primary"
                      :disabled="serverLayoutSaving"
                      @click="saveDesktopEditing(); closeDesktopContextMenu()">
                <span class="icon-[lucide--check]" aria-hidden="true"></span>
                <span x-text="desktopLayoutSaveButtonLabel()"></span>
              </button>
            </div>
          </div>
        </template>

        <template x-if="desktopContextMenu.targetKind === 'widget' && canManageDefaultDesktopLayout">
          <div style="display: contents;">
            <div class="desktop-context-menu-group" x-show="canDesktopContextWidgetConfigure()">
              <button type="button"
                      class="desktop-context-menu-item"
                      @click="editDesktopContextWidgetConfig()">
                <span class="icon-[lucide--settings-2]" aria-hidden="true"></span>
                <span>编辑设置</span>
              </button>
            </div>

            <div class="desktop-context-menu-group" x-show="hasDesktopContextWidgetSizeOptions()">
              <template x-for="option in desktopContextWidgetSizeOptions()" :key="option.key">
                <button type="button"
                        class="desktop-context-menu-item"
                        :class="{ 'desktop-context-menu-item--primary': option.active }"
                        @click="changeWidgetSizeFromContext(option)">
                  <span class="icon-[lucide--panel-top]" aria-hidden="true"></span>
                  <span x-text="option.active ? `${option.label}尺寸（当前）` : `切换为${option.label}尺寸`"></span>
                </button>
              </template>
            </div>

            <div class="desktop-context-menu-group">
              <button type="button"
                      class="desktop-context-menu-item"
                      x-show="canDesktopContextWidgetMoveToNotification()"
                      @click="moveWidgetToNotificationFromContext()"
                      style="display: none;">
                <span class="icon-[lucide--panel-right-open]" aria-hidden="true"></span>
                <span>移到通知中心</span>
              </button>
              <button type="button"
                      class="desktop-context-menu-item"
                      x-show="canDesktopContextWidgetMoveToDesktop()"
                      @click="moveWidgetToDesktopFromContext()"
                      style="display: none;">
                <span class="icon-[lucide--monitor]" aria-hidden="true"></span>
                <span>移到桌面</span>
              </button>
            </div>

            <div class="desktop-context-menu-group">
              <button type="button"
                      class="desktop-context-menu-item"
                      style="color: var(--theme-danger, #ef4444);"
                      @click="removeDesktopContextTarget()">
                <span class="icon-[lucide--trash-2]" aria-hidden="true"></span>
                <span>移除小组件</span>
              </button>
            </div>

            <div class="desktop-context-menu-group" x-show="isEditing">
              <button type="button"
                      class="desktop-context-menu-item desktop-context-menu-item--primary"
                      :disabled="serverLayoutSaving"
                      @click="saveDesktopEditing(); closeDesktopContextMenu()">
                <span class="icon-[lucide--check]" aria-hidden="true"></span>
                <span x-text="desktopLayoutSaveButtonLabel()"></span>
              </button>
            </div>
          </div>
        </template>

        <template x-if="desktopContextMenu.targetKind === 'icon' && canManageDefaultDesktopLayout">
          <div style="display: contents;">
            <div class="desktop-context-menu-group">
              <button type="button"
                      class="desktop-context-menu-item"
                      style="color: var(--theme-danger, #ef4444);"
                      @click="removeDesktopContextTarget()">
                <span class="icon-[lucide--trash-2]" aria-hidden="true"></span>
                <span>移除图标</span>
              </button>
              <button type="button"
                      class="desktop-context-menu-item"
                      @click="reArrangeIcons(); closeDesktopContextMenu()">
                <span class="icon-[lucide--list-ordered]" aria-hidden="true"></span>
                <span>整理图标</span>
              </button>
            </div>

            <div class="desktop-context-menu-group" x-show="isEditing">
              <button type="button"
                      class="desktop-context-menu-item desktop-context-menu-item--primary"
                      :disabled="serverLayoutSaving"
                      @click="saveDesktopEditing(); closeDesktopContextMenu()">
                <span class="icon-[lucide--check]" aria-hidden="true"></span>
                <span x-text="desktopLayoutSaveButtonLabel()"></span>
              </button>
            </div>
          </div>
        </template>
      </div>

      <!-- 添加图标 modal -->
      <div class="desktop-add-icon-backdrop"
           x-show="addIconForm.open"
           @click.self="closeAddIconForm()"
           x-transition:enter="transition ease-out duration-180"
           x-transition:enter-start="opacity-0"
           x-transition:enter-end="opacity-100"
           x-transition:leave="transition ease-in duration-140"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           style="display: none;">
        <div class="desktop-add-icon-dialog"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95 translate-y-2"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-140"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-95 translate-y-2">
          <header class="desktop-add-icon-dialog-header">
            <h2>添加图标</h2>
            <button type="button" class="desktop-add-icon-close" @click="closeAddIconForm()" aria-label="关闭">
              <span class="icon-[lucide--x]" aria-hidden="true"></span>
            </button>
          </header>
          <div class="desktop-add-icon-form">
            <label class="desktop-add-icon-field">
              <span>链接地址</span>
              <input type="url"
                     placeholder="https://example.com 或 /path"
                     x-model="addIconForm.href"
                     @input="addIconForm.error = ''"
                     @keydown.enter="submitAddIconForm()"
                     autocomplete="off"
                     autofocus>
            </label>
            <p class="desktop-add-icon-error" x-show="addIconForm.error" x-text="addIconForm.error" role="alert"></p>
            <label class="desktop-add-icon-field">
              <span>显示名称</span>
              <input type="text"
                     placeholder="可留空，自动提取域名"
                     x-model="addIconForm.title"
                     @keydown.enter="submitAddIconForm()"
                     autocomplete="off">
            </label>
            <div class="desktop-add-icon-field">
              <span>图标类型</span>
              <div class="desktop-add-icon-type-picker">
                <template x-for="t in [['folder','📁文件夹'],['document','📋文档'],['link','🔗链接']]" :key="t[0]">
                  <button type="button"
                          class="desktop-add-icon-type-btn"
                          :class="{ 'is-active': addIconForm.subtype === t[0] }"
                          @click="addIconForm.subtype = t[0]"
                          x-text="t[1]"></button>
                </template>
              </div>
            </div>
          </div>
          <footer class="desktop-add-icon-dialog-footer">
            <button type="button" class="desktop-add-icon-btn" @click="closeAddIconForm()">取消</button>
            <button type="button" class="desktop-add-icon-btn desktop-add-icon-btn--primary" @click="submitAddIconForm()" :disabled="!addIconForm.href.trim()">添加</button>
          </footer>
        </div>
      </div>

      <!-- 组件配置 modal（用于 hasConfig 组件，如图库分组选择） -->
      <div class="desktop-add-icon-backdrop"
           x-show="widgetConfigForm.open"
           @click.self="closeWidgetConfigForm()"
           x-transition:enter="transition ease-out duration-180"
           x-transition:enter-start="opacity-0"
           x-transition:enter-end="opacity-100"
           x-transition:leave="transition ease-in duration-140"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           style="display: none;">
        <div class="desktop-add-icon-dialog desktop-widget-config-dialog"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95 translate-y-2"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-140"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-95 translate-y-2">
          <header class="desktop-add-icon-dialog-header">
            <h2 x-text="widgetConfigForm.title ? `配置${widgetConfigForm.title}` : '配置组件'">配置组件</h2>
            <button type="button" class="desktop-add-icon-close" @click="closeWidgetConfigForm()" aria-label="关闭">
              <span class="icon-[lucide--x]" aria-hidden="true"></span>
            </button>
          </header>
          <div class="desktop-add-icon-form">
            <p class="desktop-add-icon-error"
               x-show="widgetConfigOptionsError"
               x-text="widgetConfigOptionsError"
               role="alert"></p>
            <template x-for="field in widgetConfigForm.configSchema" :key="field.key">
              <div class="desktop-add-icon-field desktop-widget-config-field">
                <span x-text="field.label || field.key"></span>

                <template x-if="field.type === 'photo-group'">
                  <div class="desktop-widget-config-group-list">
                    <template x-for="group in widgetConfigPhotoGroups()" :key="group.metadata?.name">
                      <button type="button"
                              class="desktop-widget-config-group-btn"
                              :class="{ 'is-active': widgetConfigForm.meta[field.key] === group.metadata?.name }"
                              @click="updateWidgetConfigMeta(field.key, group.metadata?.name || '')">
                        <span class="desktop-widget-config-group-name" x-text="group.spec?.displayName || group.metadata?.name"></span>
                        <span class="desktop-widget-config-group-count"
                              x-text="`${widgetConfigPhotoGroupCount(group)} 张`"></span>
                      </button>
                    </template>
                    <template x-if="!widgetConfigPhotoGroups().length">
                      <p class="desktop-widget-config-empty">还没有相册，请先在后台图库中创建分组。</p>
                    </template>
                  </div>
                </template>

                <template x-if="field.type === 'select'">
                  <select class="desktop-widget-config-select"
                          :value="widgetConfigForm.meta[field.key] || ''"
                          @change="updateWidgetConfigMeta(field.key, $event.target.value)">
                    <template x-for="option in widgetConfigSelectOptions(field)" :key="option.value">
                      <option :value="option.value" x-text="option.label"></option>
                    </template>
                  </select>
                </template>

                <template x-if="field.type === 'category-list'">
                  <div class="desktop-widget-config-category-list">
                    <p class="desktop-widget-config-help"
                       x-text="field.emptyLabel || `最多选择 ${field.maxItems || 4} 个分类`"></p>
                    <div class="desktop-widget-config-category-grid">
                      <template x-for="option in widgetConfigCategoryOptions(field)" :key="option.value">
                        <button type="button"
                                class="desktop-widget-config-category-btn"
                                :class="{ 'is-active': isWidgetConfigCategorySelected(field.key, option.value) }"
                                @click="toggleWidgetConfigCategory(field, option.value)">
                          <span x-text="option.label"></span>
                        </button>
                      </template>
                    </div>
                    <template x-if="!widgetConfigCategoryOptions(field).length">
                      <p class="desktop-widget-config-empty">还没有可选择的分类。</p>
                    </template>
                  </div>
                </template>

                <template x-if="field.type === 'number'">
                  <input class="desktop-widget-config-input"
                         type="number"
                         :min="field.min"
                         :max="field.max"
                         :step="field.step || 1"
                         :value="widgetConfigForm.meta[field.key]"
                         @input="updateWidgetConfigMeta(field.key, Number($event.target.value))">
                </template>

                <template x-if="field.type === 'text'">
                  <input class="desktop-widget-config-input"
                         type="text"
                         :placeholder="field.placeholder || ''"
                         :value="widgetConfigForm.meta[field.key] || ''"
                         @input="updateWidgetConfigMeta(field.key, $event.target.value)">
                </template>

                <template x-if="field.type === 'toggle'">
                  <button type="button"
                          class="desktop-widget-config-toggle"
                          :class="{ 'is-active': widgetConfigForm.meta[field.key] !== false }"
                          :aria-pressed="widgetConfigForm.meta[field.key] !== false"
                          @click="updateWidgetConfigMeta(field.key, widgetConfigForm.meta[field.key] === false)">
                    <span class="desktop-widget-config-toggle-label"
                          x-text="widgetConfigForm.meta[field.key] !== false ? '已开启' : '已关闭'"></span>
                    <span class="desktop-widget-config-toggle-track" aria-hidden="true">
                      <span class="desktop-widget-config-toggle-knob"></span>
                    </span>
                  </button>
                </template>
              </div>
            </template>

            <template x-if="widgetConfigForm.previewWidget">
              <div class="desktop-widget-config-preview" aria-label="组件预览">
                <p class="desktop-widget-config-preview-label">预览</p>
                <article class="desktop-widget-card desktop-widget-card--preview desktop-widget-config-preview-card"
                         :style="widgetConfigPreviewStyle()"
                         :data-widget-appearance="widgetAppearanceValue(widgetConfigForm.previewWidget)"
                         :class="widgetClassName(widgetConfigForm.previewWidget)">
                  <header class="desktop-widget-header">
                    <div>
                      <p class="desktop-widget-kicker" x-text="widgetKicker(widgetConfigForm.previewWidget)"></p>
                      <h2 class="desktop-widget-title" x-text="widgetConfigForm.previewWidget.title"></h2>
                    </div>
                  </header>
                  <div class="desktop-widget-body"
                       :data-widget-render-mode="widgetContentRenderMode(widgetConfigForm.previewWidget)"
                       x-widget-content="renderWidgetBody(widgetConfigForm.previewWidget, { preview: true })"></div>
                </article>
              </div>
            </template>
          </div>
          <footer class="desktop-add-icon-dialog-footer">
            <button type="button" class="desktop-add-icon-btn" @click="closeWidgetConfigForm()">取消</button>
            <button type="button"
                    class="desktop-add-icon-btn desktop-add-icon-btn--primary"
                    :disabled="!isWidgetConfigFormValid()"
                    @click="submitWidgetConfigForm()"
                    x-text="widgetConfigForm.mode === 'update' ? '保存设置' : '添加到桌面'">添加到桌面</button>
          </footer>
        </div>
      </div>

      <div class="desktop-widget-center-backdrop"
           x-show="showWidgetCenter"
           :style="centerBackdropStyle"
           x-transition:enter="transition ease-out duration-240"
           x-transition:enter-start="opacity-0"
           x-transition:enter-end="opacity-100"
           x-transition:leave="transition ease-in duration-180"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           style="display: none;"></div>

      <section class="desktop-widget-center"
               x-show="showWidgetCenter"
               x-transition:enter="transition ease-out duration-280"
               x-transition:enter-start="opacity-0 translate-y-14"
               x-transition:enter-end="opacity-100 translate-y-0"
               x-transition:leave="transition ease-in duration-180"
               x-transition:leave-start="opacity-100 translate-y-0"
               x-transition:leave-end="opacity-0 translate-y-10"
               style="display: none;">
        <div class="desktop-widget-center-frame"
             :style="centerSheetStyle"
             :class="{ 'is-dragging': centerSheetDrag.active }">
          <div class="desktop-widget-center-drag-area"
               @pointerdown.prevent="beginCenterSheetDrag($event)"
               @mousedown.prevent="beginCenterSheetDrag($event)">
            <button type="button"
                    class="desktop-widget-center-grabber"
                    aria-label="收起组件中心"
                    @click.stop="setEditStage('decorate')"></button>
          </div>
          <header class="desktop-widget-center-header">
            <div class="desktop-widget-center-heading">
              <h2>小组件</h2>
              <p x-show="desktopLayoutSaveFeedbackText"
                 :class="desktopLayoutSaveFeedbackClass"
                 x-text="desktopLayoutSaveFeedbackText"
                 style="display: none;"></p>
            </div>
            <div class="desktop-widget-center-actions">
              <button type="button"
                      class="desktop-widget-center-head-action desktop-widget-center-head-action--quiet"
                      @click="setEditStage('decorate')">完成添加</button>
              <button type="button"
                      class="desktop-widget-center-head-action desktop-widget-center-head-action--primary"
                      :disabled="serverLayoutSaving"
                      @click="saveDesktopEditing()"
                      x-text="desktopLayoutSaveButtonLabel()"></button>
            </div>
          </header>

          <div class="desktop-widget-center-shell">
            <aside class="desktop-widget-center-sidebar">
              <label class="desktop-widget-center-search">
                <span class="icon-[lucide--search]" aria-hidden="true"></span>
                <input type="search"
                       placeholder="搜索"
                       x-model.trim="widgetCenterSearch">
              </label>

              <div class="desktop-widget-center-nav">
                <template x-for="category in widgetCenterCategories" :key="category.id">
                  <button type="button"
                          class="desktop-widget-center-nav-item"
                          :class="{ 'is-active': widgetCenterCategory === category.id }"
                          @click="setWidgetCenterCategory(category.id)">
                    <span x-text="category.label"></span>
                  </button>
                </template>
              </div>
            </aside>

            <div class="desktop-widget-center-content">
              <div class="desktop-widget-center-content-header">
                <div>
                  <h3 x-text="widgetCenterCategories.find((item) => item.id === widgetCenterCategory)?.label || '全部'"></h3>
                </div>
                <p class="desktop-widget-center-content-count" x-text="`${filteredWidgetCatalog.length} 项`"></p>
              </div>

              <div class="desktop-widget-center-grid">
                <template x-if="!editingRuntime">
                  <div class="desktop-widget-center-empty">正在加载组件中心…</div>
                </template>

                <template x-if="editingRuntime && filteredWidgetCatalog.length === 0">
                  <div class="desktop-widget-center-empty">当前筛选条件下没有可展示的组件。</div>
                </template>

                <template x-for="entry in (editingRuntime ? groupedFilteredCatalog : [])" :key="entry._key || entry.catalogKey">
                  <div style="display:contents">
                    <!-- Section header -->
                    <div class="desktop-widget-center-section" x-show="entry._type === 'header'">
                      <h4 class="desktop-widget-center-section-title" x-text="entry.label"></h4>
                      <p class="desktop-widget-center-section-desc" x-show="entry.description" x-text="entry.description"></p>
                    </div>

                    <!-- Widget card -->
                    <article class="desktop-widget-center-item"
                             :class="`is-size-${entry.size}`"
                             x-show="!entry._type">
                      <!-- 预览区 -->
                      <div class="desktop-widget-center-preview" :style="selectedWidgetVariantStyle(entry)">
                        <article class="desktop-widget-card desktop-widget-card--preview"
                                 :data-widget-appearance="widgetAppearanceValue(selectedWidgetVariant(entry))"
                                 :class="widgetClassName(selectedWidgetVariant(entry))">
                          <header class="desktop-widget-header">
                            <div>
                              <p class="desktop-widget-kicker" x-text="widgetKicker(selectedWidgetVariant(entry))"></p>
                              <h2 class="desktop-widget-title" x-text="selectedWidgetVariant(entry).title"></h2>
                            </div>
                          </header>
                          <div class="desktop-widget-body"
                               :data-widget-render-mode="widgetContentRenderMode(selectedWidgetVariant(entry))"
                               x-widget-content="renderWidgetBody(selectedWidgetVariant(entry), { preview: true })"></div>
                        </article>
                      </div>

                      <!-- 底栏 -->
                      <div class="desktop-widget-center-item-foot">
                        <div class="desktop-widget-center-item-info">
                          <div class="desktop-widget-center-item-title-row">
                            <h3 class="desktop-widget-center-item-title">
                              <span x-text="entry.title"></span>
                              <span class="desktop-widget-center-size-badge" x-text="entry.sizeLabel"></span>
                            </h3>
                            <span class="desktop-widget-center-added-badge"
                                  x-show="widgetCatalogAddedCount(entry) > 0"
                                  x-text="`已添加 ${widgetCatalogAddedCount(entry)} 个`"
                                  style="display: none;"></span>
                          </div>
                          <p class="desktop-widget-center-item-meta" x-text="catalogStatusText(entry)"></p>
                        </div>
                        <div class="desktop-widget-center-item-controls">
                          <div class="desktop-widget-center-appearance-picker" role="tablist" :aria-label="`${entry.title} 外观`">
                            <template x-for="appearance in ['follow', 'light', 'dark']" :key="`${entry.catalogKey}-${appearance}`">
                              <button type="button"
                                      class="desktop-widget-center-appearance-option"
                                      :class="{ 'is-active': isCatalogAppearanceSelected(entry, appearance) }"
                                      @click="selectCatalogAppearance(entry.catalogKey, appearance)"
                                      x-text="widgetAppearanceLabel(appearance)"></button>
                            </template>
                          </div>
                          <button type="button"
                                  class="desktop-widget-center-item-action"
                                  @click="addWidgetFromCatalog(entry.widget, entry.size, entry.catalogKey)">添加</button>
                        </div>
                      </div>
                    </article>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <div class="desktop-widget-center-safe-area" aria-hidden="true"></div>
        </div>
      </section>

      <div class="desktop-widgets-grid-shell" x-ref="gridShell">
        <div class="desktop-widgets-grid" x-ref="grid" :style="gridStyle" :class="{ 'is-editing': isEditing }">
          <template x-for="guide in snapGuides" :key="guide.key">
            <div class="desktop-node-snap-guide"
                 :class="`is-${guide.axis}`"
                 :style="guide.style"></div>
          </template>

          <div class="desktop-widget-drop-preview"
               x-show="previewPlacement"
               :class="previewPlacementClass()"
               :style="previewStyle"
               style="display: none;"></div>

          <template x-for="node in visibleDesktopNodes" :key="desktopNodeLoopKey(node)">
            <div :class="desktopNodeSlotClassName(node)"
                 :style="getDesktopNodeStyle(node)"
                 :data-desktop-key="node.key"
                 @contextmenu.prevent="openDesktopNodeContextMenu(node, $event)">
              <template x-if="isWidgetNode(node)">
                <article class="desktop-widget-card"
                         :data-widget-appearance="widgetAppearanceValue(node)"
                         :class="widgetCardClass(node)"
                         @pointerdown="beginWidgetDrag(node, $event)">
                  <header class="desktop-widget-header">
                    <div>
                      <p class="desktop-widget-kicker" x-text="widgetKicker(node)"></p>
                      <h2 class="desktop-widget-title" x-text="node.title"></h2>
                      </div>
                      </header>
                      <div class="desktop-widget-body"
                           :data-widget-render-mode="widgetContentRenderMode(node)"
                           x-widget-content="renderWidgetBody(node)"></div>
                      </article>
                      </template>
              <!-- 悬浮删除按钮（放在 slot 层，不受 card overflow:hidden 影响） -->
              <button type="button"
                      class="desktop-widget-remove-btn"
                      x-show="false"
                      @click.stop="hideWidget(node.key)"
                      style="display: none;"
                      aria-label="移除组件"
                      title="删除">
                <span class="icon-[lucide--trash-2]" aria-hidden="true"></span>
              </button>

              <template x-if="isIconNode(node)">
                <a class="desktop-icon"
                   :class="desktopNodeContentClassName(node)"
                   :href="node.href"
                   :target="node.external ? '_blank' : null"
                   :rel="node.external ? 'noopener noreferrer' : null"
                   :data-pjax-app="node.pjaxApp || null"
                   :data-id="node.dataId"
                   :data-desktop-key="node.key"
                   @click="handleDesktopIconClick($event, node.key)"
                   @pointerdown="beginIconDrag(node.key, $event)">
                  <div class="desktop-icon-graphic" x-html="typeof node !== 'undefined' ? renderDesktopIconGraphic(node) : ''"></div>
                  <div class="desktop-icon-label" x-text="typeof node !== 'undefined' ? node.title : ''"></div>
                </a>
              </template>
              <!-- 图标删除按钮（编辑态可见，放在 slot 层避免被 icon overflow 裁剪） -->
              <button type="button"
                      class="desktop-widget-remove-btn"
                      x-show="false"
                      @click.stop="removeIcon(node.key)"
                      style="display: none;"
                      aria-label="移除图标"
                      title="删除">
                <span class="icon-[lucide--trash-2]" aria-hidden="true"></span>
              </button>
            </div>
          </template>
        </div>
      </div>

      <div class="desktop-widget-drag-ghost"
           x-show="dragState.active"
           :style="dragGhostStyle"
           style="display: none;">
        <template x-if="dragState.kind === 'widget' && dragState.widgetMarkup">
          <article class="desktop-widget-card is-drag-ghost"
                   :data-widget-appearance="dragState.widget?.appearance || 'follow'"
                   :class="dragState.widget ? widgetTypeClass(dragState.widget) : ''"
                   x-html="dragState.widgetMarkup">
          </article>
        </template>
        <template x-if="dragState.kind === 'icon' && dragState.iconMarkup">
          <div class="desktop-icon desktop-icon--ghost" x-html="dragState.iconMarkup"></div>
        </template>
      </div>

      <div class="desktop-save-hint"
           x-show="isEditing && canManageDefaultDesktopLayout"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-4"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100 translate-y-0"
           x-transition:leave-end="opacity-0 translate-y-4"
           x-html="saveShortcutHintMarkup"
           style="display: none;"></div>
    </section>
  </th:block>
</html>
