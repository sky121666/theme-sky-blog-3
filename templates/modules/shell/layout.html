<!doctype html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  th:fragment="html (title, description, ssrContent, canonical, image, type, seoFallback, pageMode, pageApp, windowVariant, windowScene, windowTitle, windowResizable, windowMaximizable, windowMetricsKey)"
  th:data-default-theme="${theme.config.header?.theme?.default_mode ?: 'system'}"
>
  <head
    th:with="
      pageDescription = ${!#strings.isEmpty(description) ? description : (!#strings.isEmpty(site.seo?.description) ? site.seo.description : site.subtitle)},
      pageType = ${!#strings.isEmpty(type) ? type : 'website'},
      pageModeValue = ${pageMode != null ? pageMode.toString() : ''},
      pageAppValue = ${pageApp != null ? pageApp.toString() : ''},
      seoFallbackMode = ${seoFallback != null ? seoFallback.toString() : 'none'},
      seoPluginAvailable = ${pluginFinder.available('seo-tools') or pluginFinder.available('plugin-seo-tools')},
      shouldEmitMetaFallback = ${!seoPluginAvailable and (seoFallbackMode == 'meta' or seoFallbackMode == 'full')},
      faviconHref = ${site.favicon != null ? site.favicon.toString() : ''},
      touchIconHref = ${site.logo != null ? site.logo.toString() : ''},
      rawCanonical = ${canonical != null ? canonical.toString() : ''},
      rawImage = ${image != null ? image.toString() : ''},
      siteBaseUrl = ${site.url != null ? site.url.toString() : ''},
      absoluteCanonical = ${!#strings.isEmpty(rawCanonical) ? ((rawCanonical.startsWith('http://') or rawCanonical.startsWith('https://')) ? rawCanonical : (!#strings.isEmpty(siteBaseUrl) ? ((siteBaseUrl.endsWith('/') and rawCanonical.startsWith('/')) ? siteBaseUrl + rawCanonical.substring(1) : ((!siteBaseUrl.endsWith('/')) and (!rawCanonical.startsWith('/')) ? siteBaseUrl + '/' + rawCanonical : siteBaseUrl + rawCanonical)) : rawCanonical)) : ''},
      absoluteImage = ${!#strings.isEmpty(rawImage) ? ((rawImage.startsWith('http://') or rawImage.startsWith('https://')) ? rawImage : (!#strings.isEmpty(siteBaseUrl) ? ((siteBaseUrl.endsWith('/') and rawImage.startsWith('/')) ? siteBaseUrl + rawImage.substring(1) : ((!siteBaseUrl.endsWith('/')) and (!rawImage.startsWith('/')) ? siteBaseUrl + '/' + rawImage : siteBaseUrl + rawImage)) : rawImage)) : ''},
      shouldEmitCanonicalFallback = ${!seoPluginAvailable and !#strings.isEmpty(absoluteCanonical)},
      shouldEmitSocialFallback = ${!seoPluginAvailable and seoFallbackMode == 'full'},
      themeAssetVersion = ${theme.spec.version ?: '0.9.0'},
      themeAssetRevision = ${theme.metadata.version ?: themeAssetVersion},
      themeFallbackIcon = ${#theme.assets('/favicon.svg')}">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- plugin-contract: seo-tools; contract-version: 1.9.5; tested-version: 1.9.5; status: confirmed; source: docs/插件适配契约.md -->
    <!-- SEO -->
    <title th:text="${title}"></title>
    <meta name="robots" th:if="${error != null}" content="noindex,nofollow" />
    <meta name="description"
          th:if="${shouldEmitMetaFallback and !#strings.isEmpty(pageDescription)}"
          data-theme-seo-fallback="description"
          th:content="${pageDescription}" />
    <link rel="canonical"
          th:if="${shouldEmitCanonicalFallback}"
          data-theme-seo-fallback="canonical"
          th:href="${absoluteCanonical}" />
    <meta property="og:url"
          th:if="${shouldEmitCanonicalFallback}"
          data-theme-seo-fallback="og:url"
          th:content="${absoluteCanonical}" />
    <meta property="og:site_name"
          th:if="${shouldEmitCanonicalFallback and !#strings.isEmpty(site.title)}"
          data-theme-seo-fallback="og:site_name"
          th:content="${site.title}" />

    <meta property="og:title"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(title)}"
          data-theme-seo-fallback="og:title"
          th:content="${title}" />
    <meta property="og:type"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(pageType)}"
          data-theme-seo-fallback="og:type"
          th:content="${pageType}" />
    <meta property="og:description"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(pageDescription)}"
          data-theme-seo-fallback="og:description"
          th:content="${pageDescription}" />
    <meta property="og:image"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(absoluteImage)}"
          data-theme-seo-fallback="og:image"
          th:content="${absoluteImage}" />

    <meta name="twitter:card"
          th:if="${shouldEmitSocialFallback}"
          data-theme-seo-fallback="twitter:card"
          th:content="${!#strings.isEmpty(absoluteImage) ? 'summary_large_image' : 'summary'}" />
    <meta name="twitter:title"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(title)}"
          data-theme-seo-fallback="twitter:title"
          th:content="${title}" />
    <meta name="twitter:description"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(pageDescription)}"
          data-theme-seo-fallback="twitter:description"
          th:content="${pageDescription}" />
    <meta name="twitter:image"
          th:if="${shouldEmitSocialFallback and !#strings.isEmpty(absoluteImage)}"
          data-theme-seo-fallback="twitter:image"
          th:content="${absoluteImage}" />
    <script id="theme-seo-fallback-config"
            type="application/json"
            data-theme-seo-fallback-config="true"
            th:data-mode="${seoFallbackMode}"
            th:data-title="${title}"
            th:data-description="${pageDescription}"
            th:data-canonical="${absoluteCanonical}"
            th:data-image="${absoluteImage}"
            th:data-page-type="${pageType}"
            th:data-site-name="${site.title}"></script>
    <!-- plugin-contract: PluginFeed; contract-version: 1.5.0; tested-version: 1.5.0; status: confirmed; source: docs/插件适配契约.md -->
    <link rel="alternate"
          type="application/rss+xml"
          title="RSS"
          th:if="${pluginFinder.available('PluginFeed')}"
          th:href="@{/rss.xml}" />

    <link rel="icon" type="image/svg+xml" th:if="${#strings.isEmpty(faviconHref)}" th:href="${themeFallbackIcon}" />
    <link rel="shortcut icon" th:if="${#strings.isEmpty(faviconHref)}" th:href="${themeFallbackIcon}" />
    <link rel="apple-touch-icon" th:if="${#strings.isEmpty(faviconHref) and !#strings.isEmpty(touchIconHref)}" th:href="${touchIconHref}" />
    <link rel="apple-touch-icon" th:if="${#strings.isEmpty(faviconHref) and #strings.isEmpty(touchIconHref)}" th:href="${themeFallbackIcon}" />

    <!-- 阻止暗黑模式闪烁的内联脚本 -->
    <script>
      (function() {
        var root = document.documentElement;
        var defaultTheme = root.getAttribute('data-default-theme') || 'system';
        var savedTheme = localStorage.getItem('theme');
        var theme = savedTheme || defaultTheme;
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

        root.classList.remove('dark', 'light', 'system', 'color-scheme-auto', 'color-scheme-dark', 'color-scheme-light');
        root.classList.add(theme === 'system' ? 'color-scheme-auto' : 'color-scheme-' + theme);
        root.classList.add(theme);
        root.setAttribute('data-color-scheme', theme);
        root.setAttribute('data-theme', isDark ? 'dark' : 'light');
        root.style.colorScheme = isDark ? 'dark' : 'light';

        if (isDark) {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
      })();
    </script>

	    <!-- 本地打包产物：使用主题版本号 + Halo 主题资源版本作为缓存边界 -->
	    <link id="shell-core-style"
	          rel="stylesheet"
	          th:href="@{/assets/css/shell-core/index.css(v=${themeAssetVersion},r=${themeAssetRevision})}" />
	    <link rel="stylesheet"
	          th:if="${!#strings.isEmpty(pageAppValue)}"
	          th:attr="data-app-css=${pageAppValue}"
	          th:href="@{'/assets/css/apps/' + ${(pageAppValue == 'explorer-tags' ? 'tags' : (pageAppValue == 'explorer-categories' ? 'categories' : (pageAppValue == 'explorer-author' ? 'author' : (pageAppValue == 'explorer-archives' ? 'archives' : pageAppValue))))} + '/index.css?v=' + ${themeAssetVersion} + '&r=' + ${themeAssetRevision}}" />
	    <script type="module"
	            th:if="${!#strings.isEmpty(pageAppValue)}"
	            th:attr="data-app-script=${pageAppValue}"
	            th:src="@{'/assets/js/apps/' + ${(pageAppValue == 'explorer-tags' ? 'tags' : (pageAppValue == 'explorer-categories' ? 'categories' : (pageAppValue == 'explorer-author' ? 'author' : (pageAppValue == 'explorer-archives' ? 'archives' : pageAppValue))))} + '/index.js?v=' + ${themeAssetVersion} + '&r=' + ${themeAssetRevision}}"></script>
	    <script type="module" th:inline="javascript">
	      (() => {
	        const manifestUrl = /*[[@{/assets/asset-manifest.json(v=${themeAssetVersion},r=${themeAssetRevision})}]]*/ '/assets/asset-manifest.json';
	        const fallbackScriptUrl = /*[[@{/assets/js/shell-core/index.js(v=${themeAssetVersion},r=${themeAssetRevision})}]]*/ '/assets/js/shell-core/index.js';
	        const fallbackStyleUrl = /*[[@{/assets/css/shell-core/index.css(v=${themeAssetVersion},r=${themeAssetRevision})}]]*/ '/assets/css/shell-core/index.css';
	        const shellStyle = document.querySelector('link[href*="/assets/css/shell-core/index.css"]');

	        const withQuery = (url, query) => {
	          if (!query) return url;
	          const parsed = new URL(url, window.location.origin);
	          const params = new URLSearchParams(query);
	          params.forEach((value, key) => parsed.searchParams.set(key, value));
	          return `${parsed.pathname}${parsed.search}${parsed.hash}`;
	        };

	        const importShell = (scriptUrl, styleUrl) => {
	          if (shellStyle && styleUrl) {
	            const currentStyleUrl = new URL(shellStyle.href, window.location.origin);
	            const nextStyleUrl = new URL(styleUrl, window.location.origin);
	            // 服务端首屏 link 已带 Halo 版本；同路径仅 revision 不同不重复下载整份 Shell CSS。
	            if (currentStyleUrl.pathname !== nextStyleUrl.pathname) {
	              shellStyle.href = styleUrl;
	            }
	          }
	          return import(scriptUrl);
	        };

	        fetch(manifestUrl, {
	          credentials: 'same-origin',
	          cache: 'no-store'
	        })
	          .then((response) => response.ok ? response.json() : Promise.reject(new Error(`asset-manifest ${response.status}`)))
	          .then((manifest) => {
	            const query = String(manifest?.__meta?.query || '').replace(/^\?/, '');
	            return importShell(withQuery(fallbackScriptUrl, query), withQuery(fallbackStyleUrl, query));
	          })
	          .catch(() => importShell(fallbackScriptUrl, fallbackStyleUrl));
	      })();
	    </script>
  </head>

          {
            key: [[${'icon-custom-' + icon.name}]],

            href: [[${icon.href}]],
            pjax: [[${!icon.external}]],
            pjaxApp: '',
            external: [[${icon.external}]],
            subtype: [[${icon.type}]],
            dataId: [[${icon.name}]]
          },
          /*[/]*/
          /*[# th:each="catName : ${desktopCategories}"]*/
          {
            key: [[${'icon-category-' + catName}]],
            title: [[${categoryFinder.getByName(catName) != null ? categoryFinder.getByName(catName).spec.displayName : catName}]],
            href: [[${categoryFinder.getByName(catName) != null ? categoryFinder.getByName(catName).status.permalink : '#'}]],
            pjax: true,
            pjaxApp: 'explorer-categories',
            external: false,
            subtype: 'folder',
            dataId: [[${catName}]]
          },
          /*[/]*/
          /*[# th:each="tagName : ${desktopTags}"]*/
          {
            key: [[${'icon-tag-' + tagName}]],
            title: [[${tagFinder.getByName(tagName) != null ? tagFinder.getByName(tagName).spec.displayName : tagName}]],
            href: [[${tagFinder.getByName(tagName) != null ? tagFinder.getByName(tagName).status.permalink : '#'}]],
            pjax: true,
            pjaxApp: 'explorer-tags',
            external: false,
            subtype: 'folder',
            dataId: [[${tagName}]]
          },
          /*[/]*/
          /*[# th:each="postName : ${desktopPosts}"]*/
          {
            key: [[${'icon-post-' + postName}]],
            title: [[${postFinder.getByName(postName) != null ? postFinder.getByName(postName).spec.title : postName}]],
            href: [[${postFinder.getByName(postName) != null ? postFinder.getByName(postName).status.permalink : '#'}]],
            pjax: true,
            pjaxApp: 'reader',
            external: false,
            subtype: 'document',
            dataId: [[${postName}]]
          },
          /*[/]*/
          /*[# th:each="pageName : ${desktopSinglePages}"]*/
          {
            key: [[${'icon-page-' + pageName}]],
            title: [[${singlePageFinder.getByName(pageName) != null ? singlePageFinder.getByName(pageName).spec.title : pageName}]],

            pjax: true,
            pjaxApp: 'reader',
            external: false,
            subtype: 'document',
            dataId: [[${pageName}]]
          },
          /*[/]*/
        ];

        window.__THEME_DESKTOP_PROTOCOL__ = Object.assign(window.__THEME_DESKTOP_PROTOCOL__ || {}, {
          baseColumns,
          icons: rawIcons
        });
        window.__THEME_DESKTOP_ICONS__ = window.__THEME_DESKTOP_PROTOCOL__.icons;

    <!-- ==================== Dock ==================== -->
    <div class="dock-container" th:attr="data-show-labels=${dockShowLabels},data-magnification=${dockMagnification},data-dock-icon-size=${dockIconSize},data-dock-icon-gap=${dockIconGap},data-dock-padding=${dockPadding},data-dock-mag-scale=${dockMagScale},data-dock-glass-blur=${dockGlassBlur},data-dock-glass-opacity=${dockGlassOpacity}" x-data="dock">
      <div class="dock-glass"></div>
      <div class="dock-bar relative z-10" x-ref="dockBar">
        <th:block th:if="${dockMenu != null}">
          <th:block th:each="menuItem : ${dockMenu.menuItems}">
            <th:block th:with="iconType = ${#annotations.getOrDefault(menuItem, 'icon_type', 'iconify')},
                iconSvg = ${#annotations.getOrDefault(menuItem, 'icon', '')},
                customSvg = ${#annotations.getOrDefault(menuItem, 'custom_svg', '')},
                imageUrl = ${#annotations.getOrDefault(menuItem, 'image_url', '')},
                dockImageUrl = ${#strings.trim(imageUrl)},
                dockImageUrlLower = ${#strings.toLowerCase(dockImageUrl)},
                dockImageAllowed = ${!#strings.isEmpty(dockImageUrl) and (#strings.startsWith(dockImageUrl, '/') or #strings.startsWith(dockImageUrlLower, 'https://') or #strings.startsWith(dockImageUrlLower, 'http://'))},
                bgColor = ${#annotations.getOrDefault(menuItem, 'bg_color', '')}">
              
              <!-- 改为 PJAX <a> 链接 -->
              <a class="dock-icon group"
                 th:href="${menuItem.status.href}"
                 th:target="${menuItem.spec.target?.name() == 'BLANK' ? '_blank' : '_self'}"
                 th:classappend="${menuItem.spec.target?.name() == 'BLANK' ? '' : ' pjax-link'}"
                 th:style="${iconType != 'image' and !#strings.isEmpty(bgColor) ? 'background-color:' + bgColor : ''}"
                 th:title="${menuItem.status.displayName}">

                <!-- Tooltip -->
                <div class="dock-tooltip" x-show="$el.closest('.dock-container').dataset.showLabels === 'true'" th:text="${menuItem.status.displayName}">Name</div>

                <!-- 图片类型 -->
                <th:block th:if="${iconType == 'image' and dockImageAllowed}">
                  <img class="dock-icon-img" th:src="${dockImageUrl}" th:alt="${menuItem.status.displayName}" loading="lazy" decoding="async" draggable="false" />
                </th:block>

                <!-- 禁止 data/blob/javascript 等内联或可执行协议，避免大图复制进 HTML。 -->
                <th:block th:if="${iconType == 'image' and !dockImageAllowed}">
                  <div class="dock-icon-svg dock-icon-svg--fallback" aria-hidden="true">
                    <span class="icon-[lucide--app-window]"></span>
                  </div>
                </th:block>

                <!-- SVG 类型 -->
                <th:block th:if="${iconType != 'image'}">
                  <th:block th:with="svgContent = ${iconType == 'custom_svg' ? customSvg : iconSvg}">
                    <th:block th:if="${!#strings.isEmpty(svgContent)}">
                      <div class="dock-icon-svg" th:utext="${svgContent}"></div>
                    </th:block>
                  </th:block>
                </th:block>

                <!-- 运行状态指示点 -->
                <div class="dock-dot"
                     x-show="$store.windowManager.show &amp;&amp; window.location.pathname.replace(/\/$/, '') === new URL($el.parentElement.href, window.location.origin).pathname.replace(/\/$/, '')"
                     x-transition:enter="transition ease-out duration-150"
                     x-transition:enter-start="opacity-0 scale-50"
                     x-transition:enter-end="opacity-100 scale-100"
                     style="display: none;"></div>
              </a>
            </th:block>
          </th:block>
        </th:block>

        <!-- 动态缩小应用展示区 (macOS 分割线 + 极简文稿图标) -->
        <template x-if="$store.windowManager.minimized">
           <div style="display: contents;">
              <!-- macOS 竖向分隔线 -->
              <div class="dock-separator"></div>
              
              <!-- 最小化的应用图标 -->
              <button id="minimized-dock-icon" type="button" class="dock-icon group cursor-pointer relative shrink-0" 
                 @click.stop="$store.windowManager.restore()">
               <!-- Hover Label -->
               <div class="dock-tooltip" x-show="$el.closest('.dock-container').dataset.showLabels === 'true'" x-text="$store.windowManager.title"></div>
               <!-- 缩略图图标 (macOS 窗口微缩) -->
               <div class="dock-minimized-thumb">
                 <svg viewBox="0 0 52 40" fill="none">
                    <rect class="dock-thumb-window" width="52" height="40" rx="4"/>
                    <path class="dock-thumb-titlebar" d="M0 4 C0 1.79 1.79 0 4 0 L48 0 C50.21 0 52 1.79 52 4 L52 10 L0 10 Z"/>
                    <rect class="dock-thumb-divider" x="0" y="10" width="52" height="0.5"/>
                    <circle cx="6" cy="5" r="1.5" fill="#ff5f56" stroke="#e0443e" stroke-width="0.3"/>
                    <circle cx="11" cy="5" r="1.5" fill="#ffbd2e" stroke="#dea123" stroke-width="0.3"/>
                    <circle cx="16" cy="5" r="1.5" fill="#27c93f" stroke="#1aab29" stroke-width="0.3"/>
                 </svg>
               </div>
               <!-- 指示点 -->
               <div class="dock-dot"></div>
             </button>
          </div>
        </template>
      </div>
    </div>
