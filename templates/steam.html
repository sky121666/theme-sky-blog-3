<!DOCTYPE html>
<th:block xmlns:th="https://www.thymeleaf.org"
          th:with="
            totalGames=${games != null and games.total != null ? games.total : 0},
            rawWindowTitle=${!#strings.isEmpty(title) ? title : 'Steam 游戏库'},
            windowTitleSuffix=${!#strings.isEmpty(site.title) ? ' - ' + site.title : ''},
            resolvedWindowTitle=${!#strings.isEmpty(windowTitleSuffix) and #strings.endsWith(rawWindowTitle, windowTitleSuffix) ? #strings.substring(rawWindowTitle, 0, #strings.length(rawWindowTitle) - #strings.length(windowTitleSuffix)) : rawWindowTitle},
            resolvedWindowSubtitle=${totalGames != null ? ('共 ' + totalGames + ' 款游戏') : 'Steam 信息展示'},
            resolvedDocumentTitle=${!#strings.isEmpty(site.title) ? resolvedWindowTitle + ' - ' + site.title : resolvedWindowTitle}">
  <html th:replace="~{modules/shell/layout :: html(
          title = ${resolvedDocumentTitle},
          description = 'Steam 用户资料、游戏库、最近游玩和徽章信息',
          ssrContent = ~{modules/steam-app/list :: content},
          canonical = '/steam',
          image = ${site.logo},
          type = 'website',
          seoFallback = 'meta',
          pageMode = 'browser-steam',
          pageApp = 'steam',
          windowVariant = 'steam',
          windowScene = 'profile',
          windowTitle = ${resolvedWindowTitle},
          windowResizable = true,
          windowMaximizable = true,
          windowMetricsKey = 'steam'
        )}"></html>
</th:block>
