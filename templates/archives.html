<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = '时光机归档 - ' + ${site.title},
        description = '',
        ssrContent = ~{::ssrBlock}
      )}">
  <th:block th:fragment="ssrBlock">
    <div class="max-w-4xl mx-auto px-4 md:px-8 py-10 md:py-16">
      
      <div class="mb-14 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-gray-800 mb-3">历史档案</h1>
        <p class="text-gray-500 text-lg">Timeline Archives</p>
      </div>
      
      <div class="space-y-12">
        <th:block th:each="archive : ${archives}">
          <div class="relative pl-4 md:pl-0">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 md:sticky top-0 bg-white/80 backdrop-blur pb-2 z-10" th:text="${archive.year} + ' / ' + ${archive.month}"></h2>
            <div class="space-y-6 md:ml-6 border-l-2 border-gray-100 pl-6">
              <div th:each="post : ${archive.posts}" class="relative group">
                <span class="absolute -left-[31px] md:-left-[31px] top-1.5 w-3 h-3 bg-gray-200 rounded-full border-2 border-white group-hover:bg-blue-500 transition-colors"></span>
                <a class="pjax-link block" th:href="${post.status.permalink}">
                  <h3 class="text-lg font-medium text-gray-800 group-hover:text-blue-600 transition-colors" th:text="${post.spec.title}"></h3>
                  <time class="text-sm text-gray-400 mt-1" th:text="${#dates.format(post.spec.publishTime, 'MM-dd')}"></time>
                </a>
              </div>
            </div>
          </div>
        </th:block>
      </div>

    </div>
  </th:block>
</html>
