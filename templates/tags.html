<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(
        title = '所有标签 - ' + ${site.title},
        description = '',
        ssrContent = ~{::ssrBlock}
      )}">
  <th:block th:fragment="ssrBlock">
    <div class="max-w-4xl mx-auto px-4 md:px-8 py-10 md:py-16">
      
      <div class="mb-14 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-gray-800 mb-3">所有标签</h1>
        <p class="text-gray-500 text-lg" th:text="'发现 ' + ${tags.size()} + ' 个宇宙信标'"></p>
      </div>
      
      <!-- 极简标签云 -->
      <div class="flex flex-wrap items-center justify-center gap-4 mt-8">
        <a th:each="tag : ${tags}" 
           th:href="${tag.status.permalink}"
           class="pjax-link group px-4 py-2 bg-gray-100 hover:bg-blue-500 hover:text-white rounded-xl text-sm font-medium text-gray-700 transition-all duration-300 shadow-sm hover:shadow-md hover:-translate-y-0.5"
           th:style="'font-size: ' + (14 + ${tag.status.postCount} * 1) + 'px'">
           <span class="opacity-50 mr-1 group-hover:opacity-100">#</span>
           <span th:text="${tag.spec.displayName}"></span>
           <span class="ml-1 text-xs opacity-60" th:text="${tag.status.postCount}"></span>
        </a>
      </div>
      
    </div>
  </th:block>
</html>
