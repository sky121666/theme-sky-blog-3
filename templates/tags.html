<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{modules/layout :: html(
        title = ${'所有标签 - ' + site.title},
        description = ${site.seo?.description ?: site.subtitle},
        ssrContent = ~{::ssrBlock},
        canonical = '/tags',
        image = ${site.logo},
        type = 'website',
        seoFallback = 'meta',
        pageMode = 'browser-list',
        pageApp = 'explorer'
      )}">
<th:block th:fragment="tagPostPanels(tags)">
  <th:block th:with="tagPageSize=${site.post != null and site.post.tagPageSize != null ? site.post.tagPageSize : 10}">
    <th:block th:each="tagItem : ${tags}">
      <th:block th:with="tagPostsMeta = ${postFinder.list({
        page: 1,
        size: tagPageSize,
        tagName: tagItem.metadata.name,
        sort: {'spec.publishTime,desc'}
      })}, pageCount=${tagPostsMeta.totalPages > 0 ? tagPostsMeta.totalPages : 1}">
        <th:block th:each="pageNumber : ${#numbers.sequence(1, pageCount)}">
          <th:block th:with="tagPosts = ${postFinder.list({
            page: pageNumber,
            size: tagPageSize,
            tagName: tagItem.metadata.name,
            sort: {'spec.publishTime,desc'}
          })}">
            <div data-tags-post-panel th:attr="data-tag-key=${tagItem.metadata.name},data-tag-page=${pageNumber}"
              x-show="activeTagKey === $el.dataset.tagKey && activeTagPage === Number($el.dataset.tagPage)" x-cloak>
              <a class="tag-post-row pjax-link" data-pjax-app="reader" th:each="post : ${tagPosts.items}" th:href="${post.status.permalink}"
                data-tags-post-option
                th:attr="data-parent-tag-key=${tagItem.metadata.name},data-tag-page=${pageNumber},data-post-key=${post.metadata.name},data-post-title=${post.spec.title}"
                @mouseenter="selectPost($el.dataset.postKey, $el.dataset.postTitle)"
                @focus="selectPost($el.dataset.postKey, $el.dataset.postTitle)"
                @click="selectPost($el.dataset.postKey, $el.dataset.postTitle)"
                :class="{ 'is-active': activePostKey === $el.dataset.postKey }">
                <div class="tag-post-row-main">
                  <svg class="tag-post-file-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path
                      d="M4 1.75H9.25L12.5 5V12.5C12.5 13.3284 11.8284 14 11 14H4C3.17157 14 2.5 13.3284 2.5 12.5V3.25C2.5 2.42157 3.17157 1.75 4 1.75Z"
                      stroke="currentColor" stroke-width="1.1" />
                    <path d="M9 1.75V5.25H12.5" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round" />
                  </svg>
                  <span class="tag-post-row-title" th:text="${post.spec.title}">文章标题</span>
                </div>
                <span class="tag-post-row-meta">
                  <time th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.03.26</time>
                  <span th:text="${post.stats.comment} + ' 评论'">0 评论</span>
                </span>
              </a>

              <div class="tags-post-empty" th:if="${#lists.isEmpty(tagPosts.items)}">
                <p>这个标签下还没有文章。</p>
              </div>

              <nav class="tag-pagination" th:if="${pageCount > 1}">
                <button type="button" class="tag-page-btn" th:classappend="${pageNumber == 1 ? ' is-disabled' : ''}"
                  th:disabled="${pageNumber == 1}"
                  th:attr="data-target-page=${pageNumber - 1},aria-label='上一页，第 ' + ${pageNumber - 1} + ' 页'"
                  @click="selectTagPage($el.dataset.targetPage)">
                  上一页
                </button>

                <span class="tag-page-indicator" th:text="${pageNumber} + ' / ' + ${pageCount}">1 / 1</span>

                <button type="button" class="tag-page-btn"
                  th:classappend="${pageNumber >= pageCount ? ' is-disabled' : ''}"
                  th:disabled="${pageNumber >= pageCount}"
                  th:attr="data-target-page=${pageNumber + 1},aria-label='下一页，第 ' + ${pageNumber + 1} + ' 页'"
                  @click="selectTagPage($el.dataset.targetPage)">
                  下一页
                </button>
              </nav>
            </div>
          </th:block>
        </th:block>
      </th:block>
    </th:block>
  </th:block>
</th:block>

<th:block th:fragment="tagPreviewPanels(tags)">
  <th:block th:with="tagPageSize=${site.post != null and site.post.tagPageSize != null ? site.post.tagPageSize : 10}">
    <th:block th:each="tag : ${tags}">
      <th:block th:with="tagPostsMeta = ${postFinder.list({
        page: 1,
        size: tagPageSize,
        tagName: tag.metadata.name,
        sort: {'spec.publishTime,desc'}
      })}, pageCount=${tagPostsMeta.totalPages > 0 ? tagPostsMeta.totalPages : 1}">
        <th:block th:each="pageNumber : ${#numbers.sequence(1, pageCount)}">
          <th:block th:with="tagPosts = ${postFinder.list({
            page: pageNumber,
            size: tagPageSize,
            tagName: tag.metadata.name,
            sort: {'spec.publishTime,desc'}
          })}">
            <th:block th:each="post : ${tagPosts.items}">
              <article class="tag-preview-panel" data-tag-post-panel
                th:attr="data-tag-key=${tag.metadata.name},data-tag-page=${pageNumber},data-post-key=${post.metadata.name}"
                x-show="activeTagKey === $el.dataset.tagKey && activeTagPage === Number($el.dataset.tagPage) && activePostKey === $el.dataset.postKey"
                x-cloak>
                <header class="tag-preview-header">
                  <div class="tag-preview-icon">
                    <svg class="tag-post-file-icon tag-post-file-icon--preview" viewBox="0 0 16 16" fill="none"
                      aria-hidden="true">
                      <path
                        d="M4 1.75H9.25L12.5 5V12.5C12.5 13.3284 11.8284 14 11 14H4C3.17157 14 2.5 13.3284 2.5 12.5V3.25C2.5 2.42157 3.17157 1.75 4 1.75Z"
                        stroke="currentColor" stroke-width="1.1" />
                      <path d="M9 1.75V5.25H12.5" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round" />
                    </svg>
                  </div>
                  <div class="tag-preview-heading">
                    <h2 class="tag-preview-title" th:text="${post.spec.title}">文章标题</h2>
                    <p class="tag-preview-path"
                      th:text="${tag.spec.displayName} + ' / ' + ${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">标签
                      / 时间</p>
                  </div>
                </header>

                <dl class="tag-preview-meta">
                  <div>
                    <dt>发布日期</dt>
                    <dd th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.03.26</dd>
                  </div>
                  <div>
                    <dt>评论</dt>
                    <dd th:text="${post.stats.comment} + ' 条'">0 条</dd>
                  </div>
                  <div>
                    <dt>所属标签</dt>
                    <dd th:text="${tag.spec.displayName}">标签</dd>
                  </div>
                </dl>

                <p class="tag-preview-excerpt" th:if="${!#strings.isEmpty(post.status.excerpt)}"
                  th:text="${post.status.excerpt}">
                  摘要
                </p>

                <a class="tag-preview-action pjax-link" data-pjax-app="reader" th:href="${post.status.permalink}">打开文章</a>
              </article>
            </th:block>
          </th:block>
        </th:block>
      </th:block>
    </th:block>
  </th:block>
</th:block>

<th:block th:fragment="ssrBlock">
  <div class="tags-shell">
    <div class="tags-workspace" th:if="${tags != null and !#lists.isEmpty(tags)}" x-data="tagsExplorer">
      <aside class="tags-sidebar">
        <p class="tags-sidebar-title">标签</p>
        <nav class="tags-sidebar-nav">
          <button type="button" class="tags-sidebar-item" th:each="tag : ${tags}" data-tags-folder
            th:attr="data-tag-key=${tag.metadata.name},data-tag-name=${tag.spec.displayName},data-tag-href=${tag.status.permalink},data-tag-count=${tag.postCount},data-tag-color=${tag.spec.color},data-tag-cover=${tag.spec.cover}"
            @click="selectTag($el.dataset.tagKey, $el.dataset.tagName, $el.dataset.tagHref, $el.dataset.tagCount, $el.dataset.tagColor, $el.dataset.tagCover)"
            :class="{ 'is-active': activeTagKey === $el.dataset.tagKey }">
            <svg class="tags-folder-icon tags-folder-icon--sidebar" viewBox="0 0 20 16" fill="none" aria-hidden="true">
              <path
                d="M1.5 4.25C1.5 3.00736 2.50736 2 3.75 2H7.375C7.94958 2 8.50106 2.22076 8.91529 2.61612L10.0897 3.75H16.25C17.4926 3.75 18.5 4.75736 18.5 6V11.75C18.5 12.9926 17.4926 14 16.25 14H3.75C2.50736 14 1.5 12.9926 1.5 11.75V4.25Z"
                fill="currentColor" />
            </svg>
            <span class="tags-sidebar-label" th:text="${tag.spec.displayName}">标签</span>
          </button>
        </nav>
      </aside>

      <section class="tags-content">
        <section class="tags-pane tags-pane--posts">
          <header class="tags-pane-header">
            <span class="tags-pane-title">文章</span>
            <span class="tags-pane-path"
              x-text="activeTagName ? activeTagName + ' · ' + (activeTagCount || 0) + ' 篇' : '未选择标签'"></span>
          </header>

          <div class="tag-posts-scroll">
            <th:block th:replace="~{::tagPostPanels(tags=${tags})}"></th:block>
          </div>
        </section>

        <aside class="tags-pane tags-pane--preview">
          <header class="tags-pane-header">
            <span class="tags-pane-title">预览</span>
            <span class="tags-pane-path"
              x-text="activePostTitle || (activeTagName ? activeTagName + ' · ' + (activeTagCount || 0) + ' 篇' : '未选择标签')"></span>
          </header>

          <div class="tags-preview-scroll">
            <th:block th:replace="~{::tagPreviewPanels(tags=${tags})}"></th:block>

            <section class="tags-preview-empty" x-show="!activePostKey" x-cloak>
              <p>选择一个标签文件夹后，中间会显示对应文章，右侧这里会预览当前文章。</p>
            </section>
          </div>
        </aside>
      </section>
    </div>

    <div class="tags-empty" th:if="${tags == null or #lists.isEmpty(tags)}">
      <h2 class="tags-empty-title">当前没有任何标签</h2>
      <p class="tags-empty-text">内容还没有整理到标签文件夹中，稍后再来查看。</p>
    </div>
  </div>
</th:block>

</html>
