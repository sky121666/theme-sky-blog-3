apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-sky-blog-3-setting
spec:
  forms:
    - group: header
      label: 外观与顶栏
      formSchema:
        - $formkit: group
          id: header_source_group
          name: source
          label: 顶栏导航源
          value:
            menu_name: primary
          children:
            - $formkit: menuRadio
              id: header_source_menu_name
              name: menu_name
              label: 提供顶栏菜单数据的后台导航
              value: primary
        - $formkit: group
          id: header_logo_group
          name: logo
          label: 品牌标识
          value:
            icon: ""
            title: ""
          children:
            - $formkit: iconify
              id: header_logo_icon
              name: icon
              label: 应用图标
              help: 左上角的应用图标。
              format: svg
            - $formkit: text
              id: header_logo_title
              name: title
              label: 应用名称
              help: 留空时默认使用站点标题；如果站点标题也为空，则不显示名称。
              value: ""
        - $formkit: group
          id: header_theme_group
          name: theme
          label: 外观模式
          value:
            enable_frontend_setting: true
            default_mode: system
          children:
            - $formkit: switch
              id: header_theme_enable_frontend_setting
              name: enable_frontend_setting
              label: 允许访客切换
              help: 是否在顶栏显示控制中心供访客切换深浅色。
              value: true
            - $formkit: toggle
              id: header_theme_default_mode
              name: default_mode
              label: 默认状态
              value: system
              options:
                - label: 跟随系统
                  value: system
                - label: 浅色
                  value: light
                - label: 深色
                  value: dark
        - $formkit: group
          id: header_dropdown_group
          name: dropdown
          label: 二级菜单
          value:
            light_bg: "rgba(88, 92, 100, 0.66)"
            dark_bg: "rgba(70, 74, 82, 0.72)"
          children:
            - $formkit: text
              id: header_dropdown_light_bg
              name: light_bg
              label: 浅色背景
              help: 二级菜单面板的浅色模式背景值，支持 rgba、rgb、hex。
              value: "rgba(88, 92, 100, 0.66)"
            - $formkit: text
              id: header_dropdown_dark_bg
              name: dark_bg
              label: 深色背景
              help: 二级菜单面板的深色模式背景值，支持 rgba、rgb、hex。
              value: "rgba(70, 74, 82, 0.72)"

    - group: desktop
      label: 桌面内容
      formSchema:
        - $formkit: group
          id: desktop_appearance_group
          name: appearance
          label: 桌面配色
          value:
            mode: preset
            preset: blue
            accent_color: "#2E5FBD"
            selection_color: "#244D9B"
            folder_color1: "#4A90E2"
            folder_color2: "#64B5F6"
            folder_color3: "#90CAF9"
          children:
            - $formkit: toggle
              id: desktop_appearance_mode
              name: mode
              label: 配色模式
              help: 选择内置方案或自定义颜色。
              value: preset
              options:
                - label: 内置
                  value: preset
                - label: 自定义
                  value: custom
            - $formkit: toggle
              id: desktop_appearance_preset
              key: desktop_appearance_preset_field
              name: preset
              label: 内置配色
              render-type: image
              size: 64
              gap: 6
              help: 选择一套内置配色。
              value: blue
              if: "$get(desktop_appearance_mode).value === 'preset'"
              options:
                - label: 海蓝
                  value: blue
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/sea-blue.svg
                - label: 紫藤
                  value: purple
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/wisteria.svg
                - label: 玫粉
                  value: pink
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/rose-pink.svg
                - label: 樱红
                  value: red
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/cherry-red.svg
                - label: 琥珀
                  value: orange
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/amber-orange.svg
                - label: 麦黄
                  value: yellow
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/wheat-yellow.svg
                - label: 森绿
                  value: green
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/forest-green.svg
                - label: 石墨
                  value: graphite
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/graphite-gray.svg
            - $formkit: color
              id: desktop_appearance_accent_color
              key: desktop_appearance_accent_color_field
              name: accent_color
              label: 全局强调色
              help: 用于强调层，包含菜单高亮、交互激活、进度条，以及搜索/评论等兼容组件按钮和线条。
              value: "#2E5FBD"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_selection_color
              key: desktop_appearance_selection_color_field
              name: selection_color
              label: 选中态颜色
              help: 用于桌面图标选中底色等 selection 状态。
              value: "#244D9B"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color1
              key: desktop_appearance_folder_color1_field
              name: folder_color1
              label: 文件夹主色调
              value: "#4A90E2"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color2
              key: desktop_appearance_folder_color2_field
              name: folder_color2
              label: 文件夹阴影层
              value: "#64B5F6"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color3
              key: desktop_appearance_folder_color3_field
              name: folder_color3
              label: 文件夹亮部层
              value: "#90CAF9"
              if: "$get(desktop_appearance_mode).value === 'custom'"
        - $formkit: group
          id: desktop_background_group
          name: background
          label: 桌面背景
          value:
            mode: preset
            image_url: ""
            solid_color: "#0f172a"
            preset: tahoe-dawn
          children:
            - $formkit: toggle
              id: desktop_background_mode
              name: mode
              label: 背景模式
              help: 选择背景来源。
              value: preset
              options:
                - label: 内置
                  value: preset
                - label: 纯色
                  value: solid
                - label: 上传
                  value: image
            - $formkit: toggle
              id: desktop_background_preset
              key: desktop_background_preset_field
              name: preset
              label: 内置背景
              render-type: image
              size: 64
              gap: 6
              help: 选择一套内置背景。
              value: tahoe-dawn
              if: "$get(desktop_background_mode).value === 'preset'"
              options:
                - label: 晨雾
                  value: tahoe-dawn
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/tahoe-dawn.svg
                - label: 湖蓝
                  value: tahoe-blue
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/tahoe-blue.svg
                - label: 松雾
                  value: sequoia-mist
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/sequoia-mist.svg
                - label: 石墨夜
                  value: graphite-night
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/graphite-night.svg
                - label: 霞粉
                  value: sonoma-sunset
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/sonoma-sunset.svg
                - label: 薄荷
                  value: aurora-mint
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/aurora-mint.svg
                - label: 淡紫
                  value: alpine-lilac
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/alpine-lilac.svg
                - label: 珊瑚
                  value: coral-haze
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/coral-haze.svg
                - label: 银霜
                  value: arctic-pearl
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/arctic-pearl.svg
                - label: 靛夜
                  value: midnight-indigo
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/midnight-indigo.svg
                - label: 金砂
                  value: golden-amber
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/golden-amber.svg
                - label: 深海
                  value: deep-sea
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/deep-sea.svg
            - $formkit: attachment
              id: desktop_background_image
              key: desktop_background_image_field
              name: image_url
              label: 桌面背景图
              value: ""
              help: 上传桌面背景图。推荐横向高清图片，避免过小图片被拉伸后失真。
              if: "$get(desktop_background_mode).value === 'image'"
              accepts:
                - "image/png"
                - "image/jpeg"
                - "image/webp"
                - "image/gif"
                - "image/svg+xml"
            - $formkit: color
              id: desktop_background_color
              key: desktop_background_color_field
              name: solid_color
              label: 桌面纯色
              help: 为桌面设置纯色背景，适合更安静、更接近极简工作桌面的风格。
              value: "#0f172a"
              if: "$get(desktop_background_mode).value === 'solid'"

        - $formkit: group
          id: desktop_icons_group
          name: icons
          label: 桌面图标
          value:
            custom_icons: []
            categories: []
            tags: []
            posts: []
            single_pages: []
          children:
            - $formkit: array
              id: desktop_icons_custom
              name: custom_icons
              label: "[自定义] 挂载图标"
              help: 自由创建兼容多种类型的桌面图标，支持自定义跳转和多种风格。
              value: []
              itemLabels:
                - type: text
                  label: $value.name
              children:
                - $formkit: text
                  id: desktop_icons_custom_name
                  name: name
                  label: 显示名称
                  validation: required
                - $formkit: text
                  id: desktop_icons_custom_href
                  name: href
                  label: 跳转链接
                  help: 提供内部路由（如 /about）或外部链接（如 https://...）。
                  validation: required
                - $formkit: select
                  id: desktop_icons_custom_type
                  name: type
                  label: 图标风格
                  options:
                    - label: 📁 文件夹 (蓝色)
                      value: folder
                    - label: 📄 文稿文件 (白色)
                      value: document
                    - label: 🌐 图标链接 (地球)
                      value: link
                  value: folder
                - $formkit: switch
                  id: desktop_icons_custom_external
                  name: external
                  label: 新窗口打开
                  help: 开启后将在浏览器新窗口打开，适用于外部链接。
                  value: false
            - $formkit: categorySelect
              id: desktop_icons_categories
              name: categories
              label: "[文件夹] 桌面分类"
              help: 下拉选择要在桌面展示的文章分类（支持多选），图标为蓝色文件夹。
              multiple: true
              value: []
            - $formkit: tagSelect
              id: desktop_icons_tags
              name: tags
              label: "[文件夹] 桌面标签"
              help: 下拉选择要在桌面展示的文章标签（支持多选），图标为蓝色文件夹。
              multiple: true
              value: []
            - $formkit: postSelect
              id: desktop_icons_posts
              name: posts
              label: "[文稿文件] 桌面多篇文章"
              help: 下拉选择要在桌面展示的任意多篇文章，图标为原生白色文稿文件。
              multiple: true
              value: []
            - $formkit: singlePageSelect
              id: desktop_icons_single_pages
              name: single_pages
              label: "[文稿文件] 桌面独立单页"
              help: 下拉选择要在桌面展示的独立单页（支持多选），图标为原生白色文稿文件。
              multiple: true
              value: []
    - group: widgets
      label: 桌面小组件
      formSchema:
        - $formkit: group
          id: widgets_behavior_group
          name: behavior
          label: 基础开关
          value:
            enabled: true
            edit_enabled: true
          children:
            - $formkit: switch
              id: widgets_behavior_enabled
              name: enabled
              label: 启用桌面小组件
              help: 小组件固定显示在桌面层，和桌面图标、Dock 一样不随 PJAX 页面切换消失。
              value: true
            - $formkit: switch
              id: widgets_behavior_edit_enabled
              name: edit_enabled
              label: 允许编辑布局
              help: 后续会进入编辑态、拖拽和添加组件面板。
              value: true
        - $formkit: array
          id: widgets_instances
          name: instances
          label: 结构化默认组件（回退）
          help: 当「默认布局」为空时，使用这里生成桌面的默认组件。列表中的组件即为默认显示组件。
          value:
            - key: clock-main
              title: 时间
              widget: system.clock
              size: small
              x: 1
              y: 1
            - key: calendar-main
              title: 日历
              widget: system.calendar
              size: small
              x: 3
              y: 1
            - key: latest-posts-main
              title: 最新文章
              widget: halo.latest_posts
              size: large
              x: 1
              y: 3
          addButton: true
          addLabel: 添加组件
          removeControl: true
          emptyText: 暂无默认组件
          itemLabels:
            - type: text
              label: $value.title
            - type: text
              label: $value.size
            - type: text
              label: $value.widget
          children:
            - $formkit: text
              id: widgets_instance_key
              name: key
              label: 实例键
              validation: required
            - $formkit: text
              id: widgets_instance_title
              name: title
              label: 显示标题
              validation: required
            - $formkit: select
              id: widgets_instance_widget
              name: widget
              label: 组件类型
              value: system.clock
              validation: required
              options:
                - label: 时间
                  value: system.clock
                - label: 日历
                  value: system.calendar
                - label: 天气
                  value: system.weather
                - label: 最新文章
                  value: halo.latest_posts
                - label: 热门文章
                  value: halo.popular_posts
                - label: 文章分类
                  value: halo.categories
                - label: 作者卡片
                  value: halo.author_card
                - label: 站点统计
                  value: halo.site_stats
                - label: 随机标签
                  value: halo.random_tags
                - label: 最新瞬间
                  value: plugin-moments.recent
            - $formkit: select
              id: widgets_instance_size
              name: size
              label: 默认尺寸
              value: medium
              options:
                - label: 小
                  value: small
                - label: 中
                  value: medium
                - label: 大
                  value: large
            - $formkit: number
              id: widgets_instance_x
              name: x
              label: 默认列起点
              value: 1
              min: 1
            - $formkit: number
              id: widgets_instance_y
              name: y
              label: 默认行起点
              value: 1
              min: 1
        - $formkit: group
          id: widgets_modules_group
          name: modules
          label: 组件内容与数据
          value:
            clock:
              show_seconds: false
            weather:
              enabled: true
              city_name: 北京
              refresh_minutes: 30
            author_card:
              enabled: true
            site_stats:
              enabled: true
          children:
            - $formkit: group
              id: widgets_module_clock_group
              name: clock
              label: 时间组件
              children:
                - $formkit: switch
                  id: widgets_module_clock_show_seconds
                  name: show_seconds
                  label: 显示秒
                  value: false
            - $formkit: group
              id: widgets_module_weather_group
              name: weather
              label: 天气组件
              children:
                - $formkit: switch
                  id: widgets_module_weather_enabled
                  name: enabled
                  label: 启用天气组件
                  help: 这里只控制天气模块是否可用，不控制天气卡片的前端视觉样式。
                  value: true
                - $formkit: text
                  id: widgets_module_weather_city_name
                  name: city_name
                  label: 默认城市
                  help: 例如：北京、杭州、Shanghai。当前版本使用固定城市模式。
                  value: 北京
                - $formkit: number
                  id: widgets_module_weather_refresh_minutes
                  name: refresh_minutes
                  label: 刷新间隔（分钟）
                  value: 30
                  min: 10
                  max: 180
            - $formkit: group
              id: widgets_module_author_card_group
              name: author_card
              label: 作者卡片组件
              children:
                - $formkit: switch
                  id: widgets_module_author_card_enabled
                  name: enabled
                  label: 启用作者卡片
                  value: true
            - $formkit: group
              id: widgets_module_site_stats_group
              name: site_stats
              label: 站点统计组件
              children:
                - $formkit: switch
                  id: widgets_module_site_stats_enabled
                  name: enabled
                  label: 启用站点统计
                  value: true

    - group: default_layout
      label: 默认布局
      formSchema:
        - $formkit: code
          id: default_layout_layout_json
          name: layout_json
          label: 已发布默认布局 JSON
          language: json
          height: 220px
          help: "由前端桌面编辑器中的「保存」动作自动写入，作为全站默认桌面布局。优先级高于桌面图标和默认组件；留空时才回退到结构化配置。"
          value: ""
    - group: dock
      label: Dock
      formSchema:
        - $formkit: group
          id: dock_source_group
          name: source
          label: Dock 数据源
          value:
            menu_name: primary
          children:
            - $formkit: menuRadio
              id: dock_source_menu_name
              name: menu_name
              label: Dock 菜单
              help: 指定哪个后台菜单作为 Dock 的数据源。
              value: primary
        - $formkit: group
          id: dock_appearance_group
          name: appearance
          label: Dock 交互
          value:
            show_labels: true
            magnification: true
          children:
            - $formkit: switch
              id: dock_appearance_show_labels
              name: show_labels
              label: 显示名称标签
              help: 控制 Dock 提示气泡是否显示名称，不影响 Dock 固定玻璃底材质。
              value: true
            - $formkit: switch
              id: dock_appearance_magnification
              name: magnification
              label: 启用放大效果
              help: 控制鼠标滑过 Dock 图标时是否启用 macOS 风格放大动画，不影响 Dock 固定玻璃底材质。
              value: true
