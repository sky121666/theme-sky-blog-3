apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-sky-blog-3-setting
spec:
  forms:
    - group: header
      label: 顶栏
      formSchema:
        - $formkit: group
          id: header_source_group
          name: source
          label: 顶栏导航源
          value:
            menu_name: primary
          children:
            - $formkit: menuRadio
              id: header_source_menu_name
              name: menu_name
              label: 提供顶栏菜单数据的后台导航
              value: primary
        - $formkit: group
          id: header_logo_group
          name: logo
          label: 品牌标识
          value:
            icon: ""
            title: ""
          children:
            - $formkit: iconify
              id: header_logo_icon
              name: icon
              label: 应用图标
              help: 左上角的应用图标。
              format: svg
            - $formkit: text
              id: header_logo_title
              name: title
              label: 应用名称
              help: 留空时默认使用站点标题；如果站点标题也为空，则不显示名称。
              value: ""
        - $formkit: group
          id: header_theme_group
          name: theme
          label: 外观模式
          value:
            enable_frontend_setting: true
            default_mode: system
          children:
            - $formkit: switch
              id: header_theme_enable_frontend_setting
              name: enable_frontend_setting
              label: 允许访客切换
              help: 是否在顶栏显示控制中心供访客切换深浅色。
              value: true
            - $formkit: toggle
              id: header_theme_default_mode
              name: default_mode
              label: 默认状态
              value: system
              options:
                - label: 跟随系统
                  value: system
                - label: 浅色
                  value: light
                - label: 深色
                  value: dark
        - $formkit: group
          id: header_dropdown_group
          name: dropdown
          label: 二级菜单
          value:
            light_bg: "rgba(88, 92, 100, 0.66)"
            dark_bg: "rgba(70, 74, 82, 0.72)"
          children:
            - $formkit: text
              id: header_dropdown_light_bg
              name: light_bg
              label: 浅色背景
              help: 二级菜单面板的浅色模式背景值，支持 rgba、rgb、hex。
              value: "rgba(88, 92, 100, 0.66)"
            - $formkit: text
              id: header_dropdown_dark_bg
              name: dark_bg
              label: 深色背景
              help: 二级菜单面板的深色模式背景值，支持 rgba、rgb、hex。
              value: "rgba(70, 74, 82, 0.72)"

    - group: desktop
      label: 桌面
      formSchema:
        - $formkit: group
          id: desktop_appearance_group
          name: appearance
          label: 强调色方案
          value:
            mode: preset
            preset: blue
            accent_color: "#2E5FBD"
            selection_color: "#244D9B"
            folder_color1: "#4A90E2"
            folder_color2: "#64B5F6"
            folder_color3: "#90CAF9"
            glass_light_color: "#FFFFFF"
            glass_dark_color: "#141414"
          children:
            - $formkit: toggle
              id: desktop_appearance_mode
              name: mode
              label: 配色模式
              help: 仅用于强调层、选中态和兼容组件桥接，不直接决定固定壳层的基底材质。
              value: preset
              options:
                - label: macOS 内置方案
                  value: preset
                - label: 自定义主题
                  value: custom
            - $formkit: select
              id: desktop_appearance_preset
              key: desktop_appearance_preset_field
              name: preset
              label: macOS 配色方案
              help: 这会统一控制强调色、选中态、文件夹色，以及搜索/评论等兼容组件的强调层。
              value: blue
              if: "$get(desktop_appearance_mode).value === 'preset'"
              options:
                - label: Blue
                  value: blue
                - label: Purple
                  value: purple
                - label: Pink
                  value: pink
                - label: Red
                  value: red
                - label: Orange
                  value: orange
                - label: Yellow
                  value: yellow
                - label: Green
                  value: green
                - label: Graphite
                  value: graphite
            - $formkit: color
              id: desktop_appearance_accent_color
              key: desktop_appearance_accent_color_field
              name: accent_color
              label: 全局强调色
              help: 用于强调层，包含菜单高亮、交互激活、进度条，以及搜索/评论等兼容组件按钮和线条。
              value: "#2E5FBD"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_selection_color
              key: desktop_appearance_selection_color_field
              name: selection_color
              label: 选中态颜色
              help: 用于桌面图标选中底色等 selection 状态。
              value: "#244D9B"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color1
              key: desktop_appearance_folder_color1_field
              name: folder_color1
              label: 文件夹主色调
              value: "#4A90E2"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color2
              key: desktop_appearance_folder_color2_field
              name: folder_color2
              label: 文件夹阴影层
              value: "#64B5F6"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color3
              key: desktop_appearance_folder_color3_field
              name: folder_color3
              label: 文件夹亮部层
              value: "#90CAF9"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_glass_light_color
              key: desktop_appearance_glass_light_color_field
              name: glass_light_color
              label: 浅色兼容层桥接色
              help: 仅用于少量前端兼容层变量桥接，不直接决定固定的 header 或 Dock 基底材质。
              value: "#FFFFFF"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_glass_dark_color
              key: desktop_appearance_glass_dark_color_field
              name: glass_dark_color
              label: 深色兼容层桥接色
              help: 仅用于少量前端兼容层变量桥接，不直接决定固定的 header 或 Dock 基底材质。
              value: "#141414"
              if: "$get(desktop_appearance_mode).value === 'custom'"

        - $formkit: group
          id: desktop_background_group
          name: background
          label: 桌面背景
          value:
            mode: preset
            image_url: ""
            solid_color: "#0f172a"
            preset: tahoe-dawn
          children:
            - $formkit: toggle
              id: desktop_background_mode
              name: mode
              label: 背景模式
              help: 选择桌面背景的来源。预设用于快速搭建 macOS 风格背景，上传图片用于自定义壁纸，纯色用于极简方案。
              value: preset
              options:
                - label: macOS 预设
                  value: preset
                - label: 上传图片
                  value: image
                - label: 纯色方案
                  value: solid
            - $formkit: toggle
              id: desktop_background_preset
              key: desktop_background_preset_field
              name: preset
              label: macOS 专用方案
              render-type: image
              size: 64
              gap: 6
              help: 通过预览卡片直接选择桌面壁纸预设。每个选项都使用独立的 SVG 预览，更接近实际桌面氛围。
              value: tahoe-dawn
              if: "$get(desktop_background_mode).value === 'preset'"
              options:
                - label: 晨雾
                  value: tahoe-dawn
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/tahoe-dawn.svg
                - label: 湖蓝
                  value: tahoe-blue
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/tahoe-blue.svg
                - label: 松雾
                  value: sequoia-mist
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/sequoia-mist.svg
                - label: 石墨夜
                  value: graphite-night
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/graphite-night.svg
                - label: 霞粉
                  value: sonoma-sunset
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/sonoma-sunset.svg
                - label: 薄荷
                  value: aurora-mint
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/aurora-mint.svg
                - label: 淡紫
                  value: alpine-lilac
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/alpine-lilac.svg
                - label: 珊瑚
                  value: coral-haze
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/coral-haze.svg
                - label: 银霜
                  value: arctic-pearl
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/arctic-pearl.svg
                - label: 靛夜
                  value: midnight-indigo
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/midnight-indigo.svg
                - label: 金砂
                  value: golden-amber
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/golden-amber.svg
                - label: 深海
                  value: deep-sea
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/deep-sea.svg
            - $formkit: attachment
              id: desktop_background_image
              key: desktop_background_image_field
              name: image_url
              label: 桌面背景图
              value: ""
              help: 上传桌面背景图。推荐横向高清图片，避免过小图片被拉伸后失真。
              if: "$get(desktop_background_mode).value === 'image'"
              accepts:
                - "image/png"
                - "image/jpeg"
                - "image/webp"
                - "image/gif"
                - "image/svg+xml"
            - $formkit: color
              id: desktop_background_color
              key: desktop_background_color_field
              name: solid_color
              label: 桌面纯色
              help: 为桌面设置纯色背景，适合更安静、更接近极简工作桌面的风格。
              value: "#0f172a"
              if: "$get(desktop_background_mode).value === 'solid'"

        - $formkit: group
          id: desktop_icons_group
          name: icons
          value:
            custom_icons: []
            categories: []
            tags: []
            posts: []
            single_pages: []
          children:
            - $formkit: array
              id: desktop_icons_custom
              name: custom_icons
              label: "[自定义] 挂载图标"
              help: 自由创建兼容多种类型的桌面图标，支持自定义跳转和多种风格。
              value: []
              itemLabels:
                - type: text
                  label: $value.name
              children:
                - $formkit: text
                  id: desktop_icons_custom_name
                  name: name
                  label: 显示名称
                  validation: required
                - $formkit: text
                  id: desktop_icons_custom_href
                  name: href
                  label: 跳转链接
                  help: 提供内部路由（如 /about）或外部链接（如 https://...）。
                  validation: required
                - $formkit: select
                  id: desktop_icons_custom_type
                  name: type
                  label: 图标风格
                  options:
                    - label: 📁 文件夹 (蓝色)
                      value: folder
                    - label: 📄 文稿文件 (白色)
                      value: document
                    - label: 🌐 图标链接 (地球)
                      value: link
                  value: folder
                - $formkit: switch
                  id: desktop_icons_custom_external
                  name: external
                  label: 新窗口打开
                  help: 开启后将在浏览器新窗口打开，适用于外部链接。
                  value: false
            - $formkit: categorySelect
              id: desktop_icons_categories
              name: categories
              label: "[文件夹] 桌面分类"
              help: 下拉选择要在桌面展示的文章分类（支持多选），图标为蓝色文件夹。
              multiple: true
              value: []
            - $formkit: tagSelect
              id: desktop_icons_tags
              name: tags
              label: "[文件夹] 桌面标签"
              help: 下拉选择要在桌面展示的文章标签（支持多选），图标为蓝色文件夹。
              multiple: true
              value: []
            - $formkit: postSelect
              id: desktop_icons_posts
              name: posts
              label: "[文稿文件] 桌面多篇文章"
              help: 下拉选择要在桌面展示的任意多篇文章，图标为原生白色文稿文件。
              multiple: true
              value: []
            - $formkit: singlePageSelect
              id: desktop_icons_single_pages
              name: single_pages
              label: "[文稿文件] 桌面独立单页"
              help: 下拉选择要在桌面展示的独立单页（支持多选），图标为原生白色文稿文件。
              multiple: true
              value: []

    - group: dock
      label: Dock
      formSchema:
        - $formkit: group
          id: dock_source_group
          name: source
          label: Dock 数据源
          value:
            menu_name: primary
          children:
            - $formkit: menuRadio
              id: dock_source_menu_name
              name: menu_name
              label: Dock 菜单
              help: 指定哪个后台菜单作为 Dock 的数据源。
              value: primary
        - $formkit: group
          id: dock_appearance_group
          name: appearance
          label: Dock 交互
          value:
            show_labels: true
            magnification: true
          children:
            - $formkit: switch
              id: dock_appearance_show_labels
              name: show_labels
              label: 显示名称标签
              help: 控制 Dock 提示气泡是否显示名称，不影响 Dock 固定玻璃底材质。
              value: true
            - $formkit: switch
              id: dock_appearance_magnification
              name: magnification
              label: 启用放大效果
              help: 控制鼠标滑过 Dock 图标时是否启用 macOS 风格放大动画，不影响 Dock 固定玻璃底材质。
              value: true
