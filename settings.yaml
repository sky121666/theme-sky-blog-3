apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-sky-blog-3-setting
spec:
  forms:
    - group: navigation
      label: 菜单
      formSchema:
        - $formkit: group
          id: navigation_header_group
          name: header
          label: Header 顶栏菜单
          help: 用于桌面顶栏和移动端菜单，适合结构完整的主导航。
          value:
            menu_name: ""
          children:
            - $formkit: menuRadio
              id: navigation_source_header_menu_name
              name: menu_name
              label: 后台菜单
              help: 一级菜单显示在顶栏；带二级菜单的一级项会作为分组入口展示，移动端按分组展开。留空时沿用旧版 Header 菜单设置或 primary。
              value: ""
        - $formkit: group
          id: navigation_dock_group
          name: dock
          label: Dock 快捷入口菜单
          help: 用于底部 Dock 图标，适合扁平快捷入口菜单。
          value:
            menu_name: ""
          children:
            - $formkit: menuRadio
              id: navigation_source_dock_menu_name
              name: menu_name
              label: 后台菜单
              help: 只读取一级菜单项，二级菜单不会展开。留空时沿用旧版 Dock 菜单设置或 primary。
              value: ""

    - group: header
      label: 顶栏
      formSchema:
        - $formkit: group
          id: header_logo_group
          name: logo
          label: 品牌标识
          value:
            icon: ""
            title: ""
          children:
            - $formkit: iconify
              id: header_logo_icon
              name: icon
              label: 应用图标
              help: 左上角的应用图标。
              format: svg
            - $formkit: text
              id: header_logo_title
              name: title
              label: 应用名称
              help: 留空时默认使用站点标题；如果站点标题也为空，则不显示名称。
              value: ""
        - $formkit: group
          id: header_theme_group
          name: theme
          label: 外观模式
          value:
            enable_frontend_setting: true
            default_mode: system
          children:
            - $formkit: switch
              id: header_theme_enable_frontend_setting
              name: enable_frontend_setting
              label: 允许访客切换
              help: 是否在顶栏显示控制中心供访客切换深浅色。
              value: true
            - $formkit: toggle
              id: header_theme_default_mode
              name: default_mode
              label: 默认状态
              value: system
              options:
                - label: 跟随系统
                  value: system
                - label: 浅色
                  value: light
                - label: 深色
                  value: dark
        - $formkit: group
          id: header_actions_group
          name: actions
          label: 开关
          value:
            search_enabled: true
            auth_enabled: true
            mobile_menu_enabled: true
          children:
            - $formkit: switch
              id: header_actions_search_enabled
              name: search_enabled
              label: 搜索
              help: 关闭后会同时隐藏搜索按钮并禁用 Cmd/Ctrl + K。
              value: true
            - $formkit: switch
              id: header_actions_auth_enabled
              name: auth_enabled
              label: 登录
              help: 仅控制 Header 的登录入口，固定跳转到 /login。
              value: true
            - $formkit: switch
              id: header_actions_mobile_menu_enabled
              name: mobile_menu_enabled
              label: 启用手机端菜单
              help: 关闭后，小屏幕顶部不再提供一级导航入口。
              value: true
        - $formkit: group
          id: header_time_group
          name: time
          label: 时间格式方案
          value:
            enabled: true
            desktop_preset: month-day-weekday-time
            mobile_preset: time-only
            hour_cycle: 12
          children:
            - $formkit: switch
              id: header_time_enabled
              name: enabled
              label: 显示时间
              value: true
            - $formkit: toggle
              id: header_time_desktop_preset
              name: desktop_preset
              label: 桌面端格式
              value: month-day-weekday-time
              options:
                - label: 仅时间
                  value: time-only
                - label: 时间含秒
                  value: time-seconds
                - label: 日期 + 时间
                  value: date-time
                - label: 星期 + 日期 + 时间
                  value: weekday-date-time
                - label: 月日 + 星期 + 时间
                  value: month-day-weekday-time
            - $formkit: toggle
              id: header_time_mobile_preset
              name: mobile_preset
              label: 手机端格式
              help: 默认建议只显示时间。
              value: time-only
              options:
                - label: 仅时间
                  value: time-only
                - label: 时间含秒
                  value: time-seconds
                - label: 日期 + 时间
                  value: date-time
                - label: 星期 + 日期 + 时间
                  value: weekday-date-time
                - label: 月日 + 星期 + 时间
                  value: month-day-weekday-time
            - $formkit: toggle
              id: header_time_hour_cycle
              name: hour_cycle
              label: 小时制
              value: 12
              options:
                - label: 12 小时
                  value: 12
                - label: 24 小时
                  value: 24
        - $formkit: group
          id: header_auth_group
          name: auth
          label: 登录入口
          value:
            login_label: 登录
          children:
            - $formkit: text
              id: header_auth_login_label
              name: login_label
              label: 登录文案
              help: 顶栏和手机端登录入口统一使用这个文案。
              value: 登录
        - $formkit: group
          id: header_icons_group
          name: icons
          label: 工具栏图标
          help: 留空则使用主题内置默认图标，配置后将覆盖对应按钮图标。
          value:
            mobile_menu: ""
            search: ""
            auth: ""
            theme_light: ""
            theme_dark: ""
          children:
            - $formkit: iconify
              id: header_icons_mobile_menu
              name: mobile_menu
              label: 菜单按钮
              help: 留空使用主题默认图标。
              format: svg
            - $formkit: iconify
              id: header_icons_search
              name: search
              label: 搜索按钮
              help: 留空使用主题默认图标。
              format: svg
            - $formkit: iconify
              id: header_icons_auth
              name: auth
              label: 登录按钮
              help: 留空使用主题默认图标。
              format: svg
            - $formkit: iconify
              id: header_icons_theme_light
              name: theme_light
              label: 浅色模式
              help: 留空使用主题默认图标。
              format: svg
            - $formkit: iconify
              id: header_icons_theme_dark
              name: theme_dark
              label: 深色模式
              help: 留空使用主题默认图标。
              format: svg
        - $formkit: group
          id: header_dropdown_group
          name: dropdown
          label: 二级菜单
          value:
            light_bg: "rgba(88, 92, 100, 0.66)"
            dark_bg: "rgba(70, 74, 82, 0.72)"
          children:
            - $formkit: text
              id: header_dropdown_light_bg
              name: light_bg
              label: 浅色背景
              help: 二级菜单面板的浅色模式背景值，支持 rgba、rgb、hex。
              value: "rgba(88, 92, 100, 0.66)"
            - $formkit: text
              id: header_dropdown_dark_bg
              name: dark_bg
              label: 深色背景
              help: 二级菜单面板的深色模式背景值，支持 rgba、rgb、hex。
              value: "rgba(70, 74, 82, 0.72)"

    - group: desktop
      label: 桌面
      formSchema:
        - $formkit: group
          id: desktop_appearance_group
          name: appearance
          label: 桌面配色
          value:
            mode: preset
            preset: blue
            accent_color: "#2E5FBD"
            selection_color: "#244D9B"
            folder_color1: "#4A90E2"
            folder_color2: "#64B5F6"
            folder_color3: "#90CAF9"
          children:
            - $formkit: toggle
              id: desktop_appearance_mode
              name: mode
              label: 配色模式
              help: 选择内置方案或自定义颜色。
              value: preset
              options:
                - label: 内置
                  value: preset
                - label: 自定义
                  value: custom
            - $formkit: toggle
              id: desktop_appearance_preset
              key: desktop_appearance_preset_field
              name: preset
              label: 内置配色
              render-type: image
              size: 64
              gap: 6
              help: 选择一套内置配色。
              value: blue
              if: "$get(desktop_appearance_mode).value === 'preset'"
              options:
                - label: 海蓝
                  value: blue
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/sea-blue.svg
                - label: 紫藤
                  value: purple
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/wisteria.svg
                - label: 玫粉
                  value: pink
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/rose-pink.svg
                - label: 樱红
                  value: red
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/cherry-red.svg
                - label: 琥珀
                  value: orange
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/amber-orange.svg
                - label: 麦黄
                  value: yellow
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/wheat-yellow.svg
                - label: 森绿
                  value: green
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/forest-green.svg
                - label: 石墨
                  value: graphite
                  render: /themes/theme-sky-blog-3/assets/images/color-schemes/graphite-gray.svg
            - $formkit: color
              id: desktop_appearance_accent_color
              key: desktop_appearance_accent_color_field
              name: accent_color
              label: 全局强调色
              help: 用于强调层，包含菜单高亮、交互激活、进度条，以及搜索/评论等兼容组件按钮和线条。
              value: "#2E5FBD"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_selection_color
              key: desktop_appearance_selection_color_field
              name: selection_color
              label: 选中态颜色
              help: 用于桌面图标选中底色等 selection 状态。
              value: "#244D9B"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color1
              key: desktop_appearance_folder_color1_field
              name: folder_color1
              label: 文件夹主色调
              value: "#4A90E2"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color2
              key: desktop_appearance_folder_color2_field
              name: folder_color2
              label: 文件夹阴影层
              value: "#64B5F6"
              if: "$get(desktop_appearance_mode).value === 'custom'"
            - $formkit: color
              id: desktop_appearance_folder_color3
              key: desktop_appearance_folder_color3_field
              name: folder_color3
              label: 文件夹亮部层
              value: "#90CAF9"
              if: "$get(desktop_appearance_mode).value === 'custom'"
        - $formkit: group
          id: desktop_background_group
          name: background
          label: 桌面背景
          value:
            mode: preset
            image_url: ""
            solid_color: "#0f172a"
            preset: tahoe-dawn
          children:
            - $formkit: toggle
              id: desktop_background_mode
              name: mode
              label: 背景模式
              help: 选择背景来源。
              value: preset
              options:
                - label: 内置
                  value: preset
                - label: 纯色
                  value: solid
                - label: 上传
                  value: image
            - $formkit: toggle
              id: desktop_background_preset
              key: desktop_background_preset_field
              name: preset
              label: 内置背景
              render-type: image
              size: 64
              gap: 6
              help: 选择一套内置背景。
              value: tahoe-dawn
              if: "$get(desktop_background_mode).value === 'preset'"
              options:
                - label: 晨雾
                  value: tahoe-dawn
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/tahoe-dawn.svg
                - label: 湖蓝
                  value: tahoe-blue
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/tahoe-blue.svg
                - label: 松雾
                  value: sequoia-mist
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/sequoia-mist.svg
                - label: 石墨夜
                  value: graphite-night
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/graphite-night.svg
                - label: 霞粉
                  value: sonoma-sunset
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/sonoma-sunset.svg
                - label: 薄荷
                  value: aurora-mint
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/aurora-mint.svg
                - label: 淡紫
                  value: alpine-lilac
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/alpine-lilac.svg
                - label: 珊瑚
                  value: coral-haze
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/coral-haze.svg
                - label: 银霜
                  value: arctic-pearl
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/arctic-pearl.svg
                - label: 靛夜
                  value: midnight-indigo
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/midnight-indigo.svg
                - label: 金砂
                  value: golden-amber
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/golden-amber.svg
                - label: 深海
                  value: deep-sea
                  render: /themes/theme-sky-blog-3/assets/images/wallpaper-presets/deep-sea.svg
            - $formkit: attachment
              id: desktop_background_image
              key: desktop_background_image_field
              name: image_url
              label: 桌面背景图
              value: ""
              help: 上传桌面背景图。推荐横向高清图片，避免过小图片被拉伸后失真。
              if: "$get(desktop_background_mode).value === 'image'"
              accepts:
                - "image/png"
                - "image/jpeg"
                - "image/webp"
                - "image/gif"
                - "image/svg+xml"
            - $formkit: color
              id: desktop_background_color
              key: desktop_background_color_field
              name: solid_color
              label: 桌面纯色
              help: 为桌面设置纯色背景，适合更安静、更接近极简工作桌面的风格。
              value: "#0f172a"
              if: "$get(desktop_background_mode).value === 'solid'"

        - $formkit: group
          id: desktop_icons_group
          name: icons
          label: 桌面图标
          value:
            custom_icons: []
            categories: []
            tags: []
            posts: []
            single_pages: []
          children:
            - $formkit: array
              id: desktop_icons_custom
              name: custom_icons
              label: "[自定义] 挂载图标"
              help: 自由创建兼容多种类型的桌面图标，支持自定义跳转和多种风格。
              value: []
              itemLabels:
                - type: text
                  label: $value.name
              children:
                - $formkit: text
                  id: desktop_icons_custom_name
                  name: name
                  label: 显示名称
                  validation: required
                - $formkit: text
                  id: desktop_icons_custom_href
                  name: href
                  label: 跳转链接
                  help: 提供内部路由（如 /about）或外部链接（如 https://...）。
                  validation: required
                - $formkit: select
                  id: desktop_icons_custom_type
                  name: type
                  label: 图标风格
                  options:
                    - label: 📁 文件夹 (蓝色)
                      value: folder
                    - label: 📄 文稿文件 (白色)
                      value: document
                    - label: 🌐 图标链接 (地球)
                      value: link
                  value: folder
                - $formkit: switch
                  id: desktop_icons_custom_external
                  name: external
                  label: 新窗口打开
                  help: 开启后将在浏览器新窗口打开，适用于外部链接。
                  value: false
            - $formkit: categorySelect
              id: desktop_icons_categories
              name: categories
              label: "[文件夹] 桌面分类"
              help: 下拉选择要在桌面展示的文章分类（支持多选），图标为蓝色文件夹。
              multiple: true
              value: []
            - $formkit: tagSelect
              id: desktop_icons_tags
              name: tags
              label: "[文件夹] 桌面标签"
              help: 下拉选择要在桌面展示的文章标签（支持多选），图标为蓝色文件夹。
              multiple: true
              value: []
            - $formkit: postSelect
              id: desktop_icons_posts
              name: posts
              label: "[文稿文件] 桌面多篇文章"
              help: 下拉选择要在桌面展示的任意多篇文章，图标为原生白色文稿文件。
              multiple: true
              value: []
            - $formkit: singlePageSelect
              id: desktop_icons_single_pages
              name: single_pages
              label: "[文稿文件] 桌面独立单页"
              help: 下拉选择要在桌面展示的独立单页（支持多选），图标为原生白色文稿文件。
              multiple: true
              value: []
    - group: widgets
      label: 小组件
      formSchema:
        - $formkit: group
          id: widgets_behavior_group
          name: behavior
          label: 显示与编辑
          value:
            enabled: true
            hide_on_mobile: false
            edit_enabled: true
            fallback_cover: ""
          children:
            - $formkit: switch
              id: widgets_behavior_enabled
              name: enabled
              label: 启用桌面小组件
              help: 小组件固定显示在桌面层，和桌面图标、Dock 一样不随 PJAX 页面切换消失。
              value: true
            - $formkit: switch
              id: widgets_behavior_hide_on_mobile
              name: hide_on_mobile
              label: 手机端不显示小组件
              help: 开启后，当视口宽度不大于 640px 时隐藏桌面小组件，仅保留桌面图标和 Dock。
              value: false
            - $formkit: switch
              id: widgets_behavior_edit_enabled
              name: edit_enabled
              label: 允许编辑布局
              help: 后续会进入编辑态、拖拽和添加组件面板。
              value: true
            - $formkit: attachment
              id: widgets_behavior_fallback_cover
              name: fallback_cover
              label: 组件回退封面
              help: 当文章没有封面图时，小组件将使用此图片作为占位。留空则显示纯色占位。
              value: ""
              accepts:
                - "image/png"
                - "image/jpeg"
                - "image/webp"

        - $formkit: group
          id: widgets_modules_group
          name: modules
          label: 组件参数
          value:
            weather:
              city_name: 北京
              refresh_minutes: 30
          children:
            - $formkit: group
              id: widgets_module_weather_group
              name: weather
              label: 天气组件
              children:
                - $formkit: text
                  id: widgets_module_weather_city_name
                  name: city_name
                  label: 默认城市
                  help: 例如：北京、杭州、Shanghai。当前版本使用固定城市模式。
                  value: 北京
                - $formkit: number
                  id: widgets_module_weather_refresh_minutes
                  name: refresh_minutes
                  label: 刷新间隔（分钟）
                  value: 30
                  min: 10
                  max: 180

    - group: sidebar
      label: 侧边栏
      formSchema:
        - $formkit: group
          id: sidebar_notification_center_group
          name: notification_center
          label: 通知中心
          value:
            title: 通知中心
            guest_title: 小组件
            default_open: false
          children:
            - $formkit: text
              id: sidebar_notification_center_title
              name: title
              label: 名称
              help: 显示在右侧侧边栏顶部。未登录时侧边栏只展示小组件区域。
              value: 通知中心
            - $formkit: text
              id: sidebar_notification_center_guest_title
              name: guest_title
              label: 未登录名称
              help: 未登录访客打开右侧侧边栏时显示的标题。
              value: 小组件
            - $formkit: switch
              id: sidebar_notification_center_default_open
              name: default_open
              label: 默认展开
              help: 开启后，进入桌面壳层页面时自动展开一次右侧侧边栏；PJAX 页面切换不会反复展开。
              value: false

    - group: dock
      label: Dock
      formSchema:
        - $formkit: group
          id: dock_appearance_group
          name: appearance
          label: Dock 外观与交互
          value:
            show_labels: true
            magnification: true
            icon_size: 48
            icon_gap: 4
            dock_padding: 6
            magnification_scale: 1.4
            glass_blur: 60
            glass_opacity: 28
          children:
            - $formkit: switch
              id: dock_appearance_show_labels
              name: show_labels
              label: 显示名称标签
              help: 控制 Dock 提示气泡是否显示名称。
              value: true
            - $formkit: switch
              id: dock_appearance_magnification
              name: magnification
              label: 启用放大效果
              help: 控制鼠标滑过 Dock 图标时是否启用 macOS 风格放大动画。
              value: true
            - $formkit: number
              id: dock_appearance_icon_size
              name: icon_size
              label: 图标大小
              help: Dock 图标的基础尺寸，范围 36–64 px。
              value: 48
              min: 36
              max: 64
              step: 2
            - $formkit: number
              id: dock_appearance_icon_gap
              name: icon_gap
              label: 图标间距
              help: Dock 图标之间的间距，范围 2–12 px。
              value: 4
              min: 2
              max: 12
              step: 1
            - $formkit: number
              id: dock_appearance_dock_padding
              name: dock_padding
              label: 内边距
              help: Dock 玻璃面板边缘到图标之间的间距，范围 4–16 px。
              value: 6
              min: 4
              max: 16
              step: 1
            - $formkit: number
              id: dock_appearance_magnification_scale
              name: magnification_scale
              label: 放大倍率
              help: 鼠标悬停时的最大放大比例，范围 1.0–2.0（1.0 = 不放大）。
              value: 1.4
              min: 1
              max: 2
              step: 0.1
            - $formkit: number
              id: dock_appearance_glass_blur
              name: glass_blur
              label: 背景模糊
              help: Dock 玻璃背景的模糊半径，范围 20–100 px。
              value: 60
              min: 20
              max: 100
              step: 5
            - $formkit: number
              id: dock_appearance_glass_opacity
              name: glass_opacity
              label: 背景透明度
              help: Dock 玻璃背景的不透明度，范围 10–80%，数值越小越透明。
              value: 28
              min: 10
              max: 80
              step: 2

    - group: moments
      label: 瞬间
      formSchema:
        - $formkit: group
          id: moments_cover_group
          name: cover
          label: 封面背景
          value:
            image_url: ""
          children:
            - $formkit: attachment
              id: moments_cover_image
              name: image_url
              label: 封面图片
              help: 推荐横向图片，避免头像区被遮挡。留空时不显示封面。
              value: ""
              accepts:
                - "image/png"
                - "image/jpeg"
                - "image/webp"
        - $formkit: group
          id: moments_profile_group
          name: profile
          label: 封面名片
          value:
            display_name: ""
            subtitle: ""
          children:
            - $formkit: text
              id: moments_profile_display_name
              name: display_name
              label: 封面名称
              help: 留空时默认使用站点标题。
              value: ""
            - $formkit: text
              id: moments_profile_subtitle
              name: subtitle
              label: 封面副标题
              help: 留空时默认使用站点副标题。显示在封面名称下方。
              value: ""
        - $formkit: group
          id: moments_style_group
          name: style
          label: 界面风格
          value:
            color_mode: wechat
          children:
            - $formkit: radio
              id: moments_style_color_mode
              name: color_mode
              label: 配色模式
              help: 微信风格使用固定朋友圈配色；跟随主题会映射桌面主题色。
              value: wechat
              options:
                - label: 微信风格
                  value: wechat
                - label: 跟随主题
                  value: theme

        - $formkit: group
          id: moments_publish_group
          name: publish
          label: 前端发布
          help: 控制瞬间页面标题栏的前端发布入口。
          value:
            enabled: true
            image_upload: true
            video_upload: true
            audio_upload: true
          children:
            - $formkit: switch
              id: moments_publish_enabled
              name: enabled
              label: 启用前端发布
              help: 允许登录用户在前端发布瞬间。
              value: true
            - $formkit: switch
              name: image_upload
              if: $get(moments_publish_enabled).value
              label: 启用图片上传
              help: 通过 Halo UC 附件接口上传图片。
              value: true
            - $formkit: switch
              name: video_upload
              if: $get(moments_publish_enabled).value
              label: 启用视频上传
              help: 通过 Halo UC 附件接口上传视频。
              value: true
            - $formkit: switch
              name: audio_upload
              if: $get(moments_publish_enabled).value
              label: 启用音频上传
              help: 通过 Halo UC 附件接口上传音频。
              value: true

